更潑第二杓惡水拗折拄杖將什麼登山渡水拈却鉢盂匙筯將什麼喫粥喫飯於斯薦得共賀太平若也未然切忌無繩自縛住興教入院僧問妙喜和尚道喚作竹篦則觸不喚作竹篦則背不得有語不得無語不得下喝不得拂袖便行到者裏作麼生師云一時交點與園頭僧云不因今日爭識得妙喜師云你道老僧有幾莖蓋膽毛僧云捉敗了也便禮拜師云猶隔海在師乃云歸源無二掃昏霧而心鏡長明方便門多廓性天而情塵不夜頓除己有剗盡根源含衆妙而有餘坐大方而獨照且道不傷物義一句作麼生橫按鏌鎁全正令太平寰宇斬癡頑剖玄機於未兆已涉廉纖揮露刃於人前轉見敗闕去此二途如何即是風卷浮雲空界淨夜來明月落階前舉僧問雲門樹凋葉落時如何門云體露金風師云雲門眼睛被這僧剜出了也諸人還知麼良久云惜取眉毛好舉盤山道光非照境境亦非存光境俱忘復是何物洞山云光境未忘復是何物師云前來半斤後來八兩斤兩分明一對漆桶時當亞歲節屆書雲不萌枝上喚春歸無影樹頭增秀色且道衲僧分上事如何卷舒立方外乾坤縱橫挂壺中日月臘月一雪凍草枯水寒冰結黃河絶流虗空迸裂若將此語定綱宗敢保老兄猶未徹四海共遵靈鷲制九旬禁足自蕭然飢餐渴飲隨緣過禪道是非掃一邊知我者謂我深錐痛劄不知我者謂我弔影揚鞭畢竟如何月中丹桂和根拔水底泥牛驀角牽即心即佛千山萬水非心非佛草窠裡輥向上一路千聖不傳熱碗鳴聲三邊若得渾無事四海何愁不太平退靈隱云踢倒飛來回首去倒騎佛殿出皇都須知此外封疆闕八面騰騰任卷舒頌古芭蕉拄杖子趙州狗子無佛性倒握毒蛇橫古路背騎猛虎舞三臺收來放去無多子鐵眼銅睛被活埋趙州狗子無佛性當空掘出秦時鏡光明渾不見星兒上下四維俱徹映有僧不看經尊宿問云何不看經僧云不識字宿云何不問人僧展手云是什麼字宿無對袖中寶劍摩星斗肘後靈符照八方撥轉目前關捩子從教天下竟忙忙衡陽別妙喜老師寄育王廓和尚倒騎鐵馬渡瀟湘㵎草巖花不覆藏回鴈峯高親到頂了無佛法可商量向來事業俱荒廢即體生涯逈一空慚愧此身無被蓋百般癡鈍玷宗風石佛空谷與禪人積念有年瞻石佛今朝一見絶疑猜都盧面目只如此却道三生鑿出來谷空空谷谷空空空谷全超萬象中流水落花渾不見清風明月却相容家山有路應須到到得家山未是歸拈轉杖頭俱劃斷好看午夜太陽輝為性上人秉炬為巳上人入塔提起火把云喚作火炬即觸不喚作火炬即背翻身透出兩頭深入火光三昧畢竟如何但盡凡情別無聖解喝一喝刀山劍樹橫身去烈火堆中轉步來直下二途俱不涉白雲影裏笑咍咍且道笑箇什麼諸人於此見得便見正巳上人當處出生隨處滅盡其或未然泥牛吼斷千山月木馬嘶開萬里風遁菴演和尚語嗣大慧上堂乾坤之內宇宙之間中有一寶祕在形山者箇說話喚作管中窺豹是諸人各各具此無上大寶直得包括乾坤宇宙四大形山於此寶上如海一漚發而今諸人要見此寶麼開眼也著合眼也著擬議躊躇放過一著今朝三月初十大野和風襲襲不用轉腦回頭向此一時證入入則易出則難敢問諸人如何是出身一句鳳凰不是凡間羽不得梧桐誓不棲病起云空病有為藥有病空為藥空有兩俱非藥病何處著無處著萬里秋風飛一鶚解夏云九旬禁足精修今朝休夏自恣山僧不敢自瞞於中罪過有五一不合說大脫空二不合拋沙撒土三不合將龍眼核換人眼睛四不合毀佛謗祖五咄洎合錯舉便下座中秋舉吾心似秋月碧潭清皎潔無物堪比倫教我如何說大衆寒山子比也比了也說也說了也且從諸人點頭咽唾忽若月落潭枯莫道諸人討頭鼻不著設使寒山子親到也則未免腳跟下黑漆漆地衆中莫有透出重關者麼出來與華藏相見良久云無人知此意令我憶南泉舉臥龍西堂掛牌云入聖超凡不作聲臥龍常怖碧潭清人生若得長如此大地那能留一名龍牙這箇說話只可獨善其身華藏即不然入聖超凡既有聲臥龍誰顧碧潭清快須鼓浪興雲雨莫負從前濟物心今朝臘月初一次第年窮歲畢從教萬物凋零豎起拂子云這箇元無變易諸禪老知不知孤逈逈峭巍巍拈來拋擲太湖裏下載清風付與誰謝知事頭首云大川欲濟須舟楫大廈謀成必巨材又是一年能事畢山僧贏得笑咍咍敢問大衆且道笑箇什麼菩薩子喫飯來若是飯籮裏坐道饑也怪華藏不得三界無法何處求心還見麼四大本空佛依何住還知麼知得下落見得分曉華藏門下朝打三千暮打八百且匾擔驀折兩頭脫一句作麼生道三頭六臂擎天地忿怒那吒撲帝鐘人間鑠石流金世外風高月冷要知二無兩般須是一回自肯敢問大衆且道自肯後如何鑊湯爐炭橫身入劍樹刀山信腳行一日一日復一日次第年窮歲暮來莫道東君無面目梅花依舊雪中開見便見絶疑猜燈籠㳂壁上天台凡聖體真猶存見隔見存即凡情亡即佛然則佛之一字吾不喜聞是故衲僧家逢佛殺佛逢祖殺祖遇阿羅漢殺阿羅漢敢問諸人削髮染衣當依佛住既殺却佛復何所依還相委悉麼漢地不收秦不管又騎驢子下楊州病起云今朝季冬朔旦歲月不可把玩各請打辦精神了却未了公案敢問大衆阿那箇是未了公案有我即病生無我即病滅我病兩俱非萬里一條鐵更有末後句待款款地與諸人說雲門一曲子臘月二十五唱高和得齊大棒出去敢問大衆既是唱高和得齊為什麼却打他勸君更盡一杯酒西出陽關無故人浴佛云今朝乃我佛如來降誕之辰所至叢林例皆浴佛因記得僧問寶峯䖍和尚銅鐵之像則且置今朝浴什麼佛峯云煮煠不爛師云好大衆古人開口見膽只是罕遇知音華藏忍俊不禁要與下箇注腳諸人要識煮煠不爛底麼杓兒才舉處不用更沈吟端午舉文殊令善財採藥云是藥者採將來善財遍觀無不是藥却來白云無不是藥文殊云是藥者採將來善財乃拈一枝草度與文殊文殊提起示衆云此藥亦能殺人亦能活人師云善財童子採來親大智文殊用得靈今日青山端午節不勞拈出再施呈何故幸自可憐生無以藥為病古人道似地擎山不知山之孤峻如石含玉不知玉之無瑕若能如是是真出家古人恁麼道華藏即不然似地擎山不知山之孤峻如石含玉不知玉之無瑕若能如是辜負出家何也如是則易不如是則難擊碎無瑕之玉推倒孤峻之山橫按鏌鎁全正令太平寰宇斬癡頑舉保寧勇和尚示衆云保寧有箇無價擔子雖無毫釐斤兩須是有力者方能荷負得去且道誰是荷負者顧大衆云不可更待鐫名鑿字也師拈云保寧雖則不鐫名鑿字未免藏身露影笑破衲僧鼻孔華藏道是諸人人人具有此擔箇箇荷負得行湘淮江浙川廣福建到處去來了無疏失只是不肯放下驀然放得下管取呵呵大笑受用無窮驀召大衆衆舉首師喝云放下著便下座今朝臘月十有五摩那擊動三通鼓諸人不是不將來山僧不是不分付麻三斤柏樹子德山歌道吾舞此道今人棄如土阿呵呵較些子發機須是千鈞弩有一語沒人知最親切又希奇曉來和露看只缺一聲啼有般瞎漢背地裏笑曰這箇是雞冠花詩誰人不知還曾夢見麼下座舉達磨大師道吾本來茲土傳法救迷情白雲和尚道祖師豈不知有一花開五葉結果自然成白雲道因風吹火用力不多師云達磨祖師不枉西東白雲和尚不謾注腳故得子子孫孫千古家聲不墜華藏跛跛挈挈百醜千拙雖然用盡腕頭力爭奈諸人如風過樹只麼休去要且不甘試作死馬醫看以拄杖敲繩牀云阿㖿阿㖿雖是木頭也知痛癢至節云無邊不動虗空體不拒陰陽去復來誰道一雙窮相手未嘗容易舞三臺遂舉手云華藏今日不捨道法現凡夫事供養大衆去也復云休休一九與二九且舞一半舉趙州和尚道我十八上便會作活計南泉和尚道我十八上會破家散宅師云趙州南泉也是徐六擔板只見一邊華藏也無活計可做也無家宅可破逢人突出老拳要伊直下便到且道到後如何三十六峯觀不足却來平地倒騎驢舉三聖問雪峯透網金鱗以何為食峯云待汝出網來即向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事繁師拈云張侯白李侯黑硬如綿軟如鐵驀路相逢兩會家臨濟未是白拈賊一九與二九相逢不出手面面各相看人人自知有你若野犴鳴我便獅子吼我若野犴鳴你亦獅子吼十字縱橫自在行切忌隨人背後走摩尼珠人不識如來藏裏親收得收者易見者難見者易用則難見得用得二無兩般閒把一枝歸去笛夜深吹過汨羅灣今朝四月一春去無蹤跡拈拄杖云衲僧拄杖子依舊光黑漆復舉云看看旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周遂擲下云盡情拋擲太湖裏下載清風孰與儔散祈雨道場云萬里不挂片雲虗空正好喫棒古今無間令不虗行遂舉拂子云是故過去諸佛現在諸佛未來諸佛西天二十八祖唐土六祖天下老和尚乃至古往今來諸善知識盡在這裏震法雷擊法鼓布慈雲灑甘露直得靈苗增秀氣瑞草發祥光且道林下衲僧以何報德蒲團時倚無他事永日寥寥賀太平謝知事頭首拈拄杖示衆云還見麼卓一下云還聞麼聞見分明是箇什麼觀音大士弘悲願千臂莊嚴千眼明定慧慈威咸具足山僧贏得不惺惺今朝十月十五有誤諸人來此山僧口似匾擔說禪煩拄杖子卓拄杖一下云一擊忘所知更不假修持黑蛇當大路獅子逞全威有句無句如藤倚樹打破油甕討甚老鼠楖𣗖橫擔不顧人直入千峯萬峯去無邊剎境自他不隔毫端十世古今始終不離當念東勝身洲打鼓西瞿耶尼上堂南閻浮提展鉢開單北鬱單越喫粥喫飯三世諸佛歷代祖師天下老和尚古往今來諸善知識總在這裏兩日來好雪演上座不可更向雪上加霜各自歸堂喫茶去今朝已是三月半到處桃花開爛熳多少遊人眼不開靈雲一見疑情斷諦當甚諦當敢保老兄猶未徹且道玄沙意作麼生伯牙與子期不是間相識小參冬至舉五祖和尚道將四大海水為一枚硯須彌山作一管筆若人向虗空裏寫得祖師西來意五字白雲下座大展坐具禮拜為師若寫不得佛法無靈驗大衆以虗空為紙海水為硯須彌為筆只寫五字有什麼難處華藏道若有人不假紙筆墨硯一大藏教五千四十八卷天下老和尚所說法門一時寫畢華藏要伊為走使若寫不得上大人丘乙己化三千七十士爾小生八九子佳作人可知禮也且熟念然後順朱莫道老僧壓良為賤結夏舉達磨大師一日謂門人曰汝等盍各言其所得時道副對曰如我所見不執文字不離文字而為道用磨曰汝得吾皮尼總持曰如我所見如慶喜見阿閦佛國一見更不再見磨曰汝得吾肉道育曰四大本空五陰非有如我見處無一法可當情磨曰汝得吾骨二祖出禮三拜依位而立磨曰汝得吾髓師拈云缺齒胡僧輸機是算人之本爭奈謾演上座一點不得據這四箇漢若踏著華藏門總是喫棒之數何故貪他一粒粟失却半年糧偈頌辭亦菴相招行者化苔脯南北東西總亦菴塵毛剎海悉包含山僧已住其中矣更欲招邀即不堪琉璃田地無根草信手拈來屬老盧不似時人開著眼再三撈摝費工夫與鴈山車嶺建接待僧送定維那鴈山孤頂絶攀躋當念遊人困路岐暫與化城休歇地莫教忘却轉身時興化當年為克賓棒頭敲出玉麒麟遁菴放過定禪者只要渠儂眼自明題石勒王見佛圖澄畫像與正弼侍者立地成佛殺人漢握節當胸更問誰莫怪阿師佯瞌睡要渠回首自知非三應三呼亘古今遁菴無此老婆心痛拳熱喝出門去一聽渠儂怨恨深送元功居士歸溫陵示法震頭陀湖山相見笑顏開知道仁從佛國來敗闕盡情都納了莫言無物送君回頭陀事衆已多年華藏無衣可得傳劈面三拳仁義絶陳州人出許州門竹原元菴主語嗣大慧登高菴主劉師誠請普說師云諸法寂滅相不可以言宣釋迦老子在摩竭提國三七日啓口無由達磨大師對梁武帝盡力提持只道得箇不識若也一向坐却盡大地無一箇發真歸元先聖幸有第二義門不妨於中開一線路不見道一法若有毗盧墮在凡夫萬法若無普賢失其境界一法萬法若有若無毗盧凡夫普賢境界總在裏許喝一喝云如我按指海印發光汝暫舉心塵勞先起大衆見塵爾時善財童子入妙光大城於正法藏大樓閣中尋見大光王時大光王修大慈幢行出自住處來於此中入大慈幢三昧此處一切人天及山河大地若草若木有情無情並皆歸向於王各發菩提心修行梵行成等正覺轉大法輪時諸大山王各作大師子吼說大法要菴山道休去歇去寒灰死火去一念萬年去古廟裏香爐冷啾啾地去世間諸樂悉皆是苦惟寂滅之樂是為真樂橫山道三九二十七菩提涅槃真如解脫即心是佛𧣴子落地楪子成七片扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾觀音菩薩買胡餅放下手云元來却是饅頭惟諸大菩薩禪悅之樂是為真樂聖山道臨濟三次問黃檗如何是佛法的的大意黃檗大棒打去大溈問仰山佛法向上道取一句作麼生道仰山擬欲答熱喝出去乃至德山棒臨濟喝皆是諸佛慈悲之樂是為真樂登高山道爾等三人正在葛藤窠裏欲得不招無間業莫謗如來正法輪才作是說大光王從三昧安詳而起告諸山王言善哉善哉如是如是汝等善說此法我以此法為王以此法教敕以此法攝受以此法引導以此法令衆生修行世間之樂皆悉是苦惟此三法是為真樂諸大山王并善財童子咸作是言但願東風齊著力一時吹入我門來解夏示衆云年豐歲稔道泰時清唱太平歌樂無為化秋露如珠秋月如圭衆妙園中茄子瓠子大小纍纍早麻晚麻結莢底結莢開花底開花正當恁麼時釋迦彌勒文殊普賢德山臨濟向上向下有句無句天地玄黃宇宙洪荒直下一時坐斷直得風颯颯地人人分上壁立千仞各各面前飛大寶光與麼說話未稱衲僧且不落夤緣一句作麼生道昨夜聖山頭倒卓今朝石筍暗生芽若究竟此事如失却鎖匙相似只管尋尋來尋來忽然撞著噁在這裏開箇鎖子便見自家庫藏一切受用無不具足不假它求別有什麼事諸方為人抽釘楔我這裏為人添釘著楔諸方為人解粘去縛我這裏為人加繩加索縛了送向深潭裏待他自去理會這些子如撞著殺人漢相似你若不殺了他他便殺了你鄭居士請益師云若要參學須是信得及始有參學分若信不及徒費精神終無所益大抵煩惱即是菩提無明便是生死根本未達斯理且須看箇話頭純熟自然開悟生死到來却得力汝要理會此事但向日用應緣行住坐臥常將不是心不是佛不是物話作一句舉看盡公措大家平生許多聰明見識一齊向此話上用却伎倆窮處如上墻上壁都無縫罅無著力處正好著力忽然失腳倒地老僧即為汝證明未到這般田地且自看話不用來見老僧示徐君飾道友生死根本乃佛祖心印萬世不移易一絲毫但當仁自迷不能回光返照甘作衆生耳欲得透脫豈是小緣二六時中四威儀內應公奉私但將前日所示話頭貼在額上抵死謾生與之廝崖一番作為一番提起審詳諦觀是誰起倒譬如快鷹快梢雲突日迷風透青掀騰直截覿體承當一切見成只是不得卜度做頌下合頭語便千里萬里也要得透脫生死除非大徹大悟心地開通僧問趙州狗子還有佛性也無州云無此箇公案正是開大徹大悟心地底鑰匙子也示入府化士達磨西來已是多事二祖立雪安心一生受屈後來承虗接響將謂多少禪道佛法盡是迷頭狂布殊不知古聖曲垂方便事出急家今時滿口道恣意說如之若何盡是染污兄弟不知却謂是好點頭咽唾若真實全體作用都理會不得蓋謂不曾證悟不遇真善知識向心意識裏卜度自謂百了千當苦哉可惜許皮下還有血麼老僧只是箇喫飯屙屎底老和尚亦無一法與人你才入門便知你端的若是箇中人如上將軍出陳不顧危亡得失決勝千里把從上佛祖踏向腳跟下一突突出嗄天下人不奈你何然後更須知有向上一竅子若透頂透底方得自由自在若只得箇入頭處便寶惜坐在勝靜境界中堪作什麼大丈夫漢一等是踏破草鞋須是還他大徹大悟方能出生入死如其毫髮不透則十萬八千古人云轉凡或聖易轉聖成凡難而今凡聖難易總不得動著且下府見檀越紅塵閙市中忽然撞著無面目漢老僧罪過彌天達磨二祖隱身無路印樞下府持鉢臨行求法語勉強書此舉世尊生下一手指天一手指地周行七步目顧四方云天上天下惟吾獨尊師云見怪不怪其怪自壞贊贊達磨大師五祖和尚十萬里來賣口觜宜乎打落當門齒面壁九年誰採你深雪之中若不得救苦救難觀世音菩薩有甚面目歸鄉里貌古而清語俚而新同乎流俗大有徑廷常心是道殺人活人使當時磨下玉潔氷清則楊岐一宗未必中興者也大慧和尚世尊去世二千餘年到此尊慈恰五十代渠以壁上安燈盞雨前置酒臺悶來打三碗何處得愁來頌清淨行者不入涅槃破戒比丘不墮地獄佛法興衰可見也為定上座入塔那伽常在定無有不定時雖經劫火燒此定未嘗亂定上座還會麼若向這裏薦得童子身中入正定比丘身中從定出比丘身中入正定大火聚中從定出且道大火聚中出定向什麼處去良久云煙霞生背面星月繞簷楹東禪蒙菴嶽和尚語嗣大慧上堂師住漳州淨衆到鼓山請云鼓山不跨石門句嚼碎令人牙齒寒親扣國師問端的石門無鎖亦無關喝一喝云得與麼七穿八穴又喝一喝云得與麼十字縱橫若謂全提半提和屎合尿喚作一喝兩喝披沙揀金若還主將當頭誰敢單刀直入昔時入得而今入不得昔時入不得而今入得青蘿夤緣直上寒松之頂白雲淡濘出沒太虗之中拶破髑髏非等閒不說世間真實義諸禪德知是般事便休且道有什麼事千峯勢到嶽邊止萬派聲歸海上消舉適來老禪和尚道鼓山有三十棒要打新淨衆你諸人且道如何莫是未入鼓山門合喫三十棒麼咄莫是已入鼓山門合喫三十棒麼咄莫是鼓山盲枷瞎棒胡打亂打麼咄咄若是我楊岐兒孫便請單刀直入師云鼓山三十棒要打新淨衆正是畫龍得龍畫馬得馬淨衆恁麼道要騎便騎要下便下只謂突出人前豈可像真弄假即今權借老禪拄杖子行正令且要拔本遂作拈拄杖勢復云休休將謂胡鬚赤更有赤鬚胡山僧今日卜一卦且要大衆相委天地合其德日月合其明鬼神合其吉凶咄內卦已成更求外象咄但願今年蠶麥熟羅睺羅兒與一文芭蕉聞雷開耳在什麼處葵花隨日轉眼在什麼處若還眼耳分明透出千門萬戶於斯信得魚龍知變化龜鶴自神仙苟或未然灸瘡盤上更著艾炷拈拄杖云一葉飄丹乾坤獨露萬緣泯迹法界全彰溈山水牯牛大雄白額虎河陽新婦子臨際小廝兒雖然借路經過拶著扶籬摸壁卓拄杖一下下座今年是閏年剩著三十日返究所剩底添些浮逼逼世間沒量人一切但省力淨衆此密語說了却不密誰道霜風只一般今年寒勝去年寒夜來得箇真消息無限鮎魚上竹竿開爐云爐已開炭未有衲僧暖地且相守忽然乞得火種來切忌燒腳又燒手阿爺阿爺山僧為諸人忍俊不禁未免預搔而待癢住福州東禪升座云諸佛浩浩法門流出一切衆生密密心地應用無差箇中誰悟誰迷誰得誰失得失既絶迷悟一如長劍倚天不用羣魔膽落明珠照夜何須智鑑高懸直下已絶承當便乃全身擔荷逢人即出出即不為人三聖氈上拽猫兒不離當處全機變逢人即不出出即便為人興化如在燈影中著著有分身之路當知此事千聖共行四面布蒺䔧中間劄硬寨棒頭取證喝下承當正是衲僧放身命處且衲僧分上內既不出外既不入豈思量分別之所能知非杳絶情忘之所解會種種妙悟一一天真箭既離弦無返回勢所以道菩提無實相亦無非菩提平生用處力在腕頭皇恩佛恩一時報畢試問諸人大功不宰一句作麼生道良久云天高羣象正海濶百川朝乾龍節云權實齊喝頭頭摩竭真機照用雙行處處普光明殿絲毫不異如風行空表裏洞融似日普照正當恁麼時見得徹信得及心無所生法無所住總無邊剎海為我皇宮盡萬世古今為我皇壽蠻夷華夏自然車書混同鸞鳳輦輿初無遠邇之隔且報恩一句作麼生道萬方歌有道四海樂無為世尊不說一箇字大藏小藏從此出達磨九年面壁來得皮得髓分優劣既無神通變化豈有東湧西沒直下針眼裏覷破不妨大衆前雪屈靈山指月虗空釘橛曹溪話月窟籠著榍讓和尚磨磚作鏡馬大師即心是佛實語當懺悔弄巧翻成拙冷處著一把火臨危切忌饒舌選甚德山棒臨濟喝明中坐舌頭暗裏抽橫骨當知此事自然超越心不在內不在外法無可傳無可說心法雙忘性即真渴若喫鹽加得渴君不見古人有言兮從上諸聖還達真正理也無答云達會麼阿剌剌阿剌剌石菴玿和尚語嗣蒙菴嶽上堂鵲既鳴鵲鵲鴉則鳴鴉鴉禾山四打鼓趙州三喫茶春來花處處雲散月家家達磨當年無板齒祇應特地過流沙祈雨云五五二十五乖龍不為雨沙石欲生煙稻麻將槁死山僧有箇七字頂輪王陀羅尼能破龍宮開蟄戶斥雷師驅電母布慈雲而灑甘露唵囌嚕㗭唎囌嚕入新僧堂舉黃龍南和尚同隆慶間禪師看僧堂龍云好僧堂麼慶云好僧堂龍云好在什麼處慶云一梁一柱龍云此未是好處慶云和尚又作麼生龍云這一柱得恁麼麼圓那一枋得恁麼匾慶云人天善知識須是和尚始得遂同出僧堂外龍云適來恁麼且道是肯你是不肯你慶云若與麼又何曾得安樂來師云黃龍父慈隆慶子孝直得龍吟霧起虎嘯風生如水入乳水乳和同也不妨奇特若是檢點將來總未得勦絶白雲與麼道為復是肯伊不肯伊諸人還會麼若會去也不謾向明窗下安排上座若也不會三條椽下六尺單前豎起脊梁各自討箇安樂處始得謝李深卿陳仲齡云昔在東溪日花開葉落時幾擬以黃金鑄作鍾子期師云古人恁麼道大似焦桐掛壁罕遇知音白雲今日幸遇二居士到來正值六合無風萬籟俱息不免再理朱絃試彈一曲橫按拄杖云諸人還聞麼聞即不無且道是何曲調卓拄杖云太古希聲無限意知音知後更誰知葛教授請追薦云雲山偶爾遭攧臂痛不可勝言府教揮金辨供殷勤咨請談禪禪禪不在拈槌豎拂亦非作用周旋不在揚眉瞬目亦非文字語言祇據現成公案自然七方八圓在雲門得之則曰一句三句在法眼得之則曰惟心法門在溈仰得之則曰父慈子孝在臨濟得之則曰三要三玄在曹洞得之則有偏正回互在天下老和尚得之則有問答機緣在雲山得之則全提正令於人天之上在府教學士得之則致吾君於堯舜之前在現前大衆得之則隨宜應用在太孺人黃氏得之則生於忉利諸天禪禪綿綿密密密密綿綿渡水胡僧無膝褲東村王老屋頭穿拈來一一中的不妨似箭離絃脫或躊躇擬議迢迢十萬八千語是謗寂是誑不語不寂轉增虗妄喝一喝云春風吹落桃李花淡煙疏雨籠青嶂謝幽巖和尚云向來雲岫訪雷峯朔風吹雪落長松今日雷峯訪雲岫無限春光滿巖竇機鋒互換主賓分八兩元來重半斤然雖如是且如賓主作麼生分莫是賓則全賓主則全主麼錯莫是全主是賓全賓是主麼錯直饒不落賓主也錯錯錯明眼衲僧休卜度雲散水流鳥啼花落可菴若更少留雲山不至寂寞受鼓山請辭衆云墾土誅茆作佛宮栽田博飯與君同夢中十載因緣盡又拄烏藤過別峯臨岐一句如何說此去平分江上月千里同風事宛然雲山雖別何曾別別不別鷺鷥飛入寒江雪乍遠衆慈伏惟珍重在白雲受鼓山請拈帖示衆云山僧十有餘年坐在亂雲堆裏真箇如一片頑石相似搖撼也搖撼不得拈掇也拈掇不得提起帖云今日因什麼被這些箇點著便動豈不見道兵隨印轉將逐符行拈疏示衆云與麼文彩甚生標格直下承當迥超言默且道是箇什麼得與麼奇特青山不鎖長飛勢滄海合知來處高升座僧問坐斷雲山事已彰可憐雲水自茫茫今日石門通一線端然衣錦便還鄉還鄉一曲作麼生唱師云罕遇知音僧云爭奈鼻頭繩子猶屬他人在師云你且道他是阿誰僧云他也不識師云依俙越國倣佛楊州僧云祇如未跨石門一句作麼生道師云百雜碎了也僧云已跨石門一句又作麼生師云依舊却渾崙僧云直得大頂峯點頭鼓屴崱震動師云未為分外僧云祇今晏國師撫掌呵呵大笑云幸得與老師相見去也師云不是冤家不聚頭僧禮拜師云放汝三十棒師乃云山野行年甫及耳順百醜千拙怕出人前以故巖棲谷隱火種刀耕自以為得計而禪和家一箇箇論量卜度道石菴老漢大似稱鎚落井何日是出頭時山僧聞之鼻孔裏嘻嘻地冷笑且道笑箇什麼聻豈不見古人道如今是甚時節出頭來又道布袋裏盛錐子不出頭者是好手誠哉是言今日無端驀然地被鼓山一行專使到來大丞相旨命嚴重難以固辭也祇得順水張帆更加櫓棹直上大頂峯去也汝等禪和家又作麼生論量又且如何卜度喝一喝云休卜度世間那有楊州鶴一身與世等委蛇萬事隨緣即安樂無意求時却宛然有心用處還應錯錯錯錯莫莫莫近日秋林多葉落鐵牛飛過洞庭湖西山走入滕王閣卓拄杖復舉雪竇明覺禪師在洞庭受雪竇請衆檀越與專使喧爭不已明覺升座告衆云住翠峯好住雪竇好于時一衆皆云住雪竇好師云明覺老人老老大大主人公在什麼處去住却問他人山僧今日這裏也無檀越與專使喧爭自家直是一刀兩段更不周由為什麼如此一拳拳到黃鶴樓一踢踢翻鸚鵡洲玉麟掣斷黃金鎖大丈夫兒得自由卓拄杖小參鄭少梅提宮結冷淘會請云今日一會亦非小緣僧俗交參人天普集直得山河大地示現本光水鳥樹林咸提妙唱一一七穿八穴明明百匝千重若也直下薦得去不論比丘比丘尼優婆塞優婆夷頓證阿耨多羅三𧂀三菩提便乃古釋迦不先今彌勒不後其或未然石菴不免向灸瘡盤上更著艾燋去也龐居士一口吸盡西江水凸出眼睛胡釘鉸一椎釘得虗空未為好手紫胡要打劉鐵磨雖然據令未免倚勢欺人趙州勘破臺山婆當面蹉過者如麻似粟如今總好一狀領過箇中休辨誵訛沒誵訛會也麼湖南人賣上麵福建人喫冷淘卓拄杖一下云白雲拄杖却飽寒山撫掌呵呵為什麼如此豈不見甘贄行者設粥為狸奴白牯念摩訶更有南泉潦倒無端打破粥鍋喝一喝云恁麼說話哂我者少笑我者多卓拄杖施主散藏請僧問一法若有毗盧墮在凡夫萬法若無普賢失其境界去此二途如何是獨脫一句師云烏龜倒上樹僧云莫祇這便是也無師云是著即錯僧云祇如僧問投子一大藏教還有奇特事也無子云有僧云如何是奇特事子云演出大藏教意旨如何師云文不加點僧云且如死心又道演入大藏教又作麼生師云無孔鐵鎚重下楔僧禮拜師乃云一法若有毗盧墮在凡夫萬法若無普賢失其境界去此二途道得獨脫一句未為奇特且作麼生是奇特底事若也會去一大藏教總在裏許若也未會一大藏教亦在裏許豈不見僧問投子一大藏教還有奇特事也無子云有僧問如何是奇特事子云演出大藏教後來死心又道投子祇知其一不知其二若有問如何是奇特事却向道演入大藏教諸人者一人演出一人演入還有得失優劣也無還會麼會則事同一家不會萬別千差所以道百川異流同歸於海萬途差別皆入此宗此宗奇特當陽顯赫佛及衆生皆承恩力釋迦老子承此恩力於靈山三百餘會演說五千四十八卷權實半滿頓漸偏圓大喻三千小喻八百法門重疊如雲起於長空行解分披似花鋪於錦上由是蘇巖居士承此恩力於塵勞界內正念現前發難遭想披閲此五千四十八卷一句一偈字義一一炳然理事一一明白今日今時承此恩力遠詣雲山蘭若以檀波羅蜜營辦香積供佛及僧而白雲山僧承此恩力登此蓮華獅子之座說法一時為其懺散還恩恩無不滿賽願願無不圓回煩惱為菩提回無明為大智改禾莖為粟柄易短壽作長年遂拈起拂子云這拂子承此恩力上至非非想天下至金輪水際東西南北上下四維於其中間作無邊無量廣大佛事讚揚如上所作功德不可思議諸人還信得及麼若信得及方知釋迦老子也與麼蘇巖居士也與麼白雲山僧也與麼拂子也與麼拂子穿過釋迦老子釋迦老子穿過蘇巖居士蘇巖居士穿過白雲山僧白雲山僧穿過拂子正當恁麼時喚作釋迦老子耶喚作蘇巖居士耶喚作白雲山僧耶喚作拂子耶喝一喝云拂子還他拂子釋迦還他釋迦居士還他居士白雲還他白雲如是則拂子自拂子釋迦自釋迦居士自居士白雲自白雲正當恁麼時畢竟功歸何所蘇巖居士還相委悉麼黃卷何須更遮眼靈龜此去伴長生以拂子擊禪床華藏退菴先和尚語嗣育王無示師在福州大乘受信州章法請辭衆上堂云有去有來有聚有散古今流動南北異馳此世間法無去無來無聚無散融三世於當念括大千於一塵此出世法若是衲僧家又且不然朝到西天暮歸唐土向大食國裏喫粥喫飯新羅國裏東行西行蓋是尋常不為分外雖然漿水錢即且置草鞋錢教誰出喝一喝云乍遠衆慈伏惟珍重入院云若據此事通上徹下亘古亘今乾坤不能包裹寒暑不能遷變語言不能表顯數量不能該括所以不欲向聲前句後鼓弄脣舌只有這拄杖子却得箇善巧方便遂卓一下云瘥病不假驢馱藥有時放行即枯木生花氷河起焰有時把定即百川絶流千林無葉有時把定即是放行放行即是把定枯者任他枯榮者任他榮此三句中有隨波逐浪有截斷衆流有函蓋乾坤且道山僧平常用什麼句為人若也定當得出許伊具擇法眼若定當不得行到水窮處坐看雲起時鐘鳴鼓響問答交馳水緑山青覿體全露禪和家聞人恁麼舉著便道多少現成殊不知針眼魚吞却嘉州大像却向北斗裏藏身今日若有傍不肯底出來掀倒禪牀也許伊具一隻眼若無山僧今日一場罪過舉四祖大師云百千法門同歸方寸河沙妙德總在心源師云大小大祖師只知渡水不覺腰深山僧即不然遂拈起拄杖云百千法門河沙妙德盡在拄杖頭上若也直下見得便向祖師頂𩕳上行其或未然却聽拄杖子重為諸人說破卓拄杖下座言語道斷尋行數墨者罕窮其端離見超情摘葉尋枝者難求其本所以六情才動萬法摐然一念亡機太虗絶點諸佛如來於中親證六道衆生於中往來十方虗空於中發現山河大地於中成形且道這拄杖還在其中也無日月不到處特地好乾坤祖師會云昔日世尊於靈山會上拈花示衆迦葉破顏世尊道吾有正法眼藏分付摩訶大迦葉及乎達磨西來子子孫孫遞相印證臨濟下喝德山行棒俱胝豎指祕魔擎叉以至道吾舞笏雪峯輥毬大似聾人聽啞子說話有什麼分曉所以古人道從上來宗門中事未曾有一人舉著既然如是且道許多老漢成得什麼邊事良久云不覩雲中鴈焉知沙塞寒諸人白日見山見水樓臺高下人畜駢闐一見便見更無凝滯及乎豎起拳頭拈起拂子問伊作麼生便乃不知下落且道誵訛在什麼處良久云睦州道底馬祖升堂百丈卷席且從諸人指東畫西二祖三拜依位而立你道意在什麼處直饒十分會得更有向上一竅在咦傳經云當陽有路不隔絲毫直下承當豈容擬議向千聖頂𩕳上橫行於萬化紛紜中坐斷具爍迦羅眼者覷不見有通天耳者聽不聞四音八辨說不得三玄五位分不開若也放過一著隨機應變遇緣即宗有漸有頓有開有遮且道一大藏教從何而來蘇盧悉利薩婆訶十二時中山河大地草木叢林為汝諸人宣揚法要發明大事其來已久若能眼似眉毛窺覷得透心如木石餐采得入便知水流花發常轉無盡法輪禽飛獸走普現色身三昧且道瞿曇四十九年又更說箇什麼良久云一字入公門九牛車不出水陸請升座云以一粒米而為飲食以一塵毛而為供具以一草葉而為香花以一滴油而為燈燭是則名為微細供養以大地為飲食以萬物為供具以須彌為香花以海水為燈油是則名為廣大供養以禪悅為飲食以道品為供具以戒定為香花以智慧為燈燭是則名為真法供養若是衲僧家吞栗棘蓬咬鐵酸𨢝餐金牛飯喫趙州茶且道是什麼供養若向這裏擘得線路知得下落微細供養即廣大供養廣大供養即法供養即三而一即一而三一切諸佛受此供養永住世間不入涅槃一切菩薩受此供養坐菩提樹成等正覺一切聲聞受此供養不入正位回趣大乘一切人天受此供養發菩提心修菩薩行地獄衆生受此供養速離苦趣生諸佛前今辰齊主受此供養親承如來摩頂受記不歷僧祇獲證法身山僧拂子受此供養有何利益良久云到頭霜夜月任運落前溪施主請云此事若是得底人周旋往返不離大方譬如魚龍受用海水亦如飛鳥出沒太虗初無片時離於空水向這裏覓生死去來聖凡染淨是非取捨了不可得所以道無常生死法與我不相干山僧恁麼說話忽被明眼人覷破一場漏逗何故夜行人只貪明月不覺和衣渡水寒謝知事頭首云珍裘非一狐之腋大廈非一木之枝太山非巖巒無以增其高滄溟非川谷無以成其大是以普賢鼓棹妙德揚帆互作主賓交為肘臂且道班勞冊勳誰當其最良久云路遙知馬力歲久辨人心上元云九重城裏燈燭燒空歌管揭地時人只向閙中過却千山盡頭塵迹不到松檜陰森僧家但覓靜處安身雖然志趣不同要且但是徐六擔板若是夜半騎牛穿市井手𢹂席帽出長安底終不向那邊著到何故他家自有眠雲志蘆管橫吹宇宙分四月八日云佛法無人說雖慧莫能了既已擊鼓升堂大衆齊集今正是時不可放過要知麼昨日是春今朝是夏三十年後莫道華藏不曾說破若作時節因緣會即眉鬚墮落上元云諸人各有自己一段光明周遍法界交光相羅如寶絲網無壞無雜既然如是雲門因什麼道人人盡有光明在看時不見暗昏昏大似壓良為賤以己方人只如夜來鄉坊城邑百千燈明互相照耀且道與自己光明是同是別若也道得許伊親見燈明如來若道不得東家點燈西家暗坐小林三拜得吾髓鷲嶺拈花一笑新莫謂藏身無影迹月明照見夜行人臘八日云二千年前大覺世尊適丁今日明星現時於菩提樹下成等正覺普觀法界一切衆生乃至山河大地草木叢林悉皆成佛遂拈拄杖云既然如是且道這拄杖子成什麼佛住何國土說何等法乃卓三下云三轉法輪於大千其輪本來常清淨若能奉持速取證又卓一下云急急如律令十二月初一歲事將周畢臘月火燒山旱雷轟霹𮦷瞌睡師僧驚覺來三九依前二十七參小參若據此事直是頂門具眼底看不見有通天耳底聽不聞若是箇識機宜別休咎底豈更向胡餅裏呷汁指頭上覓月便好懸崖撒手全身放下把從前許多向上向下玄言妙句是佛是祖一時轉向自己背後直教三世諸佛仰望不及天魔外道窺覷不見方有少分相應若更有絲毫許佛法可作解會却被他知見網羅一時却歷劫終身無有活脫之期只是隨人語言搏量捉摸見人道此事不容擬議便於一切見聞境界語言機境都不餐采打淨潔毬見人道此事本來成現便道見山但喚作山見水但喚作水飢來喫飯困來打眠見人道有時恁麼有時不恁麼便道拈一枝草為丈六金身也得拈丈六金身為一枝草也得元來只是依草附木傍人門戶若奪却手中杖子一步也行不得何故如此為他腳跟下線子未斷頂門上竅子未開於自己分上全無些子自由所以於䨥明䨥暗時擺撥不開即自無出身之路於同生同死時入作不得即為凡聖情量所拘既然如是忽若正令全提十方坐斷又且如何透得昨夜三更過鐵門年窮歲盡寺舍冷落無可殷勤也擬牽挽些子新鮮葛藤呈似大衆直是措置未就何故若是拈槌豎拂瞬目揚眉激揚今古辨論誵訛從上老宿莫不如是大似嚼了甘蔗淋過死灰有什麼滋味若是建立門庭起模畫樣破二作三將無為有又似無風起浪好肉剜瘡若是說心說性說因說果說頓說漸說開說遮黃面老子四十九年一時道了也是以向這裏東拏西抉潦漉不上如賊入空屋相似未免向諸人面前口似匾擔雖然又不可只恁麼休去豈不見雲門大師道若是得底人道火何曾燒著口要知麼夏熱冬寒山青水緑天高地厚月白風清一時為諸人八字打開了也又恐有般底道是平實商量不免更為伊拈出金剛圈栗棘蓬胡張三黑李四朝到西天暮歸唐土便乃點頭咽唾道却較些子者拄杖子路見不平𨁝跳出來一時趕散且道如何判斷即是青山只解磨今古流水何曾洗是非混源密和尚語嗣晦菴光狀元上堂雲山漠漠喬木陰森古屋耽耽叢林閴寂混源於此栽荊棘布蒺藜劄硬寨誰敢覷著忽有人進得步轉得身出得氣釅茶三五碗意在钁頭邊其或未然青尖路嶮瞰空碧莫謂公公不道來結夏云以大圓覺為我伽藍善財特地向南參身心安居平等性智三世如來未瞥地過去已滅未來未至堪笑維摩談不二喝云有利無利不離行市一二三四五金木水火土拾得語寒山豐干騎老虎報君知莫莽鹵從來保福四謾人不似禾山解打鼓舉五祖和尚云秋雲秋水兩依依塞鴈聲聲度翠微多在洞庭青草岸楚天空闊不知歸師云五祖箇老翁從來多指注不是不知歸忘却來時路連綿雨不晴穀子多損失二麥未入泥憂心常惕惕來歲不飢荒未敢相委悉啓告梵天帝釋天玉皇大帝天且放日頭出運推移日南長至伏惟首座大衆起居輕利石笋抽條泥牛脫鼻三門頭石師子咬殺南山白額蟲即且置且道竹山點頭青尖肯首竟談何事相罵饒你插觜相唾饒你潑水春日晴黃鶯鳴更聽斷崖流水聲青山疊翠款步作程歸來煙島有誰爭且道歸來一句如何語會曲肱權作枕臥聽夕陽鐘即心即佛非心非佛不是心不是佛不是物半夜虗空揣出骨十分描摸畫難成試問諸人是何物阿呵呵咄咄咄拶倒門前大案山搏風放出遼天鶻拈拄杖示衆云還見麼若喚這箇作拄杖則瞎却汝眼山河大地明暗色空欺汝去復卓一下云還聞麼若喚這箇作聲則塞却汝耳雞啼犬吠鵲噪鴉鳴謾汝去既不喚作拄杖又不喚作聲畢竟喚作什麼箭穿紅日影須是射鵰人元宵云現在佛未來佛過去燈明佛臂長衫袖短星宿光日月光本光瑞如此依舊黑漫漫我此一燈傳百千萬億燈光光相照互相攝入還見有燈明佛麼這裏明得拽占波國與新羅國鬬額其或未然黑地撞著露柱莫言不道剎說衆生說三世一切說常說熾然說無閒歇如是則蟬噪長林蛩吟古砌猿啼嶽麓魚躍深淵半帆明月載新秋物物頭頭俱透脫便恁麼去止宿草菴且居門外何故鶴有九皋難翥翼馬無千里謾追風釋迦老子洎諸聖師所說經律論乃戒定慧總持之門三藏五乘四時八教不消道箇鉢囉娘切腳更說什麼張僧迦胡達磨鼻孔一時穿却然雖恁麼且道鉢囉娘切得什麼字還委悉麼若未委悉混源今日不惜口業為你諸人說破便下座學道人見有如無得之若失諸佛菩薩畜生驢馬渾無有異菩提涅槃業障煩惱等無差別若人與麼見得則生身入地獄受無量苦何故謗斯經故獲罪如是記得達磨祖師在少林時有一則公案流落叢林七八百年諸方未曾道著今日混源不惜口業與你諸人說破切須記取良久云若到諸方不得錯舉一身浪宕無拘撿閙市門頭恣意遊漢地不收秦不管不風流處也風流健則坐困則休信任從教雪滿頭寄語宣和政和元和佛陀張僧伽李達磨老耽孔丘照顧溈山水牯牛僧問如何是學人得力句師云你為什麼問別人進云如何是學人轉身句師云十字街頭進云如何是學人親切句師云腳跟下薦取復拈拄杖云拄杖子豎窮三際橫亘十方聖不可知凡莫能測天堂地獄鑊湯爐炭諸佛菩薩畜生驢馬俱是假名卓拄杖一下云一時百雜碎了也只這拄杖子又且如何誣人之罪以罪加之召大衆云鼓未鳴諸人未出僧堂前已前一時成現頭正尾正更來這裏叉手竝足伏聽處分討什麼碗驀拈拄杖下座大衆一時走散師住淨慈淳照十一年十二月初十日恭奉聖旨就本寺開堂謝恩畢判府安撫徽猷度疏師提起示衆云豈弟張夫子遺我徑寸璧中有數箇字字字無人識莫有識者麼試道看宣蔬了指法座此座高廣吾不能升舍利弗可煞小膽臣僧曇密常升此座為國開堂今日何須特地作禮既不作禮如何話會須彌燈王如來照顧踏著你鼻孔便登座祝香問答罷師乃云至理亡言靈機絶待纖塵不透如隔關山一線才通千差得路不是情中法莫生種種心諸佛證而不知羣迷用而不覺大包天地細入鄰虗於一毫端現寶王剎坐微塵裏轉大法輪是謂無盡藏大解脫門無盡藏總持門無盡藏功德聚無盡藏福壽海言言玉轉珠回句句斬釘截鐵把住也聖凡路絶佛祖乞命天下衲僧亡鋒結舌放行也滿天和氣枯木生春野老謳歌漁人鼓腹不把住不放行一句作麼生道四海浪平龍睡穩九天雲靜鶴飛高敘謝畢復舉太宗皇帝嘗夢神人報云請陛下發菩提心皇帝早朝宣問左右街曰菩提心作麼生發左右街無對後來雪竇和尚道實謂今古罕聞臣僧曇密輒成一頌菩提妙心作麼發日應萬機元不差回首瞥然輕覷著大千沙界是皇家久立衆慈伏惟珍重諸佛出世打劫殺人祖師西來吹風放火古今善知識佛口蛇心天下衲僧自投籠檻莫有天然氣槩特達丈夫為宗門出一隻手主張佛法者麼良久云設有也斬為三段大慧禪師忌日拈香咄這花木瓜苦澀無以加驀然嚼得碎清風生齒牙種性惡不堪誇楊岐老驢三隻腳踏人無數滿天涯湖山疊亂青湖水漾虗碧斷岸蓼花紅疏林秋露滴良哉觀世音處處失彌勒到萬壽上堂道人相見豈可徒然舉一則語有陷虎深機說兩句話破古人窠窟纖塵不立不啻如鐵壁銀山倒嶽傾湫未嘗動著毫末許笑瞿曇拈花拙醜恨黃檗行棒無辜說脫空起臨濟宗風斷命根續楊岐正派卷舒自在縱奪臨時掀翻佛眼葛藤窠大坐當軒全正令敢問大衆作麼生是全提底正令平生不識先生面不得一聽烏夜啼頌古居一切時不起妄念清淨行者不入涅槃塞北平沙闊黃河袞底流征帆才及岸蠻狄一時收汲水僧歸林下寺待船人立渡頭沙澄江渺渺煙波窄雲靜一天星斗斜數珠百八摩尼顆顆圓遼天鼻孔一時穿恆河沙數佛菩薩日日呼來跳一圈空叟印禪師語嗣佛照上堂大道坦然離名離相剗除則失旨建立則乖宗從上佛祖古往今來善知識顯大機彰大用盡是關空鎖夢過犯迷天印上座打破面皮還免得麼良久拍蠅床云不入驚人浪難逢稱意魚舉羅山初入院上堂才攬衣就座便起去却回首云未識者近前來有僧出禮拜山云也大苦僧禮拜起云某甲咨和尚山便喝出師云要識羅山麼用盡自己心笑破他人口要識這僧麼乞火和煙得擔泉帶月歸二由一有一亦莫守平地上死人無數一心不生萬法無咎屎窖裡頭出頭沒孤迥迥峭巍巍花須連夜發莫待曉風吹春山青春水緑春風包褁無纖粟目前事量外機東村王老暗攢眉暗攢眉獨腳山魈舞柘枝舉丹霞參忠國師才展坐具國師云不用不用霞退身三步國師云如是如是霞進前三步國師云不是不是霞繞禪牀一匝出去國師云去聖時遙人多懈怠三十年後覓遮漢也難得師云不用不用千聖不共如是如是蝮蝎蛇虺不是不是徹骨徹髓進前退後繞禪牀掣電之機落二三鐵崑崙兒喫一攧南海波斯舞不徹夜半失却攔腰帛笑倒東村王大伯拍禪牀一下下座通身畫錦赤骨力賣扇老婆手遮日無手人一拳是一拳無足漢一踢是一踢阿呵呵九九元來八十一平如鏡嶮如崖擬即失動即乖不擬不動自纏縛別有生機掘地埋喝一喝云雲門親見陳蒲鞋請少林再立僧多子塔前風行草偃育王門下正令重行掀翻舊日規模從教佛祖乞命不是第一句亦非格外機寸釘才入木遍界火星飛龍吟霧起虎嘯風生水長船高泥多佛大因什麼春力不到處枯木亦開花良久云收得安南又憂塞北舉南泉示衆道非物外物外非道趙州出問如何是物外道南泉拽拄杖便打趙州接住拄杖云莫打某甲他後錯打人去在南泉云龍蛇易辨衲子難謾便歸方丈師云避得迅雷重遭霹𮦷病起云即虗空體是病森羅萬象是藥謂之藥病相治直得虗空消殞萬象平沈亦未是勿藥時節良久云喪却毗耶離無人解看箭蓬萊開受請花未拈時憑誰著眼破顏笑後已錯流通從茲接響承虗致見麻纏紙褁若非本色漢難起此門風把住放行天旋地轉鐵船不怕海濤怒香餌端知意在龍便請承當毋勞謙遜舉真淨道石霜云休去歇去是二乘寂滅之樂雲門云一切智通無障礙拈起扇子云釋迦老子來也是謂學般若菩薩法喜禪悅之樂德山棒臨濟喝是謂三世諸佛慈悲喜捨之樂除此三種外不為樂也師云真淨老子能知他人之樂不能自樂其樂育王箇裏以上刀山攀劍樹為樂以飲洋銅吞熱鐵為樂莫有同此樂者麼喝一喝云不是弄潮人莫入洪波裏舉龍牙道雲居師兄得第二句我得第一句西院問雲門龍牙恁麼道還扶得也無門云須禮拜雲居始得西院云傍觀者哂師云路見不平拔劍相助傷鱉如龜必應有主范統制入山若論宗門中事譬如上將軍臨陳韜略俱備咳唾風生所以臨濟金剛王寶劍誰敢嬰其鋒東山暗號子鬼神莫能測妙在建功立業佐國安然雖如是還有向上事也無擊禪牀云回觀射鵰處千里暮雲平僧問如何是截鐵之言師云滿口含霜二月十五了無遮護山花半紅半白爭開黃鶯一聲兩聲乍語取箇眼兮耳必聾取箇耳兮目䨥瞽報慈隔雲門露打破油甕失却老鼠舉肇法師道觀方知彼去去者不至方師云觀方知彼去去者不至方防胡城萬里其禍起蕭墻拈拄杖示衆云喚作拄杖縛殺汝不喚作拄杖走殺汝卓一下云順風帆已掛不肯上船來語是謗寂是誑不在非語非默亦非向下向上拈拄杖卓一下云開甘露門示真實相又卓一下云無端平地堆青嶂冬夜秉拂大藏小藏教詮注不及處當甚破草鞋四七二三祖相傳不到底餵狗也不喫豈況分枝列派玷辱宗風致使逐隊隨羣遞相鈍置若論衲僧本分事覷著即瞎聽著即聾舉著即爛却舌頭會得即生陷地獄直下著得腳挨得開正好朝打三千暮打八百一向壁立萬仞土曠人稀不免俯順時宜通一線路所以道羣陰剝盡何曾動著絲毫一陽復生已是全機漏泄正當恁麼時如何野水氷生銀片段寒梅雪綻玉零星九旬禁足造地獄因三月安居擔枷帶鎖護生須是殺殺盡始安居會得箇中意鐵船水上浮用盡自己心笑破他人口以大圓覺為我伽藍身心安居平等性智好人不肯做剛向屎裏臥到箇裏直饒坐斷聖凡蹤不居佛祖位魔宮虎穴即處優游在衲僧分上了沒交涉若是蹴踏驚人底瞎驢只於沒交涉處進一步便見靈山會上迦葉微笑錯承當少室峰前神光得髓未親切畢竟親切一句作麼生道良久云夜半明星當午現癡人猶待曉雞啼佛照為父母忌請升座妙悟玄機腳跟紅線繁興大用千年葛藤還他過量漢一刀截斷不與千聖同途一句單提掃蕩衆魔窟穴荊棘林中烹金琢玉黃金殿上撒土拋沙回天轉地峭巍巍邁古騰今風凜凜千峯坐斷萬頃虗閒罔極之恩一時報畢正恁麼時且道二位尊靈向什麼處去還委悉麼內宮慈氏當臺見遍界全彰淨法身末後說偈云無端淨飯與摩耶生下男兒不起家此日難忘當日恨一爐沈水一甌茶頌古崔禪上堂拈拄杖云出來打出來打有僧出問崔禪聻崔便擲下拄杖歸方丈十三慣繡羅衣裳自憐紅袖聞馨香人言此是嫁時服含羞刺出雙鴛鴦木菴永和尚語嗣懶菴師住西禪升座問答罷乃云萬機不到千聖攢眉正令當行阿誰敢擬任是祖師出世未免弄假像真直指人心如望梅林止渴故知聲前一路智者猶迷言下精通翻成漏逗直饒有奔流渡刃之手不犯鋒𨦵全機敵勝正是衲僧門下守營把寨老弱殘兵堪作何用只今莫有具衝天意氣底麼良久云金鏃慣調曾百戰鐵鞭多力恨無讐上堂機輪轉處作者猶迷千眼頓開如何曉會不見睦州和尚示衆云諸人未得箇入頭須得箇入頭既得箇入頭不得辜負老僧恁麼說話面皮厚多少木菴則不然諸人未得箇入頭須得箇入頭住洋嶼菴升座云經年不跨雲門路逐浪隨波恁麼去而今老大復癡憨歸來且作村菴主跨瞎驢撾毒鼓百戰場中偃文武從教臨濟撥動煙塵溈仰互為隊伍列伍位鎗旗布三玄戈弩不消咳嗽一聲直下一時敗露雖然如是猶是尋常用底且不墮時機一句又作麼生良久云旋斫生柴帶葉燒時挑野菜和根煮復舉僧到鶴林敲門林問阿誰僧云是僧林云莫道是僧佛來亦不著師云諸禪德鶴林雖能把定封疆要且不會隨高就下山僧即不然方丈門八字打開了也僧來佛來了無罣礙為甚如此家無小使不成君子慶御書妙喜菴額師指牌云虎頭帶角人難措石火電光休密布中興天子展神鋒萬象之中看獨露升座問答罷乃云海門鼓浪拍天飛妙喜家風孰與知今日風雲重借便分明向上為全提文彩未彰消息已露動地驚天不容回互雲漢昭回星斗垂誰敢擡頭正眼覷復舉五祖示衆云若人將四大海為硯須彌為筆向太虗書祖師西來意太平下座禮伊為師若書不得佛法無靈驗師云諸禪德直饒恁麼未是作家裂開金鎖玄關看取通天手段拈拄杖劃一劃云還知麼三分入石從來妙却使神仙暗裏驚鴈山枯木和尚遺書至云枯木生花劫外春馨香遍界古今聞忽然樹倒歸何處猿叫千山月滿船會慶聖節升座云世出世間稱第一誰敢當頭正眼觀今日風雲欣慶會九重深處現龍顏拈起拂子云甚生標格與麼奇特甚生標格如是富貴未離兜率降王宮天上人間無比類萬國來朝仰聖明南山又見添蒼翠直得龍吟丹闕鳳舞青霄石笋抽條木人撫掌正與麼時莫有共樂升平底麼良久云鵰弓高掛狼煙息復山河四百州至雪峯請升座云解語非干舌能言不在聲非聲非舌用還家罷問程既非干舌又不在聲且作麼生說作麼生聽說既無說聽又無聽直得雨花無路凡聖絶蹤譬如明鏡當臺絶演若逐東西之徑洪機在掌排巨靈擘太華之峯只這神威阿誰敢近天下老和尚到這裏飲氣吞聲乞命有分只今線道放開也要大家知有豎起拂子云差之毫釐失之千里臨濟正法眼藏向這瞎驢邊滅却至今三百六十骨節八萬四千毛竅一時撒在諸人懷裏未審還辨明麼擊拂子云石火一揮天外去時人休看月邊星復云適來方丈老人舉僧問五祖和尚如何是臨濟下事祖云五逆聞雷師云五祖和尚向蟭螟眼中開張世界坐斷臨濟舌頭未審還知落處麼擘開滄海取龍吞五逆聞雷不許聞翻笑波心遺劍客區區空記刻舟痕寸絲不掛赤肉尚存萬里無雲青天猶在直饒仰面不見天低頭不見地鳥道絶行蹤通身無出氣猶落時人窠臼裏還知超越一路麼蓑衣篛笠從偏側收取絲綸歸去來素面相呈猶涉脂粉離諸己見墮在斷常直下喝散白雲衝開碧落到乾元門下不堪為走使在還知麼精金不入爐中煅爭得光華徹底鮮中秋云茫茫人看中秋月徒向閻浮記時節不智明月向人圓已是眼中重著屑瞎了眼降却屑昨夜三更轉向西驚起蒼龍拗角折師在枕峯再受黃蘗請云春深不放白牛閒依舊隨羣入亂山拽杷牽犁償宿債尾巴再露與人看受鼓山請云國師不跨石門句舌頭未舉先分付那堪覿面涉思惟冲天子新羅去如斯剖露已是敲出鳳凰五色髓擊碎驪龍頷下珠刢利漢與麼知歸腳跟下好與一劄還知麼大頂峯高不容進步靈源水急誰敢停橈直饒一喝倒流亦乃未為奇特莫有撥轉上頭關棙底麼良久云三尺鏌鎁橫在握不知誰是出頭人僧問少處減些子多處添些子時如何師云已是七穿八穴進云學人未曉其中旨乞師方便再提撕師云不許夜行投明須倒進云登山須到頂入海須到底師云這漢今日方瞥地僧禮拜師乃云少處減些多處添白雲官路販私鹽一條性命俱拋下不怕當初王令嚴秉拂西禪首座寮立僧云不露風骨句未舉先分付進步口喃喃軒知大罔措如斯剖露已是將諸人作死馬醫了也還肯麼若也肯去大似認奴作郎若也不肯又是斬頭覓活到這裡合作麼生話會刢利漢一覷覷透何妨穩坐若向途路經行不消輕輕一拶便見鐵圍那畔今之學徒這裏經冬那裏過夏大法未明一向馳騁脣觜誇諸己見將謂舉世無人殊不知性命渾在別人手裏白日業識忙忙何時得到家看它到家底人開口動舌自然去離泥水活人眼目何曾將實法繫綴於人又豈是心緣意解所能證悟不見德山和尚示衆云問即有過不問猶乖有僧才出德山便打僧云話也未問因甚便打德山云待你開口堪作什麼古人具恁麼手段譬如烈焰燒空不容眨眼有甚近傍處有般漢聞與麼道又却隨語生解自謂我為法王於法自在無你會處無你不會處若作如是見解非惟蹉過德山亦乃自昧行腳眼而今要徑截會麼適來方丈老人垂示外道問世尊不問有言不問無言世尊良久外道讚嘆云世尊大慈大悲開我迷雲令我得入師云聽事不真喚鐘作甕阿難續問世尊云外道有何所證而言得入世尊云如世良馬見鞭影而行師云且道那裏是見鞭影處後來雪竇和尚云迷雲既開決定見佛還許同參也無若共相委天下宗師竝為外道伴侶若各非印證東土衲僧不如西天外道又大溈和尚云外道懷藏至寶世尊親為高提森羅萬象歷然又得阿難金鐘再擊四衆共聞雖然如是大似二龍爭珠長他智者威獰師云這兩箇老漢一人具金剛眼睛照破四天下一人泥裏洗土塊未免自救不了若人緇素得出未免鈍置世尊為甚如此覿面若無青白眼宗風那得至于今贊偈六祖黃梅半夜錯分付才得星兒便亂做大庾嶺頭屙一堆後代兒孫遭點污黃檗生緣不在北門村行腳何曾參百丈夢裏思歸黃檗山無端平地堆青嶂洋嶼菴造水筧路繞懸崖萬仞頭擔泉帶月幾時休箇中撥轉通天竅人自安閒水自流柏堂雅和尚語嗣懶庵師住溫州淨社開堂日升座問答罷乃云太虗掛劍用顯吾宗凜凜神威阿誰敢擬刢利漢聊聞舉著踢起便行坐斷報化佛頭直下壁立萬仞若向言中取則句下明宗戀窟狐狸不消一攫何故此事不可以有心知不可以無心得不可以語言造不可以寂默通如擊石火似閃電光眨得眼來了無交涉所以黃檗棒頭打出大愚肋下用來有卷有舒能區能別可以助無為之化可以報不報之恩帝道與佛道遐昌皇風共宗風永扇直得風行草偃水到渠成海晏河清漁歌樵唱且共樂升平一句作麼生道太平瑞氣無邊表航海梯山祝聖明復舉羅山初出世升座才斂衣就坐便云珍重又云未會者進前來僧出禮拜山便喝師云還知羅山落處麼一道直如絃千古應無對縱有嚙鏃機髑髏成粉碎喝一喝太守請就州衙祈雨升座云葛陂化杖誰為力陶壁飛梭事有因好是風雲相際會崢嶸頭角自驚羣拈起拄杖云還見麼復卓一下云直得海水騰波須彌岌㠋拏雲霧電掃雷奔正恁麼時傾湫倒嶽一句作麼生道良久云大海若知足百川應倒流上堂佛子住此地即是佛受用拈拄杖卓一下云鞏縣茶瓶喫一槌擊碎饒州白瓷碗直得憍梵鉢提不覺縮項吐舌觀音菩薩忍俊不禁向蚊子眼睫上開張鋪席懸羊頭賣狗肉無星稱子稱來恰得十二兩大愚老漢聽事不真却將稱鎚鋸解轉使行市買賣不相當敢問諸人作麼生得恰好去良久云多處添些兒少處減些子溫州貢院回祿太守請升座薦亡歿士人師云百歲光陰彈指頃萬緣休處是良謀文章蓋世今何在到了還歸土一丘便恁麼信得及生而無生一片浮雲點太清滅而無滅萬里寒空沈曉月箇些兒佛不知擬心棲處隔山迷直饒不擬棲心處猶落吾家第二機豈不見魯仲尼謂曾子曰參乎吾道一以貫之直下擔荷得去處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧天當恁麼時生死兩字甚處安著既無安著便見文殊問菴提遮女云生以何為義女云生以不生生為生義殊云如何是生以不生生為生義女云明知地水火風四大未常自得有所和各而能隨其所宜是為生義殊云死以何為義女云死以不死死為死義殊云如何是死以不死死為死義女云明知地水火風四大未嘗自得有所離散而能隨其所宜是為死義師召大衆云生死兩義菴提遮女八字打開了也物故諸位英賢聞如是說徹證無生豎起拂子云看看如今盡在山僧拂子頭上示現神變舒廣長舌同聲唱言生是死之生死是生之死兩路坦然平無彼亦無此既無彼此又無死生畢竟向什麼處去劫火洞然毫末盡須彌頂上任橫行懶菴忌日拈香瞎驢滅却正法眼臨濟宗風始大張的的單傳至今日繩繩不斷愈光揚有價數沒商量無鼻孔漢將什麼聞香萬機不到千聖攢眉一句當陽十方坐斷直得三十三天風颯颯地金剛水際涓滴不流然後移身換步唱二作三殺活全提收放有準如鏡照像不亂光輝似鳥飛空不雜空色頭頭歷落著著現前不墮功勳何拘得失所以道鐘中無鼓響鼓中無鐘聲鐘鼓不交參句句無前後直饒恁麼猶涉程途瞥轉機輪如何著眼撒手到家人不識鵲噪鴉鳴柏樹間小參住溫州靈巖入院當晚云不露風骨句未舉先分付進步口喃喃知君大罔措古人盡力提持只這些子若也徹去說什麼懸崖峭壁鳥道無前信腳優游縱橫得路便見叢林改觀滴水氷生邁古超今騎聲蓋色全賓即主全主即賓照用雙行誰散覷著且畢竟誰是知音者雪後始知松柏操事難方見丈夫心結夏云去年今月正今日北高峯前冷泉亭畔懸羊頭賣狗肉稱頭斤兩惜如玉幾多高價來相酬盡力相酬酬不足今年今日正今時竹山頂上棲風亭邊飢即餐困即眠石頭為枕草為氈永日蕭然無箇事白雲深處不朝天且道今年底是去年底是若道一是一不是見處偏枯若道總是總不是更買草鞋行腳何故不見道閙時閙浩浩靜時靜悄悄靜中之事閙中參閙中之事靜中了直饒靜閙兩忘更須當陽裂破方能以大圓覺為我伽藍身心安居平等性智涅槃自性無繫屬故既無繫屬又何用踞菩薩乘修寂滅行明眼漢沒窠臼應時如風應機如電點著便行撥著便轉高高峯頂立不掛煙雲深深海底行清波不犯鵝珠不待護而自護蠟人不待氷而自氷雖然如是且道承誰恩力還知麼一曲韻寒千古調萬重青嶂月來初解夏云十方同聚會箇箇學無為此是選佛場心空及第歸既是無為又作麼生學既已心空又歸什麼處若是頂門眼正未舉先知早是鈍漢更於言下爭鋒有何交涉豈不見三角和尚道若論此事眨上眉毛早是蹉過了也麻谷出衆云蹉過即且從如何是此事三角云蹉過了也麻谷掀倒禪牀三角劈脊便棒師云提持過量事須是過量人所向無前折衝萬里後來雪竇道遮二老漢眉毛總未曾眨上說什麼此事蹉過師云雪竇雖善攙旗奪鼓其奈身陷重圍柏堂特為破關與伊討箇出路驀拈拄杖卓一下云向遮裏透得過可以排巨靈逞擘太華之威懾蒼龍展奪驪珠之勢隨處作主遇緣即宗師子翻身誰敢覷著且俯徇時機一句又作麼生不憐鵝護雪且喜蠟人氷偈贊立地佛事見見之時見非是見見見之時非是見見猶離見若為論錢塘江上中秋後風急潮聲萬馬奔真覺禪師德山棒下桶底脫又被巖頭轟一喝懸崖萬丈放全身松山撐破秋空月為僧下火三十三年居夢宅而今夢破宅還空直饒合得虗空體未免依前在夢中惺惺句若為通不惜眉毛為指蹤雲間木馬嘶風急火裏蝍蟟吞大蟲杞上人下火正杞非凡木吾家梁棟材如何未合抱遽爾迅風摧直得叢林悽愴猿鶴悲哀正當恁麼時一句若為裁歸根得旨憑誰委異種靈苗火裏栽白雲菴主起龕箇是白雲菴中主常與白雲為伴侶白雲影裏笑翻身滿谷白雲留不住既不住去何處緑楊堤畔舞春風家家門外長安路生時亦物死還空死去生來事一同今日死生消息斷四方八面路頭通春風蕩蕩和氣融融下坡不走快便難逢齊監稅撒骨得得臨安過浙東來時草草去匇匇百年鼎鼎槐宮夢夢破方知總是空既總是空遮箇骨頭甚處得來遮裏徹去方知道有生有死善始善終魚龍穴下蟠根固日月輪邊氣象雄
