與無情共一體處處皆同真法界乃豎起拂子云這箇拂子橫該法界豎括乾坤一切山河及與蝦蟆蚯蚓總在拂子頭上分彊立界拈一放七又擊一下云盡情百雜碎了也是你諸人還知痛癢麼若道知則拂子穿却髑髏髑髏不覺不知若道不知則髑髏穿却拂子拂子不知不覺知不知則且置遂擘開𮌎云且道老僧胸前有幾莖蓋膽毛遂喝一喝趙守至請升座云達士相見如擊石火似閃電光擬不擬早是白雲千萬里魯仲尼見溫伯雪已是郎當太原孚觸誤老雪峯一場敗闕自餘叢林作者天下宗師舉古論今談玄說妙總好喚來生按過只如超然居士今日到此合談何事良久云相逢無雜言但說桑麻長未鳴鼓已前何不瞥地去更來這裡討甚屎拽拄杖跳下繩牀大衆一時走散舉僧問鏡清如何是鏌鎁劍清云塵埋牀下履風動架頭巾後來琅琊和尚云衆中商量作答話會諸人既不作答話會又作麼生會良久云去時前街去歸時後街歸師云鏡清先鋒琅琊殿後排行布伍動地驚天及至臨陳交鋒不免一時墮坑落塹而今若有人問如何是鏌鎁劒但云焠出七星光燦爛解拈天下任橫行僧問動為境轉靜為法縛去此二途如何即是師云臂長衫袖短腳廋草鞋寬進云還許學人領會也無師云你作麼生會進云也知和尚擘腹剜心師云酌海持蠡一場困苦師乃云動為境轉靜為法縛正是破凡夫有色可蓋有聲可騎未是好手所以雲門大師道平地上死人無數過得荊棘林者是好手師云大小雲門不妨小膽若是東禪荊棘林裏坐荊棘林裏臥有什麼過僧問春雷已發陽鳥未啼正與麼時如何舉令師云腦後拔箭進云今日不著便師云敗將不斬進云也知和尚慣得其便師云放汝命通汝氣進云吽吽師云切忌掠虗師乃云善言言者言所不能言善迹迹者迹所不能迹言不能言不可以語言話會迹不能迹不可以影迹指陳所以僧問德山靈山話月曹溪指月即不問如何是真月山云昨夜三更轉向西師云這僧與麼問德山與麼答未審諸人如何捫摸聽取一頌昨夜三更轉向西昏昏宇宙幾人迷澄潭影轉風初息孤狖微聞嶺外啼舉黃檗和尚云自達磨大師到于中國唯說一性惟傳一法以佛傳佛不說餘佛以法傳法不說餘法法即不可說之法佛即不可取之佛乃是清淨本源心也師云法既不可說佛既不可取又指何物作本源清淨心耶喝一喝云欲得不招無間業莫謗如來正法輪僧問談玄說妙舉古論今盡屬非時語不涉玄微一句作麼生師云百花香處鷓鴣啼進云便與麼去時如何師云眼中著屑進云不與麼去時如何師云重疊關山路進云一曲兩曲無人會雨過夜塘春水深師云蝦䗫衣下客師乃云在凡全凡在聖全聖各各據本位通達事理竟譬如鐘中無鼓響鼓中無鐘聲鐘鼓不相參句句無前後若能於此徹根源一任金毛喚作狗忙忙途路未歸人切忌面南看北斗舉同安問僧近離甚處僧云東川安云雙洞孤松煙青月白阿那箇是你主人公僧云始屆同安便領此問安云記劍刻舟破珠求影豈不是闍梨境界且坐喫茶僧云如何是同安正主安云途中駒子不勝驊騮僧便禮拜安云胡人打令舞拍全無師云作家宗師手段直如巨靈逞擘太華之威蒼龍展奪驪珠之勢雖然如是若遇咬人師子終不放過諸人要識同安麼正是欺客打婦也好與三十棒解夏云獨枕孤峯忘歲月梧桐葉落始知秋若知撲落非他物始解縱橫得自由萬仞懸崖𮈔繫腰百尺竿頭獨打翹大洋海裏驟驊騮須彌頂上駕扁舟好箇通天作略自然脫體風流風流不風流即且置正與麼時責情三十棒又作麼生良久云今朝有酒今朝醉明日愁來明日愁行亦禪坐亦禪語默動靜體安然江上晚來堪畫處一葉扁舟破遠煙元首座住菴引座云陝府鐵牛吞大像生得河東鸑鷟兒海門深處宜歸隱只恐調高人不知知不知擬欲擡眸一顧之早是失却兩莖眉舉濛溪一日見僧來便喝僧云好箇來由溪云猶要棒在僧珍重便出溪云得能自由師云這僧似箇赤梢鯉魚活鱍鱍地末後却被人斷送放池塘裏山僧當時若見他珍重出去隨後痛與一劄待他回頭轉腦管取高透龍門僧問世尊拈花迦葉微笑則不問馬祖升堂百丈卷席意旨如何師云為衆竭力禍出私門進云洎合錯商量師云漏逗不少進云到此若無青白眼平生辜負兩莖眉師云鈍置殺人師乃云世尊拈花迦葉微笑師鐵得金一場富貴馬祖升堂百丈卷席為衆竭力禍出私門諸禪德不是知音者徒勞話歲寒人間正月十五日西來祖意若為陳樓臺上下火照火車馬往來人看人舉水潦問馬祖和尚如何是西來的的意祖當胸踏倒水潦起來拊掌呵呵大笑云也大奇也大奇百千三昧無量妙義只向一毫頭上識得根源便禮拜師云大小水潦喫人拳踢却道我悟悟得甚屎起來更不識羞猶道向一毫頭上識得根源且莫捏目生花後出世住山告衆云自從一喫馬師踏直至而今笑未休且道笑箇什麼一不得孤負自己二不得停囚長智三不得生心比擬擬不擬眨起眉毛千萬里舉五祖和尚云老僧遊方十餘年參數人善知識將謂了當及到浮山圓鑒會下更開口不得後來到白雲咬破一箇鐵餕餡直得百味具足且道豏子一句作麼生道花發雞冠媚早秋誰人能染紫絲頭有時風動頻相倚似向街前鬬不休師云五祖老和尚恁麼說話大似乞兒見小利舉香嚴端和尚云語是謗寂是誑不語不寂向上有事在老僧口門窄不能與汝說得師云香嚴和尚開口了合不得有什麼用處山僧即不然而今開兩片皮舒廣長舌為汝說去也便下座舉乳源和尚示衆云西來的的意不妨難道莫有道得者出來道看時有僧擬出來乳源便打云是什麼時節你出頭來師云這老漢雖是不惜身命入泥入水爭奈瞎却一切人眼去在舉盤山道三界無法何處求心四大本空佛依何住師云幸無偏照處剛有不明時又道璇璣不動寂爾無言覿面相呈更無餘事師又云會麼溪上芙蓉秋信早一枝映水兩枝紅舉僧問趙州如何是古人言州云諦聽諦聽師云諦聽即不無切忌喚鐘作甕舉僧問寬和尚狗子還有佛性也無寬云有僧云和尚還有麼寬云無僧云一切衆生皆有佛性和尚因甚却無寬云我非衆生僧云既不是衆生莫是佛否寬云不是佛僧云畢竟是什麼物寬云亦不是物僧云可思可見否寬云思之不可及見之不可議是名不可思議師云上來講讚無限良因蝦蟆𨁝跳上梵天蚯蚓驀過東海舉僧問雪峯如何是第一句峯良久僧舉似長生生云這箇是第二句僧便問如何是第一句生云蒼天蒼天師云雪峯毒蛇頭帶角長生猛虎尾查沙二大老雖然如是要且未知第一句而今若有人問山僧只向他道糞掃堆頭重添搕𣜂如地擎山不知山之孤峻似石含玉不知玉之無瑕乃豎起拂子云拂子穿却你髑髏敲落你鼻孔你還知麼若也機前領略句後知歸清風月下守株人凉兔漸遙秋草緑虎頭帶角人難措石火電光須密布還插得手麼假饒烈士薦應難懵底那能解回互豎起拂子云這箇拂子倒騎駿馬逆驟高樓跳入諸人鼻孔裏大叫一聲云相識還同不相識從教大地黑漫漫懶菴懶中懶最懶懶談禪亦不重自己亦不慕先賢又誰管你地又誰管你天物外翛然無箇事日上三竿猶更眠僧問靈機絶兆薦者還稀大用無私隨流得妙時如何師云金沙灘頭馬郎婦進云有意氣時添意氣師云猶較一線道進云不是知音徒勞竚思師云恁麼會又爭得進云既不恁麼如何即是師云一句截流萬機寢削師乃云靈機絶兆薦者還稀大用無私隨流得妙是乃橫行三界而三界絶行蹤放曠十方而十方無影像譬如鏡照諸像不亂光輝鳥飛於空不雜空色雖然如是未審何人共委良久云江西馬大師南嶽讓和尚一切智智清淨無二無二分無別無斷故釋迦老子千門萬戶八字打開了也還有把手共行者麼自是不歸歸便得五湖煙景有誰爭僧問普化踢倒飯床意作麼生師云驚天動地進云普化猶在師便打進云為復是神通妙用為復是法爾如然師云猶瞌睡在師乃云作家相見閃電猶遲擬議不來不消一撮那更言中定旨意下明宗繫縛盲驢斷送劫末報諸稚子莫謾波波自家胸襟自家酌度甚麼魔魅教你恁麼甚麼魔魅教你不恁麼喝一喝十方薄伽梵一路涅槃門且道路頭在什麼處不快漆桶舉同安察和尚問僧善惡不思心體自現古人還有理麼僧云莫是古人深意否安云胡人飲乳返怪良醫僧便禮拜出去安云若到諸方莫道參見同安來師云同安窮始究末截斷誵訛這僧知時別宜不妨具眼因甚同安向道若到諸方莫道參見同安來還委悉麼打水杖痕人莫問釘空鎚迹我全收僧問情生智隔想變體殊且道情未生時還隔麼師云隔進云知師一曲從來妙達者須知暗裏驚師云棺木裏瞪眼師云明眼漢沒窠臼應時如風應機如電譬如俊狗眼卓朔地上門下戶咬人火急若是困魚點著不來還歸死海舉雲門大師道盡大地無纖毫過患猶是轉句不見一法始是半提更須知有全提時節師云作麼生是全提底時節八尺布衫丈二袖僧問萬機休罷未為格外玄談直截根源乞師垂示師云早傷迃曲了也進云也知和尚三寸甚密師云猶缺悟在師乃云淺水不可容大舶止水不可藏獰龍惟有四溟波浪闊從容遊戲在其中所以兩岸遙曠如何繫中流洄洑詎可停橈漁翁一笛兮自樂長天萬里兮何憂了無憂復何求有時乘好月不覺過滄洲僧問聲前密布句後全收不是俊流如何話會師云劍去久矣爾方刻舟進云箭穿紅日影須是射鵰人師云徒勞啖進云不是苦心人不知師云轉見郎當師乃云聲前密布句後全收擬動鋒鋩失却鼻孔所以舉今舉古其數恆沙同死同生萬中無一衆中莫有一箇半箇試吐露看設或有之正好斬為三段速置他方何故布袋裏盛錐不出頭是好手舉永首座立僧云湍流處撥轉船來還他英俊手劍刃上翻身去須是婁羅兒豈不見外道問佛不問有言不問無言世尊良久外道云世尊大慈大悲開我迷雲令我得入諸禪德要知世尊納敗闕處麼問取堂中第一座莫教辜負兩莖眉死中活閒雲散盡長空闊活中死螺江水流截不住兩岸蘆花相對開漁翁撥棹還歸去去去何處寒梅已綻嶺南枝漫漫雪覆千峯寺三月安居九旬禁足物外閒人何拘何束青絹扇子足風凉一任山青并水緑舉有僧見修山主主云出門見釋迦入門逢彌勒僧不肯復問古德德云出門見阿誰入門逢什麼這僧便悟去師云這僧悟即不無爭奈未甚諦當修山主青天白日如被鬼迷古德頭白齒黃作恁麼說話懶菴即不然出門竹徑無人掃入戶方池照影寒僧問如佛見佛佛無異見如法說法法無異說時如何師云欲得不招無間業莫謗如來正法輪進云一言才領旨千古自分明師云不快漆桶進云爭奈龍蛇易辨衲子難瞞師云猶自檐枷過狀師乃云如佛見佛佛無異見如法說法法無異說無異見故佛即非佛無異說故法即非法以如是佛而說法以如是法而證真若能如是而體解更於何處覓疏親云行羅漢慈破結賊故行菩薩慈安衆生故行如來慈續慧命故且道行衲僧慈又作麼生逢佛殺佛逢祖殺祖逢父殺父逢母殺母生身陷地獄仰天大叫苦只將此德報深恩嚇殺南山白額虎十五日已前羣陰消伏泥龍閉戶十五日已後一陽來復鐵樹開花正當十五日塵中醉客騎驢騎馬前街後街相慶相賀物外道人衲被蒙頭圍爐打坐風蕭蕭雨蕭蕭冷湫湫誰管你張先生李道士胡達磨去却一拈却七上下四維無等匹碧眼胡僧笑點頭孔門弟子無人識為蒙菴嶽和尚舉哀云兄弟添十字同心著一儀中眉垂兩點出世少人知蒙菴法弟禪師汝已先知我即不知我既後知汝亦不知知不知兮即與我同條生汝何生兮不我先不知知兮即與我同條死汝何死兮不我後其生也恁麼來其死也恁麼去去去何處摧法幢滅法炬昨夜泥牛鬪入海無端拶倒珊瑚樹橫按吹毛虗張意氣衝開鐵壁枉費精神直饒不動神鋒坐致太平堯舜之君猶有化在舉古德道我若向你道即禿却我舌我不向你道即啞却口且道還有為人處也無四面和尚道擬欲吞却又被當門齒礙擬欲吐却又却咽喉小且道還有為人處也無師云恁麼提持未免瞎却天下人眼去在山僧即不然擬欲向你道不怕禿却我舌亦不怕咽喉小只怕帶纍他人擬不向你道不怕啞却口亦不怕當門齒礙只怕辜負自己以字不成八字不是差之毫釐失之千里小參施馬并拄杖云浩浩塵中不染塵正體堂堂沒却身拄杖橫挑香水海倒騎鐵馬出重城來也來也閃電光中𨁝跳擊石火裏提持有時卓在孤峯頂豈掛煙雲有時踏殺天下人不露風骨而今向這裏解却籠頭放下楖𣗖歸依佛歸依法歸依僧更不歸依邪魔外道亦不歸依清淨涅槃不修諸善不作諸惡不上天堂不墮地獄敕敕攝攝急急如律令婆子施藥云神仙妙藥真靈驗父子雖親不可傳而今為什麼在老僧手裏還委悉麼拈拄杖左邊卓一下云這一捻子只能殺人不能活人又向右邊卓一下云這一捻子只能活人不能殺人能殺不能活未免招他罪犯能活不能殺又却遭人笑怪與麼也不得不與麼也不得直得上天無路入地無門且道如何即是若是箇殺人不眨眼漢決定別有生方脫或未然不免開方便門截汝疑悔遂拈拄杖中心卓一下云這一捻子不從天生亦非地産不屬草木金石名數不屬甘辛鹹淡等味非是冷非是熱非有毒非無毒鼻不可嗅舌不可嘗身不可觸意不可知聲聞得之能證四諦緣覺得之能斷十二緣菩薩得之能安衆生諸佛得之能具正遍知覺天下老和尚得之能奪陰陽之功起必死之疾不唯點鐵成金抑乃轉凡成聖縱有一切身病心病佛病祖病及諸魔病悉皆療之且道衲僧得之又作麼生藥王藥上難回避而今分付此婆婆四月八日云西天悉達多太子今日降神出母胎一步一蓮隨寶足人間天上獨崔嵬遂豎起拂子云悉達來也悉達來也威光烜赫震動乾坤四顧周行作師子吼汝等謂吾今日降生非吾弟子若謂吾今日不降生亦非吾弟子懶翁聞得恁麼說話甚生叵耐悉達多悉達多人雖小膽能大昔在西天橫說豎說教壞多少人家男女今來這裡胡言漢語太煞欺我唐土兒孫而今忍俊不禁與他一刀兩段且要天下太平擊禪床一下法語游江海者須入龍宮入得龍宮更須生控獰龍頷下珠涉山川者須入虎穴入得虎穴更須活擒猛虎乳邊子海上雲門山白浪滔天誰解控龍珠峻壁懸崖孰能擒虎子除非是不惜身命不顧危亡一刀兩段底性燥漢方堪希冀設或躊躊躇躇擬進復縮狐狸度水相似卒難湊泊況是近時邪師過謬見地不明己眼不正動以實法繫人致使盲驢不知當向倚他門墻被一條紅線子縛得來手腳查沙地輕誇神俊自謂天下無䨥若築著箇漢一拶一挨將他平生鄭重處輥底一時撲翻教他眼瞪瞪地不知下落似這般漢一掃掃就一串穿却倒卓向屎躂下有什麼罪過知麼宗門深奧豈是你將些浮識掠虗做得底事若也據實話會三世諸佛張教網撈摝有情盡是蝦䗫口邊事六代祖師天下老和尚敲枷打鎖拔楔抽釘皆是草裏漢可中有密展聲前句全提向上機未免拖泥帶水自餘之輩是什麼碗躂丘軒知這一路子未曾有人當頭踏著而今要得徹去麼但於王公草舍不得住少父丘園急走過平墟陋店莫掛瓶盂峻嶺高巖不須駐足翻然驀過那邊方較些子雖然如是未過鐵山終存嶮厄酌滄海者滿腹未容其涓滴畫虗空者落筆已失其本形況是宗門一劄擬眨眼時便見白雲萬里豈不見趙州問南泉如何是道泉云平常心是道州云還可趣向也無泉云擬趣即乖州云不擬爭知是道泉云道不屬知不屬不知知是妄覺不知是無記只此靈鋒阿誰敢近若是箇漢足未跨門早已委得若更低頭覷地腦後一椎莫言不道知麼佛法大事不可粗心依人門戶咬人屎橛種種解會執占己長無有是處參須實參悟須實悟若絲毫許及不盡閻羅老決定打你鬼骨臀看他從上人布置施為只露目前些子如同電拂豈是影響之流所能摶摸不見道聲前一句非聖不傳未曾親近早隔大千又道聲前一路切忌承當句後全提猶虧一半縱聞恁麼直下豁然如金鱗透網游泳波瀾俊鳥出籠翱翔碧落要且未在何故老僧未曾向赫日光中下一陳雪向汝在室中機緣舉白鷺下田千點雪黃鶯上樹一枝花僧云好箇消息師云莫是你見處僧云是師云不堪餧狗舉云二邊純莫立中道不須安試轉身出氣看僧云行人更在青山外師云爭奈性命在我手裏僧便喝師云這掠虗漢便打聲前一路切忌承當句後全提猶虧一半僧云記劍刻舟破珠求影師云也知上座不分外僧云土曠人稀相逢者少師云不消一句子僧云今日鈍置和尚師云知即得智不到處切忌道著道著頭角生僧云生也師云是牛是馬僧云請師鑑師打一棒云這漆桶頌古出息不涉萬緣入息不居陰界魯祖面壁入息未嘗居陰界出息何曾涉萬緣一聲漁笛離南浦依舊蘆花深處眠池陽面壁許誰知萬古孤峯對落暉才見攢眉便回去早知不是丈夫兒良遂見麻谷維摩不二閉門入圃太周遮一喚回頭便到家良遂知時人不委海山空映夕陽斜言言言兮飄風灑雪默默默兮雷輷電掣藕絲孔裏騎大鵬等閒挨落天邊月自贊一不愛乖崖傲物又不愛像樓打樓飽諳世事傭開口暗展䨥眉自點頭佛照光和尚語嗣大慧上堂陝府鐵牛吞却嘉州大像則且止只如傅大士道空手把鋤頭步行騎水牛人從橋上過橋流水不流明什麼邊事無風荷葉