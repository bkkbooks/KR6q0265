body:
  text: 大慧杲禪師語嗣圓悟師紹興七年七月二十一日於臨安府明慶院開堂升座問答罷乃約住云假使大地草木盡末為塵一一塵有一口一一口具無礙廣長舌相一一舌相出無量差別音聲一一音聲發無量差別言詞一一言詞有無量差別妙義如上塵數衲僧各各具如是口如是舌如是音聲如是言詞如是妙義同時致百千問難問問各別不消徑山長老咳嗽一聲一時答了乘時於其中間作無量無邊廣大佛事一一佛事周遍法界所謂一毛現神變一切佛同說經於無量劫不得其邊際便恁麼去鬧熱門庭即得若以正眼觀之正是業識茫茫無本可據祖師門下一點也用不著況復鉤章棘句展露言鋒非唯埋沒從上宗乘亦乃笑破衲僧鼻孔所以道毫釐繫念三塗業因瞥爾情生萬劫羈鎖聖名凡號盡是虗聲殊相劣形皆為幻色汝欲求之得無纍乎及其厭之又成大患看他先德恁麼告報如國家兵器不得已而用之本分事上亦無這箇消息山僧今日如斯舉唱大似無夢說夢好肉剜瘡檢點將來合喫拄杖只今莫有下得毒手者麼若有堪報不報之恩共助無為之化如無倒行此令去也驀拈拄杖云橫按鏌鎁全正令太平寰宇斬癡頑卓一下喝一喝復舉王常侍一日訪臨濟同到僧堂內常侍曰這一堂僧還看經否濟曰不看經常侍曰還學禪否濟曰不學禪常侍曰經又不看禪又不學畢竟作什麼濟曰總教伊成佛作祖去常侍曰金屑雖貴落眼成翳濟曰我將謂你是箇俗漢師拈云臨濟老漢握一柄金剛王寶劒氣衝宇宙天下橫行等閒被這官人輕輕一拶便見氷消瓦解且道這官人有甚長處聽取一頌世出世間希有事顯發須憑過量人只將補袞調羮手撥轉如來正法輪下座上堂昔日楊岐老祖翁牽犂拽杷逞神通兒孫帶水拖泥甚尉斗煎茶銚不同拈拄杖卓一下喝一喝云幸自可憐生特地胡打亂喝作什麼擲下云冷處著把火水底泥牛嚼生鐵憍梵鉢提咬著舌海神怒把珊瑚鞭須彌山王痛不徹拍禪床下座衝開碧落松千尺截斷紅塵水一溪不識本來真面目將謂人題德嶠詩買鐵得真金求雨得瑞雪五峯玉琢成千樹銀花結龍王降吉祥普賢呈醜拙三世如來祕密門今日一時都漏泄雖然如是這裏有一處可疑且道疑箇什麼恐日出後一場漏逗一不成隻兩不成雙喝一喝云是甚麼劍號巨闕珠稱夜光拈拄杖卓一下召大衆云還聞麼復舉起云觀世音菩薩來也在徑山拄杖頭上口喃喃地道諸行無常是生滅法生滅既滅寂滅現前拈須彌盧於掌上向針眼裡打鞦韆直饒便恁麼見得徹去猶較拄杖子十萬八千且道徑山拄杖子有甚麼奇特擲下云不直半分錢顛倒想生生死續顛倒想滅生死絶生死絶處涅槃空涅槃空處眼中屑涅槃既空喚什麼作眼中屑白雲乍可來青嶂明月難教下碧天拈拄杖卓一下喝一喝云德山棒臨濟喝今日為君重拈掇天何高地何闊休向糞掃堆頭重添榼𣜂換却骨洗却腸徑山退身三步許你諸人商量且作麼生商量擲下拄杖喝一喝云紅粉易成端正女無錢難作好兒郎去年人看中秋月今年人看中秋月今年人是去年人去年月是今年月還有人向這裏著得一隻眼麼若也著得徑山分半院與伊住其或未然歸堂喫茶拈拄杖示衆云迷底人喚這箇作拄杖子悟底人亦喚這箇作拄杖子雖迷悟之有殊蓋所見而無異見既無異則迷者從教迷悟者從教悟總不干這箇事又舉起云即今舉起在諸人眼睛上是迷耶是悟耶是見耶是不見耶是異耶是不異耶喝一喝卓一下云又是從頭起千說萬說讚說毀說安立說隨俗說顯了說蓋覆說盡是碗躂丘拈起拄杖云爭如直下識取這箇不被生死之所轉不被寒暑之所遷或有箇衲僧出來道也只是箇拄杖子用識作什麼今時有一種杜撰禪和多作這般見解擲拄杖下座拈拄杖云今朝臘月二十五諸方盡唱雲門曲徑山隨例和一聲乃卓一下云還聞麼莫言楚石不當玉結夏云此日諸方叢林莫不踞菩薩乘修寂滅行以大圓覺為我伽藍身心安居平等性智徑山又且不然從今日去九十日內與諸衲子共喫無米飯咬優曇根飲不濕水說睡夢語且道恁麼修行與諸方結制相去多少良久云將此身心奉塵剎是則名為報佛恩何似生遼天鶻萬重雲只一突古人恁麼說話大似眼病見空花徑山即不然何似生莫妄想直饒透出古今也是猢孫伎倆今朝正月半有則舊公案點起數碗燈打鼓普請看看即不無忽爾油盡燈滅時暗地裏切忌撞著露柱浴佛云大家潑一杓惡水洗滌如來淨邊垢垢盡衆生煩惱除狐狸便作獅子吼舉高亭初參德山隔江問訊德山以手招之高亭忽然開悟乃橫趍而去更不回顧後開法嗣德山師云高亭橫趍而去許伊是箇刢利衲僧若要法嗣德山即未可何故猶與德山隔江在已著槽廠將錯就錯騎却聖僧不妨快樂龍象蹴踏非驢所作堪笑諸方妄生穿鑿休穿鑿祥麟只有一隻角舉溈山與仰山行次溈山指一丘田謂仰山云這頭得恁麼高那頭得恁麼低仰山云却是那頭高這頭低溈山云你若不信但向田中立看兩頭仰山云不必中間立亦莫住兩頭溈山云若如是著水看水能平物仰山云水亦無定但高處高平低處低平溈山便休師云顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉喝一喝古人道我宗無語句實無一法與人恁麼道早是通身浸在屎窟裏了也那堪更踏步向前如之若何問向上向下三要三玄銀碗裏盛雪北斗裏藏身意旨如何豈不是屎窖傍邊更掘屎窖雖然如是若於屎窖中知些氣息方知三世諸佛歷代祖師天下老和尚古往今來一切知識盡在屎窖裏轉大法輪其或未然切忌向屎窖裏著到中秋舉仰山與長沙玩月次山以手指月云人人盡有這箇只是用不得沙云恰是倩汝用山云作麼生用沙近前一踏踏倒仰山山起來云直下似箇大蟲師云皎潔一輪寒光萬里靈利者落葉知秋傝者忠言逆耳休不休已不已小釋迦有陷虎之機老大蟲却無牙齒當時一踏豈造次驀然倒地非偶爾衆中還有緇素得二老出者麼良久云設有也是掉棒打月一二三四五五四三二一返覆數千回總不出今日且道今日事作麼生良久云霜風刮地來法身赤骨退院再歸云去是住時因住是去時果去住與果因無可無不可喝一喝云這裏是什麼所在說去說住說因說果說可說不可雖然如是這裏却有箇好處且道好在什麼處良久云再理舊詞連韻唱村歌社舞又重新舉圓通秀和尚示衆云少林九年冷坐剛被神光覷破如今玉石難分只得麻纏紙褁這一箇那一箇更一箇若是明眼人何須重說破師云徑山今日不免狗尾續貂也有些子老胡九年話墮可惜當時放過致今默照之徒鬼窟長年打坐這一箇那一箇更一箇雖然苦口叮嚀却似樹頭風過示衆拈拄杖卓一下云細不通風大通車馬突出當陽孰辨真假虗空有柄無手人能把跛驢踏倒摘茶輪草菴瀉下琉璃瓦又卓一下三十年來弄馬騎今朝却被驢兒攧就地拾得麗水金拈起却是新羅鐵報諸人別不別夜來雪壓雲門凍得烏龜成鱉除夜云今朝喚明朝作來年明朝喚今夜作去歲既稱來年今夜合來既號去歲明朝合去來年今夜不見來去歲明朝定不去既不來又不去業識茫茫無本據大圓鏡裏絶纖塵箇中豈著間家具是則是別又別爍迦晃破秋天月龐公不昧本來身大似飛龍成跛鱉你諸人瞥不瞥靈利漢須看時節五九盡處又逢春衲僧腦後三斤鐵喝一喝下座夜來兔子趕大蟲天明走入無何有月下珊瑚長數枝萬象森羅齊稽首驀拈拄杖云拄杖子不唧𠺕渠儂却善分妍醜李公爛醉絶倒時元是張公喫村酒報諸人急回首切忌癡狂外邊走心空及第無階級直下忘懷罪性空一念廓然三際斷千差萬別盡圓通雲門昨日晝寢夢乘一葉輕舟泛東大洋海騎新修佛殿入螻蟻穴中迤邐行到十字街頭萬人叢裡見一隊強項衲僧口裡談玄演妙舉古明今說靈雲見桃花悟道香嚴聞擊竹明心雪峯連年輥毬禾山長時打鼓事存函蓋合理應箭鋒拄方作此夢忽然被人驚覺元來却是嘉通聚三人鞋履作聲雲門雖然眼開猶在夢中未惺三上座近前作禮曰請和尚來日為衆說禪雲門夢裏應渠曰諾今日擊動法鼓大衆上來且道說箇什麼即得昨日夢說禪如今禪說夢夢時夢如今說底說時說昨日夢底昨日合眼夢如今開眼夢諸人總在夢中聽雲門復說夢中夢良久云驢脣先生開口笑阿修羅王打㪍跳海神失却夜明珠擘破彌盧穿七竅三人上座請說禪平地無風浪拍天禪禪不用思量卜度非干文字語言仰之彌高鑽之彌堅巖頭剗之則曰是句非句臨濟用之則曰三要三玄禪禪吞却栗棘蓬透出金剛圈休論趙州老漢庭前柏樹子莫問首山新婦騎驢阿家牽但請一時放下著當人本體自周圓召大衆云且作麼生說箇周圓底道理夢裏明明有六趣覺後空空無大千喝一喝龜山晦菴光狀元和尚語嗣大慧開堂佛法至論非競辨而求激揚鏗鏘以摧異學假使普惠雲興二百問普賢瓶瀉二十酬只益多聞於道轉遠豈不見神鼎諲和尚開堂示衆云山僧行腳初無正因只待向東京垢裏聽一兩本經論於古寺閒房且與麼過時不謂行到汝州葉縣被一陳業風吹上首山曲𩓪木床上見箇老和尚當時把不住禮却他三拜直至而今悔之不及師云這老漢牙根不瀝水未免順人情既是初無正因何用禮他三拜既禮拜了又悔箇什麼教忠當時若見痛與一頓免見遞相鈍置山僧當初特發正因參道雲水以一螢之明歷印知識末後遇箇老衲自江西入閩向村草步頭開箇鋪席特地上他門戶室中爭鋒之際驀被當頭一拶忽然失腳落手被這老漢以冬瓜印印破面門便道龜毛拈得笑咍咍一擊萬重關鎖開慶快平生是今日孰云千里賺吾來山僧是時忍俊不禁也有一頌一拶當機怒雷吼驚起須彌藏北斗洪波浩渺浪滔天拈得鼻孔失却口所以今日劈破面皮八字打開撒在諸人面前且道與神鼎是同是別忽有箇漢出來道新長老這一場漏逗還許人撿點也無莫把是非來辨我浮生穿鑿不相干復召大衆云今日一會固非小緣匝地普天孰不欣慶已是不識好惡不免科為三分最初乃是大資相公陳請古定空院為教忠顯慶是序分中間敦命山僧來住持是正宗分今日邀諸尊官入山請開東山法門上延睿算是流通分三分既明畢竟是何章句仰祝聖君無量壽河清海晏樂升平上堂卓拄杖喝一喝云忽有箇衲僧出來道幸自可憐生剛要胡打亂喝作麼只向他道晴乾開水路無事設曹司巍巍堂堂萬象之中獨露明明歷歷百草頭上相逢所以道風不鳴條雨不破塊桃花濯錦而鮮楊柳弄風而翠若於此處脫根塵何必龍華第三會結夏云未到教忠時無放身命處既到教忠後四邊無出路直饒透得出平地上死人無數衆中莫有具透關眼者麼出來道取一句句下須有分身之意亦有出身之路如無且向教忠門下尋取一條活路入龜山上堂兒時曾向山前住老大還歸山上來雲外堂前逢蔡柳大家拍掌笑咍咍且道笑箇什麼春風二三月鐵樹也花開五日一參現成公案只要當人眼親手辦遂豎起拂子云看看李廣射落雲中鴈擲拂子下座卓拄杖喝一喝云不是坐來頻勸酒自從別後見君稀召大衆云一九與二九相逢不出手凍得鴟吻頭面南看北斗諸禪人曉不曉地爐火冷莫嫌寒更有樵夫赤腳走今朝臘月二十衲僧門風壁立進前擬問如何劈面老拳箭急為什麼如此恐汝錯下名言和風習習膏雨微微洗開柳眼秀出花枝衲僧聞得呵呵笑也是宗門第八機下座召大衆云三乘十二分教橫說豎說天下老和尚縱橫十字說而今枝蔓上更生枝蔓衆中莫有具大丈夫志氣不受佛祖羅籠者麼出來掃盡天下葛藤與山僧相見有麼有麼良久云切忌停囚長智鼓山立僧秉拂云瞻望石門關如泰山北斗一旦過關來便鼓是非口喝一喝云釋迦老子大不唧𠺕以僧伽梨付囑迦葉阿難不知達磨大師具大脫空以單傳心印分付神光二祖不會而後一人傳虗萬人傳實子承父業師勝資強一箇箇馳騁家風不覺墮坑落塹慈明橫一口劍於水盆之上下安草鞋以為道用癡人面前豈可說夢楊岐三腳驢子弄蹄行談詞并擊竹海上盡知名白雲多處添些子少處減些子面赤不如語直五祖有片閒田地做主宰不得東頭買貴西頭賣賤笑殺傍觀獨有龍門老漢却較些子將一條拄杖分付老禪自江西淮南打到福建逢佛殺佛逢祖殺祖而今石鼓峯前放下拄杖靈源洞口別棹孤舟半帆明月載青秋一等是春能富貴可以揚清激濁顯正摧邪坐致太平中興吾道師驀拈拄杖橫按云秉拂上座輒借老禪用不盡底威光要與大衆相見乃以杖指云指出斷崖窮處路快須撒手莫躊躇擲下拄杖復云今早蒙老禪和尚舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人頌曰兩輪日月磨今古一合乾坤夾是非向道是龍剛不信果然含得錦標歸師云老禪雖然八字打開爭奈死蛇當路秉拂上座又且不然何也當門不用栽荊棘後代兒孫惹著衣舉世尊初生一手指天一手指地云天上天下唯我獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平師拈云樊噲踏鴻門救主不顧至尊白起坑四十萬趙民不施寸刃若比雲門猶為鈍漢且道雲門有甚長處赤手殺人血濺梵天法語一拈古二往古大達之士只為聖心未通所以負挑囊遊川涉海歷試諸難求實證悟頭目髓腦不自愛惜況小小效勤者哉如雪山童子捨全身求半偈趙州古佛八十歲猶自行腳皆為此段大緣以作後昆榜樣又豈與飽食終日游談無根者同日而語耶禪人再來入社發心為衆持鉢以表依師學道之志老僧為法惜人再三勸其無行且辦己事渠確然應曰保壽街頭見人廝打云得恁無面目當下知歸盤山猪肉按頭聞道那箇是不精底亦桶底脫維摩詰云塵勞之儔為如來種十字街頭浩浩塵中與三條椽下六尺單前亦何有異老僧云嘗聞其語未見其人杲踐前言終不倩人作保舉僧問趙州至道無難唯嫌揀擇時如何州云天上天下唯我獨尊僧云此猶是揀擇州云田厙奴什麼處是揀擇後來老宿拈云趙州一期粗心將謂瞞得這僧爭奈有人不肯當時這僧若具些眼目但云真善知識出言有準教這老和尚暗裏喫拳師拈云這老宿大似徐六擔板只見一邊殊不知正敕既行諸侯避道舉乾峯示衆云舉一不得舉二放過一著落在第二時有僧出云昨日有人從天台來却往徑山去峯云典座來日不得普請師云不因紫陌花開早爭得黃鶯下柳條此菴淨禪師語嗣大慧序無垢居士張九成豫於叢林中聞淨老名舊矣流離憂患恨未及識之今其死矣吁可傷哉妙臾禪者手其語録一編求豫為序余一讀之信楊岐的孫而徑山嫡子也且道於什麼處見得咄見成公案放汝三十棒咄紹興己卯四月朔無垢居士張九成書上堂住泉州雲門云定光金地遙招手智者江陵暗點頭已是白雲千萬里那堪於此未知休設或便休去已是一場狼籍不少還有檢點得出者麼如無山僧今日失利復舉閩王請羅山開堂升座斂衣左右顧視便下座大王近前執羅山手云靈山一會何異今日山云將謂你是箇俗漢師云大小羅山只具一隻眼定光即不然靈山一會何異今日却向他道元來是箇俗漢未到雲門不免岐路波吒前不至村後不迭店及乎到來又須透出始得若透不出坐在裏許面前毒蛇成羣背後猛虎無數頭上火星迸散腳下劍戟森然而今一衆盡在裏許眉毛相似眼孔一般誰是透出者誰是透不出者明眼高人試為雲門指出貴圖一夏在此亦不虗過儻或不爾還我九十日飯錢來冬至出歸小參云山僧數日拋離清衆暫往人間人事紛拏略有少暇茲晚恰還侍者遽報至節夜大衆鶴望和尚舉揚山僧未到法堂早聞鳴鐘況已煩動大衆上來不免曲循人情據坐少時行破文字若是佛法實不曾道著談玄說妙撒屎撒尿行棒行喝將鹽止渴立主立賓花擘宗乘設或總不與麼又是鬼窟裡活計到這裏山僧已是打退鼓且道諸人尋常心憤憤口悱悱合作麼生莫將間學解埋沒祖師心古德云大凡衲僧面前須是靈利漢始得復回顧左右云這裡莫有靈利底麼有則喚來與老僧洗腳舉趙州示衆云夫為宗師者須以本分事接人師云若論本分事老僧倒退三千里僧問不見一法即如來方得名為觀自在此意如何答彌猴弄膠𥻿僧云與麼則千江有水千江月萬里孤舟萬里身師云胡孫繫露柱師乃云善鬬者不顧其首善戰者必獲其功其功既獲坐致太平太平既致高枕無憂罷拈三尺劍休弄一張弓歸馬于華山之陽放牛於桃林之野風以時雨以時漁人歌樵人舞雖然如是堯舜之君猶有化在爭似乾坤收不得堯舜不知名渾家不管興亡事偏愛和雲占洞庭喝一喝坐斷毗盧頂𩕳須是沒量大人若是沒量大人不坐毗盧頂𩕳靠拄杖云大衆山僧全得這箇力良久云相見易得好共住難為人擲下拄杖一句具三玄一玄具三要有玄有要如拳作掌展縮自由不假他力山僧已是抖擻屎腸為你諸人說了也諸人切不得與麼會何故長安雖樂不是久居佛日付法衣到云傳來鐵鉢盛猫飯摩衲袈裟入墨盆祖翁活計都壞了不知將底付兒孫乃提起法衣示衆云且道這箇從甚處得來還委悉麼青林才換葉紅蘂又開花舉魯祖凡見僧來便面壁僧問雲門魯祖面壁意作麼生門云念七師云魯祖面壁雲門念七大衆天寒不煩久立黃狀元到云十方同聚會箇箇學無為此是選佛場心空及第歸師云及第即不無且道是甚標目不見白雲道堂前露柱久懷胎長下嬰兒頗俊哉未解語言先作賦一操直取狀元來舉黃龍道有一人朝看華嚴暮看般若晝夜精勤無有少暇有一人不參禪不論義把箇破席日裏睡此二人同到黃龍一人有為一人無為且道安下那箇得是良久云功德天黑暗女有智主人二俱不受師云黃龍雖則一時以智遣惑大似閉門塞狗竇未免觸途成滯若是達人分上無可不可況自無心於萬物何妨萬物常圍繞雖然如是莫謂無心云是道無心猶隔一重關釋迦老子設三網於生死海中初網四目救諸聲聞中網十二目救諸緣覺後網六目救諸菩薩忽遇出格底來又作麼生救良久云透網金鱗猶滯水面途石馬出紗籠今晨浴佛且道三身中浴那一身若浴報化身佛又道報化非真佛亦非說法者若浴法身佛又道佛真法身猶若虗空應物現形如水中月三身既不有一身何處起無處起正好劈頭一杓水喝一喝結夏云文殊普賢談理事臨濟德山行棒喝東禪一覺到天明偏愛風從凉處發喝一喝舉雲門云法身是病用透是藥浮山圓鑑云屬羊人本命屬虎人相衝大小圓鑑元來小膽山僧即不然象駕崢嶸謾進途誰見螳蜋能拒轍一念得心頓超三界得無所得貪瞋爛壞野草閒花滿地愁將軍戰馬今何在喝一喝古人道識得拄杖子行腳事畢師云這箇是拄杖子那箇是行腳事滿船明月一竿竹家在五湖歸去來九夏炎炎火熱木人汗流不輟夜來一雨便凉莫道山僧不說拂子擊禪牀下座道是常道心是常心汝等諸人聞山僧與麼道便云我會也我會也大盡三十日小盡二十九頭上是天腳下是地耳裏聞聲鼻裏出氣忽若四大海在汝頭上毒蛇穿汝眼睛蝦䗫入汝鼻孔又作麼生舉白雲解夏示衆云白雲又得一夏說盡靈山舊話師云若是舊話雲門萬一不說何也當門不用栽荊棘後代兒孫惹著衣受東禪請云正炊折腳鐺安隱無奈公文抵死催硬把死蛇頭不得隨時之義大矣哉淨上座今日平地上喫交諸人還見麼然雖如是官不容針私通車馬入方丈云大兄杜口毗耶小兄掩室摩竭恰好和我三人大家證龜作鱉喝一聲入院云未到覺城東際時心頭終有一絲疑既到之後睹景思人人莫我知一去一住或東或西一唱一和如塤如箎箇是吾家最白眉豈意法輪三轉自慚有辱連枝雖龍象蹴踏非驢所宜其奈若教嫫姆臨明鏡也道不勞紅粉施喝一聲石門深且幽好住不肯住翻身入城隍却向閙市去閙浩浩處冷湫湫冷湫湫處看楊州大衆且道楊州有甚好看不見道四五百條花柳巷二三千處管絃樓結夏釋迦老子道以大圓覺為我伽藍身心安居平等性智可惜許當時若有箇漢見恁麼道便拽下禪牀喝散大衆免教後代兒孫落他綣繢裏致令千載之下箇箇跳不出跳不出也大奇衝開碧落松千尺截斷紅塵水一溪十方同聚會箇箇學無為此是選佛場心空及第歸還有心空及第者麼良久云本自無瘡勿傷之也昔一尼問德山某甲如何得成僧去山云你是尼耶尼又問某甲幾時得成僧去山云你只今是什麼尼云某甲是尼山云誰識你師云誰識你笑殺我熱如水冷如火太無端德山老嚼飯餧嬰孩按牛頭喫草張氏善昌請上堂惠不厭修福不厭作福惠雙收如虎戴角作既無作修亦無修青山緑水短棹孤舟格外之談逈出常流豎起拂子且道是格外是格內觀音菩薩將錢買胡餅放下手元來却是饅頭喝一喝越格超宗埋沒先聖依他建立孤負己靈不涉二途如何通信靈龜無卦兆空殼不勞鑽不用立雪庭下不用斷臂師前須信當人分上已與佛祖齊肩會得朝打八百不會暮打三千瞿曇鼓動三寸舌四十九年無法說達磨不立一字腳列派分枝無處著既不立一字腳列派分枝從甚麼處得來青山不鎖長飛勢滄海合知來處高施主請舉晦堂云昔日去時是今日今日依前人不來昔既不來今不往白雲流水空悠哉師云晦堂大似和泥脫墼有甚快活爭如我大檀越要去便去要來便來本無岐路豈涉梯階畢竟如何雨後文殊上五臺薦母請云煩惱盡時愁火滅恩情斷處愛河枯遍虗空是愁火向什麼處滅盡大地是愛河又作麼生枯還會麼雲在嶺頭閒不徹水流㵎下太忙生念念捨離諸惡趣心心克取佛菩提取捨二途如脫得永嘉元不識曹溪印大師請上堂夫行腳漢一等踏破草鞋直須跟斷透過威音那畔更那畔宗之與教是假道佛之與祖是強名授教傳宗皆為虗妄尋真求實轉見參差若以自心自性為究竟必有他物他人為對待直饒一擲驀過太虗內絶聚蠅之糝外無繫蟻之絲衲僧門下掉棒打月必竟如何苦哉佛陀佛祖頂𩕳上有破天大路未透生死關如何敢進步不進步大千沒遮護一句絶言詮邢吒擎鐵柱流水下山非有意片雲歸洞本無心人生若得如雲水鐵樹開花遍界春請首座書記藏主上堂我有折腳鐺三子共提掇一著一著高一步一步闊從此活業興清風動寥沉夜半放烏雞頭上一點雪達磨西來老盧南至列派張枝兒孫遍地盡言教外別傳又何曾夢見東禪腳下汗臭氣你道東禪有甚長處相逢且說三分話未可全拋一片心今朝十二鼓聲動地雲水上來討甚巴鼻直饒天雨四花爭似歸堂打睡喝一喝達磨不來東土二祖不往西天老盧不識五祖誰云夜半衣傳後人聽事不真喚鐘作甕大開口來只管說夢夢却任你夢說即任你說勸君莫向虗空裏釘橛喝一喝下座歲除云日日波波走夜夜不曾停走到歲窮夜依舊定盤星山僧今夜因風吹火更為諸人重說偈言去也三十六旬窮此夕定盤星上轉風車放開結角羅紋處須信風流出當家入荒田不揀信手拈來草拈拄杖云而今信手拈來開眼也著合眼也著還有不受人瞞者麼良久云除却華山潘處士不知誰解倒騎驢住西禪入方丈云我有懶菴兄夤緣真有在從