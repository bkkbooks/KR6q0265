body:
  text: 鎮州臨濟慧照禪師語録序延康殿學士金紫光祿大夫真定府路安撫使兼馬步軍都總管兼知成德軍府事馬防撰黃檗山頭曾遭痛棒大愚肋下方解築拳饒舌老婆尿牀鬼子這風顛漢再捋虎鬚巖谷栽松後人標榜钁頭斸地幾被活埋肯箇後生驀口自摑辭焚機案坐斷舌頭不是河南便歸河北院臨古渡運濟往來把定要津壁立萬仞奪人奪境陶鑄仙陀三要三玄鈐鎚衲子常在家舍不離途中無位真人面門出入兩堂齊喝賓主歷然照用同時本無前後菱花對像虗谷傳聲妙應無方不留眹迹拂衣南邁戾止大名興化師承東堂迎侍銅瓶鐵鉢掩室杜詞松老雲閒曠然自適面壁未幾密付將終正法誰傳瞎驢邊滅圓覺老演今為流通點撿將來故無差舛唯餘一喝尚要商量具眼禪流冀無賺舉宣和庚子中秋日謹序汾陽昭禪師語嗣首山師問首山百丈卷席意旨如何山云龍袖拂開全體現師云未審師意如何山云象王行處絶狐蹤師因此有省拜起曰萬古碧潭空界月再三撈摝始應知或問見何道理便爾自肯師曰正是我放身命處僧問如何是大道之源師云掘地覓青天如何是祖師西來意師云青絹扇子足風凉師乃云汾陽門下有西河師子當門踞坐但有來者即便咬殺有何方便入得汾陽門見得汾陽人若見汾陽人者堪與祖佛為師不見汾陽人盡是立地死漢如今還有人入得門麼快須入取免得辜負平生不是龍門客切忌遭點額邢箇是龍門客一齊點下舉拄杖云速退速退珍重乾坤寬廓宇宙橫鋪衲僧分上左穿右穴樵父擔柴醫王辨價藥多病甚網細魚稠東西南北衝霜踏雪不避寒暑要明斯事也須是箇一刀兩段漢始得只恁麼㤨㤨恫恫地爛冬瓜相似有什麼成辨咬斷兩頭猶是拖泥帶水豈更因循可惜許兄弟正法難聞正眼難發何不自省去譬如兩陳相逢不讓先手掣鼓奪旗快須與徹人人慷慨各各英豪大丈夫兒莫教孤負行心虗消信施山雲廣闊有什麼休時若不自智通玄管取償他宿債圖什麼波波地誑他父母虗生一遍了又更出家行腳云我參善知識見性絶生死流了無為法苦哉苦哉萬中無一自省歸根者矣夫說法者須具宗師眼目須識玄門要辨緇素邪正古人道玄有玄路鳥道難通一語不玄流俗阿師且問諸上座作麼生是玄路還會麼與汾陽說看要知端的莫只恁麼兀兀地過時虗消信施自從古德各有出人底路還省得麼先聖道一句語須具三玄門一玄門須具三要阿那箇是三玄三要底句快會取好各自思量還得穩當也未古德已前行腳聞一箇因緣未明中間直下飲食無味睡臥不安火急決擇莫將為小事所以大覺老人為一大事因緣出現於世想計他從上來行腳不為遊山玩水看州府奢華片衣口食皆為聖心未通所以驅馳行腳決擇深奧傳唱敷揚博問先知親近高德蓋為續佛心燈紹隆祖代興崇聖種接引後機自利利他不忘先跡如今還有商量者麼有即出來大家商量僧問如何是接初機底句師云汝是行腳僧如何是辨衲僧底句師云西方日出卯如何是正令行底句師云千里持來呈舊面如何是立乾坤底句師云北俱盧洲長粳米食者無貪亦無嗔師云只將此四轉語驗天下衲僧才見你出來驗得了也如何是學人著力處師云嘉州打大像如何是學人轉身處師云陝府灌鐵牛如何是學人親切處師云西河師子師云若人辨得此三句已會三玄更有三要語在切須薦取不是等間與大衆頌出三玄三要事難分得意忘言道易親一句分明該萬象重陽九日菊花新師云會麼恁麼會得不是性燥衲僧作麼生會好久立珍重早參云平旦寅狂機內有道人身你等聞鍾聲上來不是狂機那箇是道人身有識得底麼如今識得盡未來際不受他瞞如識不得蝦蟆蚯蚓欺你千說萬說不如自見若自見分明當下超凡入聖不被衆魔惑亂喚作大事已辦但有來者到你面前一箇伎倆用不得所以趙州云老僧只管看這底不是箇擇法眼釋尊喚作妙明真性不假莊嚴會取免得妄認塵緣虗過時光僧問如何是賓中賓師云合掌菴前問世尊如何是賓中主師云對面無人暗如何是主中賓師云陳雲橫海上拔劒攪龍門問如何是主中主師云三頭六臂擎天地忿怒那吒撲帝鍾師乃云諸方老宿事不獲已東語西話你等將謂合恁麼地廣陳詞說各競聚頭不眠不睡道我參尋你擬向那裏參古人云向外作工夫總是癡頑漢快須信取不用久立一陽生後日長一線你道佛法長多少師於方丈坐次僧俗侍立外有一人不通姓名入來禮拜起問如何是和尚家風師云我家廣大無種不有云學人未會師深旨乞師方便展機鋒師云師子坐安方丈內龍形拄杖手中持云用者如何師云𭣟破頑癡石收取照星珍云如何是照星珍師云我行荒草裏汝又入深村其人禮拜起出門便隱去不知所在拈起拄杖云識得者箇參學事畢還識麼莫道喚什麼作拄杖如此之輩如塵似沙許你商量作麼生開口試道看僧問如何是拄杖子師云德山德山云過在什麼處師云薩婆訶師乃云更有問底麼快問將來道場難遇時先迅速一息不來黃泉萬劫久立珍重鍾聲噪可契真源別處馳求妄生節目信得因風吹火不信平地掘坑事不獲已起模畫樣所以道靈山話月曹溪指月月在什麼處與我指出看直報禪和莫向天上覓好僧問如何是不在天上底月師云照師云明知無一物何用更推求當處不強名鋒芒甚處有直下攬得猶是殘弓折箭堪作何用擬議躊躇陳場掃以拄杖一時擂下河東運使鄭工部入山相見茶話次部云專甲留一偈贈師得否師云何敢運使慈造部於壁上篆書一偈云黃紙休遮眼青雲自有陰莫將間學解埋沒祖師心復云只將此偈驗天下長老師云恁麼則汾陽也在裏許部云擔枷過狀師云更不再勘部云兩重公案師云知即得部良久師噓一聲部云文寶文寶師云甚所在部云不容專甲出氣爭得嗔他道淹滯長老在此師云是何言歟部云實師云也不得放過部云請師一偈得否師云不間文墨部云請師口札師遂云荒草勞尋徑巖松迥布陰幾多玄解客失却本來心鵝王擇乳素非鴨類僧問鵝王擇乳素非鴨類意旨如何師云江南有江北無師云許多葛藤還得明了未分明記取問頭便須覷捕究理而參扶桑不遠莫向外馳求當處發生隨處自現乾坤大地皎皎明白但於十二時中行住坐臥子細思量看是誰作障礙為什麼臨機道不得只為一切境識不通被他回換便隨境走不能作得主宰所以一句中三玄三要四種賓主歷然地只為多生煩惱雲翳遮蔽拋擲今生又不近明眼道人決擇莫逐日過時古人云今生不通來生窒塞轉轉不明思量虗延歲月枉過時光在家出家直教了去若能了得盡未來際天上人間作師子吼告報人天互為賓主展縮自在為依為止為道為路有甚障礙若不明了千難萬難快須薦取脫却根塵其如不了謾說如今珍重僧問抱璞投師請師雕琢師云明朝更獻楚王看朝參暮請蓋是尋常不落言詮作麼生道拈拄杖云三世諸佛總在這裏看看見你沒孔竅總入拄杖裏妄生節目去也有趂得上底麼有即舉一步趂看便有僧出師云瞥爾早拋千萬里又打云我早是𨁝跳入泥坑裏你更待火𦦨上添草似箇阿師救得也無僧禮拜師云來來你還會葛藤麼僧云不會師云賴你不會汾陽拾得口喫飯蘇嚕蘇嚕師因觀洞山價和尚五位語乃述頌云五位參尋切要知纖毫才動已相違金剛透匣誰能用唯有那吒第一機舉目便令三界靜振鈴還使九天歸正中妙俠通回互擬議鋒芒失却威僧問如何是正中來師云旱地蓮花朵朵開云開後如何師云金蘂銀絲承玉露高僧不坐鳳凰臺如何是正中偏師云玉兔既明初夜後金雞須報五更前如何是偏中正師云毫末成大樹滴水作江河如何是兼中至師云意氣不從天地得英雄豈藉四時推如何是兼中到師云玉女攛梭鳴軋軋石人打鼓響鼕鼕僧問牛頭未見四祖時如何師云師神更著師婆賽見後如何古廟重遭措大題師乃云聞聲見色觸目舒光山高海闊地久天長作麼生辨得主中主并汾地苦寒遂罷夜參有異僧振錫而至曰會中有大士六人因何不說法言訖而去師密記以偈曰胡僧金錫光為法到汾陽六人為法器勸請為敷揚師謂衆曰夫說法者須具十智同真若不具十智同真邪正不辨緇素不分不能與人天為眼目決斷是非如鳥飛空而折翼如箭射的而斷絃弦斷故射的不中翼折故空不可飛弦壯翼牢空的俱徹作麼生是十智同真與上座點出一同一質二同大事三總同參四同真志五同遍普六同具足七同得失八同生殺九同音吼十同得入又云與什麼人同得入與誰同音吼作麼生是同生殺什麼物同得失阿那箇同具足是什麼同遍普何人同真志孰能總同參那箇同大事何物同一質有點得出底麼點得出者不吝慈悲點不出來未有參學眼在切須辨取要識是非面目見在不可久立示衆二偈閃電之機不易當將心學道轉顛狂直饒咬得當鋒箭也是烏龜水裏藏疾𦦨過風用更難揚眉瞬目隔千山奔流度刃猶成滯擬議如何更得全頓漸俱收見性離文字學問識心心是佛不識是魔王魔佛一心作佛真魔即狂見性非言說何千海藏文舉心明了義不在廣云云從前學問幾能知拾礫泥中辨寶稀唯有隱淪高趣者騰騰兀兀混時機琅瑘覺和尚語嗣汾陽上堂拈起拄杖云山僧有時一棒諸佛降生有時一棒轉大法輪有時一棒入般涅槃你且道諸佛降生轉大法輪入般涅槃相去多少良久云莫謗如來正法輪珍重師舉先梁山云南來者與三十棒北來者與三十棒然雖如是不當宗乘師云梁山好一片真金將作頑鐵賣却琅琊即不然南來者與三十棒北來者與三十棒從教天下衲僧貶駮珍重舉僧問馬大師如何是佛大師云即心是佛如何是道云無心是道云佛與道相去多少大師云佛如展手道似握拳師云古人方便即不可山僧者裏也有些子若無人買山僧自賣自買去也如何是佛巖前多瑞草如何是道㵎下足靈苗佛與道相去多少數片白雲籠古寺一條緑水繞青山珍重與麼來者上間安排不與麼來者下間掛塔向上人來獨自悽悽暗渡江更有一人向什麼處著良久云釣竿斫盡重栽竹不計工程得便休珍重示衆云古人道有時先照後用有時先用後照有時照用同時有時照用不同時若也先照後用露師子之爪牙若也先用後照縱象王之威猛若也照用同時如龍得水致雨騰雲若也照用不同時提獎嬌兒拊憐愛子諸人者此古德建立法門為合如是不合如是若合如是似紀信登九龍之輦不合如是若項羽失千里烏騅還有人為琅琊出氣也無如無山僧自道去也卓拄杖下座僧問大事未辨時如何師云金燈連夜照不覺五更鐘進云大事已辨時如何師云跣足踏氷雪方知徹骨寒問談真即逆俗順俗即違真離此二途請師舉唱師云水底石牛吼木裏瑞花開進云若然者不因觀北斗爭得見南星師云世亂奴欺主年衰鬼弄人放汝三十棒舉大陽和尚示衆云平常無生句妙玄無私句體明無盡句後有僧請益如何是平常無生句白雲覆青山青山頂不露如何是妙玄無私句寶殿無人不侍立不種梧桐免鳳來如何是體明無盡句手指空時天地轉回途石馬出紗籠第一句道得師子嚬呻第二句道得師子踞地第三句道得師子返擲縱也周遍十方擒也坐在一處正當與麼時作麼生委息若委息不得來朝更向楚王看便下座拈起拄杖云十方諸佛降生也在拄杖頭上轉大法輪也在拄杖頭上入般涅槃也在拄杖頭上汝等諸人作麼生委悉良久云不可待緣木求魚見危致命卓拄杖下座拄杖若是頭上安頭拄杖不是斬頭覓活離此二途猶是無依滯魄透脫一路猶是著肉汗衫汝等諸人各具金剛眼睛到者裏作麼生會若也不會拄杖子透過渤海看看卓拄杖一下依經解義三世佛冤離經一字又同魔說且作麼生得不傷物義去汝等諸人聽山僧一頌地凍草枯水寒氷結借問禪人是何時節林際走過新羅德山愁眉不悅珍重句中薦得遊子返於故鄉意中薦得方解事於尊堂若然者須是轉身吐氣始得若能如是方解百尺竿頭進步句中無意意中無句既能如是且作麼生轉身吐氣若也不會拄杖子為汝吐氣去也卓拄杖下座舉先百丈禪師示衆云百丈有三訣喫茶珍重歇直下若承當知君猶未徹師拈云百丈與麼道美則美矣善則善矣雖然如是即有順水之波且無滔天之浪山僧即不然琅琊有三訣淥水青山月三冬枯木花九夏寒巖雪珍重慈明圓禪師語嗣汾陽師在崇勝院開堂白椎罷師乃云大衆會麼宜陽秀水南嶽石橋若也不會山僧謾你諸人去也所以達磨西來教外別傳一句且道別傳箇什麼直指人心見性成佛只如諸人盡是祖師指出底人還信得及麼若信得及與祖師同參若信不及可謂自生退屈此日一會不是小緣莫非工部郎中與諸官僚夙承佛記示作王臣建立法幢令法久住且道法幢作麼生建立還有英靈者麼試出來通箇消息看僧問如何是道師云踏著不瞋如何是道中人師云𮌎駝背負行腳不逢人時如何師云釣絲絞水如何是佛師云水出高原如何是西來意師云晝行夜臥如何是異類中人師云頭長腳短謝師指示師云半幅全封寶劒未出匣時如何師云響出匣後如何師噓一聲達磨未來時如何師云長安夜夜家家月來後如何師云幾處笙歌幾處愁既是護法善神為什麼張弓架箭師云禮防君子古人面壁意旨如何師云有年無德如何是佛師云瀟湘斑竹杖夜靜獨行時如何師云三把茆如何是西來意師云三日風五日雨己事未明以何為驗師云玄沙曾見雪峯來未審意旨如何師云一生不出嶺學人仗劍取師頭如何師云道吾遭逢僧擬議師便打師云問話且止若論此事豈枉如斯言多去道轉遠所以摩竭陀國已露鋒鋩少室峯前入泥入水到這裏須是箇人始得但某本欲寄居山野藏拙延時茲者伏承知郡郎中與諸官僚曲垂請命令續先基緣某諸事荒唐抑而不已而今向諸人面前作一場笑具還有檢點得出麼若也檢點得出共相證據若無山僧今日失利珍重上堂若向言中取則埋沒宗風直饒句下精通敢保此人未悟所以道山青水緑噪鴉鳴萬派同源海雲自異未來諸佛口似燈籠過去諸佛應病施方現在諸佛墮坑落塹不落聖凡一句作麼生道良久云矢上更加尖客至云颯颯涼風景同人訪寂寥煮茶山下水燒鼎洞中樵珍重一切諸佛及阿耨多羅三藐三菩提法皆從此經出乃竪起拄杖云者箇是南源拄杖子阿那箇是此經良久云向下文長付在來日喝一喝良久云無為無事人猶是金鎖難喝一喝卓拄杖下座諸佛放光明助發實相義竪起拄杖云者箇是南源拄杖子阿那箇是實相義你若見去被見聞所轉若也不見行腳眼在什麼處喝一喝吾有一言絶慮忘緣巧說不得只要心傳更有一語無過直與且道作麼生是直與一句良久以拄杖劃一劃喝一喝下座竪起拄杖云恆沙諸佛恆沙國土被南源拄杖子一時吞却其中衆生不覺不知你衲僧鼻孔在什麼處若也知得橫擔拄杖目視雲霄若也不知長連牀上有粥有飯卓拄杖受道吾請云先寶應道第一句薦得堪與祖佛為師第二句薦得堪與人天為師第三句薦得自救不了若是道吾即不然第一句薦得和泥合水第二句薦得無繩自縛第三句薦得四稜榻地所以道起也海晏河清行人避路坐也乾坤黯黑日月無光汝等諸人何處出氣如今還有出氣者麼有即出來對衆出氣看若無道吾今日與你出氣去也乃噓一聲卓拄杖下座天地與我同根萬物與我一體竪起拄杖云者箇是道吾拄杖阿那箇是一體良久云渡河須用筏到岸不須船卓一下宗師者奪貧子之衣珠究達人之見處若不如是盡是和泥合水漢良久云路逢劒客須呈劒不是詩人莫猷詩青青翠竹盡是真如鬱鬱黃花無非般若乃竪起拄杖云者箇是道吾拄杖阿那箇是般若看看文殊菩薩與善財童子向十字街頭說因說果被維摩居士喝一喝直得瓦解氷消良久云將謂是維摩居士元來只是山前李胡子卓拄杖下座面西行向東北斗正離宮道去何曾去騎牛臥水童伏惟珍重無明實性即佛性幻化空身即法身諸人者若也信得去不妨省力可謂善財入彌勒樓閣無量法門悉皆周遍得大無礙悟法無生是為無生法忍無邊剎境自他不隔於毫端十世古今始終不離於當念且問諸人阿那箇是當念只如諸人無明之性即汝之本覺妙明之性蓋為不了生死根源執妄為實隨妄所轉致墮輪回受種種苦若能回光返照自悟本來真性不生不滅故曰無明實性即佛性幻化空身即法身只如四大五蘊不淨之身都無實義如夢如幻如影如響從無量劫來流浪生死貪愛所使無暫休息出此入彼積骨如毗富羅山飲乳如四大海水何故為無智慧不能了知五蘊本空都無所實逐妄受生貪欲所拘不得自在所以世尊云諸苦所因貪欲為本若滅貪欲無所依止汝等若能了知幻身虗假本來空寂諸見不生無我人衆生壽者諸法皆如故曰幻化空身即法身法身覺了無一物唯有聽法說法虗玄大道無著真宗故曰本源自性天真佛又云五陰浮雲空去來三毒水泡虗出沒若如是者是為度一切苦厄乃至無量無邊煩惱知解悉皆清淨是為清淨法身若到這箇田地便能出此入彼捨身受身地獄天堂此界他方縱橫自在任意浮沉應物舒光隨機逗教喚作千百億化身與麼說話可謂無夢說夢和泥合水撒屎撒尿不識好惡乃呵呵大笑云若向衲僧門下十萬八千未夢見他汗臭氣在雖然如是事無一向但以假名字引導於衆生喝一喝藥多病甚網細魚稠道吾打鼓四大部洲同參拄杖橫也挑括乾坤大地鉢盂轉也覆却恆沙世界且問汝等諸人向甚麼處安身立命若也知安身立命處北俱盧洲喫粥喫飯若也不知長連牀上喫粥喫飯卓拄杖冬至云一冬復一冬一日復一日五湖參禪人佳景休拈出喝一喝入石霜云山青水緑覩景思人時代相遙音容如在憶昔諸道者住瀏陽菴時祇代洞山禪客下一轉語悟本一聞便知是一千五百人善知識當年被衆迎出住石霜後來果如其言名馳天下所謂從苗辨地因語識人山僧不曾住菴不代一轉語亦被賢侯移住石霜接待往來只以粗粥粗飯隨時應用故不失其宜直饒與麼來者總識得伊不與麼來者亦不缺少伊是伊到來自然不打這鼓笛特地息干戈便道似一條白練古廟香爐去且道與古者還有親疏也無良久云枯木堂前花更春風浩浩雨連連壞堂古殿一時穿吾峯孤高聳碧天禪人到者盡皆嫌雪未下總言寒那堪雪下更燒煙轉煩惱喫茶去珍重太陽升南北走夜月圓天未曉鼻孔裏藏身一句即不問你諸人腳跟下藏身一句作麼生道還有道得底麼良久云相識滿天下知心能幾人天已明鼓已響聖衆臻齊合掌如今還有不合掌者麼有即尼乾歡喜無即瞿曇惡發心若無事萬法不生意絶玄微纖塵何立向上一路千聖不傳學者勞形如猿捉影山僧即不然向下一路千聖不然學者勞形如猿捉影喝一喝佛以一音演說法衆生隨類各得解且道晝行夜臥一句作麼生道良久以拄杖卓一下云德山證明以拄杖卓繩牀一下云打草只要蛇驚靈山一會千聖共臻釋主擡眸飲光微笑衲僧門下猶在半途且道全提一句作麼生道良久云憐兒不覺醜解夏云昨日作嬰孩今朝年已老未明三八九難蹈古皇道手搦黃河乾腳踢須彌倒浮生夢幻身人命夕難保天堂與地獄皆由心所造南山北嶺松北嶺南山草一雨潤無邊根苗壯枯槁五湖參禪人可問虗空討死脫夏天衫生披冬月襖分明無事人特地生煩惱喝一喝世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知從上諸聖三昧互相不知乃拈拄杖劃一圓相云者箇是什麼良久云路逢劍客須呈劍不是詩人莫獻詩即與麼去早成多事更乃如何若何和泥合水所以靈山會上迦葉親聞少室巖前祖師斷臂且道斷臂作箇什麼卓拄杖一下下座昨夜漫天總雪大地一時皎潔今朝庭際無人莫道山僧不說若論此事汝今已得更無缺少與佛無殊更無別法良久云諸仁者瞥地也未古人無端貴買而賤賣入興化以拄杖擊繩牀一下云大衆還會麼不見道一擊忘所知更不假修持諸方達道者咸言上上機香嚴與麼悟去分明悟得如來禪祖師禪未夢見在且道祖師有甚長處若向言中取則賺殺後人直饒棒下承當辜負先聖萬法本間唯人自閙所以山僧居福嚴只見福嚴境界晏起早眠有時雲在碧嶂月落寒潭音聲鳥飛鳴般若臺前桫欏花香散祝融峯畔把瘦笻坐盤石與五湖衲子時話玄微灰頭土面住興化只見興化家風迎來送去門連城市車馬駢闐漁唱瀟湘猿啼嶽麓絲竹笙歌時時入耳復與四海禪人日談祖道歲月都忘且道居深山住城郭還有優劣也無試道看良久云是處是彌勒無門無善財摩竭提國水泄不通少室峯前親行此令作麼生是此令還有人道得麼和泥合水道將一句來有麼良久云遊子乍歸征袖濕佳人才唱翠眉低喝一喝以拄杖擊禪牀云一葉落天下秋一塵才舉大地全收拈拄杖擊禪牀一下云百億須彌百億日月恆沙國土恆沙諸佛瓦解氷消喝一喝勘辨筠州興教明上座持書到師接得書便問大路來小路來明云和尚試道看便打一坐具師云瞎漢亂統作什麼明噓一聲師便打新藏主到師問古人道三日不相見莫作舊時看一夏與藏主隔闊如今作麼生相看新云和尚住持不易師云與麼則西祖不傳唐土信少林謾自立疏親新云和尚為什麼却與麼道師云南源罪過問僧近離甚處僧云日勢稍晚師云不涉程途一句作麼生道僧云七九六十三師云灼然僧云氣急殺人師便打問僧上座年多少僧云二十六師云恰與山僧拄杖同年僧云是師云你道山僧拄杖子年多少僧無語師便打問僧上座名什麼僧云海滿師云海無增減為什麼滿僧云和尚莫瞞海滿好師云老僧罪過師問僧今夏在什麼處僧云興教師云芝和尚安樂麼僧云安樂師云放你二十棒問僧人人盡有自己那箇是上座自己僧云坐具是七尺布師云悔施一問僧擬議師便打問僧近離什麼處僧云雲過千山碧師云著忙作什麼僧云鴈去水聲長師便喝僧亦喝師便打僧亦打師云你看這瞎漢本是打出三門外念你是新到且坐喫茶師見僧舉拈起拄杖云你為什麼被我拄杖吞却僧云不敢師云你得與麼無端僧云是師云還我草鞋錢來入門一句作麼生道僧云上天無路師云好去僧云入地無門師便喝僧推師一推便出去師喚云上座僧不回首師云南源今日敗闕相逢不拈出舉意便知有作麼生是不拈出底句僧展兩手師云南源燒香供養你去也僧云過師云過在什麼處僧以手指頭師云大遠生僧無語師便打九峯專使馳書到師云玄沙封白紙九峯何用太忉忉使云亂峯幽鳥語師云不行山下路爭見泣岐人使云日午打黃昏師便喝云欲觀前人先觀所使問僧行腳人須知有行腳事作麼生是行腳事僧云知師云知底事作麼生僧云山高水冷師云念你遠來且坐喫茶僧云喏喏問僧穿雲渡水客不觸波瀾試道看僧云知州筆頭脫落地無人收師云亂道作麼僧擬議師便喝僧云日輪正當午仰面看青天師以手面前劃一劃云者箇作麼生僧云了師便打問僧近離甚處僧云北禪師云不涉程途一句作麼生道僧云合取狗口師云山僧過在甚處僧云兩重公案師便喝僧擬議師便打機緣師行腳時與李都尉相見才通門狀却請於高班處坐令小童來問道得即與相見師云今自特來相看都尉又令小童云文鐫白字當道種青松師云不因今日節餘日實難逢復令小童云與麼則與上座相見去也師云腳頭腳底遂請相見才坐便問我聞西河有金毛師子是否師云都尉甚處得這消息都尉便喝師云野干鳴尉又喝師云恰是尉拍手大笑師得數日辭都尉尉云如何是臨行一句師云好自將息尉云與麼則不異諸方也師云都尉見處作麼生尉云放你二十棒師云專為流通尉便喝拍手一下師云瞎尉云好去師云喏喏師在河東為唐明嵩和尚持書到楊億內翰處才展門狀便請相見坐次內翰問對面不相識千里却同風師云某甲奉院門請翰云真箇謾語師云前月離唐明翰云適來悔伸一問師云作者內翰便喝師云恰是內翰又喝師以手面前劃一劃楊吐舌云龍象師云是何言歟翰喚客司點好茶元來是自家人師云也不消得茶罷內翰又問如何是圓上座為人底句師云切翰云與麼則長裙新婦拖泥走師云誰得似內翰翰云作家作家師云放你二十棒翰拍膝云這裏是什麼所在師拍手云不得放過內翰呵呵大笑又問專使還記得唐明和尚當初悟底因緣麼師云也曾見和尚舉來內翰云請不吝慈悲師云見和尚舉有僧問念和尚如何是佛法大意念云楚王城畔汝水東流翰云只如楚王城畔汝水東流意旨如何師云水上掛燈毬翰云與麼則辜負古人去也師云內翰疑則別參翰云三腳蝦蟆飛上天師云一任𨁝跳內翰乃大笑師住旬日相辭翰云某甲有一轉語寄往唐明處還得否師云明月照見夜行人翰云却不相當也師云更深猶似可午後更愁人翰云開寶寺前金剛近日為什麼汗出師云知翰云上座臨行豈無為人底句師云重疊關山路翰云與麼則隨上座去也師噓一聲翰云真師子兒作師子吼師云放去又收來翰云某甲適來失腳倒地又得家童扶起師云有什麼了期內翰呵呵大笑因章介二大師持都尉書至師有書復於書後畫雙腳腳下書二大師名寄都尉尉復以頌答云黑毫千里餘金槨示雙趺人天都不測珍重赤鬚胡李都尉臨終時𦘕一圓相并頌呈師世界無依山河匪礙大海微塵須彌納芥拈起幞頭解下腰帶若問生死問取皮袋師乃問如何是都尉本來佛性尉云今日熱如昨日尉却問臨行一句作麼生道師云本來無礙隨處任方圓尉云某甲晚來困倦更不答話師云無佛處作佛楊岐問云幽鳥語喃喃辭雲入亂山時如何師云我行荒草裏汝又入深村岐云官不容針更借一問得麼師便喝頌古兩堂首座齊下喝庭柏勘婆啐之機箭拄鋒瞥然賓主當時分宗師憫物垂緇素北地黃河徹底渾趙州庭前柏天下走禪客養子莫教大大了作家賊趙州勘破婆子葉落便合知秋天下幾多禪客五湖四海悠悠雲門法身汝是惠超南北東西萬萬千乾坤上下廣無邊相逢相見呵呵笑屈指擡頭月半天僧問如何是佛師云汝是惠起禮拜近前叉手思量十萬迢迢泗洲大聖因甚在楊州出現洞山云君子愛財取之有道杖林山下竹筋鞭靈雲見桃花泗洲忽示現楊州天下宗師話路稠君子愛財取有道南海波斯鼻孔粗杖林山下竹筋鞭南北禪人萬萬千莫怪相逢不下馬東西各自有前程三月桃花處處新靈雲一見更無親相逢盡道休官去林下何曾見一人僧請益三訣三句第一訣大地山河泄維摩才點頭文殊便饒舌第二訣展托看時節語默豈相干夜半秋天月第三訣山遠路難涉陸地弄舟行眼中挑日月第一句天上他方皆罔措俱輪顛倒論多端巍巍未到尼拘樹第二句臨濟德山涉路布未過新羅棒便揮達者途中亂指注第三句維摩示疾文殊去對談一默震乾坤直至而今作笑具三玄三要第一玄三世諸佛擬何宣垂慈夢裏生輕薄端坐還成落斷邊第二玄刢利衲僧眼未明石火電光知是鈍揚眉瞬目涉關山第三玄萬象森羅宇宙寬雲散洞空山嶽靜落花流水滿長川第一要豈話聖賢妙擬議涉長途擡眸七顛倒第二要峯頭敲楗召神通自在來多聞門外呌第三要起倒令人笑掌內握乾坤千差都一照都頌報汝通玄士棒喝要臨時若明親的旨半夜太陽暉贊都尉真泡幻緣生僧瑤妙筆水月寒潭可堅可實來兮示化皇都去兮他方白日隴西令公像代間出文武兩全佛法俱畢稽首觀音金粟誰悉翠巖真禪師語嗣慈明序南昌黃庭堅石霜山中有三角虎孤遊獨坐萬木生風至於千里無人草深一丈有一人捋其鬚而得道是謂黃龍慧南有一人履其尾而得道是謂翠巖可真南之子孫江西湖南若揭日月而真得子晚所乳之子是為溈山道人慕哲林棲谷隱堅密深靜霜露果熟諸聖推出枯木朽株雲行雨施然後翠巖之道光用蓋翠巖之入石霜適遭一吼凡聖情盡參承咨決徹佛徹祖行住坐臥亘古亘今行川之水無不盈之科走盤之珠無可留之影十聖三賢當路亦須草偃風行四方八面俱來無不投老散地金章玉句具在可知然明月夜光多逢按劒陽春白雪難為賞音維黃龍罷參之客必遣之曰百煉真金直須入翠巖爐鞴今坐鎮諸方龍吟虎嘯者無不稱翠巖室中之句以接大根器凡夫而叢林號為真點胸者蓋同門數老雖目視耽耽文彩炳煥似從慈明法窟中來實不解石霜上樹之機耳各夢同牀不妨殊調冷灰豆𪹼聊為解嘲云爾上堂衆生為解礙菩薩常覺不住拈起拄杖云拄杖子是礙那箇是覺若也會去解礙為礙而不自在若也不會歸源性無二方便有多門舉雪峯寄木蛇與西院於木上題云木自圓成不勞斤斧院接得云本色住山人且無刀斧痕師云支離擁腫不謂良材僧問如何是佛師云同坑無異土如何是祖師西來意師云深耕淺種如何是佛法大意師云五通賢聖僧云學人不會師云舌至梵天如是是學人轉身處師云一堵墻百堵調如何是學人著力處師云千日斫柴一日燒如何是學人親切處師云渾家送上渡頭船師乃云上窮有頂下極空輪若也放過和泥合水若不放過寸草難存拈起拄杖云攪動東大洋海撥動龍王宮殿直得龍王魂飛膽喪念摩訶般若波羅蜜多上藍與他八表混同四方寧靜為念真言曰唵換盆換盆你莫瞋我識得你真吽吽娑婆訶卓拄杖下座不見一法是大過患山河大地日月星辰色空明暗不是一法拈起拄杖云凡夫見拄杖喚作拄杖聲聞人見拄杖認得頑空撥無拄杖菩薩人見拄杖幾曾掛著牙齒飢來喫飯困來打睡寒來向火熱則乘凉不見道一切智智清淨恁麼說話笑破土地鼻孔卓拄杖下座舉波斯匿王問佛聖義諦中還有世俗諦否若言其有智不應一若言其無智不應二一二之義其義云何佛言大王汝於過去龍光佛時曾問斯義我今無說汝今無聞無說無聞是名一義二義師云波斯匿王解問不解答世尊解答不解問何故波斯匿王事上偏枯世尊理上偏枯上藍當時若見點把火照看釋迦老漢面皮厚多少兄弟添十字同心著一儀土主曰松山卵塔號難提更有胡家曲汝等切須知我唱泥牛吼汝和木馬嘶師云寰中天子敕塞外將軍令雪峯前不至村後不遘店若是上藍和泥合水且恁麼三十年後莫顢頇寒風凜凜寒草斑斑出陳將軍其心似鐵莫有麼有則匹馬單鎗便請相見良久云如無回觀射鵰處千里暮雲平佛以一音演說法衆生隨類各得解卓拄杖云這箇豈不是釋迦老子諸人若知去七縱八橫喫粥喫飯若也不知火爐裏東說西話冬無寒臘後看卓拄杖下座舉馬祖與百丈西堂南泉玩月次大師問正當恁麼時作麼生丈云正好修行又問西堂堂云正好供養又問南泉泉拂袖而出大師云經入藏禪歸海唯有普願獨超物外神鼎師翁云只為老婆心切上藍即不然垂萬里鈎駐千里烏騅布縵天網收衝浪巨鱗還有麼有則衝浪出來相見如無且歸巖下直待月明時舉刺史何公問雲門道弟子請益門云目前無異草師云世界闊一尺古鏡闊一尺不信道誰知席帽下元是昔愁人雲藏谷口水注滄溟萬法本然而人自閙於此之外復且如何拈拄杖云拄杖子𨁝跳上三十三天築著帝釋鼻孔地神惡發奏與空神空神奏上天神如今却在上藍手中諸人還見麼若也見去隨方毗尼若也不會一任𨁝跳舉調達謗佛生身陷地獄佛令阿難傳旨汝在獄中安否達云我雖在獄中如四禪天樂佛又令阿難問汝還求出否達云我待世尊來便出阿難云世尊三界大師豈有入地獄分達云我豈有出地獄分師云親言出親口老僧背負須彌諸人手擎日月老僧倒退三千諸人順行八百所以道也有權也有實也有逆也有順去此之外復且如何卓拄杖下座舉盤山道似地擎山不知山之孤峻如石含玉不知玉之無瑕師云盤山力盡神疲也是望雲上樹還知有不歷諸聖階梯獨超物外者麼乃呵呵大笑下座舉趙州一日與文遠遊園以拄杖指一莖菜文遠低頭便拔趙州便打師云知我者為我心憂不知我者為我何求悠悠蒼天此何人哉舉僧問洞山文殊普賢來參時如何山云趁向水牯牛欄裏著僧云和尚入地獄如箭射山云全憑子力師云宗師閉闢是故驅耕夫之牛奪飢人之食然達觀之士復且如何老夫輒決平不平之事其時若作這僧五體投地如泰山崩設禮三拜而歸清淨衆中教他洞山知進知退其唯聖人乎尖新語路橫抹人天更若思量低頭難得不落風彩作麼生道還有人道得麼若有向黑豆未生時道將一句來如無門前南北路明日去逢春一喝分賓主照用一時行要會箇中意日午打三更乃喝云作麼生分直饒分得切不得過衲僧門下卓拄杖南山起雲北山下雨白日相逢把火照路拈拄杖云拄杖子𨁝跳上三十三天築著帝釋鼻孔穿過你諸人髑髏諸人還知痛癢麼若知去長連牀上有粥有飯若也不知托鉢盂向湖南城裏喫粥喫飯卓拄杖下座舉僧問巴陵如何是道陵云明眼人落井又問寶應如何是道應云五鳳樓前又問首山如何是道山云腳下深三尺此三轉語一句壁立千仞一句陸地行船一句賓主交參衆中莫有揀得出者麼出來道看如無且行羅漢慈破結賊故行菩薩慈安衆生故行如來慈得如相故臨陳抗敵不懼生死者將軍之勇也入山不懼虎兕者獵人之勇也入水不懼蛟龍者漁人之勇也作麼生是衲僧之勇拈拄杖云這箇是拄杖子拈得把得動得三千世界一時搖動若拈把動不得文殊自文殊解脫自解脫僧問如何是道師云出門便見進云如何是道中人師云擔枷過狀師乃云日日東邊出日日西邊沒會麼前是案山後是主山三十年後不得錯舉上不在天下不在地中不在人拈拄杖云而今在翠巖手中作無邊身菩薩諸人還見麼若見果不見如來頂相若不見今日當巡寮問訊拈拄杖云翠巖拄杖子與天地合其德與日月合其明與四時合其序與鬼神合其吉凶且道與衲僧合箇什麼向道莫行山下路果然猿叫斷腸聲學道如鑽火逢煙未可休直待金星現歸家始到頭後神鼎云學道如鑽火逢煙即便休若待金星現燒手又燒頭師云若論頓也石門正在半途若論漸也神鼎猶缺悟在於此復且如何諸仁者今年逢落葉幾處掃歸家頌古魯祖面壁端坐千山與萬山勸人除却是非難池陽近日無消息偶中當年不目觀馬祖即心即佛後云非心非佛百萬雄兵出將軍獵渭城不間弓矢力斜漢月初生國師三喚侍者侍者何曾喚不回國飾乾地起風雷當時若也相逢著九轉還丹化作灰百丈野狐百丈野狐語致言粗怛薩訶竭吾有吾廬洞山麻三斤如何是佛麻皮三斤咄大地茫茫愁殺人南泉歸宗麻谷禮拜國師三人同行必有我師擇其善者而從之其不善者而改之玄沙三種病人一二三見聞覺更是誰頓消爍花簇簇處鷓鴣啼草薰薰時鴛鴦飛玄沙老玄沙老賴過當年缺一著諦當之言徒唯然中間樹子半零落靈雲桃花子路當時問要津滔滔天下丈夫人相逢相見若如此更有春風春又春禾山打鼓解打鼓幾打鼓四打鼓打破鼓天界地界莫莽鹵分明記取好參詳李陵曾入番人戶寄書來報漢朝臣黃沙漫漫無由住黃龍南禪師語嗣慈明上堂僧堂覷破看積廚鴟𩾲咬殺佛殿脊明明向道尚乃不會豈況蓋覆將來擊禪牀下座智海無性因覺妄以成凡覺妄元虗即凡心而見佛只麼休去便道同安無折合隨汝顛倒所欲南斗七北斗八青蘿寅緣直上寒松之頂白雲淡濘出沒太虗之中萬法本間唯人自鬧閙箇什麼咄順捋虎鬚應自顧倒拈蝎尾任他猜胡來漢現尋常事勿將明鏡掛高臺擊禪牀下座月色和雲白松聲帶露寒好箇真消息憑君子細看紫霄峯頂黑雲靉靆鄱陽湖裏白浪滔天一氣無作而作萬法不然而然更若思量擬議迢迢十萬八千拈拄杖云橫拈倒用撥開彌勒眼睛暗去明來敲落祖師鼻孔當是時也目連鵝子飲氣吞聲臨濟德山呵呵大笑且道笑箇什麼喝一喝千般說萬般諭只要教君早回去去何處良久云夜來風起滿庭香吹落桃花三五樹說妙談玄乃太平之姦賊行棒行喝為亂世之英雄英雄姦賊棒喝玄妙皆是長物黃柏門下總用不著且道黃柏門下尋常用箇什麼喝一喝人人盡握靈蛇之珠箇箇自抱荊山之璞不自回光返照懷寶迷不見道應耳時若空谷大小音聲無不足應眼時如千日萬像不能逃影質擬議若從聲色求達磨西來也大屈古人看此月今人看此月如何古人心難向今人說古人求道內求心求得心空道自親今人求道外求聲尋聲逐色轉勞神勞神復勞神顛倒何紛紛擊禪牀下座世間有五種不易一化者不易二施者不易三變生為熟者不易四端坐喫者不易更有一種不易是什麼人良久云聻便下座時真點胸作首座藏主問云適來和尚道第五種不易是什麼人首座云腦後見腮莫與往來示衆身口意清淨是名佛出世身口意不清淨是名佛滅度也好箇消息古人一期方便為汝諸人開箇入路既得入又須出始得登山須到頂入海須到底登山不到頂不知宇宙之寬曠入海不到底不知滄溟之淺深既知寬曠又知淺深一躍躍翻四大海一撼撼倒須彌山撒手到家人不識鵲噪鴉鳴柏樹間有一人朝看華嚴暮看般若晝夜精勤無有暫捨有一人不參禪不論義把箇破席日裏睡此二人同到黃龍一人有為一人無為且道安下那箇得是良久云功德天黑暗女有智主人二俱不受輕輕踏地恐人知語笑分明更不疑知者祇此猛提取莫待天明失却雞心王不妄動六國一時通罷拈三尺劒休弄一張弓以拂子擊禪牀下座動念靜念為二不動不靜是為入不二法門通達此道者更問朱頂王菩薩擊禪牀下座出莊回云去時一溪流水送回來滿谷白雲迎一身去住非去住二物無情似有情拂子擊禪牀陽鳥啼時天大曉白雲開處月初圓鷲峰峯下諸禪客休把金針半夜穿黃檗有時正路行有時草裏走汝等諸人莫見錐頭利失却鑿頭方不見古者道開不能遮勾賊破家當斷不斷返遭其亂下座入海算沙空自費力磨磚作鏡枉用工夫君不見高高山上雲自卷自舒何親何疏深深㵎底水遇曲遇直無彼無此衆生日用如雲水雲水如然人不爾若得爾三界輪回何處起頌古昌黎見大顛祕魔巖見霍山宗師一等展家風盡情施設為韓公師子窟中無異獸象王行處絶狐蹤叔姪相逢兩不猜到頭拊背似癡呆回首恐人生怪笑報云千里賺余來嚴陽問趙州一物不將來三喚侍者一物不將來肩頭擔不起言下忽知非心中無限喜毒惡既忘懷蛇虎為知己光陰幾百年清風猶未已以拄杖擊禪牀國師三喚侍者打草只要蛇驚誰知㵎底青松下有千年茯苓死心新和尚語嗣黃龍上堂云拗折拄杖將什麼登山渡水拈却鉢盂匙筯將什麼喫粥喫飯不如向十字街頭東卜西卜忽然卜著是汝諸人有彩若卜不著也怪雲巖不得風雨颼颼聲未休庭前瘦柏翠光流煙含冷淡滴無盡誰信當年有趙州要見趙州麼良久云歸堂喫荼去謝藏主舉古有一僧在經堂內經又不看禪又不參書亦不學每日堆堆地打坐藏主問何不看經僧云不識字藏云何不問人僧近前低頭問未審是什麼字藏便休去師云這僧閉門屋裏坐禍從天上來若不是藏主洎被打破蔡州清珠下於濁水濁水不得不清念佛投於亂心亂心不得不佛佛既不亂濁水自清濁水既清功歸何所良久云幾度黑風翻大海未曾聞道釣舟傾舉僧問夾山如何是相似句山云荷葉團團團似鏡菱角尖尖尖似錐復云會麼僧云不會山云風吹柳絮毛毬走雨打梨花蛺蝶飛師云夾山簷前捧月未是高明狹路分岐寧同大轍要會相似句麼白鷺沙汀立蘆花相對開上無片瓦遮頭下無寸土立足此人有家無家若有家因什麼却無片瓦遮頭若無家十二時中向什麼處安身立命妙體本來無處所通身那更有蹤由謝二化主水中燒火特地人疑山上使帆會者應稀二理雙忘頓入幽微一瓶一鉢章江興歸是也還是非也還非白雲綻處明月光輝雙放雙收人不會滿山松竹泄天機正月才終二月來簷前雙燕自徘徊翻思昔日玄沙老實相深談眼未開既是實相深談為什麼眼未開沒量大人語脉裏轉却隱顯宗風孰辨真去來猶似涉前因須知白首歸家者非是今人與昔人既非今人又非昔人且道是什麼人良久云陋巷不騎金色馬回來却著破襴衫若論此事如人家養三箇兒相似第一兒聰明智慧孝養父母接待往來主張家業第二兒凶頑狡猾貪淫嗜酒倒街臥巷破壞家業第三兒盲聾瘖啞菽麥不分事事無能只會喫飯三兒中雲巖要選一人用且道選那箇為復選聰明