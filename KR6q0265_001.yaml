有句無句如藤倚樹且任諸人點頭及乎樹倒藤枯上無充天之計下無入地之謀刢利漢這裏著得一隻眼便見七縱八橫乃舉起拂子云看看太陽溢目萬里不掛片雲若是覆盆之下又爭怪得山僧若論此事老胡本不渡江二祖不曾得髓及至黃梅夜半一人傳虗萬人傳實若據老盧見解只是舂米漢至今走遍天下人殊不知這一片田地分付來亦多時也自是諸人不肯紹繼致使荊棘漸長禾黍不生馳走東西日求升合何如便向這裏直下識取本來契券教伊四至界畔一一分明免見異時別生辭訟只如今還識也未爾若識得一恁恣意耕鋤若也未知且受人天供養風卷殘雲宇宙寬碧天如水月如環祖師心印分明在對此憑君子細看普賢行文殊智補陀巖畔清風起鴉鳴鵲噪直入耳根草樹塵毛形影相吊聲中無有色色裏亦無聲聲色若交參處處無前後鳥窠吹布毛這裏便省去拂子云且道相去多少三十年後悟去莫良為舉首座立僧虎豹之文不得炳於犬羊金玉之光不得炫於瓦石明悟之士不得不警於群迷三者既備然後必滔天可以為滄海必崔嵬可以為山嶽秀上人明悟之士卓識之姿久蘊鋒芒不沽時譽幸願無以韜其光無以藏諸用破塵出經卷始是解絛人直教靈苗異草葉葉騰芳鸞鳳麒麟聲聲相應若能如是可謂吾道重光後昆有託我有一句把手分付瞬目揚眉西天此土良工未出玉石不分巧冶無人金沙混雜還有無師自悟底漢出來辨別看舉起拂子云且道是金是沙見之不取思之千里若論此事不是獨孤標亦非無伴侶不識又顢頇識之還莽鹵不知是甚物得恁麼難辨若非金色頭陀有理也無雪處風蕭蕭兮木葉飛鴻雁不來音信稀還鄉一曲無人吹令豫拍手空遲疑此一曲不是金石絲竹亦非匏土革木聞而不聞覩而莫覩未審是什麼曲調看取風雲會合時五湖必有知音者泐潭英禪師語嗣黃龍上堂入寶峰云石門路嶮鐵關牢舉目重重萬仞高無角鐵牛衝得破毗盧海內作波濤大衆且道不涉波濤一句作麼生道良久云一句不惶無著問迄今猶作野盤僧名因法有法逐名生名遣法除性相如如故楞嚴經云知見立知即無明本知見無見斯則涅槃無漏真淨云何是中更容他物大衆山僧如是舉唱未免笑破衲僧口且道不落笑具一句作麼生道良久云深秋簾幕千家雨落日樓臺一笛風顧視大衆云青山重疊疊緑水響潺潺遂拈拄杖云未到懸崖處擡頭子細看卓拄杖下座大衆先聖道江月照松風吹永夜清霄何所為佛性戒珠心地印霧露雲霞體上衣諸禪德先聖雖然如是可謂傷鹽傷醋若是山僧即不然江月照松風吹永夜清宵何所為牧童嶺上一聲笛驚起群鴉繞樹飛寶峯高人罕到雪壓巖邊枯樹倒嶺前嶺後野猿啼一條古路清風掃諸禪德雖然如是且道山僧拄杖子長多少遂拈拄杖子云長者隨長使短者隨短用卓一卓下座日出卯用處不須生善巧縱使神光照有無舉意便遭魔境擾且道不落善巧一句作麼生道良久云勸君不用鑽頑石路上行人口似阿呵呵是什麼叵耐無端破竈墮三更夜半走如烟到頭不離是這箇拍禪牀下座祖師道一切衆生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福師云先聖恁麼道不妨奇特奈緣衲僧門下檢點將來也是食飽傷心坐久腰疼石門𡾟嶮路難行到者須是著眼睛直饒透過祖師關也落千層與萬層好得間時不得間倚他門戶望他山爭如撥火爐邊坐相伴高人論祖關大衆爐邊撥火即不問作麼生論祖關良久云極目千山萬山雪野猿凍撲枯槎折歲夜云諸禪德一年將盡夜相會五湖人目擊有何事來朝又是春拍禪牀下座發化主云君若隨緣得似風飛砂走石不乖宗但於事上通無事見色聞聲不用聾大衆是道也須是腳跟著地始得接官歸云區區何日了人事幾時休莫道青山好逡巡便白頭釋迦老子當時一手指天一手指地云天上天下唯吾獨尊可謂傍若無人當初若遇箇明眼衲僧直教他上天無路入地無門然雖如是也須是銅砂羅裏盛油始得出縣回云莫怪頻頻出入蓋為趍陪郡邑輸他林下高人過水腳跟不濕拈拂子云看看月似彎弓少雨多風扣禪牀阿呵呵是什麼昨夜蟾光獨自坐屈指從頭數故人翻憶當年破竈墮破竈墮是什麼眨上眉毛早蹉過兜率悅禪師語嗣真淨開堂拈香云此一瓣香恭為今上皇帝太皇太后祝延聖壽伏願明真心而同日月蘊至德以合乾坤八方歌有道之君四海樂無為之化又為判府侍郎合郡文武宷寮伏願位連八座勢入三台內懷菩薩之心外護如來之教問答不録師云蓮花座上藕絲綸舉釣何曾得錦鱗只有盲龜并跛鱉可憐賺殺把竿人是何言歟況一人人盡握靈蛇之珠一箇箇總抱荊山之璞非假琢磨天然有異群生日用不覺不知但為志情觸途成滯若能退步返照歸根一虗寸心萬緣俱泯寂寂乎不礙於見聞覺知蕩蕩乎豈妨於行住坐臥彌天蓋地耀古騰今神降諸魔怨堂堂應用逈脫根塵處處隨緣放行則蒼龍出海把定則丹鳳棲桐直得二乘膽戰十地魂驚盧老再舂糠神光重斷臂遂使長天月白大野風清萬派聲寒千峯色秀然雖如是向衲僧分上正是著體花縵嚴身纓絡只如衲僧分上有甚奇特良久云竹影掃階塵不動月輪穿海水無痕但某受材散拙向道迃踈以事而固不精通賦性則實多昏昧三峽橋畔携笻而傍水間行五老峰前拂石而和雲默坐既為自得已絶他緣豈謂太守移文令尸祖席顧茲勤命自省何堪堅避無由抑從增愧此蓋判府侍郎以無礙辨才住第一義諦十方遊戲聊現宰官之身萬行圓成自是法王之子蓋以付囑實託大臣震旦流傳雅茲外護此日特垂台斾輝耀禪林令未聞者深聞未悟者妙悟敢不力弘大事上答鴻恩不盡之懷復何言也又承運使度支提點朝散洎合郡文武宷寮不遺佛囑光賁祖筵既秉精誠必生篤信伏願洞明真際頓脫妄緣包萬有於胸中恬一心於事外又承諸院尊宿僧職名員十室之賢四依之侶同降法筵共成佛事大衆曾向靈山轉法輪算來何啻二千春今朝座上鴛鸞客盡是當年一會人久立台嚴伏惟珍重到九仙歲旦上堂年去年來又一年四時交泰自天然勞生何用欣然賀物外乾坤本不遷不遷之道功莫大焉奪天地之權衡出陰陽之陶鑄光吞日月重若丘山逐處隨方安名立字吉凶無兆悔吝何生為萬物之根作群生之主九仙大士深造斯玄率豫當拱手然雖如是迎新送舊且拈向一邊只應作麼商量良久云暖日晒開千嶂雪和風吹散碧天雲無法亦無心何取復何捨要真盡屬真立假全歸假平地上行船虗空中走馬九年面壁人有口還如啞參端午云端午龍安何所有一甌山茗泛菖蒲且無百索纏人手只有摧邪肘後符諸禪德且道肘後符篆什麼字良久云支那弟子無人識碧眼胡僧笑點頭喝一喝逆順人間事分明泄與君箭穿潭底月劒斫嶺頭雲得意寧存象忘言自出群欲歸清淨界常以惠香焚參草堂清和尚語嗣晦堂師開堂日祝聖問答罷乃云佛祖心宗本無迷悟一問一答世諦流布是以真如無念非想念而能知實相無生豈色心而能見色心無見見為實相之門想念無知知是真如之理真如之理理則無名實相之門門須要入竪起拂子云只這拂子是實相門諸人作麼生入若也入得色心不二彼我無差這邊那邊應用不闕便於衆生心中念念有無量諸佛出世於諸佛心中念念有無量衆生成等正覺乃至山河大地草木叢林鳥噪猿啼風鳴水響皆與實相不相違背若未入得萬古碧潭空界月再三撈摝始應知上堂釋迦已滅彌勒未生正當現在佛法委付阿誰遂舉起拂子云看於人善者拂子善應於人惡者拂子惡應善惡俱忘拂子作麼生應千年曆日雖無用犯著須教總滅門解夏云不出三門九十日大都只要此心休此心休了全無事天下名山任意遊其遊也肩擔兔角拄杖手擎無底鉢盂出一叢林入一保社談玄唱道莫非格外之機鳥道無蹤乃是道人行履其不遊也大忘人世隱跡巖阿從教古路苔生一任口邊白醭直饒恁麼未免坐殺闍梨設不恁麼又却拋家失業恁麼不恁麼猶是紅綿襖子貼肉汗衫衲僧到這裏箇箇著骨粘皮難為透脫且道透脫一句作麼道事向定中消息盡境於塵世煉磨空舉雲門大師道平地上死人無數過得荊棘林者是好手師云只這拂子是荊棘林諸人作麼生過直饒過得也是猢猻著練黐初心未入道不用鬧浩浩古人已是撒砂落你諸人眼裏黃龍更向上風揚塵還有開眼者麼鐘聲裏薦取鼓鳴即顛倒龍濟即今在什麼處舉意欲尋尋不得黃花翠竹謾垂陰十方無壁落四面亦無門淨倮倮赤灑灑灌溪老人出頭不得則且置雪竇騎牛入你諸人鼻孔裏為什麼不覺不知未明心地印難過趙州關冬至云運推移日南長至長至日已前諸佛道消衆生道長長至日已後諸佛道長衆生道消正當長至日佛與衆生盡皆寂滅道在什麼處良久云九九陽生第一爻舉風穴和尚因寒食節參次問僧衲僧還與父母拜掃也無有數僧下語竝不契時有僧却問和尚還與父母拜掃也無穴云鳥噪新巢上人哭古墳前師云風穴老人此語甚諦當只是俗氣未除如今有人問黃龍還與父母拜掃也無向道三月懶遊花下路幾家愁閉雨中門參玄上士須參活句莫參死句若參活句臨機變態不失其宜出沒卷舒應用自在若參死句如同玉石真僞不分凡聖現前不能甄別且道那箇是活句那箇是死句會麼易分雪裏粉難辨墨中煤再住黃龍升座云掩息茆堂過六冬心忘境寂萬緣空不知幻業從何起依舊令教振祖風只如祖風作座生振所以道無隱顯法有去來去來落我淨之鄉隱顯契常樂之本在草堂即草堂間人居方丈便是住持長老在彼在此了無間然不落二途如何理論孤峯忽憶便歸去浮世要看還下來萬仞嵳峩鳥道難劒輪揮處骨毛寒泥牛昨夜歸滄海吸得西江水盡乾竪起拂子云看一處起千處百處沒觜放下拂子云一處息千處百處覔不得要會麼溪㵎豈能留得住終歸大海作波濤舉世事悠悠不如山丘臥藤蘿下塊石枕頭雪竇云這般漢有甚用處喚起了打師云雪竇何必打他但喚來與他一碗茶喫若是伶俐底抖擻精神眼目卓朔於佛法中為梁為棟續佛慧命若是昏鈍底從他一睡一千年千佛出世無由值晚參云日入酉夢幻空花能幾久百歲光陰二分過茫茫無限途中走告禪人早回首莫待春風動楊柳雲從龍風從虎冬至寒食一百五自古相傳直至今南泉不打鹽官鼓參玄人休莽鹵甜者甜兮苦者苦直截毗盧向上關莫教錯却來時路舉僧問大龍色身敗壞如何是堅固法身龍云山花開似錦㵎水湛如藍師云大龍老漢雖然即境明心爭奈被物所轉只如花謝水涸法身在什麼處好是陽和二三月融融花發不干春將心覔佛不知佛本是心以妄求真不知真即是妄直得真妄雙泯心佛兩忘到此如何理論良久云山花開似錦㵎水湛如藍師往洪州寶峰入院云四十五年前到此石門松徑得間遊而今老耄重來也依舊雲山水自流雲山依舊祖席宛然皆學道人互相興建致使真風不墜慧𦦨無窮所以古人道出門自有出門句入門自有入門句出門句即不問入門句作麼生良久云到家梅雨歇猶有子規啼靈源清禪師語嗣晦堂上堂問話且住休苦紛紜況此門中單傳直指當機默契早涉多途更若互逞詞鋒交馳意路祇增戲論豈當宗乘而今欲了宗乘要在如何體究不見道妙性圓明離諸名相本來無有世界衆生大衆古往今來謂之世八方上下謂之界其中流轉凡有識情謂之衆生三者具存作麼生說箇本來無有底道理請定當看何妨於此深切返觀忽然大悟現前便見頓超諸有凡名聖號殊相劣形不待遣除泯然自離圓明妙性廓爾全彰照徹十方實無他物唯茲妙性應用堂堂入死出生任去來而不變先天後地隨成壞以常存聖智難量凡情罔測非因修證本體如然還信得及麼若也信得及上無不報之恩下有可行之利人利己洞達靈源神化無復有何事若信不及但懷安聖代自然真趣合無生古者道十方同聚會箇箇學無為此是選佛場心空及第歸恁麼說話大似自生退屈以己妨人雖然如是建化門中是真方便何也已坐玉堂之士不在登科未升金榜之流要須入試大衆今朝同會選場各賦本來題目必欲心空及第須逢本分試官且道以何為驗直下一言通變化迅雷聲裏辨魚龍浮雲散盡狂波止天上玉蟾水底圓皎潔逈然通湛寂此時消息若為傳水無待月之心月無投水之意水月全收光歸何所解道孤圓吞萬象令人長憶老盤山時時是好時日日是好日烏兔體全真靈機何處覓今朝看見昨朝人依舊眼睛光似漆打鼓升堂賓主相對目擊道存失錢遭罪透出玄關歸去來堂裏喫茶誰不會雖然如是切忌倒跟擊禪牀下座古佛不到處諸人共用諸人不到處古佛同參同參共用如何顯種田博飯機非淺因思昔日老師言三界本無何用免舉僧問九峯云諸聖間出盡是傳語底人是否峰云是僧云只如釋迦出來道天上天下唯我獨尊為甚却成傳語底人峯云只為他指天指地所以喚作傳語底人師云明眼漢瞞他一點也不得然雖如是且道天上天下唯我獨尊是傳什麼人語良久云直饒明得出未是當行家舉趙州挾火示衆云不得喚道了也你喚作僧無語師云趙州老漢著甚來由從教遍界騰紅焰渾身冷似氷四月八舉寒山子道常聞釋迦佛未知在何方思量得去處不離我道場寒山恁麼道作麼生說箇思量底道理若以有心思有心屬妄想即墮增益謗若以無心思無心屬斷滅即墮減損謗若以不有不無思即墮相違謗若以亦有亦無思即墮戲論謗離此四謗合作麼生體會會得則釋迦老子時時降誕不待雲門打殺自然天下太平其或未然殿上燒香齊合掌更將惡水驀頭澆江月照松風吹永夜清宵更是誰霧露雲霞遮不得箇中猶道不如歸復何歸荷葉團團團似鏡菱角尖尖尖似錐天機藏不得花笑鳥啼時不待重拈出當人合自知知底事作麼生良久云笑我者多哂我者少參山是山水是水僧是僧俗是俗更將何物演真乘六六元來三十六一是一二是二頭上是天腳下是地飢即餐兮困即睡人人皆受如來記忽若有箇漢出來道我不入這保社且道向他道什麼即得但云汝於來世當得作佛且道還甘也無具擇法眼者試請辨看三世諸佛不知有恩無重報狸奴白牯却知有功不浪施明大用曉全機絶蹤跡處不思議歸去好無人知衝開碧落松千尺截斷紅塵水一溪衲僧照徹千差眼緇素淺深毫髮分分處莫非全正令法王那得獨稱尊諸禪德須曉了莫顢頇一字誵訛即豈不見法眼見俗人携兒子到因問之不語乃有頌年八歲問不解語不是不語大法難舉後白雲端見之曰好頌有一字未是何不道不是不語大法全舉又積翠投機云傑出叢林是趙州老婆勘破沒來由慈明云好頌有一字未是何不道老婆勘破有來由師云有之與沒全之與難誵訛在什麼處有般漢才被根窮便道我這裏一物也無說什麼是與未是又有般漢道大用現前縱橫盡妙更分付箇甚麼如斯見解正是尋言逐句未具衲僧眼在山僧今日也有一處未是具衲僧眼者試檢點看若檢點得出直下同歸若檢點不出被人拶著無明袋便落親踈逆順中湛堂準和尚語嗣真淨序日涉園李彭豫觀宗師說禪嘗譬之善琴者斫以百衲之材絃以園客之絲資以敏妙之失其攫之也深其醳之也愈上為南風下為別鵠可謂盡矣曾不知絃指之外徽軫所不能管攝有不可傳之妙又嘗譬之善奕者枯棊三百鏖戰於方罫之間或角或掎出奇決勝可謂備矣曾不知陷之死地而後生殺之亡地而後存有不可料之著出人意表本分宗師心空法徹得大自在窠臼不存亦何以異此哉昔真淨禪師出臨濟正宗得雲門大用而湛堂老人實世其家悟活祖師意兩坐道場發徽軫不能管攝之音下出人意表之著未嘗貶剝諸方羇縻禪子而學者向風爭趍之諸方宗匠共所推仰真祖師門下之英豪菩提場中之宿將也及其遷寂參徒志端編掇平時上堂警衆機緣將金世開鑿後人以豫嘗瞻禮杖屨獲聽妙談乞為序引於卷首豫辭以丘園病夫豈發揚潛德之具端曰若欲借重於名卿巨公以傳世而行後非先師意也吾雖不死振先師之遺風其敢負先師意乎公毋固辭豫曰唯乃序以冠之政和六年六月七日序上堂立秋日云寒來暑往古今同萬別千差不礙空昨夜鐵牛頭角露滿庭松柏撼秋風八月九月天白露寒露節門外在處山秋風落黃葉夜雨斂重雲曉鴻鳴寥沈可憐祖師意頭頭都漏泄不必雲巖苦苦更多說各請歸堂不須久立喝一喝祖師關棙子幽隱罕人知不是悟心者如何舉向伊乃喝一喝云是何言歟若一向與麼達磨一宗掃土而盡所以大覺世尊初悟此事便乃開方便門示真實相普令南北東西四維上下郭大李二鄧四張三同明斯事雲巖今日不免效古開方便門去也以拂子擊禪牀一下云方便門開也作麼生是真實相良久云十八十九癡人夜走舉甘贄行者一日在南泉設粥粥辦甘贄請南泉打槌南泉白槌云請大衆為狸奴白牯念摩訶般若波羅蜜多甘贄禮拜便出南泉却往厨下問典座云甘贄行者向什麼處去也典座云當時便去也南泉便打破粥鍋師云大衆南泉為狸奴白牯念誦且止且道打破粥鍋意作麼生會若也會得便好高挑鉢袋繞天下橫行其或未然雲巖下箇注腳高吟大笑意猖狂潘閬騎驢出故鄉驚起暮天沙上鴈海門斜去兩三行古人道不看經不念佛看經念佛是何物自從識得轉經人遂舉拂子云龍藏聖賢都一拂遂拂一拂云諸禪德正當恁麼時且道雲巖土地向什麼處安身立命遂擲下拂子兩手握舉扣齒云萬靈千聖千靈萬聖四月人家麥正收連綿陰雨不能休㳂溪處處生深草飽殺南泉水牯牛諸禪德各各照顧照顧箇什麼恐水牯𨁝跳永嘉道直截根源佛所印摘葉尋枝我不能遂卓拄杖云大小直截或有箇秀才出來道雲巖長老你佛法得恁麼簡易準上座便向伊道田厙奴豈不聞孝經序云朕聞上古其風朴略志公和尚云雞鳴丑一顆圓光明已久內外推尋覓總無境上施為渾大有不見頭也無手世界壞時渠不朽未了之人聽一言只者如今誰動口師云大小志公只識得箇昭昭靈靈不笑破衲僧口雲巖即不然雞鳴丑三四五六七八九象骨峰頭木馬嘶新豐洞口石牛吼山之前水之後吳道僧繇𦘕不就斷頭船子下南康倣佛天明到湖口大道縱橫觸事現成雲開日出水緑山青拈拄杖卓云雲門大師來也說道觀世音菩薩將錢買胡餅放下却是饅頭大衆雲門只見錐頭利不見鑿頭方寶峰即不然乃擲下拄杖云勿於中路事空王䇿杖還須達本鄉昨日有人從淮南來不得福建信却道嘉州大像吞却陝府鐵牛遂喝一喝云是甚麼說話笑倒雲居土地鑽真珠解玉板即易看窟籠著楔却難月色和雲白松聲帶露寒即不問你諸人且道大目犍連共須菩提商量箇什麼良久云東家杓柄長西家杓柄短卓拄杖云客來須看賊來須打又誰家門外無明月清風元來道不必揀擇才有揀擇便落知見故老胡云知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物所以巴陵明提婆宗便道銀碗裏盛雪祖意教意兩家證龜成鱉大底同天不同地處所相遠胡越有時思量得趙州壁上掛胡蘆又著甚死急有僧出衆云江邊臨水者盡是取魚人便問祖師心印狀似鐵牛之機如何是鐵牛之機師默然僧云閉口深藏舌安身處處牢師亦默然僧云早知今日事悔不慎當初便禮拜師乃召大衆云江邊臨水者盡是取魚人八月中秋天凉芙蓉花發映禪房老胡大道分明在不必諸方問短長短不是短長不是長短長不是處是道非思量思量不及文彩愈彰秋山兮秋雲片片秋江兮秋水洋洋風悲蘭社天淡滄浪諸禪德也好箇消息以拂子擊禪牀一下云欲言言不及林下好商量太陽門下日日三秋地轉天回而本靜明月堂前時時九夏寒灰死火而恆然故至人正中入偏布袋長年落魄偏中入正飲光論劫坐禪所以道一氣無作而作萬法不然而然不然而然石牛吼火裏生蓮無作而作木馬嘶河氷𦦨著便與麼去衲僧門下猶缺轉身句在大衆且道作麼生是轉身底句良久云翡翠踏翻荷葉雨鷺鷥飛破竹林煙今朝臘月十五切忌葛藤露布者事直下分明當處超佛越祖便與麼去苦苦何故寒山子能莽齒十年歸不得忘却來時路阿呵呵天道運行節氣頻更五日為候十日為旬三十日為月十二月為年一日一日因循因循五九盡又逢春擊禪牀下座僧問若有一人發真歸源十方虗空悉皆消殞未審此理如何師乃點指云子丑寅卯辰巳午未一羅二土三水四金五太陰六太陽七計都今日計都星入巨蟹宮寶峰不打這鼓笛昨日有人從湖南來說道一路人家家家竈裏有烟寶峯聞了不覺手之舞之足之蹈之願年年水碧山青花紅柳緑更有什麼事良久云道泰不傳天子令時清好唱太平歌今日五月一寶峯集四海禪和不談玄不說妙共大衆商量南嶽萬年松形狀如龍輪輪囷囷至今臥在祝融峯廬山瀑布水不知得幾千萬年今古長如白練飛一條界破青山色以此舉揚上祝皇帝聖壽無彊更願天下人安然萬齊賀太平年長靈卓和尚嗣靈源師初住舒州甘露開堂問答罷乃云有問有答須是其人若是其人喚作遊戲三昧逢場施設無可不可其或心源尚翳覺照猶蒙但縱狂機無有是處若據此事人天未集已前平常動靜之際人人分上本自混然各無增損明來暗去自古自今一段靈光法爾瑩徹即心即佛日用堂堂非佛非心物物覿體是箇微妙大解脫門於斯得入亡言而聲應十方不動而身遊沙界塵塵華藏境處處總持門即想念以契神機闢塵勞而興佛事回途石馬火裏蓮開以至棒頭取證喝下傳心一指明宗三拜得髓復何怪哉還信得及麼以拂子擊禪牀云若向這裏信得及如許多葛藤又向什麼處去也良久云目前得旨俱成現觸處無心是到頭上堂的的無來去明明有舊新去年今日事今日去年人脫體全收放隨流混主賓春光重漏泄有口不須陳拈起拄杖云大衆若拈起也要汝諸人向普賢門中覓箇出身之處復放下云若放下也教你諸人向文殊門中討箇入頭底路若不拈不放也令汝諸人於毗盧界中不出不入得大自在雖然如是未是好心爭如汝諸人罷却從前流浪識取祖父契書承認本家田業從教露柱懷胎鐵牛生犢後四前三全無窠窟向下文長一喝一咄卓拄杖下座甘露尋常說佛說祖是招呼你談玄談妙是蹊徑你行棒行喝是定動你收來放去是殺活你主賓互換是博詰你拈頭作尾其變通你敲骨打髓是諦當你把臂並行是和合你灑灑無事是停息你且道甘露為人在什麼處良久云斫却月中桂清光應更多付法傳心將錯就錯立雪斷臂隨邪逐惡本色衲僧如何評薄達磨大師露出一膞摩尼在掌隨五色以分輝寶月當空散千江而現影還會麼以拄杖一劃云禍不入慎家之門人無心合道困來不覺和衣倒一老一不老法身真箇入荒草了無求隨分討糞掃堆頭拾得寶木人石女共歡呼信手拈來用恰好青山無盡意無窮何須更覓來時道乾坤之內宇宙之間中有一寶乃喝云在什麼處良久云若要價重娑婆但識取這箇擲拂子下座拈拄杖橫按云釋迦先鋒彌勒後殿且道中軍主將畢竟是誰良久云擬議之間西天此土卓一下下座日出心光耀堂堂更孤峭天陰性地昏風寒早閉門不知天地者剛道有乾坤欲明還得暗打破却渾侖爭如回首家鄉路寒食依前是暮春五五二十五人人超佛祖撩著未知機黃金成糞土諸禪德莫莽鹵夷門山朝朝走入新羅占波國裏賣吉州針相逢醉老婆尋牛撞著虎落花隨流水啼鳥在深雲莫怪多違背年高耳目昏豈不見七百甲子老禪翁對人只道東門西門南門北門披砂揀金非我族類拈來便用罕遇其人不見道不許夜行投明須到若是醋蟲不知酸明鑑不自照也祇是坎井之蛙詎知滄海譬如畫虎未成猶勝於犬萬仞崖頭曾撒手底便請丹霄獨步師宣和六年十二月二十七日圓寂先於二十五日上堂舉僧問雲門如何是雲門一曲門云臘月二十五師云雲門曲子不妨徑曲便恁麼會得去臘月三十日贏得觜頭光若也不會臘月三十日亦贏得觜頭光汝等諸人畢竟作麼生會老僧住世能復幾時若是據令而行直須法堂上草深一丈而今不獲已將鳥缸打作硯瓦賣曲盡老婆心為汝諸人和箇曲子乃云衲僧要唱雲門曲六六從來三十六曹源有箇癡禪人解道一生數不足數不足不屬金石與絲竹等間一拍五音全直道如弦已曲彔從教歲去年來依舊山青水緑偈頌迷悟何從恰恰今人用明明古佛心寒雲歸碧嶂幽鳥下青林偶言巖松森翠皆穿眼㵎水清冷亦到心自笑不能修白業祇憑流水念觀音讀傳燈誰謂拈花後聯芳直至今到頭珠有水未免線因針蝶在花猶在春深草亦深軒窗倚踈豁間聽洞龍吟
