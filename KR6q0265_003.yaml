body:
  text: 楊岐會禪師語前錄𠬧不盡者嗣慈明上堂僧問如何是祖師西來意師云檐頭不負書師乃云心生種種法生心滅種種法滅卓拄杖云大千世界百雜碎捧鉢盂向香積世界喫飯去也一切法皆是佛法佛殿對三門僧堂對厨庫若也會得擔取鉢盂拄杖一任橫行天下若也不會更且面壁僧問如何是佛師云賊是人做師乃云萬法是心光諸緣唯惟曉本無迷悟人只要今日了山河大地有什麼過山河大地目前諸法總在諸人脚跟下自是諸人不信可謂古釋迦不前今彌勒不後楊岐與麼可謂買帽相頭心是根法是塵兩種猶如鏡上痕痕垢盡時光始現心法雙忘性即真拍禪牀云山河大地何處有了且作麼生道得不受人瞞底句若也道得向十字街頭道將一句來如無楊岐今日失利一塵纔起大地全収拈拄杖云須彌山上走馬大洋海裏𨁝跳閙市中忽撞著這箇是人知有且道黑地裏穿針一句作麼生道良久云尋常不欲頻開口為是渾家著衲衣心隨萬境轉轉處實能幽隨流認得性無喜亦無憂復云天堂地獄却你頭釋迦老子左你脚跟下當明對暗時人知有閙市裏把將鼻孔來還有道得麼試出來與楊岐出氣如無楊岐今日失利僧問祖師面壁意旨如何師云西天人不會唐言僧云昨日雨落今日天晴是人道得請和尚出格道一句師以兩手捺膝坐僧云盡力道只道一半師云分身兩處看僧指侍者云和尚為什麼不著鞋師云這漆桶僧禮拜歸眾師乃云外道問佛不問有言不問無言世尊良久外道讚歎世尊大慈大悲開我迷雲令我得入外道去後阿難問世尊云外道見箇什麼便道令我得入世尊云如世良馬見鞭影而行師云道吾師兄云世尊隻眼通三世外道雙眸貫五天道吾師兄善則善矣甚與古人出氣楊岐道金鍮不辨玉石不分大眾要會麼世尊輟己從人外道因齋慶讚以拄杖卓一下喝一喝楊岐一訣凡聖路絕無端維摩特地饒舌落鵰之箭斬蛟之劍主將自敗抱馬拖旂有人向安家立國處道將一句來良久云太平本是將軍致不許將軍見太平俗人問人王與法王相見合談何事師云釣魚船上謝三郎進云此事已蒙師指示雲蓋家風事若何師云幞頭衫帽脫當酒錢進云忽遇客來將何祇待師云三盞兩盞猶閒事醉後郎當笑殺人師乃云一切法皆是佛法拍禪牀云山河大地百雜碎還我佛法來良久云何似生遼天鶻萬重雲只一突無邊剎境自他不隔於毫端十世古今始終不離於當念拍禪牀云釋迦老子年多少還知麼若也知得人間天上出入自在若也不知雲蓋自道怛薩訶竭二千年雲蓋傳箭令下釋迦老子為先鋒菩提達磨為殿後陣勢既圓天下太平且道不動步一句作麼生道良久云不經一事不長一智天得一以清地得一以寧君王得一以治天下衲僧得一且作麼生良久云鉢盂口向天心隨萬境轉轉處實能幽拍禪牀一下云釋迦老子被蟭螟虫吞却了也且喜天下太平喝一喝是法住法位世間相常住釋迦老子鼻孔遼天樓至如來兩脚踏地且道兩箇漢還有過也無良久云犬子便吠牛子牽犁衲僧與麼未模著皮彌勒真彌勒分身千百億時時示時人時人俱不識師乃擲拄杖便歸方丈萬法本閑唯人自閙以拄杖卓一下云大眾好看火燭明眼人前不得錯舉舉盤山道向上一路千聖不傳師云口上著又云學者勞形如猿捉影師云盤山與麼道以己妨人一日數人新到相看師云陣勢既圓作家戰將何不出來與雲蓋相見僧打一坐具師云作家師僧僧又打一坐具師云一坐具兩坐具又作麼生僧擬議師乃背面立僧又打一坐具師云你道雲蓋話頭在甚麼處僧云在這裏師云三十年後自悟去在雲蓋在上座手裏且坐喫茶師又問夏在甚處僧云神鼎師云早知上座神鼎來更不敢借問師次日早參云昨日數人新到打雲蓋三下坐具恰似有箇悟處遂舉前話了乃云雲蓋敗闕處諸人總知新到得勝處諸人還知麼若也知得出來與雲蓋出氣若也不知明眼人前不得錯舉師訪孫比部值判公事次部云下官被王事所牽無由免離師云此是比部願力弘深廣利羣生部云未審如何師云應現宰官身廣弘悲願深為人重指處棒下血霖霖比部因頌有省乃歸小廳坐次却問下官每日持齋喫菜還合諸聖也無師以頌贈之曰孫比部孫比部不將酒肉污腸肚侍僕妻兒渾不顧釋迦老子是誰做孫比部孫比部璉三生至師云寒風凜冽紅葉飄空祖室高流朝離何處璉云齋後離南源師云脚跟下一句作麼生道璉以坐具摵一摵師云只者箇更別有在璉作抽身勢師云且坐喫茶師問僧落葉飄飄朝離何處僧云南源師云脚跟下一句作麼生道僧云愁人莫向愁人說師云楊岐專為舉揚諸方去也僧云是什麼心行師云不得楊岐讚歎僧擬議師云且坐喫茶自贊口似乞兒席袋鼻似園頭屎杓勞君神筆寫成一任天下卜度似驢非驢似馬非馬咄哉楊岐牽犁拽把指驢又無尾喚牛又無角進前不移步退後豈収脚無言不同佛有語誰斟酌巧拙常現前勞君安寫邈白雲端和尚語嗣楊岐上堂開堂拈香祝聖罷次拈香奉為過現未來大覺海中有利於含生一切聖賢及生平所參見諸善知識眾中衣鉢道友曾有一言一句布施我者師僧父母一切恩門聊伸報謝又拈香云且道為什麼人若有所為雪上加霜若無所為過莫大焉奉為先住楊岐後住雲蓋親見慈明來底老古錐誰知道今日向這裡拋三放兩去也遂坐圓通訥和尚白槌畢師乃顧視左右云便與麼散去自古自今如麻似粟若言更有如何若何曹溪一路平沉所以從上諸聖皆向火𦦨裏出來垂手只要一切人眼橫鼻直去今日眾中有大家垂手者麼出來僧問欲行千里一步為初如何是最初一步師云過這邊立問人天交接兩得相見如何是相見底事師云爭敢相謾師乃云問話且止問之與答俱是贏得邊事古者道動則起生死之本靜則沈昏醉之鄉動輯雙泯則落空亡動靜雙收則顢頇佛性到這裡直得窮天玄辯竭世樞機用一點不著獨有山僧今日幸遇太平世界得路便行不懼他人笑怪所以道此事上在諸佛分上不曾增一毫下在一切含生分上不曾減一毫只為一念迷妄背覺合塵輪轉三塗暫無休息遂勞我竺乾本師於大解脫海中強湧玄波三乘教外直指人心見性成佛且道今日如許多葛藤阿那裏是直指處若向長老口邊覓大似貪觀天上月忘却室中燈若向不言不語處會直得盡大地亡鋒結舌只是箇無孔鐵槌有什麼用處到者裡還有知音者麼良久云只見白雲飛散盡不知明月落誰家次日舉雪竇道偶續靈鋒照夜燈遽泛鐵船下滄海承天此者也隨例泛一隻鐵船文殊普賢為招頭把拖觀音摩詰為打篙搖櫓承天只管坐地看楊州既然如是且道將什麼報答諸人良久云誰知遠煙浪別有好思量到圓通僧問二師相見合談何事師云六耳不同謀僧云謝師答話師云聽事不真喚鐘作甕僧便喝師云過乃云秋江清淺時白鷺和煙島良哉觀世音全身入荒草大眾承天未出世時或有一箇半箇衲子相疑著誰知道出世後直得無言可說無理可伸然雖如是猶賴得侯溪主人在何謂如此千古萬古無人知眼裏瞳兒看馬騎到歸宗示真性心地藏無頭亦無尾應緣而化物方便呼為智大眾承天此者來禮拜歸宗師叔師叔若行一丈承天也行一丈師叔若行一尺承天也行一尺何謂如此得風流處且風流有般漢到這裏道耶舍塔高金輪峯峻眨眼回頭早是子過新羅似恁麼還稱得老師叔也無不見道打麵還他州土麥唱歌須是帝鄉人然雖如是三十年後清平過水到開先云莫行舊時路莫掛本來衣如今有人向鋒刀上橫身火𦦨裏出手盡是勞而無功豈可更擔水向河頭賣然雖如是若教嫫母臨明鏡也道不勞紅粉施到棲賢云承天自開堂後便安排些葛藤來山南東葛西葛却為在歸宗開先一時打疊却了也今日到三峽會裏大似臨嫁醫癭卒著脚手不辨幸望大眾不怪伏惟珍重歲旦云今日普天之下盡添一歲且道水牯牛還添也無添與不添且致且道牯牛鼻孔重多少若知得他鼻孔斤兩分明一任侵他人苗稼若也未然臘月三十日莫道春來草自青乾坤之內宇宙之間中有一寶秘在形山大眾眼在鼻上脚在肚下且道寶在甚處乃云人面不知何處去桃花依舊笑春風文殊起佛見法見被世尊貶向鐵囲山大眾世尊一期也似爭小失大有失大人之相如今若有人向承天這裏起佛見法見承天終不敢動著他何謂如此但得雪消去自然春到來上士問道勤而行之中士聞道如存若亡下士聞道大笑之大眾若約衲僧門下却許他大笑底有些骨氣何謂如此眾眼難瞞豎起拄杖云劍刃上𨁝跳却橫按拄杖云微塵裏走馬勞勞去復來箇是知音者擲拄杖下座戢玄機於未兆藏冥運於即化大眾如今禪和子一箇箇出來氣宇如王問著辯瀉懸河有甚柰何處忽若解按下雲頭聽承天說些將有如無話往往方知道打鼓弄琵琶相逢兩會家然雖如是禹力不到處河聲流向西今朝至節一陽生於此日拈起拄杖云且道這箇作麼生便恁麼搆得且恁麼應時納祜若數至大年朝前頭大有雪在所以承天十度發言九度休何謂如此當門不用栽荊棘後代兒孫惹著衣然雖如是三十年後太公釣魚若常似今日承天謾得諸上座若不似今日承天謾諸上座不得何謂如此黨理不黨親入林不動草入水不動波入鳥不亂行大眾這箇是把纜放船底手段且道衲僧家合作麼生以手拍禪牀一下云掀飜海岳求知己撥動乾坤見太平卓拄杖云一漚生波瀾始又卓云一漚生文殊起又卓三下云這箇又作麼生良久云誰知遠煙浪別有好思量佛身無為不墮諸數且道六入十二緣十八界乃至八萬四千法門從甚處來以手拍禪牀云好女不著嫁時衣舉僧問投子不斷煩惱而入涅槃時如何投子作色云這箇師僧好發業殺人西堂別云家家觀世音大眾投子可謂善解量才西堂可謂善解補職如今忽有人問圓通不斷煩惱而入涅槃時如何即向伊道青山綠水短棹孤舟僧問牛頭未見四祖為甚百鳥含花献師云世情看冷暖人面逐高低如何是佛師云鑊湯無冷處如何是西來意師云烏飛兔走乃云若立一塵家國興盛野老嚬蹙不立一塵家國喪亡野老安貼大眾且道立即是不立即是良久云心不負人面無慚色以手拍禪牀一下云參生死交謝寒暑迭遷有物流動人之常情肇法師剛然不知有不為物之流動者作麼生是不流動者良久云大盡三十日小盡二十九葉落歸根來時無口大眾祖師可謂善解借手行拳有般漢往往便道言猶在耳不見道子期去不反浩浩良可悲不知天地間知音復是誰鳥有雙翼飛無遠近道出一隅行無前後你衲僧尋常放匙把筯盡道知有及至上嶺時為什麼却氣急不見道人無遠慮必有近憂江月照松風吹到這裏還有不漏網者麼良久云皇天無親釋迦老子有四弘誓願煩惱無邊誓願斷法門無邊誓願學眾生無邊誓願度無上菩提誓願成法華亦有四弘誓願飢來要喫飯寒來要添衣困時伸脚睡熱處要風吹初住法華晚小參中閒舉楊岐問慈明幽鳥語喃喃辭雲入亂峯時如何明云我行荒草裏汝又入深村岐云官不容針再借一問明便喝岐云好一喝明又喝岐亦喝明連喝兩喝岐遂禮拜退師云大眾須知悟了遇人底向十字街頭與人相逢劫在千峯頂上握手千峯頂上相逢却在十字街頭握手山僧曾有頌云他人住處我不住他人行處我不行不是與人難其住大都緇素要分明開堂上堂問答罷乃云昔日靈山會上世尊拈花迦葉微笑世尊道吾有正法眼藏分付摩訶大迦葉流傳母令斷絕至于今日若是正法眼藏釋迦老子自無分將什麼分付將什麼流傳諸人分上各各自有正法眼藏每日起來是是非非分南道北種種施為盡是正法眼藏之光影此眼開時乾坤大地日月星辰森羅萬象只在目前不見有毫釐之相此眼未開時盡在諸人眼睛裏已開者不在此限未開者山僧為諸人開此法眼藏看乃豎起兩指云看看若見得事同一家其或未然不免重說偈言諸人法眼藏千聖莫能當為君通一線光輝滿大唐須彌走入海六月降嚴霜法華恁麼道無句得商量既滿口說了為什麼無句得商量喝一喝云分身兩處看如我按指海印發光拈拄杖云山河大地水鳥樹林情與無情盡向拄杖頭上作大獅子吼演說摩訶大般若且道天台南嶽說什麼法門南嶽說洞山五位修行君臣父子各得其宜莫守塞巖異草青坐斷白雲宗不妙天台說臨濟三玄三要四料揀一喝分賓主照用一時行要會箇中意日午打三更廬山出來道你兩箇漢正在葛藤窠裏不見道欲得不招無間業莫謗如來正法輪此三箇漢見解若上衲僧秤子上秤一箇重八兩一箇重半斤一箇不直半分錢且道那箇不直半分錢但願春風齊著力一齊吹入我門來舉金鑾一日在厨前見典座便問典座變生成熟即不無典座離却木杓道將一句來座無語後令僧入室代語皆不契乃自代云羊羮雖美眾口難調大眾且道金鑾離得木杓也未法華即不然離却木杓一句作麼生道人情若好喫水也肥今年雨水非常足管取秋來天下熟牧童齊唱太平歌笑殺東村王大叔合肥請師不赴回山云不住城隍果所期山花山鳥又同嬉石泉昨夜窓前過何事清聲勝舊時卓拄杖三下玄沙因誤喫藥徧身紅爛僧問如何是堅固法身沙云膿滴滴地天衣懷和尚頌云滴滴通身是爛膿釣魚船上展家風時人只見絲綸上不見蘆花對蓼紅亦曾有人問法華如何是清淨法身只答他道屎臭熏天又云蓮花葉上化生兒且道與古人是同是別法華亦有頌屎臭熏天亦偶然法華爭敢為君宣鼻中若有通天竅一任橫行不著穿舉雪竇道春山疊亂青春水漾虗碧寥寥天地間獨立望何極乃迴顧侍者云還有人守方丈麼云有自云作賊人心虗雪竇老人放去収來有舒慘乾坤之手然雖如是何似乾坤收不得堯舜不知名法華忍俊不禁當為古人出氣山櫻火焰輝山鳥歌羣滑𢹂手不同途任他春氣發有天有地來幾箇眼睛活法華暫出不著問侍者守方丈便下座結夏云安居之首禁足為名禁足之意意在進道護生衲僧家有何生而可護何道而可進唾一唾唾破釋迦老子面門行一步踏斷釋迦老子脊骨猶是隨行逐隊漢未是本分衲僧如何是本分衲僧無限風流慵賣弄免教人指好郎君日淌萬兩黃金法華門下不著直饒不直半分錢正入得法華門未升得法華堂入得法華室且道什麼人升得法華堂入得法華室眼生三角頭峭五嶽法華収得三般希奇之寶尋常少曾拈出今日麻頭穀頭進發不免將出奉送諸人拈拄杖卓三下云前頭第一不得擘破又須分教兩平縱遇南番舶主也須換却眼睛聞聲悟道見色明心展兩手云有麼有麼又搖手云無也無也乃云曾經大海休誇浪除却巫山總是煙拍禪床一下此事如在萬丈崖頭相似總知道放手著便撲到底只是捨命不得法華今日不動著一毫頭教諸人到底去乃擲下拄杖下座學道先須且學貧學貧貧後道方親一朝體得成貧道道用還同貧底人法華雖與古人同路行且不與古人同路歸何謂如此自住箇小院子客來並無施設無可咬嚼賴得下面有人撐拄逐日且蓋覆得過可謂山花不廢栽培力自有春風管帶伊施主捨法衣云龍披一縷金翅不吞當時若一口吞盡豈不天下太平且道那箇是吞不盡底拈起法衣角示眾云者箇豈不是吞不盡底還見麼等閒掛在肩頭上也勝時人著錦衣住龍門僧問如何是龍門境師云到者方知如何是境中人師云兩脚拄地乃云見聞不脫如水中月山色水聲名花異鳥滿眼滿耳作麼生說箇脫底道理要會麼暢暢釋迦老與無伎倆休休龍門山水天下幽夜來一覺到天明得風流處且風流一切聲是佛聲一切色是佛色釋迦老子誑惑人家男女陷在阿鼻大地獄中至今分說不下拈起拄杖云太湖縣裏屠兒項大伯今日向龍門拄杖頭上成等正覺轉大法輪度一切含生諸人還見麼若也見去天下太平以拄杖擊禪牀舉僧問趙州大耳三藏第三度覓國師不見州云在三藏鼻孔裏僧問玄沙既在鼻孔裏為什麼不見沙云只為大近大眾國師若在三藏鼻孔裏有甚麼難見殊不知在三藏眼睛裏作是思惟時十方佛皆現且道作麼生思若以有心思則盡大地是荊棘林若以無心思則盡大地是荒岑良久云雲從龍風從處參禪學道莫忙忙問透法身北斗藏吾今老倒疎慵甚見人無力得商量唯有鋤頭知我道我松同步上金剛洞山聰老可謂戢玄機於未兆藏冥運於即化今古難並其風龍門病叟每日被鬲氣撲得來一日不如一日只見羸瘦實是無氣力與人商量然雖如是家貧願隣富有時碓觜生花有時佛面百醜李公醉倒街頭自是張公喫酒燈籠皺斷眉頭露柱呵呵拍手未透者且教伊識已透者須共伊行盡大地是沙門一隻眼教阿誰識實際理地不受一塵向什麼處行所以道世人住處我不住他人行處我不行不是與人難共聚大都緇素要分明少處減些子多處添些子為什麼少處更減多處更添神仙秘訣父子不傳今日也道者箇明日也道者箇作麼生是那箇漆桶參堂去法尚應捨何況非法拈拄杖云這箇拄杖且作麼生捨又作麼生說箇非法良久云敲落鼻孔露出眼睛擊禪牀一法不明翳汝眼睛拈起拄杖云者箇豈不是眼睛八萬四千法門無一點影子八萬四千法門門門解脫作麼生翳得伊只如每日見山見水分別青黃赤白不是伊又作麼生見乃卓拄杖一下云瞎一僧在經堂內長坐一日藏主問上座何不看經僧云某甲不識字主云何不問人僧鞠躳叉手云未審是什麼字主無語大眾藏主雖然無語爭柰其聲如雷者僧雖不識字要且點劃分明且道是什麼字良久云玉篇裏尋取賊來須打客來須看客來須看禮之常道且道賊來作麼生打人面似賊賊面似人半夜三更有什麼辨處然雖如是也不得放過以拄杖擊一下佛法二字掉去他方世界未為分外一日兩度鉢盂濕少一點不得不見道常聞一飽忘百飢今日山僧身便是乃云不審不審尋常向你道未在也無別意只是要諸人喫粥喫飯須是自家拈匙把筯便得飽若取別人辨只是虗飽臘月三十日贏得一場乾嚥唾然雖如是莫教忘却口海會開堂問答罷乃云善言言者言所不能言善跡跡者跡所不能跡每日開口動舌無非是言作麼生說箇言所不能言既喚作言即便是跡作麼生說箇跡所不能跡到者裡一大藏教用一點不著到者裏一大藏教字字用得著為什麼先用不著後又却用得著且道誵訛在什麼處不見道千峯勢到岳邊止萬派聲歸海上消自古自今向其間鑽仰者如稻麻竹葦實端的透徹者百中無一二若果然透得十二時中不妨慶快應機接物利樂有情盡乾坤星辰日月盡大地草木叢林都作一箇出入遊戲之場古者道玉轉珠回佛祖言精通猶是污心田老盧只解長舂米何得黃梅萬古傳山僧在菴中亦有示徒直下雖然沒許般透如未盡活還難海門昨夜狂風起無限波瀾一埽乾恁麼地先與人開却路然後兩手掇放人前靈利底不用絲毫氣力便提得去還有麼若提不去敢問諸人十二時中應用施為分賢別愚是是非非是箇什麼郭功甫入山上堂夜來枕上作得箇山頌謝功甫大儒廬山二十年故舊今日遠訪白雲舉似大眾請已後分明舉似諸方此頌豈唯謝功甫大儒直要與天下有鼻吼衲僧脫却著肉汗衫莫言不道乃云上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也中峯至云九九八十一幾人能解筭兩箇五百文元來是一貫到者裏添得一文麼若有添得一文即便滿路光生拔出古今爭柰自古自今千箇萬箇只愛足頭底白雲今日為你添看乃云下座興知事首座大眾請中峯和尚升座一徧若端的得一回汗出來也向一莖草上便現瓊樓玉殿若未端的得一回汗出縱有玉殿瓊樓却被一莖草蓋却且道作麼生得汗出去良久云自有一雙窮相手不曾容易舞三臺來知有時幸自十相具足稍知有後分明却被礙塞要得盡善盡美麼早知燈是火飯熟也多時此事有人擔得起價直三千大千世界有人擔不得不直半分錢且道三千大千世界底是不直半分錢底是知恩分解報恩揚眉瞬目拈鎚豎拂彈指謦欬盡是抓鈎搭索海會今日還免過也無家家觀世音處處彌陀佛舉百丈開田僧白云開田也請說大義丈行數步退身立展開兩手師拈云百丈說大義只是如此當時再參馬祖底向甚處去若言更有在未免與蛇畫足作麼生得見百丈立地處客來無茶點蒿湯備禮儀洞山悟本禪師云初秋夏末直須向萬里無寸草處去有僧舉似瀏陽菴主主云出門便是草師云若見得菴主便見得洞山若見得洞山便見得菴主洞山却易見菴主却難見為他不為住持之絆不見道雲在嶺頭間不徹水流㵎下太忙生功商二儀而不仁明踰日月而彌昏肇法師只得半邊且作麼生是完全者乃云左眼半斤右眼八兩馬大師道即心是佛又道非心非佛諸人即今要見馬大師麼處處綠楊堪繫馬家家門首到長安開口有時道得著開口有時道不著著與不著爭幾何祥麟只有一隻角彈指謦欬揚眉瞬目無不是這箇古人為甚却道萬古碧潭空界月再三撈摝始應知要會麼九九八十一田地穩密底古佛家風在神通遊戲底今佛放光明且道即今是古是今乃云上馬見路職到威成古人留下一言半句未透時撞著鐵壁相似忽然一日覰得透方知自己是鐵壁如今作麼生透鐵壁鐵壁一句道得盡與祖佛為師一句道不盡與人天為師今日作麼生道乃云有水皆含月無山不帶雲一二三四五剩得太多六七八九十又却少些子且道作麼生向定盤星上秤得恰好去乃云到頭霜夜月任運落前溪有為雖偽棄之則道業不成無為雖真著之則慧性不明古人向這裏借路經過盡大地總在脚跟下若向長安城裏則賺殺一船人要見白雲麼時把一聲歸去笛夜深吹過汨羅灣開口時末上一句正道著舉步時末上一步正踏著為甚鼻孔到夜不正只為尋常見他頑了所以不肯發心白雲今日勸諸人發却去乃云一本是釣魚船上客偶除鬚髮著袈裟祖佛位中留不住夜來依舊宿蘆花依舊宿蘆花有誰可共明月滿船無處問沙鷗時叫兩三聲絲毫有趣皆能進畢竟無歸若可當逐日退身行興盡忽然得見本爺娘作麼生是本爺娘乃云萬福萬福便下座直下分明承當得了被人道箇不是便見參差不然亂有承當不然忘前失後且道病在甚處只為未有透底時節只這箇不是泄盡天機竝無一點滲漏良久云不是不是舉甘贄僧問按待不易贄云譬如餧驢餧馬瑯瑘云快把飯來師拈云瑯瑘有不犯之手雖然如是白雲即不然譬如餧驢餧馬願行者長似今日舉僧問楊岐如何是不動尊岐云大家齊著力白雲即不然如何是不動尊禮拜著世間一切伎倆手頭弄得熟後自然方有餘態且道衲僧伎倆手頭弄得熟後有多少餘態良久吹一聲下座彌勒真彌勒分身千百億卓拄杖三下云時時示時人時人俱不識卓拄杖下座洞山天晴蓋却屋乘時刈却禾輸賦皇祖了鼓腹唱謳歌良久云洞山聰禪師何似白雲老楊長官至云自古自今說理說事者如稻麻竹葦會禪者更比比然討一箇家裏人如天上揀月相似黃梅賢宰楊次公聞名十載有餘夜來忽蒙訪及元來却是一箇本分家裏人杓柄長短鍋子大小雖然未曾一一點過看他數目也甚分明可謂如在東溪日花開葉落時幾擬將黃金鑄作鍾子期昨來當塗郭功甫到曾舉上大人一編今日次公來更須舉一徧夜凉堂上坐忽聞人叫喚黃梅楊長官來到白雲畔久聞竊我宗未得當面斷一夜燈火前行過舊公案所犯一一招也要眾人看鼻直權骨高一箇沒量漢何日履亨衢吾道聊輝煥共唱太平歌埽盡天下亂文章不礙他兼能大衍筭兩箇五百文依前是一貫吾本來茲土傳法救迷情豈不知有一花開五葉結果自然成因風吹火用力不多忌口自然諸病減多情未免有時勞貧居動便成違順祇得清閒一味高雖然如是莫謂無心云是道無心猶隔一重關諸人每日見底諸人每日用底如從天上降下地中涌出緜緜然無絲毫間斷可謂古釋迦不前今彌勒不後白雲病老打底不遇作家到了飜成骨董從來共住不知名齪漢任運相將只麼行一脚在前一脚在後自古上賢猶不識端的也未造次凡流豈可明錦上更添花叮嚀損君德無依真有功任從滄海變終不為君通這箇是黃泥那箇是白石悟了更須遇人始得若不遇人只是一箇無尾胡孫才弄出人便笑演首座受四面請云年年秋暑甚如初何事清凉特有餘盡是當人心地感不虗把手在龍舒且道把手一句作麼生道良久云行到水窮處坐看雲起時興道者開田回云三載區區弄水泥捎裩擗褲又扶犁滿倉収稻方歸院一任禪和韗肚皮且道韗底是禪是飯乃云因風吹火用力不多少一滴不得剩不滴不得且道是什麼人分上事良久云日日日東上夜夜月西流大象不遊於兔徑大悟不拘於小節是何言歟承天道針眼裏躍出獰龍藕絲中開張世界何謂如此功多業就水到渠成頌古二祖安心臨濟三頓棒世尊拈花終始覓心無可得寥寥不見少林人滿庭舊雪重知冷鼻孔依前搭上脣一拳拳倒黃鶴樓一踢踢飜鸚鵡洲有意氣時添意氣不風流處且風流盡說拈花微笑是不知將底當宗風若言心眼同時證未免朧在夢中咄達磨見梁武帝黃檗噇糟漢一箭尋常落一鵰更加一箭已相饒直歸少室峯前坐梁主休言更去招大唐國裏無禪師與君𢹂手歸家裏拋鈎只欲釣獰龍誰知得箇跛鱉子趙州勘婆州中糶黃米干戈中立太平基塊雨條風勝古時婆子為君勘破了趙州脚跡少人知寶劍𢹂來刃似霜幾回臨陣斬蠻王有情有理俱三段直得寒光射斗傍無位真人楞嚴經云吾不見時春風浩浩烘天地是處山藏煙靄裏無位真人不可尋落花又見隨流水堂前露柱久懷胎生下孩兒頗俊哉未解語言先作賦一操直取狀元來大士講經靈雲悟桃花大士何曾解講經志公方便且相成一揮案上俱無取直得梁王努眼睛且道努底是什麼靈雲悟處復何如未徹無人辨得渠千古華山山脚下豈知潘閬倒騎驢汝是慧超百丈卷席一文大光錢買得箇油糍喫向肚皮裏當下便不飢昨日東風偶然惡桃花亂落如紅雨昨夜東風又發狂滿地不知何處去一口吸盡西江水北斗裏藏身一口吸盡西江水萬古千古無一滴要須黨理不黨親馬師可惜口門窄五陵公子遊花慣未第貧儒自古多冷地看他人富貴等閒無柰幞頭何問楊岐如何是佛岐云三脚驢子弄蹄行三脚驢子弄蹄行奉報諸人著眼睛草裏見他須喪命只緣踢踏最分明問少林面壁意旨如何岐云西天人不會唐言天高地迥非難見水濶山重不易論萬古八風吹不入西天人不會唐言問撥雲見日時如何岐云東方來者東方坐堯舜垂衣萬國賓撥雲見日意休陳東方來者東方坐草木重霑雨露新正法眼瞎驢邊滅雲門云露擘破太山雷未猛照開滄海月非光瞎驢滅却正法眼直得哀聲滿大唐簸土揚塵無避處飜身直到御樓前回頭不見來時路下是黃泉上是天洞山三頓棒動與事會一鏃三關破不難柰何猶在是非間曲勞提起飯袋子三頓方知徹骨寒飯若真珠麵如玉食罷㳂溪行數曲忽然逢箇荷耡翁我自高歌他鼓腹贊楊岐和尚衡州茶陵受業和尚碧海中珠爛泥裏刺虎嘯龍吟雞啼犬吠天下楊岐討甚巴鼻水月以喻兮古來已多我今不然兮所陳伊何百尺竿頭曾進步溪橋一踏沒山河固不方遊兮何遊之有玄沙保壽兮師其與偶雁峯之東兮洣川之口三十三秋兮大獅子吼舒兮卷兮已而矣依前空瀉洣川水九江相去幾千里父有重牙子無齒謾勞提耳一爐香微煙旋逐松風起題雲蓋會和尚遺塔五峯諸祖塔我祖據中央山脈朝來正溪光瀉去長僧移雲際樹客献海邊香從此滿湘畔遺風振洛陽保寧勇禪師語錄嗣楊岐無為子楊傑序鳳堂山老南方游行時至楊朱泣岐處遇一善知識白雪蒙頭師子踞坐以金圈栗蓬為佛事布施十方學者云鐵圍山可透吾金剛圈不可透大海水可吞吾栗棘蓬不可吞若透一圈即百千萬億圈透之無礙一切煩惱於此解脫若吞一蓬則百千萬億蓬吞之不疑一切功德於此成就時諸比丘罔然退席莫知所措彼上人者從容道場獨蒙受記後十五年鳳臺山頂震大雷音三草二木均霑一雨其徒錄其語請無為子以序之云耳時皇宋元豐元年清明日述上堂受帖云明珠歷掌別者還稀寶鏡當臺何人鑑照鋒前一路截斷眾流言下千差隨波逐浪所以展則大千俱徧不展則毫髮不存與麼猶是化門之說且道不落化門一句作麼生道道泰不傳天子令時清休唱太平歌敘謝畢復云千峯壁立滑於苔不惜眉毛露出來直下早逾千萬里那堪於此更徘徊拍禪牀云心外無法萬法唯心心既不生法從何立山河大地甚處得來三十年後忽有人問轉身句作麼生道良久云潼關雖易度劒閣轉難行僧問如何是佛答云近火先焦問如何是法答云爛泥有刺問如何是道中人答云切忌踏著乃云保寧乍住不曾停日日街頭巷尾行張三李四相逢著剔起眉毛作麼生大笑下座拍禪牀云不是心亦非佛問君畢竟是何物昨夜金剛努目瞋一拳把破精靈窟喝一喝滿口是舌都不能說碧眼老胡當門齒缺一人發真歸源十方虗空悉皆消殞拍禪牀云大眾為什麼却有人透這裏不過良久云自是不歸歸便得五湖煙景有誰爭釋迦掩室於摩竭已泄天機淨名杜口於毗耶特地饒舌少林九年面壁老不歇心永嘉一寂曹溪徒誇英俊大眾只如保寧與麼道還有過也無復云路逢劒客須呈劒不是詩人莫献詩在常州廣福上堂塵塵爾剎剎爾山是山水是水彌勒不入樓閣善財不須彈指以手劃一劃云微塵世界氷消瓦解且道彌勒善財在什處若向這裏參徹去不妨在處稱尊若也不見客路如天遠侯門似海深如來明星現時成道乃云大眾且道明星幾時不現下座拈拄杖云人人盡道有星漆底祇是用處不同在諸人分上所謂上窮三際橫徧十方指大地為黃金攪黃河為酥酪在保寧手裏要橫不得橫要竪不得竪動著即喪覰著即瞎當與麼時忙忙之者普天匝地屈屈作什麼昨夜三更達磨大師一拳打落保寧當門齒僧問知師解把無星秤無角銕牛重幾多云頭輕尾重唯一堅密身一切塵中現所以行住坐臥念念無生見聞覺知心心永寂善財童子於剎那際一念之間經過百一十城參問五十三員知識到了不離菩提道場普光明殿遮那彌勒步步相隨文殊普賢處處出現若向這裏見得諦去更須知有向上路始得且道向上一路又且如何吽吽若說佛法供養大眾未免眉鬚墮落若說世法供養大眾入地獄如箭射去此二途且道保寧今日當說什麼三寸舌頭無用處一雙空手不成拳舉夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止分毫不相離如身影相似欲識佛去處祇這語聲是玄沙拈云大小傅大士祇認箇昭昭靈靈洞山聰和尚拈云你且道衲僧家日裏還曾睡也無師云此二尊宿兩轉語誰言世上無仙客須信壺中別有天保寧亦有一頌要眠時即眠要起時即起水洗面皮光歠茶濕却觜大海紅塵生平地波濤起呵呵阿呵呵囉哩哩囉哩下座看看山僧入拔舌地獄去也以手拽舌云啊㖿啊㖿快馬一鞭快人一言直饒與麼猶是鈍漢乃召大眾云喫茶去僧問如何是祖師西來意答云雪上加霜萬法是心光諸緣唯性曉本無迷悟人只要今日了且道了底事作麼生但得雪消去自然春到來迦葉擎拳阿難合掌樓至如來全無伎倆橫按拄杖云雲從龍風從虎甘草甜黃連苦洪波浩渺浪滔天須彌頂上日卓午卓拄杖譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發拈拄杖云者箇且非琴非瑟有大妙音眾中莫有妙指者麼試請一發看若無保寧自品弄去也橫按杖云還聞麼良久云一堂風冷淡千古意分明晨朝有粥齋時有飯展鉢開單光明燦爛行住坐臥無他一生大事成辨大眾且道與麼見解底人還得盡善也未良久云誰知更有離家子望斷碧雲生遠愁保寧有一路東西徒指注直下已千差回頭還錯悞不錯悞百尺竿頭須進步顧示大眾云前面有山兼有水一程分作兩程行秋風凉松韻長未歸客思故鄉且道誰是未歸客何處是故鄉良久云長連牀上有粥有飯天上無彌勒地下無彌勒打破太虗空如何尋不得垂下一足云大眾向甚處去也釋迦出世弄假像真達磨西來將長就短德山棒臨濟喝陽𦦨充飢梅林止渴清平世界不妨夜行如今莫有吞却佛祖打破化城者麼良久云保寧今日被大眾勘破山僧二十餘年挑囊負鉢參善知識十餘人竝無箇見處若頑石相似參底尊宿亦無長處可相利益自此只做箇百不會底人幸自可怜生忽被業風吹到江寧府無端被人上當推向十字街頭住箇破院作粥飯主人接待方來事不獲已隨分有鹽醋粥足飯足且與麼過時若是佛法不曾夢見大地北風吹長天霰雪飛今朝寒較殺身上更添衣大眾有衣則添衣無衣添箇什麼爐邊向火猶嫌冷更有樵夫跣足行春雨如膏春風如刀填溝塞壑拔樹鳴條會麼魚行水濁鳥飛落毛祖師門下絕人行深險過于萬丈坑垂手不能空費力任他堂上綠苔生拈拄杖云宮商角徵羽金木水火土卓一下云卦上吉凶分三日後看取保寧尋常為人直下是無面目若也敲骨出髓直得神號鬼哭拍手大笑云仁義盡從貧處斷世情偏向有錢家一是一二是二三是三四是四數目甚分明上下依資次依資次有何事以拄杖一劃云大眾一時亂却六十甲子了也行時行住時住坐時坐臥時臥舉手動步皆自由處處何時有蹉過自家肚皮自家劃粥飯但飡休忍餓阿呵呵記得麼今年十一月是小十二月是大森羅及萬像皆於鏡中現以拄杖指云北面是廚庫南面是僧堂中間是佛殿直下指云者裏是什麼乃云踏牀子也不識釋迦老子初生下時周行七步目顧四方當與麼時土曠人稀相逢者少遂以手指天地三家村裏東卜西卜便道天上天下唯我獨尊祖禰不了殃及兒孫下座以手托禪牀却召大眾云三十年後不得錯舉古人底今人用今人底古人為古今無背面今古幾人知㖿鳴咿一九與二九相逢不出手僧問如何是保寧境云主山頭倒卓問如何是境中人云鼻孔無半邊問如何是保寧家風云硬胡餅爛䬪飥云忽遇客來將何祇待云麤飡易飽細嚼難飢乃云無種靈苗火裏栽鐵花還向樹頭開驀然結箇團欒果指似時人處得來無邊剎境自他不隔於毫端十世古今始終不離於當念是以豎窮三際橫徧十方理事圓融性相平等宮殿樓臺處處莊嚴草木山川重重顯露鐘鳴鼓響時時揚解脫之音文字語言句句盡真如之理離彼離此無是無非芥子納於須彌未為分外百川歸于大海乃是尋常都亡大小之名不見有無之相是故隱顯自在去住無方處凡不凡在聖不聖此不思議境界諸人常在於其中為什麼却不自覺以兩手畫一圓相擘開捺膝云渾崙擘不破三人共兩箇滋味信全無有誰吞得過吞得過且與麼吞不過莫亂做欲言言不及林下好商量且道作麼生商量時挑野菜和根煑旋斫生柴帶葉燒賣扇老婆手遮日田公布袴不到膝斷頭船子任風飄昨夜籬頭吹篳𥷑僧問如何是佛法大意云鑊湯無冷處乃云百川異流同歸於海萬塗差別皆入此宗卓拄杖一下云醫得眼下瘡剜却心頭肉昨夜三更忽然大地震動直得須彌岌峇海水沸騰其中有無限眾生正在睡夢中不覺不知如存若亡卓拄杖一下云大眾還聞麼幾乎喪身失命道遠乎哉觸事而真凉風明月青山白雲聖遠乎哉體之則神眉毛上𨁝跳眼睫裏藏身拍禪牀一下云遠親不如近隣到真州資福云會麼不解作客勞煩主人便下座乾坤之內宇宙之間中有一寶祕在形山且道是什麼寶非青黃赤白男女等相是何言歟雖然如是匹上不足匹下有餘拈拄杖云此是雲門臨濟德山巖頭一生用不盡底如今在保寧手裏不直半分錢雖然如是又也可貴可賤且道什麼處是可貴可賤擲下拄杖下座到長蘆末後云乘興安然泛小舟霎時風送到江頭不知相見談何事諸高德試道看下座有手脚無背面明眼人看不見天左旋地右轉拍膝云西風一陣來落葉三兩片古云文殊門入者墻壁瓦礫助汝發機觀音門入者蝦蟆蚯蚓與汝發機普賢門入者不動步徧十方大眾東西南北四維上下築著磕著不覺不知過在甚處良久云紅粉易成端正女無錢難作好兒郎黃面老子出世平地骨堆碧眼胡兒西來無風起浪近朱者赤近墨者黑臨濟雲門牽枝引蔓保寧也有沒量罪過諸人也有沒量罪過還委悉麼良久云面皺只因陪笑得皆跎還為打躬多不可以智知不可以識識言語道斷心行處滅保寧道亦可以智知亦可以識識言語道斷心行不滅何故青山只解磨今古流水何曾洗是非風鳴條雨破塊曉來枕上鶯聲碎蝦蟆蚯蚓一時鳴妙德空生都不會都不會三箇成群四箇作隊窈窈窕窕飄飄颻颻向南北東西折得梨花李花一佩兩佩退院上堂百尺竿頭弄險𡾟是人平地為攢眉而今老倒成無用高躡前蹤付與誰有道得者試道看良久云若無人道不如交與知府諫議召大眾以一手指上一手指下云這箇是釋迦擎拳云這箇是迦葉合掌云這箇是阿難橫展兩手云這箇是什麼自云羞慙殺人下座有箇漢怪復醜眼直鼻藍鑱面南看北斗解使日午金烏啼夜半鐵牛吼天地施山河走羽族毛群失其所守直得文殊普賢出此沒彼七縱八橫千生萬受驀然逢著箇黃面瞿曇不惜眉毛再三與伊摩頂授記云善哉善哉大作佛事希有希有於是乎自家𢣾𢣾㦬㦬張張惶惶藏頭縮手召云大眾此話大行何必更待三十年後真相無形示形顯相千怪萬狀自此而彰喜則滿面光生怒則雙眉斗豎非凡非聖或是或非人不可量天莫能測直下搆得未稱丈夫喚不回頭且莫錯怪時時舉處處說絕忌諱無閒歇橫按拄杖示會麼一夜落花雨滿城流水香卓一下昨日去年去今日今年來去年去不去今年來不來徧野盈凡雪大地絕纖埃無為無事人舉目聊徘徊釋迦老子四十九年說法不曾道著一字優婆掬多化籌盈室不曾度得一人達磨不居少室六祖不住曹溪誰是後昆誰為先覺彼自無瘡勿傷之也拍手大笑云且喜天下太平天地與我同根萬物與我一體拈拄杖云渾家不管興亡事只解和雲占洞庭相見不揚眉君東我自西紅霞穿碧落白日遶須彌保寧即不然不西不東觸處相逢耳輪卓朔頭髮鬅鬆仰天大笑手拍虗空作麼寒風颯颯細雨濛濛解語非干舌能言不是聲百骸俱潰散一物鎮長靈師彈指三下云大眾蒼天中更添冤苦夜中靜峭峭日裏閙浩浩夜夜與日日尋常向人道忙時急脚行困便和衣倒不曉這箇意總是閒煩惱相罵無好言相打無好拳大眾直須恁麼始得一句句切害一拳拳著實忽然打著箇無面目漢也不妨暢快殺人我見瞞人漢如籃提水走急急到家中籃裏何曾有拍手大笑云分意氣時添意氣不風流處也風流或是或非人不識逆行順行天莫測大眾是箇什麼便得與麼良久云有金有玉同歡喜無米無柴各皺眉保寧飯食麤惡別無精妙品饌供養諸人既到這裡開單展鉢須是喫得這箇無滋味始得喫不得且莫怪是箇什麼得與麼難會是箇什麼得與麼易曉還委悉麼不是冤家不聚頭無漏真淨云何是中更容他物喝一喝拍一拍云好人不肯做須要屎裏臥見見之時見非是見見猶離見見不能及卓拄杖云還見麼落霞與孤鶩齊飛秋水共長天一似五臺山頂雲蒸飯佛殿堦前狗尿天剎竿頭上煎䭔子三箇胡孫夜簸錢石霜云風吹石臼爭哮吼泥揑夜叉空裏走趯飜海月亂波生驚起土星犯牛斗道吾云三面狸奴手捉月兩頭白牯脚拏煙戴冠碧兔立庭柏脫殻烏龜飛上天此三頌一與祖佛為師一與天人作榜樣一驗衲僧眼目若人定當得許具一隻眼夜靜月明水清魚現金鈎一擲何處尋蹤提起拄杖云歷細歷細吾心似秋月碧潭清皎潔無物堪比倫教我如何說寒山子貴價精神賤價賣子細思量著甚來由雖然如是三十年後有人撿點保寧去在霜風浩浩葉紛紛曉入深村野老門相見但知俱默坐更無一事可談論良久云入山擒虎易開口告人難智不到處切忌道著道著即頭角生大眾師角生也是牛是馬舉老宿到臨濟便問禮即是不禮即是濟便喝僧便禮拜濟云這賊云這賊便出去濟云莫道無事好首座在那立濟云且道還有過也無首座云有濟云賓家有過主家有過首座云俱有過濟云過在什麼處首座便出去濟云莫道無事好後有僧舉似南泉泉云禍事禍事僧云這賊泉云這賊便打拈云大眾這一群賊其中有正賊有草賊且道那箇是正賊那箇是草賊辨得麼口款易招贓物難認來無頭去無脚終日行踏不著既是終日行為什麼踏不著橫身荷眾不顧危亡劄起布裙入泥入水分毫上定當升合裡論量拆東籬補西障若解與麼循途守轍也可以當風抵浪雖然如是猶未是箇咬猪狗底手脚作麼生是咬猪狗底手脚委悉麼殺人不眨眼氣宇大於王春種一粒粟秋收萬顆子四海無閑田農人猶餓死我沙門釋子修心務本五湖四海到處為家今日不愁明日飯生涯祇在鉢盂中雖然如是祇知有一不知有二何故不見道喫人美食憂人美事保寧記得三十年前一轉奇特底公案恰欲舉似大眾及至下得法堂和話頭都來忘却還有人記得麼試舉看眾無對師云江南極有江北絕無拈起拄杖云長千聖不能量短蟭螟眼裏著不滿卓一下云夜來江上雨分作萬家流不思議解脫力妙用恒沙也無極拈拄杖卓一下云吞却法身了也你等諸人向什麼處回避若也道得萬仞崖前有活身之路若道不得大地死人如麻似粟卓一下壽寧長老進發上堂云曹溪一宿也大無端黃檗三年遞相鈍置蒲團禪板屈抑當人索火來燒猶較些子保寧今日別無奇特相送壽寧長老拈拄杖云祇有一條黑漆主丈更不囊藏被蓋向大眾前兩手分付去也拋下拄杖下座業鏡當臺賊身已露既是贓物現在為甚不肯招伏會麼朝打三千幕打八百拶破面門覆蓋乾坤縱橫十字今古獨存以兩手托禪牀云會麼阿彌陀佛阿彌陀佛恁麼來傾湫倒嶽恁麼去填溝塞壑總不恁麼錯錯身上之衣不容易披鉢中之飯莫等閒喫等閒喫往往難消水一滴容易披究竟出家何所為直心實行能綱紀一顆圓光無表裏莫學庸常輕薄徒平生獵涉誇脣觜恣貪瞋沒慚愧善惡昭然難軃避三塗六道正忙忙也好回頭自瞥地揭却天靈葢露出鬼眼睛直饒便恁麼猶尚未惺惺日月之光照四天下非日月之光照見什麼處竪兩手云佛手遮不得人心似等閒清凉世界未是安居萬仞峯前無措足處正是衲僧家放身命處試向放身命處露箇消息看顧視大眾云可惜許阿那律眼無纖翳舜若多身色相分憍梵鉢提知美味摩訶迦葉意難論諸上座逐日孜孜地上來下去叩頭磕腦當為何事老僧亦逐日孜孜地為諸上座費盡精神發盡口業天堂未就地獄先成還知麼若也知得向鑊湯爐炭裏救取老僧若也不知老僧却向驢胎馬腹裡救諸上座去也拍禪牀一下保寧有箇無價擔子雖無毫釐斤兩須是有力者方能荷負且道誰是有力者顧眾云不可更待䥴名鑿字去也佛殿吻眼睛被人盜去上堂佛殿上吻失却金眼睛可憐這箇賊錯認定盤星保寧有箇金剛眼睛在摩尼殿上一任偷取直饒偷得未是好手在有木無竹其功不獨有竹無木翻成不足竹木兩全是物相續匠者機關建成大屋棟宇巍峩房廊屈曲四海五湖一家眷屬十二時中周旋往復遂召大眾云若也曉得此理世世獲無窮福天台宴坐峯南嶽萬年松白雲影片片流水聲重重冬至云古人烹露地白牛與三家村裡看牛兒分歲保寧今日將箇什麼與諸上座分冬遂展開兩手云兩手擡不起滿盤滋味全大覺禪師至上堂同聲相應同氣相求定光招手智者點頭游雖如是未免笑破他人口頌古佛有六通聖諦第一義無量劫來曾未遇如何不動到其中莫言佛法無多子最苦瞿曇那一通燒得通紅打一鎚周遭無數火星飛十成好箇金剛鑽攤向門前賣與誰東山五祖演禪師語嗣白雲上堂天上無彌勒地下無彌勒十字街頭立被人喚作賊結夏僧問五天結制分付蠟人未審四面如何示眾師云足不履地師乃云結夏無可供養大眾作一家宴管顧諸人遂擡手云囉邏招囉邏搖囉邏送莫怪空疎伏惟珍重於三七日中思惟如是事釋迦老子半夜逾城直往雪山早是漏逗不少更思惟箇什麼諸院長老入山云臨濟入門便喝是甚盌鳴聲德山入門便棒拗曲作直雲門三句曹洞五位大開眼了作夢何故國清才子貴家富小兒嬌到興化云世事冗如麻空門路轉賒青松林下客幾箇得歸家共唱胡笳曲分開五葉花幸逢諸道友同上白牛車大眾車在這裏牛在甚處芳草渡頭尋不見夜來依舊宿蘆花下座甘露資老把住云舒州管界元來有箇草賊師云和尚也須隄防資擬議師便托門葉落歸根來時無口祖師恁麼道猶欠悟在僧問祖意教意是同是別師云人貧智短馬瘦毛長乃云祖師說不著佛眼看不見四面老婆心為君通一線春氣乍寒乍暖春雲或卷或舒引得韶陽老子放出針眼裏魚乃云錯適來思量得一則因緣而今早忘了却是拄杖記得乃拈起拄杖云拄杖子也忘了遂卓一下云同坑無異土咄有道始入山請上堂道可道非常道真可笑姮娥一夜綉鴛鴦解把金針呈巧妙將竝老黃梅兒孫一何拙如今箇箇口吒呀問著烏龜喚作鱉四面今日與君決烈怎生雪冤家冤家莫向背地裏吐舌住太平僧問如何是佛師云露胸跣足如何是法師云大赦不放如何是僧師云釣魚船上謝三郎乃云我本無心有所希求今此寶藏自然而至世間之寶能變窮為富此之一寶能轉凡成聖且道而今是凡是聖太平道總不是何故若匏連根苦甜瓜徹蔕甜達磨無端少林面壁二祖斷臂一生受屈黃檗樹頭討甚木密太平今日兩眼如漆李廣神箭是誰中的十方諸佛六代祖師天下善知識皆同這箇舌頭若識得這箇舌頭始解大脫空便道山河大地是佛草木叢林是佛若也未識得這箇舌頭只成小脫空自謾去明朝後日大有事在太平恁麼說話還有實頭處也無自云有如何是實頭處歸堂喫茶去問牛頭未見四祖時為甚百鳥含花献師云富與貴是人之所欲見後為什麼不含花師云貧與賤是人之所惡乃云西天二十八祖也恁麼道唐土六祖也恁麼道天下老和尚也恁麼道獨有太平不恁麼道何故寡不敵眾且道畢竟如何妙舞更須知變拍三臺須是大家催山僧今日將山河大地盡作黃金凡該有情無情總令成佛去然後太平不入這保社何故爭之不足讓之有餘太平不會禪一向外邊走臘月三十日贏得一張口且道那箇是太平口自云兩片皮也不識太平淈𣸩漢事事盡經徧如是三十年也有人讚歎且道讚歎道什麼好箇淈𣸩漢山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉施為青黃赤白一一見了子細看時元來青布慢裏有人山僧忍俊不禁乃問長史高姓他道老和尚看便休問什麼姓山僧被他一句直得無言可對無理可伸還有人為山僧道得出麼昨日那裏落節今日這裏拔本謝典座變生為熟雖然易眾口調和轉見難醎淡若知真箇味自然飢飽不相干天地為洪爐烹煉強與弱大道本無元卷舒由橐籥凡聖路坦然各自看謀略一月普現一切水一切水月一月攝誠哉是言也可謂塑不成畫不就昨夜三更白如晝住海會結座日暖風和花正開七重山鎖白雲堆飜思城市繁華處又出松關步一回白雲不會說禪三門開向兩邊有時動著關捩兩片東扇西扇幸然無箇事行脚要參禪却被禪相惱不透祖師關如何是祖師關把火入牛欄望天祈好雪祥瑞實難加鵲噪青松上變成白老鵶紫騮牽出薄寒馬金鐙粧成銀鏤花苦苦苦箇什麼忽然變成雨雲門一日普請搬柴次乃拋下一片柴云一大藏教只說這箇師云大小雲門錯下註脚老僧當時若見向伊道普請處不得狼籍若撿點得出免你普請僧問如何是先照後用師云王言如絲如何是先用後照師云其出如綸如何是照用同時師云舉起軒轅鑑尤頓失威如何是照用不同時師云金將火試乃舉僧問首山如何是佛山云新婦騎驢阿家牽大家莫問新婦阿家免煩路上波吒遇飯即飯遇茶即茶同門出入宿世冤家僧問如何是臨濟下事師云五逆聞雷如何是雲門下事師云紅旗閃爍如何是曹洞下事師云馳書不到家如何是溈仰下事師云斷橫古路僧禮拜師云你何不問法眼下事僧云留與和尚師云巡人犯夜乃云會即事同一家不會萬別千差一半喫泥喫土一半食麥食麻或即降龍伏虎或即摝蜆撈蝦禾山唯解打鼓秘魔一向擎杈這箇一場戲笑皆因微笑拈花白雲隨隊骨董順風撒土撒沙若無這箇肚膓如何衣錦還家且道還家一句作麼生道今日榮華人不識十年前是一書生出隊半箇月眼不見鼻孔忘却祖師禪拾得箇骨董且道向什麼處著一分奉釋迦牟尼佛一分奉多寶佛塔但知喫菓子莫管樹曲六不識曲六樹爭解喫菓子不過祖師關爭會敵生死如何是祖師關拈却大案山卓拄杖一下乃舉起云拄杖子敢問你還說得如來禪麼自云說不得還說得祖師禪麼自云說不得既說不得白雲今日出自己意去也出自己意小兒子戲人天眾前討甚巴鼻恁麼恁麼蝦跳不出斗不恁麼不恁麼弄巧成拙軟似鐵硬如泥金剛眼睛十二兩衲僧手裏秤頭低有價數勿商量無鼻孔底將什麼聞香冬至達磨西來事久多變後代兒孫門風無限攪撓身心一團麻線白雲今日都通截斷大眾一百單五近清明上元定是正月半邑中升座白雲相送出山來滿眼紅塵撥不開莫謂塵中無好事一塵一剎一樓臺說佛說法拈槌豎拂白雲萬里德山入門便棒臨濟入門便喝白雲萬里然後恁麼也不得不恁麼也不得恁麼不恁麼總不得也則白雲萬里忽有箇出來道長老你恁麼也則白雲萬里這箇說話喚作矮子看戲隨人上下三十年後一場好笑具且道笑箇什麼笑白雲萬里白雲門前路往復行大步中間有一片方磚諸人為什麼却踏不著昔有秀才造無鬼論論成才放筆有鬼現身斫手謂秀才云你爭柰我何白雲當時若見便以手作鵓鳩觜向伊道谷谷呱祖師遺下一隻履千古萬古播人耳空自肩擔跣足行何曾踏著自家底新鞔法鼓云多載頑皮擊不響新皮纔動震天雷無滯莫言隨勢去有聲誰謂不平來何也雙眼聽不聞雙耳覰不見一條平坦路誰謂沒方便六祖能大師是箇大癡漢後代兒孫多展轉相惑亂子細好思量白雲不著便問百尺竿頭如何進步師云快走始得乃舉雲門道聞聲悟道見色明心觀世音菩薩將錢買胡餅放下手元來却是饅頭雲門好則甚好要且只說得老婆禪若是白雲即不然作麼生是聞聲悟道見色明心遂作打杖鼓勢云棚八囉扎二月仲春漸暖吹歌頷打拍板烏鷄走入鵝群鴨兒凍得觜遍水上或浮或沈何時解作瑚璉子細好好思量天地去此不遠復云頻婆娑羅王夫為禪客如出塞將軍你將得雲門半箇胡餅來我便與半箇須彌山若不如是焉敢稱禪客四五百石麥二三千石稻好箇休粮藥耆婆不得妙頻頻喚汝不歸家貪向門前弄土沙每到年年三月裏滿城開盡牡丹花妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身大眾若作禪會則謗經若作經會則謗禪若作一團則儱侗有人跳得日銷萬兩黃金若跳不出有處著你在但知月圓月缺誰知月缺月圓忙忙乘船過水不知過水乘船百年三萬六千日等閒老却朱顏各自照鏡看是什麼面孔南泉云文殊普賢昨夜三更起佛見法見各與二十棒貶向二鐵圍山白雲則具大慈悲遂拍手云曼殊室利普賢大士不審不審今後更敢也無自云一度被蛇傷怕見斷井索難難義何般易易沒巴鼻好好催人老默默從此得過這四重關了泗洲人見大聖參是法不可示言辭相寂滅這兩句猶較些子忽遇羚羊掛角時如何直上指云天天師一日持錫遶方丈行問僧還有屬牛人問命麼僧無對遂云孫臏今日開鋪茲無一人垂顧可惜三尺龍鬚喚作尋常破布你等諸人見老和尚鼓動脣吻豎起拂子便作勝解及乎山禽聚噪牛動尾巴却將作等閒殊不知簷聲不斷前旬雨電影還連後夜雷仲冬嚴寒伏惟首座大眾尊體起居萬福兩彩一賽下座世有一物亦不屬凡亦不屬聖亦不屬邪亦不屬正萬事臨時自然號令抵死要知換却性命舉肅宗問忠國師百年後所須何物國師云與老僧造箇無縫塔帝云請師塔樣國師良久云會麼帝云不會國師云吾有付法弟子耽源却諳此事請詔問之師云前面是真珠馬瑙後面是馬瑙真珠東邊是親音勢至西邊是普賢文殊中間有一首幡被風吹著道胡盧胡盧趙州道箇柏樹子盧陵隨後雪白米中間有箇白蓮峯一口吸盡西江水喜美囉邏哩囉邏哩我自我你自你村裏有白額虫吒腮𩮻頷九條尾良久云咦好怕人如何是禪閻浮樹在海南邊近則不離方寸遠則十萬八千畢竟如何禪禪賤賣擔板漢貼秤麻三斤百千年滯貨何處著渾身釋迦已滅彌勒未生森羅萬象推向一邊且作麼生是你諸人常住法身乃云有功無功莫使肚空住黃梅晚參一則三三則七牧羊海畔女貞花拒馬河前望夫石石擊赤赤土畫簸箕從教眼𥉌𭿇敘謝了復云淮甸三十載今作老黃梅好是明明說從教鴨聽雷入院上塔燒香罷以手指云當時與麼全身去今日重來記得無復云以何為驗以此為驗遂禮拜文殊張帆普賢把柁世至觀音共相唱和贏得雙泉鬧中打坐打坐即不無且道下水船一曲作麼生唱囉邏哩囉邏哩俗氣不除先入白雲門次過白雲限吞底栗棘蓬喫底籼米飯君子如到來好好看方便謝監收人之性命事第一須是欲得成此先須防於若是真人每日起來拄却臨濟棒吹雲門曲應趙州拍擔仰山鍬駈溈山牛耕白雲田七八年來漸成家活更告諸公每人出一隻手共相扶助唱村田樂麤茶淡飯且恁麼過時何也但願今年蠶麥熟羅睺羅兒與一文孟夏漸熱伏惟首座大眾尊候萬福却似夾竹桃花錦上鋪花徧地花莫眼花每年事例不用張查下座巡寮喫茶亦無人亦無佛大千沙界海中漚一切聖賢如電拂大眾者裏若不具金剛眼睛便見髑髏遍野如何即是劍閣路雖嶮夜行人更多時人住處我不住時人行處我不行畢竟作麼生牛角長三寸兔角長八尺四溟東海流般若波羅蜜無法可說是名說法夜月嚴凝霜天凜冽池裏烏龜凍得成鱉更說兩句舌頭成鐵淺聞深悟深聞不悟爭柰何爭柰何献佛不在香多悟了同未悟歸家尋舊路一字是一字一句是一句自小不脫空兩歲學移步湛水生蓮花一年生一度太平專使至萬里無雲點太清祖天日月自分明太平不許將軍見却許將軍建太平擔水河頭賣諸人盡笑怪滯貨沒人情一似欠他債昨夜三更半石人闘禮拜這箇說話莫道你理會不得我也理會不得請供頭修造云白雲今日權將大宋世界作一面碁盤先將東嶽太山南嶽衡山西嶽華山北嶽恒山中獄嵩山定却五方次將五臺峨嵋支提羅浮以為相助左畔則斜飛鴈陣右邊則虎口雙關遂舉手云且道這一著落在什麼處若知落處便為敵手若也未知白雲試通箇消息十九條平路爭功勢未休莫教一著錯敗子卒難收問承師有言山前一片間田地只如威音王已前甚人為主師云問取寫契書人僧云和尚因甚倩人來答師云只為你教別人問僧云與和尚平出去也師云大遠在乃云五目莫睹其容二聽絕聞其響有功者罰無功者賞拈須彌山秤來二兩忽有箇道一方知識為什麼大秤秤人物事自云官不容針私通車馬謝街坊云街坊昨日將一把沙到方丈前一見老僧劈面便撒賴遇老僧先見衫袖一遮並不妨事今朝舉似大眾不敢隱藏何故賞伊膽大下得這箇脚手忽有人問白雲如何只恁休去不見道老不以筋骨為能然雖如是賓主歷然若要天下橫行見老和尚打鼓升堂七十三八十四將拄杖驀口便𡎺然雖如是拈却門前上馬臺剪斷五色索方始得安樂今日端午節白雲有一道神符也有些子靈驗不敢隱藏舉似諸人一要今上皇帝太皇大后聖躳萬歲二要合朝卿相文武百官州縣宷僚常居祿位三要萬民樂業雨順風調有箇符使却來報白雲道諸處盡去遍只為神通小不柰一件事何遂問他是甚事便云禪和子鼻孔遼天白雲向伊道莫道你我尚不柰何雖然如是澤廣藏山理能伏豹畢竟如何一抽三二添四黃牛角向天八脚垂過鼻急急下座平生百了千當底正好喫棒且道過在什麼處打底百了千當釋迦彌勒猶是他奴且道他是阿誰便下座小參僧問如何是佛師云肥從口入乃舉德山云今夜不答話問話者三十棒眾中舉者甚多會者不少且道向甚處見德山有不顧性命底漢試出來道看若無山僧為大眾與德山相見去也待德山道今夜不答話問話者三十棒但向伊道某話也不問棒也不喫你道契他德山老人麼到這裏須是箇漢始得況某十有餘年海上參尋見數人尊宿自謂了當及到浮山圓鑑會下直是開口不得後到白雲門下咬破一箇鐵餕餡直得百味具足且道餡子一句作麼生道乃云花發鷄冠媚早秋誰人能染紫絲頭有時風動頻相倚似向堦前闘不休問答問如何是佛云獨木橋子如何趣向云緊峭草鞋問如何是和尚家風云鐵旗鐵鼓或遇客來如何祇待云龍肝鳳髓且待別時問如何是白雲為人親切處云愛捩轉人鼻孔如何是白雲一滴水云打碓打磨飲者如何云教你無著面處如何是道云治平郡如何是道中人云赤心為主道與道中人相去多少云名傳天下如何是佛云口是禍門一代時教是箇切脚未審切什麼字云鉢囉娘頌古不與萬法為侶日面佛月面佛一口吸盡西江水洛陽牡丹新吐蘂簸土揚塵勿處尋擡頭撞著自家底𩫾鬟女子畫娥眉鸞鏡臺前眼似癡自說玉顏難比並却來架上著羅衣狗子佛性無趙州露刃劍寒霜光𦦨𦦨更擬問如何分身作兩段悼四祖演和尚此病彼圓寂吾門何得失生死若空花去來如鳥跡東涌忽西沒影掛寒堂壁三十三天撲帝鐘普念般若波羅蜜悼浮山圓鑑和尚浮渡巖前青瘦柏叢林聳出標風格夜來寒影落西衢誰唱胡笳十八拍悼投子青華嚴寂住峯頭雲洒落曹溪水高張浮渡帆直入大洋裏運載既緣終昨夜狂風起丫角女子帶瓊花八十翁翁穿綉履贊白雲先師真贊四祖演和尚一月在天影含眾水師真之真非月非水青黃碧綠亂塗糊看來半瞋半偷喜桂花包褁老黃梅不向陰陽地上開蜂蝶豈知香遠近難尋蹤跡去還來自贊三以相取相都成幻妄以真求真轉見不親見成公案無事不辨百年三萬六千日飜覆元來是這漢我真我讚唯己自知面面相覰有甚了期眼睛耳聾行步躘蹱人前強笑叉手當胸辭眾上堂舉趙州和尚有末後句你作麼生會試出來道看若會得去不妨自在快活如或未然者好事作麼生說良久云說即說了也只是諸人不知要會麼富嫌千口少貧恨一身多珍重時崇寧三年歲次甲申六月二十五日辭眾至晚淨髮澡浴二十六日粥前吉祥而逝山門留七日茶毗四眾收舍利不可勝數建塔於東山之南南堂興和尚語嗣五祖小參云山僧來日領眾下山為國出戰煩首座作先鋒維那充殿後僧童列于左右助老僧作都統領請諸人各被忍辱鎧執智慧劍用破慳貪家家打開無盡藏運出髻中珠彼此取捨自如略無悔悋然後使萬民樂業四海晏清共歌堯舜之風高唱太平之曲便可斂陣收旗各務休息當槌得勝鼓烹露地白牛賞設三軍以伸慶賀老僧作師子吼大眾作象王行敢問大眾且道定光佛堪作箇什麼良久云卷簾敷座處四眾盡瞻依普請修路上堂木菴老教頭善請搬石頭與人正路頭令人識路頭合寺菩薩子人人盡點頭只有一个不點頭且道是那一个不點頭良久云待了日與你說偈頌馬祖即心即佛答望川山順和尚即心即佛鐵牛無骨戲海獰龍摩天俊鶻西江吸盡未為奇火裏生蓮香𩖼𩖼紅日三竿猶作夢清風一枕許誰同人來問我修何行報道年來雙耳聾拄杖歌奇哉拄杖非凡木有山水兮有節目不短不長兮撑天拄地不細不麤兮穿雲透谷或把行烏龍騰躍太威獰或把住金毛師子眉揚竪或橫擔兩輪日月互交參或橫按七星迸出光燦爛或靠著參羅萬象仍吞却探水卓破金鰲頭穿雲敲折老虎脚佛眼遠禪師語嗣五祖上堂世尊拈花迦葉微笑親切親切省要省要眼目定動料料掉掉為報先生莫打之遶何也文不加點下座舉僧問趙州萬法歸一一歸何處州云我在青州作一領布衫重七斤大眾至音絕韻妙曲非聲通身不掛寸絲赤體全無忌憚諸人切莫拈䭔䑛指直須截斷舌頭放下身心自然快活眼若不睡諸夢自除心若不異復名何物快活快活歸堂喫茶臺山路上過客全稀破竈堂前感恩無地雪埋庭柏氷鎻偃溪雖在南方火爐頭不入他家虀甕裏看看臘月三十日便是孟春猶寒你等諸人各須努力向前切忌自生退屈行者落髮云露柱多年出家燈籠久已落髮佛殿堅持禁戒三門近得休歇大事本來平等無著清凉滿月度盡草木叢林一似陽和齊發悟時此事元來易迷後斯門實大難處處綠楊堪繫馬家家門口透長安舉昔有一秀才見長沙和尚看千佛名經問曰許多佛祇聞其名未審居何國土長沙曰黃鶴樓崔顥題後秀才還曾題否對曰不曾長沙曰無事題一篇好秀才罔措大眾秀才問佛居何國土長沙為什麼却恁麼道秀才尋常嘲風詠月為什麼長沙面前一辭不措若是黃鶴樓有什麼難題處聽取山僧題破遂云容顏甚奇妙光明照十方我適曾供養今復還親近下座擬思量何劫悟不思量終莾鹵欲思不思踏破時萬里無雲常顯露常顯露妙用恒沙非旦暮諸禪伯正好休征罷戰永息干戈傍水依山成就大事況是人生易老壽命幾何或若生死現前畢竟將何支準不見古德道若不安禪靜慮到這裏總須茫然久立龍門別無奇妙剛謂單傳心要豈惟淺水無魚撥剔全無孔竅二時展鉢開單逐日屙屎送尿萬事與人一般子細看來好笑既是萬事與人一般為什麼稱善知識良久曰我也理會不出舉誌公曰我見世間之人各執一般異見祇知傍𨫼求餅不解返本觀麵餅則從來是麵造作由人百變大眾會麼狸奴白牯念摩訶猫兒狗子長相見諸禪客薦不薦若言自性本圓明大似捫空追閃電知得麼含元殿上更覓長安慈氏宮中願生內院龍門三月半大鼓聲聲喚喚得一時來特地生迷亂大眾既是喚得一時來為什麼特地生迷亂此段好因緣諸人怎生斷不解斷轉迷亂若解斷較一半良久曰因緣一段無人斷留與諸方共斷看十方世界龍門寺大地山河是學徒隨順眾緣成解脫筭來全不費工夫飄飄颻颻楊柳花紅紅赤赤遠天霞屈屈曲曲龍門路僻僻靜靜野僧家尚不心頭懷勝解誰能劫外算河沙休粮方子齋兼粥任運還鄉苦澁茶好大哥喫茶去行者剃髮云山僧因而度得小師一人遂拈起拄杖示眾曰見麼法名崇木俗姓葛良久又云爾既投吾出家今為汝受三歸五戒乃曰崇木歸依佛歸依法歸依僧已為汝作三歸今為汝飜十邪受五戒汝當聽受所謂身口意也身有三過謂殺盜婬意有三過謂貪恚癡口有四過妄言綺語兩舌惡口作此十者名為十惡無此十者名為十善汝今三業門中稟受戒法所謂不殺不盜不妄不婬不飲酒是五戒相汝依吾教信受奉行復卓拄杖一下曰崇木聞吾教訓乃告吾曰和尚所說但崇木從來無身口意亦不知何以為持犯縱聞三歸我不知何者名佛法僧聞五戒相從何受持雖煩和尚如此崇木並無領覧處師放下拄杖曰此真吾弟子也是真歸依也真受得戒也所以昔人云和尚何不畜一沙彌老宿曰有無眼耳者為吾尋一人來正是此意也好得力小師大眾會得否拈起拄杖曰扶過斷橋水伴歸明月村久立總別同異兼成壞祇是山僧與眾人高廣須彌入芥子無邊剎海在微塵晝復夜秋復春境寂心融事事真七寶大車既如此去來語默莫因循禪和子聞說了呵呵大笑道我會也我會也師乃呵呵笑曰你會也且道西天那蘭陀寺後孤峯頂上如今有什麼人在彼中修行見麼見麼下座為四面璘和尚掛真虗空無相不拒諸相發揮寶鏡無形豈礙羣形頓現相與形而常偽空與鏡而常真故即偽即真不生不滅大眾或若虗空頓消殞寶鏡不臨臺光鏡俱亡復是何物六十三年即且置且道即今四面老子在什麼處遂提起真云生涯何所有今古與人傳達磨大師入中國至今幾千年得其道者甚眾領其旨者實多大似一人傳虗萬人傳實大眾流言止於智者諸人三十年後莫道見龍門來舉僧問德山如何是宗門奇特事山曰我宗無語句實無一法與人師曰漏逗了也僧問雪峯和尚見德山得箇什麼便歸來峯曰我當時空手去空手回師曰漏逗了也睦州喚僧僧回頭州云擔板漢師曰漏逗了也一漏逗二漏逗三漏逗用意攙前先在後莫於祖佛結冤親好看衣珠常離垢家中人鬬頭走淮南笑殺龍門叟有人若會笑因由眼似銅鈴膽如斗呵呵呵歸堂去南閻浮提人就中多鬧亂無想四禪天根性最遲緩遲速不同倫染淨難回換兩箇五百文元來是一貫貫貫啞子拍手高聲喚聾人聽得佯不管天明日出是夜半智者大師譚止觀大眾此理如何良久云看黃龍山死心和尚遺書至上堂死心心已死心死死由生拗折黃龍角翻身臥地行者老子從來翻著襴衫倒𢹂席帽口頭麤慥肚裏柔和點檢叢林呵叱學者雖傳晦堂道愛用雲門禪以罵風罵雨為訓徒以種菜種蔬為作務興災降禍少喜多瞋愚人見即攢眉智者點頭相許要去便去果然作家騰身元是莫徭人睡中失却死心老嗚呼哀哉法門不幸虗名虗相谷音鑑像棄而不修豈明幻妄少不努力老矣惆悵靜以思之隨緣稱量古德云譬如百歲老兒作歌舞豈是小兒戲大眾會他恁麼道麼百歲老兒作歌舞側首低眉聽節鼓心中聽拍雖了然手脚來遲轉辛苦乃起身作舞云會麼老作少難下座一葉落天下春無路尋思笑殺人下是天上是地此言不入時流意南作北東作西動而止喜而悲蛇頭蝎尾一試之猛虎口裏活兒是何言歸堂去眉毛眼睫最相親鼻孔脣皮作近隣至近因何不相見都緣一體是全身慮而解思而知孤燈難並太陽輝不是心不是佛為君埽蕩精靈窟摩天子入雲飛千里萬里只一突阿喇喇下座不起疎慵不進修實無言說實無求奪飢人口中之食駈耕夫手裏之牛真快活百無憂自是不歸歸便得五湖風浪拍天流陳與明還佛頂心經願云唵齒臨唵齒臨唵部臨唵部臨大眾此是甚麼言語義理如何還有人會得麼若道是言語又不成言語若道有道理又不成道理可謂言詮不到分別不及先聖呼為密語又曰真言一切言音從是而生一切語教從是而出山僧適來看經中得七字陀羅尼能滅千災成就萬德今對諸人舉此七字陀羅尼一徧諸人諦聽遂默然屈第一指至第七指曰諸人聞得麼恐諸人不聞更舉一徧又默然屈一指至七指曰聞得麼大眾唯佛與佛乃能知之自餘羣生悉皆罔措有方便門名曰重說偈言今更再三分明說此七字呪曰佛頂心經齋願了大眾曉得其中旨趣麼待山僧奉為解釋一字字要知落處若論佛祇是當人更無物若論頂晝夜舒光照前境若論心看時無相用時深若論經解語能言不是聲若論齋所為所作盡和諧若論願猶如身在龍門院若論了無慮無疑心皎皎心皎皎增添福壽災殃少論量功德廣難思須彌未大滄溟小山僧適來說者是真言世人祇知有言不知有真若不知真所言皆妄何者名為真言能出萬宗故曰真言亦名三昧王亦名萬字頂亦名微妙章句亦名秘密大總持至心受持大有靈驗所謂山僧七字呪也乃屈指曰一二三四五六七諷誦受持皆秘密如人親入寶山中一切珍奇從此出久立海門山長安道茫茫煙水連芳草樓頭客馬上即一聽落梅悲故鄉春風過眼花飛盡蝴蝶翩翩過短墻君更聽是何章會不得參堂去雲中石塔摩星斗定明禪師大張口是你之言若解參不必腰包天下走遂卓拄杖一下曰鳥對初陽自在啼犬逢生漢連聲吼又卓拄杖一下云歸堂知府曾公舍人入山祈雨云舉劉禹端公問雲居雨從何來對云從端公問處來師云雨從何來不須尋討徧滿虗空拔濟枯槁定明妙應靈通知府舍人台造真箇是為雨為霖莫不為忻為好且問諸人是定明雨舍人雨百姓雨定當得麼良久卓拄杖一下云三下座退褒禪上堂一去一來松上鶴半開半合嶺頭雲搘笻獨立千峯外唯把南山祝聖君知府錢公奏請再住褒禪云大眾君命重宣降薜蘿不容靜處薩婆訶襴衫席帽寒酸甚又向人前唱哩囉哩囉拍一拍哩囉又拍一拍云去年梅今歲柳顏色馨香依舊人漸老水長流無心道合頭下座未達境唯心起種種分別達境唯心已分別即不生分別既不生便捨外塵相乃拈拄杖示眾云不可不喚作拄杖子也且作麼生說捨底道理有人於此云喚什麼作拄杖子便違他古佛道不壞假名而談實相又道更有什麼拄杖子也則世間萬法不成安立又道依舊喚作拄杖子則一切凡夫莫不幸甚也大眾到者裏如何即是須信道雲中石塔不是人間檻外雲山非由心變風摩雨埽日照煙蒙妙用縱橫隱顯一際自可以幽栖鳥道開豁胸懷妙契真規十方洞照直得如此更須知有衲僧孔竅始得如何是衲僧孔竅咄卓拄杖下座圓悟勤禪師語嗣五祖初受六祖請升座乃云蝸牛角上三千界雲月溪山共一家既爾業緣無避處不如隨分納些些一不做二不休還有共相建立底麼上堂云獨掌不浪鳴獨樹不成林建法幢立宗旨須是互為賓主安貼家所以道我若坐時你須立我若立時你須坐我若孤峯獨宿你須偃息干戈我若天上人間你須三頭六臂然後可以光揚佛日且道浩浩之中如何辨主是處是慈氏無門無善財平旦清晨五月一吹起少林無孔笛十方沙界坦然平大地山河印印出二祖曾不往西天達磨曾不到梁國大家共賀太平歌摩訶般若波羅蜜舉慧超問法眼如何是佛眼云汝是慧超師云還委悉麼病遇良醫飢逢王饍醬裏得鹽雪中送炭舉悟和尚立僧只這是大似撒沙向眼中只這不是還如注水向耳裏直下無事平地陷人別有機關墮坑落塹且畢竟作麼生祇園屈曲流泉急鷲嶺巍峩雲出遲復云雲居開大爐韛不止烹佛烹祖但有一切持來烈焰堆中辨取是則當處平和不是切宜退步煅出金剛眼睛直得乾坤獨露雖然到者田地須知向上一路如何是向上一路還委悉麼放將三聖瞎驢踢殺大雄猛虎五月五日天中節萬崇千妖俱殄滅眼裏拈却須彌山耳裏拔出釘根楔鍾馗小妹舞三臺八臂那吒嚼生鐵敕攝截急急如律令萬仞崖頭撒手要須其人千鈞之弩發機豈為鼷鼠雲門睦州當面蹉過德山臨濟誑謼閻閭自餘立境立機作窠作窟故是滅胡種族且獨脫一句作麼生道萬緣遷變渾閒事五月山房冷似氷曹溪路上天高地厚少室峯前土曠人稀孤然獨坐冷蕭蕭大野橫身風颯颯眼見則瞎耳聽則聾口說則啞雖然不出一毫端含吐十虗無向背既然有恁麼神通且道作用為什麼乾燥燥地東海鯉魚打一棒忙忙帀地便為霖釋迦慳彌勒富八字打開無盡庫拄杖子化為龍赫日光中吐雲霧遍界霶𩃰注甘雨卓拄杖云參七月旦云一二三四五六七眼裏瞳人吹篳觱七六五四三二一石人木人眼淚出七通八達舉著便知尚在見聞隔靴抓痒陝府鐵牛吞嘉州大像則且置佛殿堦前狗尿天五臺山上雲蒸飯一句作麼生道風來樹影動葉落便知秋舉杲首座立僧鶻兒未出窠已有摩霄志虎子未絕乳已有食牛氣況復羽翼成況復牙爪備奮迅即驚羣八面清風起一條脊梁硬似鐵一條白棒掀天地相與建法幢展衲僧巴鼻天上月圓萬象歷然地下月半觸途成現見不見包褁十虗尚餘半聞不聞透脫圓通徹本根玉漏銅壺催不得乾坤大地一枝燈一處圓融一切處無邊剎海更稜層有句無句超宗越格如藤倚樹銀山鐵壁及至樹倒藤枯多少人失却鼻孔直饒收拾得來已是千里萬里只如未有與麼消息時還透得麼風暖鳥聲碎日高花影重粥足飯足飽柴飽水廬陵米價高山前麥熟未盡乾坤剎海都盧是箇自己撒放眉毛眼睫間直得放光動地不是如來禪亦非第一義更說什麼衲僧巴鼻爭如撒手懸崖去却藥忌且唱箇囉囉哩參釋迦老子道若有一人發真歸源十方虗空悉皆消殞五祖云一人發真歸源十方虗空築著磕著山僧即不然一人發真歸源十方虗空錦上鋪花玄機獨唱截斷眾流擺撥不拘更無回互直饒釋迦彌勒不敢當頭著眼倚天長劍凜凜神威杲日當空澄澄光彩無物不為妙用無法不是真乘控佛祖大機廓人天正眼當陽顯示只貴知歸纔涉思量白雲萬里是故先聖道我此法印為欲利益世間故說在所遊方勿妄宣傳今日人天普集對眾分明剖露舉拂子示眾云見麼一處真千處百處一時真一句透千句百句一時透拈起也乾坤岌業放下也海晏河清不拈不放又作麼生萬仞峯頭高著眼大千世界一浮漚眨上眉毛蹉過大似開眼尿牀現成公案放行正是黠兒落節恁麼不恁麼總得曳尾靈龜不是心不是佛不是物虗空釘橛離得許多閒門破戶猶是死水藏龍傾湫倒嶽一句作麼生道巨靈擡手無多子裂破華山千萬重一即一切實際理地一切即一本來無物拈起也吒吒沙沙收下也綿綿密密三界長時獨露十方無處容身孤峯頂上倒行十字街頭橫臥目視雲霄則且置魚行酒肆作麼生放憨作麼覿面見得在聖猶虧才涉關津白雲萬里諦實處不思議綿密處同真際把斷世界無絲毫透漏脫洒一句作麼生道萬仞峯頭獨足立孤迥峭巍巍始終活鱍鱍喚作禪道祖佛眼中著屑不喚作禪道祖佛掘地覓天還有得入者麼從他千古萬古黑漫漫填溝塞壑無人會舉無遣照十方剎海目前觀正體堂堂大千同一真如境各守本位去山是山水是水互換投機去星辰易位佛祖潛蹤兩處絕聱訛二邊純莫立無可不可悉得安居隨時應緣凝然湛寂且道長養聖胎一句作麼生道不起纖毫修學心無相光中常自在國無定亂之劍四海晏清門無白澤之圖全家吉慶若道有承恩力處正是土上加泥更或削迹吞聲亦乃持南作北到這裏縱橫十字未免誵訛據位投機猶較些子且作麼生是據位底句寒山逢拾得撫掌笑咍咍通身是眼見不及遍身是耳聞不徹通身是口說不著通身是心鑑不出直饒盡大地明得無絲毫透漏猶在半途據令全提且道如何展演域中日月縱橫掛一亘晴空萬古春當陽有路祖佛共知覿面相呈見聞不隔萬象不能藏覆千聖無以等階活鱍鱍絕承當淨躶躶無回互直饒棒如雨點喝似雷奔猶未動著向上關棙在如何是向上關棙瞎却諸聖眼啞却山僧口日午打三更面南看北斗聞五祖訃音云大庾嶺頭笑却成哭崇寧門下哭却成笑何故喫泉水貴地脉且要正眼流通宗風不墜所謂無常生死法與我不相干若能如是見不用哭蒼天既不用哭蒼天如何通信請大眾拈香兩彩一賽點即不到一大藏教錦上鋪花到即不點祖師西來金聲玉振且道祖意教意是同是別碧潭雲外不相關三轉法輪於大千其輪本來常清淨一切諸佛皆恁麼轉若向下去三乘五性頓漸偏圓若向上去不唯覓下口處不得臨濟德山目瞪口呿且道不落上下又作麼生誰是出頭人入田不揀三千里外黑漫漫牛頭沒馬頭回百億萬劫沒交涉拈一放一節外生枝舉古舉今無風起浪山僧今日一時撥斷且道還有為人處也無千峯勢到嶽邊止萬派聲歸海上消終日相逢無半面剛然千里有知音不須格外論奇特只此全機耀古今傾蓋如舊白頭如新兩鏡相照不隔纖塵徧界未甞示相毫端普現色身止猶谷神動若行雲相見又無事不來還憶君棒頭取證撒土撒沙喝下承當承虗接響向上向下轉見顢頇說妙談玄和泥合水這一片田地分付來多時也平地欺人盡大地撮來如粟米粒大掉棒打月佛祖凡聖拈向一邊總不依倚時如何紅霞穿碧落白日繞須彌田地穩密底擡脚不起探頭太過神通妙用底放脚不下收身未轉直饒十字縱橫朝打三千猶較些子且道誵訛在什麼處若知有去始見全提半提儻或未知布袋裏老鵶雖活如死殺人刀活人劍上古之風規亦是今時之樞要言句上作解會泥裏洗土塊不向言句上會方木逗圓孔未擬議已蹉過正擬議隔關山擊石火閃電光搆得搆不得未免喪身失命且道此理如何苦瓠連根苦甜瓜徹蒂甜雲騰致雨世界索然日照天臨乾坤廓爾文殊臺裏萬菩薩縱然顯現晴是晴雨是雨山是山水是水阿那箇是萬菩薩風暖鳥聲碎日高花影重眨上眉毛早蹉過塞却眼更形言語轉周遮合取口盡大地都為一塵佛眼覰不見一大藏都為一句海口莫能宣也未提得一半在忽然踏破化城時如何行到水窮處坐看雲起時受夾山請云目前無異草徧界絕遮攔域中日月斬新方外乾坤獨露直得龍天釋梵動地雨花妙德空生目瞪口呿行棒行喝拈放一邊雲月溪山放過一著一處透千處萬處該通一機明千機萬機圓轉碧巖不離此處此處不離碧巖攝大千於毫端融芥塵於剎海含花鳥過抱子猿歸湛寂凝然應真不借則且致只如無陰陽地上成得箇什麼邊事萬卉正資和氣力碧巖先發一枝香復舉馬大師問藥山子在此許多時本分事作麼生山云皮膚脫落盡唯有一真實祖云據汝所見可謂協於身體而布於四肢何不將三條篾束取肚皮隨處住山去山云某甲何人敢言住山祖云不然未有長行而不住未有長住而不行欲益無所益欲為無所為宜作舟航由是住山師云大眾古人得意之後不忘利生直入深山提持宗要山僧暗昧豈敢仰攀如是則更不用篾束肚皮却有箇折脚鐺子與方來共守寂寥若信得及不在忉忉或未諳詳聽取箇末後句高峰突兀倚天門青嶂虗閒可垛跟折脚鐺兒幸然在不妨携去隱深雲雖然如是也須大家出手始得且道畢竟如何妙舞應須誇變拍三臺須是大家催入院指方丈云箇是毗耶據坐處正同摩竭令行時夾山頂𩕳通一竅放出天彭老古錐既放伊出頭且道作得箇什麼伎倆衝浪錦鱗來入𮊁縵天網舉不饒伊入院云門外青山潑黛途中細雨如膏靈雲陌上桃花處處芳菲溢目香嚴巖畔翠竹時時撼影搖風直得一擊忘所知一見絕疑惑不免尚留觀聽未透聲色若能見無見之色聞無聞之聲撥轉路頭踏飜關捩句句越佛越祖塵塵耀古騰今處處離色離名箇箇斬釘截鐵心外無法法外無心用王庫刀發千鈞弩壁立萬仞坐斷十方可以入大解脫門傳正法眼藏向堯時舜日共樂昇平鼓腹謳歌歸家穩坐且到家一句作麼生道但願春風齊著力一時吹入我門來復云昔傅明有通天作略跨海神機使無舌人說無義語收洛浦接青峯辨石霜賞佛日嶮崔句峻陷虎機深電激星飛珠回玉轉建茲寶剎風範具存而山僧庶事不才何以繼其高躅既辭讓不及轉透無門不免借一條路向無言處演言無事處生事無佛處現佛無祖處示祖且貴始末相符頭正尾正敢問諸人還見夾山老子麼莫從百草巔頭薦覿面無私亘古今開堂拈疏云言言錦綉句句珠璣讚無上乘顯正法眼應須未舉已前薦取文彩之外承當苟或未然却請宣過升座云爍迦羅眼頂上放大光明摩醯首羅面前現奇特相一言含眾象一句逗群機何止猛處穴裏橫身萬仞峯前側足所以道顯大機明大用得失俱喪是非杳忘絕塵絕跡透色透聲重重無盡事事圓融又如華藏法界無邊香水海不可說浮幢王剎盡向這裏一時開現即此見成即此受用不以眼見不以耳聞不以口談不以心知還證得麼若也證得不必覺城東際初見文殊樓閣門開方參慈氏敢問大眾即今是什麼人境界舉拂子云盧舍本身全體現當機直下沒纖毫丁一卓二本分鉗鎚揑聚放開作家受用灰頭土面處壁立千仞壁立千仞處土面灰頭自然雙放雙收到處為祥為瑞還委悉麼掬水月在手弄花香滿衣太虗寥廓萬彚森然正眼洞明纖毫不立孤峻處祖師莫近坦夷處人天共知擊開大解脫門識取無面目漢且作麼生是無面目底漢芍藥花開菩薩臉椶櫚葉散夜叉頭一向不恁麼目視雲漢不徇人情一向恁麼灰頭土面帶水拖泥恁麼中不恁麼就下平高不恁麼中却恁麼從空放下或有箇恁麼不恁麼總不管亦無明亦無暗亦不放亦不收且道如何到頭霜夜月任運落前溪第一句下薦得祖佛乞命第二句下薦得人天膽落第三句下薦得虎口橫身不是循途守轍亦非革轍移途透得則六臂三頭未透亦人間天上且道三句外一句作麼生道生涯只在絲綸上明月扁舟泛五湖住道林開堂云大道無向背至理絕言詮迥出三乘高超十地萬法不到處特地光輝生佛未分時靈光獨耀不落聞見不隨色聲直下無一絲毫頭徧界全彰奇特事直饒棒頭取證喝下承當猶是曲為今時更或光境俱忘契心平等畢竟亦非的旨所以道向上一路千聖不傳學者勞形如猿捉影到者裡理絕事絕行絕照絕用絕權絕實絕直似倚天長劍凜凜神威鐵牛之機牢籠不住今日幸對明眼人前不敢被蓋囊藏八字打開去也拈拂子云還委悉麼耀古騰今活鱍鱍大千沙界露全身復云大眾昔日雪峯拈拄杖示眾云我者箇為中下機人時有僧出問云忽遇上上機人來時如何峯拈起拄杖雲門云我不似雪峯打者破葛藤乃拈拄杖云我者箇為中下機人時有僧忽問遇上上機人來時如何雲門便打師拈云大凡扶宗立教須是頂門具眼肘後有符看它二老宿縱橫殺活出沒卷舒甚生奇特子細檢點將來猶是節外生枝若據山僧見處乃拈拄杖云山僧只將者箇普為一切人無論上中下若要擎展一任擎展若要承當一任承當處處把斷要津箇箇壁立千仞且道忽遇其中人來時如何萬國醉心甞大鼎相逢𢹂手上高臺深深處無物堪比倫淺淺箇兩手相分付以一統萬穿眾穴於毫端補短截長握秤尺於掌內換却髑髏襄底且致把將靴鞋袋來一句作麼生道意氣不從天地得英雄豈藉四時推葉落知秋動絃別曲定光拈手智者點頭承當於文彩未彰前相照向是非得失外不涉廉纖如何通信萬景徒有象孤雲本無心玄玄玄太顢頇了了了沒邊表有生有滅特地乖張無去無來轉見漏逗不起寂滅定而現諸威儀不捨凡夫法而修諸勝行且道是放行是把住隨流認得性無喜亦無憂舉泰首座立僧云大人具大見大智得大用一飛六月息一諾千金重滔天必江海崔嵬必山岳先知覺未知先覺覺後覺打開無盡藏運出無價珍不依倚一物顯示本來人雪竇道義出豐年儉生不孝於衲僧門下是放行是把住若人道得老僧分半院與伊住師云雪竇病多諳藥性經效始傳人箇中或有知豐知儉知放行知把住底亦何妨分半院與伊但燒香發願只圖他早有箇院子住使嘗些滋味且免得窮廝煎餓廝炒突出難辨久參未免躇蹰信手拈來後學那知端的金風扇物玉露垂珠雁過長空蛩吟幽砌一一七穿八穴明明百帀千重何必棒喝交馳方論照用直下懸崖撒手便有恁麼人麼見義不為非勇士臨危不變始驚羣一切無收攝觸處圓成應用絕參差莫窮形相向千聖頂𩕳上有時露出佛祖莫窮底機關於一毫端中有時演出主賓互換底文彩經天緯地玉轉珠回即且置舉拂子作點勢云這一點落在什麼處海神知貴不知價留與人間光照夜報寧民受帖一向孤峯獨宿目視雲霄雖則不埋沒宗風無乃太高生一向十字路口土面灰頭利物應機雖則埋沒自己無乃太屈辱生況明悟之士頂門具眼肘後有符出沒卷舒得大自在動若浮雲止猶谷神或可以孤峯獨宿不礙土面灰頭或土面灰頭不礙孤峯獨宿恁麼中有不恁麼不恁麼中却有恁麼且應時應節一句作麼生道良久云瑞氣逢嘉運靈苗觸處春古佛有通津當陽亘古今懸崖能撒手一語直千金行棒行喝拽石搬土象骨輥毬禾山打鼓溈嶺牧牛玄沙見虎喫茶趙州面壁魯祖爭似老雲門臘月二十五李善友為僧云三界無安四生拘促欲脫愛網超步大方正應披忍辱鎧操智慧刀運上品心發殊勝志與蘊魔煩惱魔死魔共戰滅三毒破魔網始是大丈夫漢豈不見教中道三界無安猶如火宅眾苦充滿甚可怖畏又道是舍唯有一門而復狹小雖然狹小過去諸佛見在諸佛未來諸佛盡從這裏出去且道畢竟如何良久云何似生遼天鶻萬里雲只一突開爐云乾茆近火理合先燋滴水生氷事不相涉儻或透生死明寒暑融動靜一去來直得意遣情忘如癡似兀然後乃可飢則喫飯健則經行熱則乘凉寒則向火雖然如是趙州道我在南方三十年有箇無賓主話直至而今無人舉得且道無賓主話火爐頭如何舉得還委悉麼衲被蒙頭萬事休此時山僧都不會竹菴為佛眼設齋請云此方緣盡他方顯化此界身死他界出現大善知識以無邊虗空為正體以香水海不可說塵剎為化境以日月為明燭以形骸為逆旅以死生為晝夜其來也電光晃耀其去也石火星飛雖示世人有去有來極其本體不動不變所以南泉昔為馬大師作齋問大眾云今日為先師作齋且道先師來麼有底道合取鉢盂有底道真堂前更添一分食蓋明此箇不動不變至靈至妙各有奇特處要且只見錐頭利不見鑿頭方今日褒山珪長老為佛眼和尚設齋敢問大眾佛眼和尚還來麼有道得底試出來道看若無不消一箇普同供養何故簷前水滴滴相乘五葉花葉葉相付且道綿綿不斷一句作麼生道祖月凌空圓勝智何山松柏不青青放行再為僧謝恩罷云天中之天聖中之聖處域中之大超方外之尊執寶籙以臨民統金輪而御極廓清六合停毒萬方聿降綸言重興佛法遂使普天釋子復換僧儀歸木笏於裴相公納冠簪於傅大士重圓應真頂相再披屈眴田衣俄頃之間追還舊觀皇恩崇重倍萬丘山草木之微云何圖報輒傾肝膽少出毫芒大眾先佛有頂𩕳一機如擊石火似閃電光祖師有末後一句吞栗棘蓬跳金剛圈可以敵勝驚群可以轉凡成聖騰今耀古蓋色騎聲如今對眾拈來不犯從前路布還委悉麼洪鈞妙力先天地覆載恩歸大聖人無盡忌日請云握佛祖鉗鎚控作家爐鞴烹煅今古驗證衲僧唯用向上一機金剛王寶劍臨濟祖師傳黃檗馬祖此箇機要向大河之北獨振正宗一喝分賓主照用一時行坐斷天下人舌頭奔走四海雲水以至乃子乃孫傳此正見用此真機若非大解脫人安能當陽證驗昔無盡大居士生平以此事為務遍寰海宗師無不參咨到兜率山下逢箇老衲論末後句始得脫體全真言解道理一時脫却遂作頌云鼓寂鐘停托鉢回巖頭一拶語如雷果然只得三年活莫是遭他受記來戞玉鏗金虎驟龍驤不妨具大機得大用以此正印印天下善知識山僧昔在湖北相見與伊電卷星馳一言契證表裡一如居士功業書於竹帛遺德在於生民當此之日撒手那邊且道向什麼處去還委悉麼大千沙界諸佛土剎剎塵塵現勝身法語示張持滿朝奉古人以牧牛為喻誠哉所謂要久長人爾直截省要最是先忘我見使虗靜恬和任運騰騰於一切法皆無取捨向根根塵塵應時脫然自處孤運獨照照體獨立物我一如直下徹底無照可立如斬一綟絲一斬一切斬便自會作活計去也佛見法見尚不令起則塵勞業識自當氷消瓦解養得成實如癡如兀而峭措祖佛位中收攝不得那肯入驢胎馬腹裏也趙州道我見千百億箇盡是覓作佛漢子於中覓箇無心底難得又云我在南方三十年除粥飯二時是雜用心處香林四十年方成一片湧泉四十年尚自走作南泉十八解作家活信知從上古人無不皆如此密密履踐安可計得失長短取捨是非知解也同學之中唯龍門智海昔甞熟與究明但逢緣遇境莫不管帶何止此生而已窮未來際證無量聖身也未是他泊頭處但一味退步切莫作限量也報緣未謝於人間世上有如許參涉交互應須處之使綽綽然有餘裕始得人生各隨緣分不必厭喧求靜但令中虗外順雖在閙市沸湯中亦恬然安穩纔有纖毫見刺則打不過也示隆知藏五祖老師平生孤峻少許可乾嚗嚗地壁立只靠此一著常自云如倚一座須彌山豈可掠虗弄滑頭謾人把箇沒滋味鐵餕餡劈頭拈似學者令咬嚼須待渠桶底子脫喪却如許惡知惡見不掛絲毫透得淨盡始可下手煅煉方禁得拳踢然後示以金剛王寶劍度其果能踐履荷負淨然無一事山是山水是水更應轉向那邊千聖羅籠不住處便契乃祖已來所證傳持正法眼藏及至應用為物仍當驅耕夫牛奪飢人食證驗得十成無滲漏即是道流也示明首座達磨游梁歷魏落草尋人向少林冷坐九年深雪之中覓得一箇及至最後問得箇什麼却只禮三拜依位而立遂有得髓之言至今守株待兔之流競以無言禮拜依位而立遂為得髓深致殊不知劒去久矣爾方刻舟豈曾夢見祖師若是本色真正道流要須超情離見別有生涯終不向死水裏作活計方承紹得他家基業到箇裏直須知有向上事所謂善學柳下惠終不師其跡是故古人道一句合頭語萬劫繫驢橛誠哉破有法王出現世間隨眾生欲種種說法將知所說皆為方便只為破執破疑破解路破我見若無許多惡覺惡見佛亦不必出現而況說種種法耶不與萬法為侶者是什麼人回光自照看待汝一口吸盡西江水即向汝道八角磨盤空裏走參得透目前萬法平沈無始妄想蕩盡德山隔江招手便有人承當鳥窠吹布毛尋有人省悟得非此段大緣時至苗根自生也亦機感相投有地也亦當人密運無間信師門發揮何峭絕如此之難而超證如此之易古人以輥芥投針為況良不虗矣示良上人金色頭陀論劫打坐達磨少林面壁九年曹溪四會縣看獵大溈深山卓菴十載大梅一住絕人跡無業閱大藏古聖翹足七晝夜讚底沙常啼經月賣心肝長慶坐破七蒲團是皆為此一段大因緣其志可尚終古作後昆標準便使致身在長連牀上亦不過冥心體究但令心念澄靜紛紛擾擾處正好做工夫當作工夫時透頂透底無絲毫遺漏全體現成更不自他處起唯此一大機阿轆轆轉更說甚世諦佛法一樣平持日久歲深自然脚跟下實確確地只是箇良上座直下契證如水入水如金博金平等一如湛然真純是解作活計但一念不生放教玲瓏才有是非彼我得失勿隨它去乃是終日竟夜親參自家真善知識何憂此事不辦切須自省曹溪大鑒微時新州一樵夫也碌碌無所建明已數十載一旦聞客誦經激其本願遂致母出鄉謁黃梅大滿才見數語間投機隱碓坊八箇月既聞秀偈始露鋒芒五祖舉衣鉢授之是時眾競起遂欲奪取而蒙山道人最先及之於大庾嶺頭知不勝始悟此衣非可以力爭稽首求法大鑒以不思善惡本初面目斂念知歸盧老以時緣未穩遁跡四會縣獵人中久之尋抵番禺吐風幡不動動自於心之語印宗伸弟子之禮為之削髮登具由是開大法要總二千餘眾若有之名徹九重遣貴近降紫泥召之確然不應度龍象若南嶽青原永嘉南陽荷澤司空數十人皆大宗師何其偉歟唯聖賢示化進退存亡了然先照然考其步驟從微至著不料世緣而示妙機百世之下無與為等到今數百年充徧天下列剎相望皆其法孫欽仰洪範欲擬其毫末竭誠罄力終莫能髣髴惟望後昆有力量者勉旃聊述梗槩爾趙州見僧喚近前來僧近前州云去多少省力若薦得乃是十成完全若作如之若何則知見生也示裕書記踏著實地到安穩處時中無虗底工夫綿綿不漏絲毫湛寂凝然佛祖莫能知魔外無捉摸是自住無所住大解脫雖歷無窮劫亦只如如地況復諸緣邪安住是中方可建立與人抽釘楔亦只令渠無住著去此之謂大事因緣秉拂據位稱宗師共無本分作家手段未免賺他方來引人草窠裏打骨董去也若具金剛正眼須洒洒落落唯以本分事接之直饒與佛齊肩猶有佛地障在是故從上來行棒行喝一機一境一言一句意在鈎頭只貴獨脫勿使依草附木所謂駈耕夫之牛奪飢人之食若不如是盡是弄泥團漢方來衲子有夙根作工夫驀地得入者不遇真正宗師反引他作露布墮在機境中無繩自縛半前落後似是不是最難整理要須識其病脈辯其落著得其所偏墜而發起之俾捨執著住滯然後示以本分正宗便無疑惑了然得大解脫居大寶宅自然趁亦不去可以洪濟大法傳續祖燈堪報不報之恩也黃龍南禪師昔未見石霜會一肚皮禪翠巖憫之勸謁慈明只窮究玄沙語靈雲未徹處應時瓦解氷消遂受印可三十年只以此印拈諸方解路瘥病不假驢䭾藥緊要處豈有如許多佛法也大宗師為人雖不立窠臼露布久之學徒妄認亦成窠臼露布也盖以無窠臼為窠臼無露布為露布應須反之全盡無令守株待兔認指為月鑒在機先風塵草動亦照其端倪況應酬擾擾哉非胸次虗靜無一法當情安能圓應無差先機照物耶此皆那伽在定之効也示禪人參問要見性悟理直下忘情絕照胸襟蕩然如癡似兀不較得失不爭勝負凡有違順悉皆截斷令不相續悠久自然到無為無事處才毫髮要無事早是事生也一波纔動萬波隨豈有了期他時生死到來脚忙手亂只為不脫洒但以此確實自然閙市裏亦淨如水豈憂己事不辨耶示成修造成就一切總只由他破壞一切亦只由他奇特殊勝緣恒沙功德藏無量妙莊嚴超世希有事皆所成就慳貪憎妬情識執著有為有漏垢染雜亂解路名相知見妄想皆所破壞也唯他能轉一切物一切物不能轉他雖無形段面目而包括十虗含凡育聖若有取之即墜見刺卒摸索不著諸佛開示祖師直指唯心妙性徑截承當不起一念透頂透底無不現前於見成際不勞心力任運逍遙了無取舍乃真密印也示杲書記臨濟正宗自馬師黃檗闡大機大用脫羅籠出窠臼虎驟龍馳星飛電激卷舒擒縱皆據本分綿綿的的到興化風穴唱愈高機愈峻西河弄師子霜華奮金剛王非深入閫奧親受印記皆莫知端倪徒自名邈只益戲論大抵負冲天氣宇格外提持不戰屈人兵殺人不眨眼尚未彷彿其趣向況移星換斗轉天輪回地軸耶是故示三玄三要四料簡四賓主金剛王寶劍踞地師子一喝不作一喝用探竿影草一喝分賓主照用一時行許多絡索多少學家搏量注解殊不知我王庫內無如是刀弄將出來看底只眨得眼須是他上流契證驗認正按旁提須還本分種草豈假娣媒只如寶壽開堂三聖推出一僧壽便打聖云你恁麼為人非但瞎却這僧眼瞎却鎮州一城人眼去在壽擲下拄杖便歸方丈興化見同參來便喝僧亦喝化又喝僧復喝化云你看者瞎漢僧擬議化直打出法堂侍僧問有何相觸忤化云是他也有權也有實也有照也有用我將手向伊面前橫兩遭却不會似此瞎漢不打更待何時看他本色宗風迥然殊絕不貴作略只貴他眼正要負荷正宗須是透頂透底不涉廉纖迥然獨脫然後的的相承可以起此大法幢然此大法炬繼他馬師百丈楊岐不為忝爾立地佛事為佛眼下火如來涅槃日娑羅雙樹間放出三昧火闍維金色身有條攀條無條攀例故褒山佛眼禪師道播四海名聞九州三十年間三踞大剎退席褒嶺宴坐鍾山以平生所受用栗棘蓬驅耕夫之牛以楊岐所付囑金剛圈奪飢人之食傳持一大事提振向上機衲子雲從諸方景仰豈謂一彈指頃坐斷報化佛頭談笑之間遽失人天正眼今則人天廓落人境蕭條雪映高山風清大野圓頂後相放萬里神光正當與麼時還委悉麼看取亘天為亡僧下火五蘊山頭涅槃路四方八面沒遮欄通身盡是金剛眼一粒靈丹火裏然開福寧和尚語嗣五祖上堂門裏出身易身裏出門難易難不到處普請大家看乃竪起拂子云還見麼若謂見云何為見見在即凡宛同流浪若謂不見云何不見行脚高士眼在什麼處見與不見若為明辨這裏徹去三世如來六代祖師平生關棙瓦解氷消苟或未然待把少林無孔笛為君吹起小陽春施主請云飲光門下徒誇微笑之機少室嵓前謾說安心之法爭似呈橈舞棹𦘕舫輕舟萬里無雲長天一色蘆灣月渚漁父拋綸烟嶋波心沙禽戲日閑烹綠茗滿酌流霞蕩蕩皇風平平帝道數聲歸笛離春浦一片孔帆過洞津到岸捨舟常式事何須更問渡頭人諸禪德報慈如斯舉唱還有為人處麼若道有那裏是有處若道無擊鼓昇堂辜他請主到這裏如何剖露還委悉麼良久云人歸大國方成器水到滄溟始是波報慈一要凡聖同妙犬吠驢鳴龍吟虎嘯道吾樂神師巫祭廟雨過山青雲收日照拾得與寒山不覺呵呵笑諸禪德且道笑个什麼休休他年自有智音豈待今朝說破冬至云運推移日南長至分明一道恩光照徹十方三世全彰諸祖玄關漏泄衲僧巴鼻靈雲剛道無疑彌勒徒誇受記爭如李四張三相賀街頭巷尾不是海印發光亦非楞嚴三昧林下高人休要瞌睡令余暗裏笑舒眉直是清風動天地春山青春水綠啼鳥落花清耳目一帶平原𦘕不成妙印無羈豈拘束諸禪德豈不見古人道聞聲悟道見色明心瞥然妙會輝古騰今古人恁麼道也是抱橋柱澡洗未出常流開福道聞聲不悟道見色豈明心大冶紅爐裏真鍮不博金忽有人道開福恁麼道何曾夢見古人師乃呵呵大笑云將謂胡鬚赤更有赤鬚胡擊禪牀下座謝藏主云琉璃殿上古佛舒光明月堂前曇花布影不用南詢彌勒何須東覓文殊華藏門開任君瞻仰或舒或卷塵塵普現色身或放或收處處毗盧境界不舒不卷寂爾無根不放不收是真常住絲毫無礙統攝聖凡自利兼他古今不墜然雖恁麼當人分上又且如何還會麼夜半不須敲五戶天明鳳子笑銜花看藏云衲子玄關群生命脉鋒𨦵未兆便好承當文彩纔形翻成影事何也空劫已前乾坤未剖凝然一片非聖非凡不涉熏修豈從外有洎乎世界安立四姓雜居憎愛情生悟迷相返妄認四大為自身相六塵緣影為自心相譬彼病目見空中花造種種業受種種報枉流諸趣曠劫于今繇是釋尊不離兜率下降閻浮四十九年三百餘會演無量義分布塵剎拯物導迷應病與方明師罕值真藥未逢賴遇程君為不請友捐潤屋珍寶屆開福道場命五湖衲子看閱毗盧大藏欲使禪人不動舌頭五千四十八卷彈指一時周足直得須彌起舞海水騰波天雨四花地搖六種因收果海果徹因源因果兩忘是真常住儻或端倪未辨依前重說偈言你等諸人發卷看時急須著眼三世諸佛全分法身盡在裏許何故焚香提起經來讀便是拈花付囑心此外別求玄妙解攸攸千古少知音以拂子擊禪牀下座永嘉一宿道播寰區招扇隔江法流四海乾坤未剖誰是知音空劫已前何人印可向上一路千聖不傳透脫斯關方能妙用慈雲靉靆舒卷湘江不假風雷霶𩃱甘澤三草二木竝獲敷榮畢竟指歸自何而得還知麼青山不鎖長飛勢滄海合知來處高施主設粥請云諸禪德從前日月依舊山川瀉碧堆青輝騰今古曾無間斷豈有虧盈不見僧問趙州學人乍入叢林乞師指示州云喫粥了也未僧云喫粥了也州云洗鉢盂去僧從此大悟大眾且道那裏是這僧悟處還委悉麼幾般雲色出峯頂一樣泉聲落檻前下座摩竭正令未免崎嶇少室垂慈早傷風骨腰囊挈錫辜負平生煉行灰心遞相鈍致爭似春雨晴春山青白雲三片五片黃鳥一聲兩聲千眼大悲看不足王維雖巧𦘕難成直饒便恁麼猶是涉途程諸禪德不涉途程一句作麼生道良久云人從卞州來不得東京信佛性泰禪師語嗣圓悟上堂日出卯用處不須生善巧看看新羅國人與大食國人在中庭相撲被佛殿鴟刎喝一聲却入諸人脚跟下去諸人還見麼若也見得觸事有餘若也不見白日莫空過青春不再來客從遠方來遺我一張琴中含太古意舉世無知音子期徒側耳師曠謾追尋今朝呈似君試請彈一曲釋迦掩室淨名默然雖明教眼未透祖關如何是祖關泥蛇吞鐵虎井底火燒山開口錯令口喪明眼衲僧無伎倆春風吹落桃李花淡煙疎雨籠青嶂錯達得人空法空未稱祖師家風體得全用全照亦非衲僧要妙直須打破牢關識取向上一竅如何是向上一竅春寒料峭凍殺年少一葉落天下秋看看空際火雲收萬里長江淨如練謝家人不在漁舟且道在甚處歸堂喫茶去一鴈度長空影落寒江水水無沉影心鴈無遺蹤意蹤影兩相忘憑何為的旨籬邊金菊黃江上芙蓉翠參德山入門便棒平地生堆臨濟入門便喝無風起浪俱胝竪指未免顢頇雪嶠輥毬小兒子戲到這裏總使不著爭如六月三伏甘雨普洪水足東臯禾青南畝農夫鼓腹樵者高歌古佛家風儼然如在如斯會得共樂升平脫或未然只知事逐眼前過不覺老從頭上來三角牯牛獨脚舞兩輪石磨遶空飛新生孩子擎鐵棒直上須彌打一槌以拂子擊禪牀下座久雨不晴有理難伸雲霧長埋大野簷聲不斷前旬阿喇喇聞不聞補陀巖上客應笑未歸人涅槃無異路方便有多門遂拈起拄杖云看看山僧拄杖子一口吸盡西江水東海鯉魚𨁝跳上三十三天帝釋忿怒把須彌山一摑粉碎堅牢地神合掌讚歎云諦觀法王法法王法如是拄杖子擊禪牀下座不思善不思惡內外中間空索索擡眸或爾望長空古木森森撐碧落參祖師道欲得現前莫存順逆釋迦老子是什麼破草鞋一大藏教是拭不淨底故紙達磨九年面壁是个瞌睡漢你諸人皮下無血眼裏無睛是來這裏討个什麼盌各請歸堂去大眾還委悉麼會則途中受用拈得瓦礫盡是真金不會則世諦流傳縱有真金翻成瓦礫且道利害在什麼處未明心地印難過趙州關尼道者請上堂云有句無句鸞翔鳳舞全提半提電轉星飛會則目前包褁不會則南北東西阿呵呵知不知堪笑當年尼總持少室峯前逢達磨更無一法可當情咄冬至云陰消陽復物光華節令推排豈有差勿謂枯株無煖氣拈拄杖云且看拄杖子生花見麼嗅著即腦裂卓一下下座咄咄何似生穿雲俊鶻摩青天擡眸一顧十萬里林間鈍羽空忙然求解會著言詮還同日午打三更爭如一句聲前薦獨向毗盧頂上行推真真無有相窮妄妄無有形真妄兩無所有廓然露出眼睛眼睛既露見个什麼曉日爍開巖畔雪朔風吹綻臘梅花開口有時非開口有時是麤言及細語皆歸第一義釋迦老子盌鳴聲達磨西來屎臭氣惟有山前水牯牛身放毫光照天地咄淨人打鼓三世諸佛向鼓聲裏轉大法輪侍者燒香六代祖師向香爐烟上深談實相諸人還聞麼見聞但見聞見聞即不得參寶劍拈來便用豈有遲疑眉毛剔起便行更無回互一切處騰今煥古一切處截斷羅籠不犯鋒鋩亦非顧鑒獨超物外則且置萬機喪盡時如何八月秋何處熱渺渺邈邈十方該括坦坦蕩蕩絕形絕相目欲視而睛枯口欲談而詞喪文殊普賢全無伎倆臨濟德山不妨提唱龜吞陝府鐵牛蛇咬嘉州大像嚇得東海鯉魚肚脹咦一舉不再說已涉繁詞未舉已先知猶落第二直饒向威音那畔空劫已前薦得猶是鬼家活計未為透脫一路且如何是透脫一路昨日南山虎咬大虫言前生句後殺電光石火中區別橫按鏌鎁行正令外道天魔皆膽慴阿喇喇趙州石橋作兩截幽鳥語如篁柳垂金線長少林傳底事對面不囊藏有般漢聞人舉著便道聞聲悟道見色明心若恁麼會病有見聞且不落見聞作麼生道三月懶遊花下路一家愁閉雨中門勿思惟休造作展手開拳咄咄咄隨意說任天真鎮州蘿蔔重三斤堪笑老胡不知有九年面壁太勞神有佛處不增無佛處不減人人一段光明歷劫何曾欠少咄釋迦謾自化西乾達磨無端來此土月菴果和尚語嗣開福寧上堂出州回云氷壺雪室坐禪時世事紛紜莫可知仰羨一堂雲水客忘機寂默是便宜雖然恁麼透脫玄關又且如何閙市街頭無異孤峯頂上孤峯頂上正如閙市街頭一喧一靜一彼一此是非可辨物理昭然作麼生道得箇平懷句良久云當初將謂茆長短燒了方知地不平若論此事迷之則萬象俱生心隨相轉悟之則乃境唯心寂然不動雖然如是猶是教乘極則未是祖師門下事要會麼迷悟雙收處趙州東院西韶陽一曲二十五不屬宮商角徵羽寥寥千古共誰論明眼衲僧未輕許既是明眼衲僧為什麼未輕許要會麼雪後始知松柏操事難方見丈夫心這箇事在天成象在地成形在日月為照為臨在江河為洲為渚遂拈起拄杖云且道在衲僧拄杖頭喚作什麼堯風舜日共樂昇平儻或未然撥落葉開蒼蘚色卓穿氷放野泉聲卓拄杖下座松風清霜月白玅應無私靈光烜爀不用思量何須揀擇豎起拂子云一句定乾坤千古為標格德山棒臨濟喝不是橫該與豎抹拈來直下要承當透網金鱗活鱍鱍活鱍鱍任人看碧天雲靜冷光寒行行莫謂知音少佛祖總在一毫端少保生日請云蘇州有常州有吸盡西江只一口百八數珠數不盡須知天長與地久騰今煥古作嘉祥一一面南看北斗諸仁者且道釋迦老子見明星悟道時與只今是同是別於斯見得人人高超十地个个逈出三乘覿體現成超諸影像且今古常如一句作麼生道良久云劫石可盡此不盡金吾難老等喬松皇叔祖趙相公請云問既無窮答亦無盡問答交馳復成何事諸人若向个裏見得當凡心而見佛心觀世諦而成真諦便能於一毫端現寶王剎坐微塵裏轉大法輪世出世間混融凡聖豈止納須彌於芥子擲大千於方外且道恁麼人憑何道理便得如斯良久云三尺冷光輝夜月一條秋水逼人寒復舉昔日劉侍郎到趙州院見趙州掃地次侍郎云大善知識何得自掃地州云外來底師云趙州老人尋常綿密無縫罅機鋒不可觸及乎被侍郎一拶直得和身放倒而今還有人扶得起麼若有試露箇消息看莫是趙州逢強即弱麼莫是隨波逐浪麼莫是相席打令麼莫是函盖乾坤麼若如此總扶未得在要會麼借水献花常式事不風流處也風流劉居士到寺云鵶鳴鵲噪為祥瑞明月清風作近隣入座笑談欣亹亹怡然世外兩閑人是以梵志出家白首而歸隣人見之曰昔人尚存乎梵志曰吾由昔人非昔人耳如夜半有力者負之而趍昧者不覺奇怪諸禪德二賢者一期對辨語驚時聽撿點將來各在一隅若向箇裏撥轉玄關直下承當得去便能坐斷要津混融今古不涉離微超諸方便其如智眼朧衣珠尚昧又且如何此身不向今生度更向何生度此身數日霶𩃱大雨元來不落別處滴穿釋迦鼻孔浸爛彌勒眼睛諸人還覺頭疼麼若知痛痒向東涌西沒處道將一句來良久云溪㵎豈能留得住終歸大海作波濤九夏光陰一瞬間休論城市與深山大圓覺是安居處坐斷毗盧境界寬山僧已為諸人解開布袋頭了且道只今在毗盧界內耶毗盧界外耶脫或未明歸堂喫茶去桃花紅李花白萬壑千巖光烜赫靈雲悟處勿遮藏賢沙正是白拈賊賊賊說甚釋迦與彌勒參復菴封禪師語嗣月菴上堂天寬地大風清月白此是海宇清平底時節衲僧家等閑問著十箇有五雙知有祇如夜來華嚴池吞却楊子江開明橋撞倒平山塔是汝諸人還知麼若也知去試向非非想天道將一句來其或未知遂擲下拂子云須是山僧拂子始得若論此事直是無一絲毫許可以指示於人若有一絲毫許可以指示於人佛法不到今日是故佛佛授手祖祖相傳盡是抑而為之初無實法到這裏不可更說吾有正法眼藏涅槃妙心分付摩訶大迦葉不可更說吾本來茲土傳法救迷情一花開五葉結果自然成不可更說臨濟三玄雲門三句洞山五位溈仰父子法眼心識不可更說垂絲千尺意在深潭離鈎三寸以篙便打然雖如是事無一向理出多途今日幸遇大資相公已為諸人廣設方便山僧不免乘此方便應箇時節是汝諸人欲知真實相為應是從前學解迷悟兩岐彼我古今一時放却直須內無取證外無所獲中無所著自然常光現前處處壁立萬仞所以道神光不昧萬古徽猷入此門來莫存知解此門既入知解不存便見保安山色奇復奇真如翠竹瑞復瑞僧堂厨庫絕中邊佛殿三門無內外縱有鐵額與銅頭到此也須俱粉碎敢問大眾正當恁麼時如何從今莫道衲被蒙頭都不會復云因更須知有彼上人者難酬對謝典座顧視大眾云看汝諸人盡是飽齁齁底今日隨鼓聲挨肩上來如渴鹿趁陽𦦨相似有什麼欠闕處有則出來吐露看莫教明朝後日虗費他新典座鹽醋遂高聲云有麼有麼良久云似則也似是則未是鮑知府入山舉僧問雲門云一切智通無障礙時如何門云掃地潑水相公來師云雲門當時因行掉臂遮僧未必知歸山僧今日借水猷花諸人好生聽取掃地潑水相公來最好三門八字開祇恐玉堂便歸去未容蓮社久追陪王少保百日請陞座正令全提一切處風行雷動單刀直入百萬眾膽喪魂飛一朝興社稷成勳業於談笑之間千古揚聲名處富貴於乾坤之內有如是標致得如是希奇有如是威神得如是自在莫非功超十地果滿三祇欲為護國天王故作分身佛事直得縱奪在手出生入死而不隨生死之流殺活臨時自利兼他而不作自他之相敢問諸人既是不作自他之相又復不隨生死之流相公即今在什麼處遂竪拂子云諸人若也於斯見得不知適來僧問大死底人却活決定不許夜行投明須到其或未然畢竟水須朝海去到頭雲定覓山歸周參政大祥請陞座不見毗耶老淨名三年一默若雷霆今朝欲問真歸處乃指靈云一默依前畫不成所以維摩會上三十二菩薩各說不二法門至文殊云我於一切法無言無說無示無識離諸問答是為菩薩入不二法門及問維摩維摩默然文殊贊云乃至無有語言文字是菩薩真入不二法門看他當時維摩一會宛爾不同語默當機天然自異直得珠回玉轉千聖由是眼開電擊星飛眾魔從茲膽喪古人即且置祇如崇恩今日說底大資參政三年默底與他文殊維摩是一耶是二耶若道是一知汝諸人祇知其一若道是二知汝諸人祇知其二若道非一非二知汝諸人一二不分若道即一即二知汝諸人一二俱失正當恁麼時既非一二畢竟如何鶴有九臯難翥翼馬無千里謾追風山僧記得在父母未生時有一百二十件事今日一一舉似是汝諸人第一不得錯會良久云早是錯會了也天左旋地右轉過眼光陰人不薦春已過夏初臨塵劫來事在而今今日事來日事歷劫明明即這是是則是非又非乃喝一喝云莫將鶴唳作鶯啼至節云衲僧家端的別脊梁鑄就渾剛鐵有飯逢飢即便餐有話逢人即便說阿呵呵如何說今朝又是新陽節
