鼓作舞意不立玄機不停午踏破草鞋赤腳行見成底事休回互不回互大龍不受玄沙瞞前面班班元是虎請延壽和尚云心心相印葉葉聯芳自己光明不覆藏剎剎塵塵如是說廣長舌相解敷揚大衆作麼生得到處如是說還相委悉麼水向石邊流出緑風從花裏過來香廓不可得其際湛兮或存妙不可得其名靈然自照釋迦以此而掩室淨名以此而杜辭少林九年垂一則語諸人還體悉得麼夜半木童敲月戶天明玉鳳笑銜花一念虗融十方周極萬有自平纖塵不立理智心冥兮到家佛祖口間兮掛壁真境寥寥靈機歷歷氷鑑無瑕玉壺無隙風磨霽色兮一片寒青水印蟾華兮十分明白出沒之淵窮通之域底處發生箇時轉側田地萌針兮暖回園林花綺兮春入無象無私無處無彈指門開見彌勒十方法侶共安居雲月身心照處虗轉側蘆汀飛鶴鷺亡機林壑混樵漁瘢痕若盡光無際絲糝才萌念有餘廊下相逢林放喝且容興化撒真珠水不洗水金不博金眼不見眼心不用心能恁麼去不墮根境識那涉去來今迷裏忽然逢達磨何曾特地作叢林巍巍堂堂萬象之中獨露明明歷歷百草頭上相逢我不見有分外底它它不見有分外底我它不外我則聲色塵消我不外它則見聞情脫所以道世界爾衆生爾塵塵爾念念爾且道如何行履得與麼相應去還會麼一機冥運道樞靜萬象影流心鏡空一心萬象萬象一心不近不遠極淺極深與乾坤同其覆載與日月同其照臨月在船而船船皆月金成器而器器皆金明潔若珊瑚之樹芬馨如薝蔔之林大用自在也獲輪王髻寶正聲和合也奏師子舷琴毛髮不遺圓融照像之鑑形殼不礙虗通度垣之音能如是也妙超曠古了在如今諸仁者且道如今了底是什麼事還會麼穩如大地能持物廓若虗空不挂針不可得一不可得異我如是也彼如是兩莖眉現𦦨光身百草頭揚祖師意歸雲誰使就青山落花自得隨流水環中叶照消息平沈方外獨存幽靈絶待綿密不漏寬廓無隅清虗一亘而理絶名言圓滿十成也道無稜角諸禪德箇是諸佛涅槃之宅衆生安葬之基一切諸法自此發生一切幻緣從此滅盡且道正恁麼時節又作麼生履踐良久云霜天月落夜將半誰共澄潭照影寒寂寂寥寥清嚴家法浩浩蕩蕩光顯門庭守家法則失撫會應變之方立門庭則失安隱宴閒之道若也驅耕夫牛奪飢人食須有箇般手段始得只如衲僧家又作麼生行履還會麼身裏出門門裏身眼中之物物中眼舉灌溪問末山如何是末山山云不露頂如何是末山主山云非男女等相溪喝云何不變去山云不是神不是鬼變箇甚麼師云非男女之相出有無之量透萬機之前超三界之上窮而通簡而當松含月兮夜寒溪帶雨而春漲看看氷鑑淨玉壺寒一亘清虗擡腳易十分明白轉身難渾身轉却舌頭短轉却渾身鼻孔寬參天寧節云一人之父百王之師道機有餘兮動若四時壽域無疆兮量同二儀大功不宰至化無為妙兮難喻智也不知箇是誕生王父真實穩密處諸人還體悉得麼權挂垢衣云是佛却裝珍御復名誰靜沈沈明蕩蕩雪滿十方雲迷四向一色影裏是誰坐著功勳百尺竿頭阿你變通伎倆恁麼時須辨幾微恁麼處須明的當趁不去露地白牛透得過渡河香象徹見其源如指諸掌恁麼盡去也無法可傳恁麼却來也有人相亮參當處出生當處滅盡三世如來相授此印石人放意臥煙寒玉女搖頭看曉信參贊偈真歇傲雪松孤懷雲石癯妙存而有也不有獨照而無也非無萬象勿能逃空王之印衆色莫我染靈蛇之珠金雞啼寒兮曉分夜戶玉兔弄魄兮瑩徹氷壺從首座畫豫於松石間求贊孤坐默默倚杖沈沈石懷雲而無像松嘯風而有音應兮珠盤不撥而自轉湛兮玉井隨汲而彌深諸塵不受兮十分清氣三際無寄兮一片閒心自贊雨霽雲收山寒水秋心月自照言象俱休滿十方而智應廓三世以神游虗空那礙東西壁明月解隨南北舟次端楞伽韻與生首座縛茨枯坐九江東鏡像虗融方寸中舜若多身禪夜看母陀羅臂用時通緣生誰兆有非有寂照自知空不空道契觀音斯善應蕭蕭竹雨雜松風假日山行平生胸中雲外峯有閒便與扶瘦笻但知一世丘壑味想得十分猿鳥從明見秋容山洗雨清可人意風吟松歸來游興散不盡誰杵喚月黃昏鐘與心知莊耕雲種月自由人田地分明契券真黃犢將看炊作飯白牛今已牧來純钁頭活計時時用物外家風處處親禾黍十分秋可望飽叢林漢著精神南麓新居山麓水濵竹木陰我儂懶養靜居深一生自足淡中味三際那收閒底心壑雲未成出岫意松風能作下灘音十分清興與誰共想有沃洲支道林送僧幹鐘木落空山霜夜樓時一撞隨風度林嶺喚月到蘿窗響應虗傳谷聲飛不礙江夢回天意曉蝴蝶失雙雙為僧下火江雲冉冉草離離花落春殘客去時古渡舟橫人不見是須記取却來期凝上座知不知水沈沈泥牛穩臥煙玉鳳來儀攂鼓轉船天欲曉片帆高掛順風吹三界從想有百年成夢游忽爾賊風吹劫火翻然大海滅浮漚高上座賦歸休透脫六處撒開兩頭靈山有路平如砥月戶無人冷似秋風骨不露水泄不通衲僧行履妙無蹤門掩三秋兮人歸何處天無四壁兮月上中峰眼光落穀氣消六窗不見獼猴跳空索索寂寥寥破屋從它野火燒歸去客笑頭搖蒼鷹掣斷紫絲絛正恁麼時如何行履良久云坐斷兩頭古渡風活船到岸細行一步清秋月冷鶴移巢入塔云幻滅非無圓覺非有虗而長靈者誰死而不亡曰壽嚴風摩洗天容清寒木搖落山骨秀虗明田地歸去來半夜長空月如晝法語履道底人妙出言思直下真實自有肯路又莫著道理廓然㳷合月流諸水風行太虗自然不觸不礙超彼照用雖照無痕雖用無迹入三昧於諸塵收萬象於一印絶滲漏無走作喚作了事衲僧又須記取還家路子雲盡天寒秋疏山瘦箇是本所住處衲僧本有田地清曠丕平望絶崖岸在其間耕雲種月明白虗廓自家受用或出或沒任收任放直得二儀同其生成萬象同其起滅崢崢嶸嶸何所從來寂寂寞寞何所至向可謂虗空不可容納大地不可擎載妙存不得其形至虗不得其名有無功盡凡聖路絶方有到家時節正恁麼時得箇甚麼萬頃眼寒清照雪好看裏許力耕人枯寒身心洗磨田地塵紛淨盡一境虗明水月霽光雲山秋色青青黯黯湛湛靈靈自照本根不循枝葉箇時底處超邁情緣不限劫數一念萬年終無變易從此出應虗谷行雲動靜自若順入諸塵常在三昧所以云那伽常在定無有不定時古巖璧禪師語嗣石窗上堂日月如彈丸頑心似堅石堅石不可融彈丸易跳擲始見踏青行相將年又極誰將後夜霜換我雙𩯭黑有箇不老方諸人識不識你若識得秋凋冬落一任施呈若也不然趙州不曾親見南泉亦不曾道箇鎮州出大蘿蔔運推移日南長至一夜東海烏龜吞却南山鱉鼻你若知得不妨眼上安眉你若不會過去須彌燈王在你腳跟底舉普化大悲院裏有齊頌云大用全提作者知爍迦眼活電光遲大悲院裏翻身處臨濟甘為小廝兒佛成道日云叢林皆為臘月八日黃面老子夜見明星悟道洞見三千大千世界衆生本來成佛大似一犬吠虗千猱啀實只如毗藍園指天指地天上天下唯我獨尊又向什麼處去也直饒道得箇大冶精金曾無變色也是向虗空剜箇窟籠畢竟如何欲得不招無間業莫謗如來正法輪非不非是不是差之毫釐失之千里拈占波國來象骨山頭將象骨峯安藕絲竅裏非偏非圓無事無理若也會得許你七縱八橫和泥合水若也不會直饒毫釐無差正是靈龜曳尾今朝六月中嘉田雨沾足山房冷似氷千山擁寒玉祖意不西來法身無展縮水上掛燈毬鎮州出蘿蔔三盞不沾脣百味皆具足你若會去直饒郢路巴歌亦唱作新豐曲你若不會有寒暑兮促君壽有鬼神兮妬君福滿散云寰中獨照萬機息壺外分權六國清四海晏然王化裏不須當道話升平釋迦慳迦葉富欺負乎人誇張莾鹵五天不納到支那塞壑填溝無避處無避處不遮護汲興相逢如塗毒鼓直須親切一回來莫似邯鄲學唐步舉世尊升座大衆才集文殊白槌一下云諦觀法王法法王法如是世尊便下座後有芭蕉和尚道忙忙者匝天普地師云釋迦老子盡力提來文殊大士滿口酬價芭蕉和尚大似無錢喫酒妬人面赤雪峯忍俊不禁著箇頌子玉象吞獅子泥牛上繡鞍御樓觀射獵不是刈茆田仲冬嚴寒一陽長至佛祖有機關俱落第二義豈不見溈山寂子與香嚴未免將泥土裏洗忽有箇漢出來道我不似這三箇老漢山僧拈棒便打何故重賞之下必有勇夫園林宿雨不勝清巖谷舂撞萬杵鳴箇裏豁開千聖眼不間弓矢賀升平皓月當空寒江不動萬里清光曾非別共蚌孕珠而無從兔懷胎而非種萬別千差波騰海湧卷舒只在一毫端不用渾家生奉重十日梅天曉未晴千巖俱作偃溪聲直饒透出威音外猶較曹山半月程且道過在什麼處有眼辨取及時陽𦦨欲燒空中有清凉一徑通衆苦不來寒暑盡鐵崑崙臥水晶宮開啓舉黃龍新禪師云摩訶般若波羅蜜甚深般若波羅蜜上祝聖人天長地久瑞巖即不然空手把鋤頭步行騎水牛憑茲陪睿算垂拱億千秋法法不隱藏古今常獨露槐影轉清陰風催巖下雨廚庫對僧堂燈籠挂露柱只有一處最誵訛半夜泥蛇吞石虎舉僧問雲門樹凋葉落時如何門云體露金風師云樹凋葉落體露金風堯眉八字舜目重瞳機如掣電者難尋蹤跡口似磉盤者驀地相逢翻地揭天休作解新羅元在海門東至節云木人夜半穿靴難尋蹤跡石女天明不露誰辨親疏枯木上一點春回古渡頭千尋寒雪同門出入不來還憶渠同氣相求回來劫無說且道是什麼人能如是行李御樓觀射獵不是刈茆田發監收云金葉銀莖報有秋明珠萬斛堂中收自從一飽家田飯不用埋頭向外求喫家田飯不向外求人人知有底只如世界未興靈苗未發汝等諸人在什麼處著眼還知麼只是自家成現底付與叢林本色人祖師忌日云漚澄巨浸無蹤跡月轉層巒顯大功剎海毫芒無缺剩空山和月撼松風或者道聖人無己靡所不己且喜沒交涉又道寂而常照感而遂通拈向一邊更饒法身無相父母未生大似為蛇𦘕足畢竟如何泥牛鬬入滄溟裏玉角纖纖倚太空至節云陰極俄驚一線回石人嶺上笑咍咍摧殘枯木非枯木今日花從冷處開十月霜天道者孤家風無地可名模鐵牛吞却金獅子撒出寒花滿道途住雪竇入院僧問明覺禪師道住翠巖好住雪竇好意旨如何師云少賣弄僧云忽有人問和尚住瑞巖好住雪竇好作麼生祗對師云須彌頂上擊金鐘師乃云靈機妙轉一毛頭上露出乾坤大事現前萬象森羅同時證據直得千山擁雪萬壑爭流門前錦鏡發輝戶外寒花襯足妙高峰頂誰云七日相逢燕坐中峯一任孤猿嘯月如斯舉唱盡落今時向上提持如何話會還知麼玉麟對對黃金角木馬雙雙白玉蹄復舉僧問師歸方丈意旨如何泉云昨夜三更失却牛天明失却火師云這箇公案舉者極多只為太近所以會者極少山僧有箇頌子舉似大衆相隨步步見還難墨刷驊騮錦繡鞍一夜遍行南贍部天明依舊立江干謝新舊知事云同氣相求虎步平林而風生巖谷同聲相應龍吟古㵎而韻出青霄其應也本出無心其用也亦非有自所以叢林調古家國晏安豈惟萬古長空亦乃一朝風月且道成得箇什麼邊事四海九州家世在一花五葉典刑新小參至節云諸佛不出世截路闌階祖師不西來填溝塞壑佛法遍天下無地容錐談玄口不開挨身不入便恁麼去諸人舌頭在山僧口裏山僧舌頭在諸人口裏如是見得無得底人無不得底人無聖底人無凡底人無迷底人無悟底人無世界衆生無差別玄妙從上老凍膿拋沙撒土竪拂拈槌便將箇無字印子一印印定東去也不得西去也不得神通妙用也不得說理說事也不得然後全身放下燒榾柮火煮野菜羮唱村田樂誰知節後一陽生說甚寒食清明一百五雖然如是忽然有箇漢牙如劒樹口似血盆說臨濟三玄三要曹洞五位君臣三種滲漏雲門三句溈仰父子之機法眼即道明心奔流度刃疾焰過鋒舉一明三目幾銖兩底出來又作麼生不因紫陌花開早爭得黃鶯下柳條謝知事云祖域疆封既闊物物全真禪家法令惟新頭頭總妙或向棒頭取正或於喝下分權或山上刈三百箇祖師或杓頭舀出千五百大衆油餈裏相逢莊主揩浴處拶著古靈莫非本有光明始信人人有分雖然如是只如洞山麻青州衫稱頭不等還有過也無但教心地平如掌自有龍天暗點頭復舉藥山向雲巖云為我喚沙彌來巖云和尚喚他作麼山云我有箇折腳鐺子要伊提上挈下大溈云藥山折腳鐺子若無雲巖幾成廢器大溈亦有箇折腳鐺子要諸人亦各出一隻手且圖古風不墜師云瑞巖亦有箇折腳鐺子傳來既久直得脣囂耳脫聲韻都無有時揚在壁角落頭分文不直有時拈來東烹西煮百味俱全雖然如是若要不傾不危也須諸人各出一隻手始得法語此道汗漫如大海江河堅剛如銀山鐵壁若非具大根器有出塵脫俗超卓不群底氣宇往往不能入作君不見石門慈照禪師謂李都尉云出家是大丈夫事非將相所能為如藥山蚊子上鐵牛長髭紅爐上一點雪又如真覺始是鰲山成道是什麼體格既得之則同天同人同貴同賤同高同下一切處無不是放身命底時節又如界方子東袞西袞無非四稜著地時到這箇田地始得穩當自然卓卓地如獅子兒如太阿劒不動則已動則傷人無回避處喚作達磨兒孫宗門上客若是瞻前顧後羊質虎皮非獨於自己無成亦將無感於外佛法禪道是文字語言拈槌竪拂鼓弄光影拂袖便行乞兒伎倆百不思量自作障礙執法修行如驢拽磨看經看教隔靴抓癢息念忘緣弄巧成拙若是英靈漢總不作這般去就如獅子兒振地哮吼一聲百獸聞之悉皆腦裂豈肯依他作解所以道參禪須是鐵漢著手心頭便判直趣無上菩提一切是非莫管自然不落時人行李處一切人自然摸索不著某上人久留心於此未能打脫發心持鉢亦猶仰山牧牛底時節忽然道得箇不問他人借口便禍事也見聞覺知是病錯見聞覺知是法錯法離見聞覺知錯錯這四箇錯字如天之四時地之四氣人之四肢若缺一箇便偏枯傾倒不成天地人物黃面老子一代時教祖師直指人心只在四箇錯字裏行古今禪僧如麻似粟各展神通亦不出此所以先德盡力提持莫過於此而今若欲作箇出格底衲僧直須有跳出一著子不見有出不出者便能超過一切差別等法如趙州鎮州蘿蔔青州布衫庭前柏樹子更不著問人矣澤禪俊衲且去徽州持鉢歸跳出跳不出却與你本分草料頌贊仰山見東寺索珠無言可對輝天地無理堪伸奪夜光離相離名言語道潑天高價不尋常洞山喫果子盡力提來不等閒要尋知己驗來端可憐臨水探紅尾依舊茫茫失釣竿化胡椒異國傳來種性殊圓陀陀似蚌中珠不艷照明月自有辛香壓五湖送人千尋老幹無寒暑百鍊精金有變遷脫盡皮毛空索索不妨重結弟兄緣送堅知庫掃盡法中病生憎佛是塵堂堂一堅密春至百花新送泉州僧洛陽橋下千尋水象骨峰前萬疊山一口為渠吞却了更無蹤跡在人間送人六窗不著閒光景七處休尋古佛心放下不行凡聖路敢將黃葉當黃金義副寺求拈却義除却法過現未來不消一劄大海波騰河四流激湍袞袞吞三峽須彌山王拊掌笑江神河神俱𨁝跳留得珊瑚對月寒九曲明珠無孔竅山居二瓶盂古㵎冷相依雲淡山寒月色微眼底賓朋聊自足屋頭猿鳥恰忘機山園茶笋疏疏有世路人情漸漸稀不記化權前後際卷簾移榻看斜暉平生湖海竟何依選得佳山賦式微茗碗爐熏同宿學蒲團禪板接初機陂城水滿芹尤滑瓦鉢肩挨粥未稀睡起烏藤清興在不知老木掛殘暉贊真覺三回九度見神見鬼德山一棒痛徹骨髓敲老觀門潑瓦官水而今冷坐眼麻眉錯認東瓜作碓觜贊卿老真風蕭蕭天空四壁雨疏疏巖花狼籍乾剝剝白浪滔天寂寥寥遍界荊棘漾在栖雲草莾中堪嗟大地無人識自贊三三際斷一亘空轉不轉功不功迢迢物外像矯矯巖間松密密處不堪親近荒林裏得意相逢咦癡不自揆老不知休提真覺觜杖用曹山死猫頭乾剝剝冷湫湫炙地熏天無氣息拋沙撒土覓冤讐喻指喻馬何勞真假說性說心轉見病深靈山拈花不曾動著少林冷坐徒自沈吟良工欲寫莫可寫汝曹敬之隔千林山陰陰水沈沈蒼苔雪徑冷不徹花鳥夕陽閒古今真兮真兮胡得而臨為翼侍者下火善翼汝果生耶三十年在世亦幻住爾汝果死耶亦一時衆生顛倒見爾既不生亦不死作如是解者亦識陰中妄想根本爾那堪更說辭親老涉鯨川登象骨預留香衲帔蒙頭師資相契盡底拈來總勿交涉畢竟如何烈火迸開金世界鐵牛行步莫匆匆天章楚和尚語嗣暹道者上堂舉雲門云十五日已前即不問你十五日已後道將一句來門自代云日日是好日師拈云且道今日是什麼日還有人揀得出麼若揀得出不惟通天通地亦乃別陰別陽若揀不出天章今日不免作箇杜巡官去也良久云還會麼甲子乙丑海中金丙寅丁卯爐中火參秋天寒不寒秋雨落不落昨日問園頭祇是好種作平地已耕犁高坡用鍬钁撒灰底撒灰下麥底下麥來年長夏間供養諸禪客然則獨掌不浪鳴大家共擘劃老漢只恁升堂諸人作麼湊泊若是擔帶之流便請一時放却以拄杖擊香臺下座一日復一日一月復一月借問諸人瞥不瞥閻羅王在汝面前聲聲叫喚無常鬼在汝腳下步步排列問汝有多少光陰底事渾不肯休歇直待兩腳梢空恁時作麼分說獨有般若鉗鎚解向空中釘橛絆住衲僧腳跟四邊莫教空缺莫空缺冬無寒兮夏無熱覓什麼鑊湯爐鐵乃召大衆云若無此箇神通前程大有霜雪卓拄杖下座金藏於礦非大治無以勝鉗鎚玉蘊於山非敏匠無以成器用乃打一棒云大冶敏匠一時在這裏還有勝得鉗鎚成得器用底麼良久云啼得血流無用處不如緘口過殘春又打一棒下座舉雪峯道盡乾坤大地是箇眼汝擬向什麼處蹲座天章即不然盡乾坤大地是箇眼因什麼青天白日扶籬摸壁良久云佛也救不得卓拄杖下座雲菴真淨文禪師語嗣黃龍聖壽開堂問話且止只知問佛問法殊不知佛法來處且道從什麼處來乃垂下一足云昔日黃龍親行此令十方諸佛無敢違者諸代祖師一切聖賢無敢越者無量法門一切妙義天下老和尚舌頭始終一印無敢異者無異即且止印在什麼處還見麼若見非僧非俗無偏無黨一一分付若不見而我自收乃收足喝一喝云兵隨印轉將逐符行佛手驢腳生緣老好痛與三十棒而今會中莫有不甘者麼若有不妨奇特若無新長老謾汝諸人去也故我大覺世尊昔日於摩竭陀國十二月八日明星現時豁然悟道大地有情一時成佛今有釋子沙門克文於東震旦國大宋筠陽城中六月十三日赫日現時又悟箇什麼以拂子劃一劃云我不敢輕於汝等汝等皆當作佛昔日大覺世尊起道樹詣鹿苑為五比丘轉四諦法輪唯憍陳如最初悟道貧道今日向新豐洞裏只轉箇主丈子遂拈起主丈向禪床左畔云還有最初悟道者麼良久云可謂丈夫自有衝天志不向如來行處行喝一喝開雲門門七通八達却須知有關棙子去著若也不知雖活如死現黃龍龍千變萬化更須到伊窟宅潛處若不到有眼如盲諸禪德我觀法王法法王法如是有眼者辨取東西南北四維上下觀機設教應病與藥驀拈拄杖云馬大師來也看看日面佛月面佛一一為君重拈出若善服者病瘥藥除舉足下足無非道場不善服者藥病相治盡大地是藥觸途成滯遂擲下云只在諸人面前有時灰頭土面橫身荒草衆生處處著引之令得出其奈飢逢王膳不能餐又爭怪得老僧聖壽長老不會禪不會道只會解粘去縛應病與藥諸佛子無禪可參無道可學棄本逐末區區客作不如歸去來識取自家城郭城中自有法王尊一呼百諾髻晃明月珠手振黃金鐸還要一切衆生自家省覺來來應是從前佛法知見一時放却乃得自己毗盧心印明廓喝一喝云大丈夫兒莫錯錯上堂彌勒真彌勒分身千百億時時示時人時人皆不識拈拄杖云還識麼千箇萬箇但識取這箇擲下拄杖宿來萬福數日人事相煩更不一一陳謝禮煩即亂知是箇般事便休且道是什麼事拈拄杖云風不鳴條雨不破塊堯風蕩蕩行人讓路萬姓歌歡筠陽城中誰家竈裡無煙張公喫酒李公醉卓拄杖云寒山拾得僧問如何是一乘法師云百尺幡竿尾指天乃云方期首夏已是初秋今朝七月改旦嗟乎流光電速四序推移世事不常人亦漸老還有不涉老少者麼八十翁翁著繡靴逍遙長老至云青山深處人來我紅塵裏紅塵偶不見白雲與流水耳目何所分浮名與浮利為是紅塵非為復青山是是非兩途間幾多殊未已幸遇逍遙人可述逍遙理天地與我同根萬物與我一體腳頭腳尾橫三豎四北俱盧州火發燒著帝釋眉毛東海龍王忍痛不禁轟一箇霹𮦷直得傾湫倒嶽雲黯長空十字街頭廖胡子醉中驚覺起來拊掌大笑云筠陽城裏近來少賊乃拈拄杖云賊賊一葉落天下秋老僧慵剃雪霜頭風浩浩水潺潺忙者自忙閒者閒終南山色翠相倚湘岸橘朵紅鈎攀諸禪德會即途中受用不會世諦流傳拈拄杖云不是途中受用又作麼生傳良久乃喝云夜靜水寒魚不食滿船空載月明歸謝月化主靈山話月曹溪指月聖壽今朝謝月且道與古人誰親誰疏莫有人辨得麼若也辨得將此身心奉塵剎是則名為報佛恩若辨不得無角鐵牛眠少室生兒石女老黃梅笑殺栽松道者參方經七月十五又是八月中秋徒知暑往寒來人老區區未休休休看看便是結交頭大衆丹霞老道底百骸俱潰散一物鎮長靈乃喝云無端騎聖僧德山呵佛罵祖承其言者多見德山者少黃龍佛手驢腳見黃龍者衆善其機者稀拈拄杖云欲見德山麼左邊卓云看要見佛手驢腳麼右手卓云看乃橫云佛手驢腳我宗廓德山披毛黃龍戴角萬化目前磊磊落落乃喝云眼睛定動總是著縛道泰不傳天子令行人盡唱太平歌五九四十五莫有人從懷州來麼若有不得忘却臨江軍豆豉城中失火云欻然火起焚燒舍宅及至煙消火滅萬事成空冷地裏一場懡㦬遂喝云轉凡成聖又是什麼人永固長老至云幽固深遠無人能到到則山青水緑別是人間好諸禪德江月照松風吹永夜清宵何所為却怪長時杜䳌子春山無限好猶道不如歸十月十五迎寒送暑唯有這箇不來不去該天括地亘今亘古雖則全彰要且不露喝一喝十七十八早是漏泄若也不會守繫驢橛以字不成八字不是有利無利不離行市拈拄杖云寰中天子塞外將軍擊禪床十月二十三天寒下暖簾黃昏一覺睡南海出榆甘聖壽有時戴寶冠掛瓔珞出來十人有九人驚怖毀謗罵詈避走遠去見伊不識遂更著垢弊衣與伊相見百人千人一時讚歎歡喜信知我所得智慧微妙最第一衆生之根鈍著樂癡所盲如斯之等類云何而可度以拄杖擊香卓一下住洞山開堂云問話且止言多道遠然則通人分上無可不可問答縱橫何是何非不二門開一道清淨古人云道無不在觸事而真心若不邪所為自正正覺之道得在乎心不在乎言言語道斷心行處滅非古非今今日一會法法本然心心本佛若僧若俗若賢若愚悟則事同一家迷乃萬別千差差之毫釐失之千里遂拈拂子召大衆云一花開五葉結果自然成摩尼珠人不識如來藏裏親收得既收得不護惜也要諸人見擲下拄杖云還識麼若識燒沈水香供養諸禪德明月照見夜行人良由不是他家事佛法現前僧俗儼然八月初五冷落秋天有相身中無相身無明路上無生路志公和尚欺我等愚迷壓良為賤然則敢問諸人而今四大五蘊是有相之身那箇是當人無相之體噓一聲云欲報先聖護念恩粉骨碎身又安得只知今日明日不覺前秋後秋諸禪德休得也未便好休而今更有什麼事見麼四大海水灌入你諸人鼻孔裏須彌山突出額角邊三十年後不得辜負洞山長老師子吼無畏說百獸聞之皆腦裂拍禪牀左邊云不是師子吼又拍禪牀右邊云不是無畏說你擬心早是腦裂也更擬如何若何一隊野狐精喝一喝平旦寅狂機內有道人身乃喝云不是狂機又唾云不是狂機若作狂機會又爭得行住坐臥山河大地不是狂機且道作麼生是道人身良久云各自歸堂喫茶此箇事學不得教不得傳不得須是當人悟始得悟得也可可地閒閒地了了明明地歷歷落落地一切神通變化悉自具足不用外求乃橫按拄杖云橫按鏌鎁全正令太平寰宇斬癡頑遂擲下良久喝一喝師子不食鵰殘快鷹那打臥兔放出臨濟大龍抽却雲門一顧拈拄杖云龍行雨至三草二木發化主云出家沙門當清淨自活以乞食為正命食不過分離憍慢故以乞法為正念增長智慧不滯寂故驀拈拄杖云你有拄杖子與你拄杖子你無拄杖子奪却你拄杖子此於薦得增汝智慧破汝憍慢火焰裏藏身淤泥中出現千手千眼大悲菩薩一任神通變化於此不薦有清泉兮恣汝飲有碧巖兮從汝栖切忌寒猿深夜啼洞山受請衆請小參新豐古洞萬疊爭攢悟本真蹤千林競簇古今勝地佛事長興所以昔悟本大師有時提唱唯有佛菩提是真歸仗處復喝一喝云猶有這箇去就在諸禪德只如大師道猶有這箇去就在且道意作麼生還知落處麼叢林中多有商量者有底道聞佛聞法似生冤家況更有歸仗處故遭悟本大師撿點有底道悟本只要人休歇去有底道悟本只見錐頭利不見鑿頭方似與麼匹配又何曾夢見他古人既不如是又且如何諸德此箇事大須子細不可粗心一等參禪窮教到底宗門中千差萬別隱顯殊途唯大智方明降茲已往莫測涯際而今多是抱不哭孩兒打淨潔毬子把纜放船抱橋澡洗彼此丈夫阿誰無分若便明去驅耕夫之牛奪飢人之食入火不燒入水不溺於一切處不留一切處成就靈光獨耀烜爀殊分可謂蕩蕩乎落落乎張起濟岸帆撥動渡人舟於生死海內白浪堆中出沒去來逍遙自在喝一喝云從他謗任他非雨中兼箬笠簑衣而今暫別海門月携魚且向市歸舉三聖興化逢人出不出師拈云看這兩箇老古錐竊得臨濟些子活計各自分疆列界氣衝宇宙使明眼衲僧只得好笑諸禪德且道笑箇什麼還知落處麼若知一任七顛八倒若不知且向三聖興化葛藤處咬嚼結夏十方聚會三月一結息狂妄心除苦惱熱獲勝清凉證大寂滅到波羅岸出生死轍以此聖制故不虗設聲聞緣覺不見不聞三世諸佛只可自知衲僧跳不出打在綣繢裏動即開眼尿床夢中說夢且向洞山門下九十日討箇活路佛法兩字直是難得人有底不信自己佛事唯憑少許古人影響相似般若所知境界定相法門動即背覺合塵粘將去脫不得或學者來如印印泥第相印授不唯自誤亦乃誤他洞山門下無佛法與人只有一口劍凡是來者一一斬斷使伊性命不存見聞俱泯却向父母未生已前與伊相見見伊才向前便為斬斷然則剛刀雖利不斬無罪之人莫有無罪底麼也好與三十拄杖丹霞燒木佛院主眉鬚墮驀拈拄杖云不是木佛便擲下云誰敢燒你擬即眉鬚墮落不擬又且如何遂高聲叫行者拈起拄杖下座九日無白醪飽餐黃栗糕十日有黃菊催人打禾穀五更鍾未鳴鄰雞已數聲相逢不下馬各自奔前程昨日風氣暖今朝天色寒乾坤共著力衲子眼皮寬從門入者不是家珍又作麼生是家珍拈拄杖召大衆云還見麼遂扣香臺復乃噓噓釋迦老子棒打不殺文殊普賢喚不回頭休休虗費力且隨流待伊時節至一葉落天下秋洞山門下要行便行要坐便坐鉢盂裏屙屎淨瓶中吐唾執法修行如牛拽磨洞山門下要道便道要用便用救得眉毛失却鼻孔乃喝云久雨不晴參出縣回云三日不相見不得故眼看是何言歟洞山數日不相見相見只是舊時人乃合掌云不審過去諸佛現在諸佛未來諸佛參退喫茶洞山門下有時和泥合水有時壁立千仞你諸人擬向和泥合水處見洞山洞山且不在和泥合水處擬欲向壁立萬仞處見洞山洞山且不在壁立萬仞處擬向一切處見洞山洞山且不在一切處你不要見洞山鼻索在洞山手裏擬瞌睡也把鼻索一掣只見眼孔定動又不相識也不要你識洞山且識得自己也得舉僧問雲門如何是和尚家風云有讀書人來報諸德千聞不如一見又作麼生見只為分明極翻令所得遲光剃頭淨洗鉢好便住惡便脫好諸禪德莫將世俗見埋沒道人心裩無襠袴無口頭上青灰三五斗趙州老漢少賣弄然則國清才子貴家富小兒驕其奈禾黍不陽𦦨競栽桃李春翻令力耕者半作賣花人但離虗妄名為解脫其實未得一切解脫作麼生是一切解脫驀拈拄杖云關又云雲門大師在拄杖頭上𨁝跳還見翠巖眉毛麼若也不見洞山為你注破長慶來也遂擲下云吹笛打鼓普請看識情安排工夫造作一向攀緣己事荒却不信吾家正遍知論劫莫能成正覺喝一喝汾州莫妄想俱胝竪指頭古今佛法事到此一時休休休却憶趙州勘婆子不風流處也風流放過一著落在第二仲春漸暄景色明媚一衆高人起居輕利莫有不涉春緣底麼良久云遠道擎空鉢深山踏落花聖僧每日入骨入髓為諸人說適來擊鼓重為宣揚更待長老開口動舌又堪作什麼老僧恁麼道也是為蛇畫足此事如明珠在盤不撥自轉有底撥不轉按不活又爭怪得老僧要識明珠麼各自歸堂喫茶臘月二十新豐一衆衲僧巴鼻滴水滴凍人貧智短馬瘦毛長趙州云我青州做一領布衫重七斤師云有年無德洞山見兔放鷹知生不知死大衆欲出生死不涉有無大用現前勿隨言語佛法門中有縱有奪縱也四五百條花柳巷二三千處管絃樓奪也天上天下唯我獨尊不縱不奪又作麼生良久云長把一聲歸去笛夜深吹過汨羅灣華嚴座主到云法界者一切衆生之本體也拈拄杖云不是法界是諸人無始以來靈明廓徹廣大虗寂之妙體故此土他界天堂地獄六凡四聖情與無情同一無異無壞無雜由帝網之明珠互相融通更相涉入可謂無邊剎境自他不隔於毫端十世古今始終不離於拄杖頭上若爾則何啻擲大千於方外納須彌於芥中而今百億日月百億須彌百億世界都在拄杖子裏許乃擲下云擲在諸人面前還見麼信得及麼不思議解脫力神通游戲妙用現前非假於他術皆吾心之常分耳喝一喝下座頭陀石被莓苔褁擲筆峰遭薜荔纏羅漢院一年度三箇行者歸宗寺裏參退喫茶你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子大衆見錢買賣莫受人瞞知麼有利無利不離行市阿呵呵却憶趙州勘婆子不風流處也風流八月中秋凉風蕭索衲僧去來如雲似鶴山北山南有路通一條拄杖橫擔却是即是覺不覺切忌隨他老盧腳喝一喝十月旦云凡夫色礙二乘空礙菩薩色空無礙目前萬象森羅理事融通自在僧堂又添暖火十方高人共會不必更分彼此同是一真法界喝一喝今朝十月二十五須知有法離言句本明本妙不假修一隊古佛參堂去冬後一陽生乾坤解通變衲僧莫守株彼此丈夫漢日用天真活人人自可見如何都不顧隨他物所轉衲僧門下無非過量境界自在禪定乃喝云豈不是過量境界又謦咳云豈不是自在禪定阿呵呵將此深心奉塵剎是則名為報佛恩大衆休得也無了期共來林下學無為袈裟同肩一佛子相逢能得幾多時大衆古人道盡大地是箇解脫門枉作佛法會却何不見山是山見水是水歸宗則不然盡大地是箇解脫法門不作知見解會有時見山不喚作山有時見水不喚作水大衆彼此丈夫莫受人瞞大衆佛法兩字彼此不著便衆中莫有師子兒麼不敢望你哮吼一聲使大衆一時頂門上眼開且莫嚼他古人殘羮餿飯也得歸宗今日瞞你諸人去也拈拄杖擲下云南山鱉鼻蛇解弄者收取喝一喝山門今日供養羅漢為十方檀越酬還心願亡者生天見存獲福召云但只隨例餐䭔子莫問人間短與長復拈起拄杖云我生已盡梵行已立所作已辦不受後有三界不奈伊何堪受人天供養這一隊少叢林漢總好與二十拄杖喝一喝大衆彼我雖殊根塵有異然則性自平等無平等者平等尚無況有不平等者拈拄杖云情與無情共一體處處皆同真法界遂擲下云撲落非他物且道是什麼物喝一喝日往月來大盡小盡光陰已去生死漸近大衆總是祖師門下客須知生死不相關且道歸宗與麼說話還有過也無良久云父母不聽不得出家如來大師云不能了自心如何知正道又寒山菩薩云一念了自心開佛之知見大衆是什麼直下了取拈拄杖云阿誰不見阿誰不知知見分明又擊禪牀云阿誰不聞阿誰不了了心平等若此觀者名為正觀若他觀者名為邪觀卓一下船子下揚州大地無寸土蛇咬蝦蟆聲更有衆生苦拈拄杖擲下云今朝二十五喝一喝一葉落天下秋廬山山北到江州擲下拄杖云若知撲落非他物須信縱橫得自由今朝九月一夜來霜氣寒當知門外路一一透長安喝一喝是日已過命亦隨減如少水魚思有何樂唯二乘禪定寂滅為樂是為真樂學般若菩薩法喜禪悅之樂是為真樂三世諸佛慈悲喜捨四無量心為樂是為真樂石霜普會云休去歇去冷湫湫地去是謂二乘寂滅之樂雲門云一切智通無障礙拈起扇子云釋迦老子來也是謂法喜禪悅之樂德山棒臨濟喝是三世諸佛慈悲喜捨之樂除此三種樂不為樂也且道歸宗一衆在三種內三種外良久云今日莊主設饡飯俵襯參退喫茶十方同聚會箇箇學無為此是選佛場心空及第歸大衆總是選佛之人既到歸宗門下須是一箇箇心空及第歸不可作長行粥飯僧彼此出家離世俗誰言祖獨有南能靈光洞耀迥脫根塵體露真常不拘文字此是百丈大智禪師舉揚大衆作麼生良久云在家疑是客別國却為親喝一喝今朝三月十五又是月圓當戶祖意教意同別且看雞寒上樹拈拄杖云春無三日晴夏無十日雨復擲下云處處緑楊堪繫馬家家門底透長安喝一喝開馬祖塔云放過一著落在第二有利無利不離行市家家門外緑楊垂不獨春風拆桃李馬祖堂開二月初二觸目遇緣法門大啓不如歸去來良久云向什麼處去馬祖堂中燒香罷僧堂裏喫茶大巧若拙大辨若訥師云達人到此身心一如身外身外無餘十方世界只在目前一年十二月倐忽又臨頭人漸老水長流世有何人便肯休休休不如歸去來自有無繩水牯牛喝一喝出家沙門清淨佛子莫於袈裟下失却人身古人道了即業障本來空未了應須償宿債且道袈裟下了箇什麼便業障本來空未了箇什麼便須償宿債出家門中也須子細不得莽鹵一等行腳離鄉別井出一叢林入一保社尋訪善知識決擇生死直須子細假饒了得我更問你只如僧問雲門二祖是了未了門云確衆中作麼生商量時中如何受用大衆要會麼昨日化主歸山一年在外化導不易有利無利不離行市喝一喝法界三觀六色空無礙如意自在萬象森羅影現中外出沒去來此土他界心印廓然融通廣大理事無礙如意自在倒把須彌卓向纖芥清淨法身圓滿土塊一點鏡燈十方海會事事無礙如意自在不動道場十方世界東涌西沒千差萬怪火裏蝍蟟吞却螃蟹事事無礙如意自在手把猪頭口誦淨戒趂出淫坊未還灑債十字街頭解開布袋事事無礙如意自在拈起一毛重重法界一念遍入無邊剎海只在目前或顯或晦事事不知空色誰會理事既周鐵船下海石火電光咄哉不快橫按鏌鎁魔軍膽碎頌古僧問首山佛法的的大意云楚王城畔水東流楚王城畔水東流樹倒藤枯笑不休好是自從投子後更無人解道油油臨濟三頓棒二資糧更不著些些岐路年深恐轉賒直下痛施三頓棒夜來依舊宿蘆花便言佛法無多子大丈夫兒豈自乖脅下兩拳明有信不從黃檗付將來僧問風穴如何是佛云杖林山下竹筋鞭杖林山下竹根鞭水在深溪月在天良馬不知何處去阿難依舊世尊前百丈再參客情步步隨人轉有大威光不能現突然一喝雙耳聾那吒眼開黃檗面興化打尅賓丈夫當斷不解斷興化為人徹底漢已後從渠眼自開棒了罰錢趁出院野狐不落藏鋒不昧分要伊從此脫狐身相逢盡道休官去林下何曾見一人因事祖師心印鐵牛機直要當鋒決是非掣電未收轟霹𮦷相逢誰是丈夫兒隱山璨和尚語嗣退庵空上堂會慶節云過去釋迦已往當來彌勒未來現在我皇誕生便是無量壽佛發號施令頭頭摩竭真機拱手垂衣處處普光明殿直得堯風蕩蕩舜日高明風以時雨以時鼓腹遊唅哺嬉東村王大翁醉酒臥街起來大笑一聲曰帝力於我何有哉不知手之舞之足之蹈之是則是且道今朝祝聖應時及節一句作麼生道九重深處龍顏悅森羅萬象盡山呼師淳熙元年二月十七日力丐退汪尚書再出帖委通判同僧司請回二十四日入院指座云隱山無量罪過復被公文追到要得重整頽綱不免再升此座登座祝聖罷再拈香云山僧茲者卸下道傍檐子走入深山擬待要追還舊觀無端被判府閣學尚書依舊牽挽出來如馬再搭鞍牛重拽磨苦苦難說如今也不可放過却為他拈出一炷栴檀無價之香祝其台算非是上酬厚德且要一拳一踢彼此分明遂就座乃云昔日石塔長老為蘇東坡而少留今朝新下生為汪尚書而走轉一動一靜本實無心或去或來有何朕迹蓋賢太守既是力作法門主則衲僧家何苦硬把死蛇頭要須看風使帆豈可釘樁搖櫓況我判府閣學尚書力攄忠悃親結主知方膺睿眷以彌隆力上祠章而不𠃔滿斯氏借寇之願繼昔人歌廉之謠如此則璨上座不免拽轉船頭再開鋪席向洛陽江邊重劄硬寨荷楊歧擔子而復展家風把斷衲子要津揑定諸方鼻孔使三世諸佛依前乞命教歷代祖師相顧攢眉叢林永永太平法眼看看滅盡是則是且道我判府閣學尚書外護提携之恩作麼生報良久云願祈台算等須彌永弼吾皇扶至化更有一頌舉似大衆心心急要入巖隈不合談禪信口開引得王臣多愛重遮回又被捉將來佛生日云瞿曇兩腳方踏地點𮌎點肋說道理直饒說得到驢年看來總落第二義且道作麼生是第一義下座與汝諸人同登寶殿潑一杓惡水報恩門庭別無道理長連牀上大衆努觜本無佛法可商量亦不坐在鬼窟裏驀然洗面摸著鼻便知得飯元是米更若遲遲疑疑白雲千里萬里上元日云昨夜三更後報恩寺裏一件事也是差異佛殿上燈籠放大光明爍破天帝釋面安樂山神忍痛不禁出來大呌一聲曰苦苦土地神怕怖慞惶走去門前石獅子鼻孔裏藏身却見衆寮中幾箇禪和先在彼中團圞打坐商量古今一箇道青州布衫為甚麼只重七斤一箇道楊岐驢子為甚麼只有三隻腳一箇道休說這箇且道麻姑山上唐朝松為什麼輪輪囷囷屈屈曲曲被土地神喝一喝云你這一隊漆桶為什麼不去觀燈却來這裏胡言漢語不勝懡㦬相趂歸來僧堂中打坐報恩門下被他恁麼相鈍置今早本要呼來對衆行遣得露柱勸一時休了如今升座之次不免舉似大衆且道是真實耶是脫空謾語耶試斷看若斷不得巡堂去風和日暖牡丹生卵露柱吹笙燈籠拍版城上遊人三杯兩盞報恩禪和努觜不管一念不生前後際斷踢倒鞏縣茶瓶打破饒州瓷碗隱山夜來夢喫攧築著腳指頭出血就地摸得麗水金元來却是新羅鐵翻身撞倒鳳凰峯赤面山神驚吐舌喚起前庵臥如來休來向這裏入滅一棒打殺麻姑仙說甚長生真祕訣叮嚀五通與三郎切莫向李太白說為什麼莫向他說怕他俗士不甘打你頭破腦裂奪得胡兒馬便休何須抵死覓封侯草鞋直掛龍牀角爭似山間煨芋頭舉湛堂準和尚頌云暑往寒來春復秋夕陽西去水東流人生三萬六千日夢電光陰颯爾休急急修急急修如今政是結交頭晚禾莫待秋後種一陳嚴霜便失收師舉了呵呵大笑云湛堂恁麼說話恰似十字街頭五更初喚起來念彌陀底老頭陀氣象急急修急急修掩彩殺人隱山今朝因晚禾可望戲作一頌身世悠悠不繫舟莫將間事掛心頭休言佛法無人會且說晚冬又倍收又倍收蟻穴百年能幾久龜腸一飽更何求大衆拍手唱囉哩算得生來不解愁重陽云箭穿楊葉未為親透得金塵有幾人多謝汾陽曾說破重陽九日菊花新拈起拄杖云昨夜三更後遮箇木上座來方丈裏問云和尚明日當參作麼生說禪隱山佇思渠云某甲教和尚道法不孤起仗境方生石女穿靴織木人帶帽耕猢孫倒上樹烏龜弄塵行時人要會箇中意新羅夜半日頭明隱山向他道也好聻今朝起來懶倦只依他所說舉似大衆少間請他來方丈裏點一盞茶賞他天下老隱山醜怪百千狀不依本分說禪一向橫拈竪放有時放夜市於蟭螟眼中有時駕鐵船於須彌頂上有時倒騎駿馬驟高樓有時輕引藕絲牽大象證鱉成龜喚三作兩黑豆換人眼睛偏做遮般伎倆汝等諸人作麼生湊泊作麼生近傍去底一任緊峭草鞋來底未許拗折拄杖為什麼如此泉山善法堂前政要草深一丈雪下云天工剪水作花飛為瑞為祥也大奇管取明年禾麥熟山河大地盡光輝千樹萬樹銀花結也是普賢呈醜拙謝三郎在南臺江手指東山笑不歇且道他笑箇什麼獅子峯高萬丈變成露地白牛以拂子打一圓相云大衆還會麼揑不成團撥不開衲僧一見莫輕猜今朝為汝明明說花奴花奴喫飯來謝休知客舉禪月休禪師在石霜充典座一日張拙入山訪石霜見其形貌枯悴語言平淡遂不喜之拂袖而下到知客寮見禪月齊己太布衲議論琅琅張乃問曰三人中何不推一人作長老禪月知張之意輕於石霜乃曰堂中五百衆似卑僧者二百五十勝卑僧者二百五十堂頭和尚乃肉身菩薩張聞此語再整威儀祇見石霜一言之下發明大事聖泉山中今請得箇知客名字適然相同議論也有些子非晚有這般措大入山問著隱山老漢知客也與麼對他時定是痛與三十即時趕出三門為什麼如此釋迦彌勒是他奴二十年來心膽粗甘與魔王為眷屬休將惡語張荼糊妙湛慧和尚語嗣法雲大通上堂云板韻才終鼓聲三疊人天交接龍象回旋祖佛家風一時漏泄到這裏不肯休去又更踏步向前致使擊玉敲金翻作葛藤露布以拄杖一劃云劃斷了也末後句作麼生道良久云驢事未去馬事到來卓拄杖下座拈起拄杖云天地一指萬物一馬踏倒繫驢橛清風滿天下莊生亦是悠悠者葉尚書宅設齊請升座師云玄機未兆影響難尋一句才宣十方普應所以圓音落落該億剎以頓周主伴重重極十方而齊唱乃拈起拄杖云拄杖子說法衲僧聽衲僧說法拄杖子聽乃至墻壁瓦礫說森羅萬象聽森羅萬象說墻壁瓦礫聽不是神通妙用亦非法爾如然要會麼牛皮鞔露柱露柱啾啾叫凡耳聽不聞賢聖嘻嘻笑住住不是韶陽門下客便隨船子下楊州舉開口不開口切忌犯靈叟智海無這箇忌諱要開便開要合便合要打便打要喝便喝一切智通無障礙十方世界橫該抹靈叟靈叟快活快活謝首座書記云透得荊棘過枯木堂中第一座拈得筆頭揮長連牀上第二機拈起拄杖云這箇是第幾機良久云若向箇中論勝劣得便宜是落便宜卓一下舉教中道何者名為義應當祕密說山僧今日不負從上諸聖對人天衆前待為諸人作祕密說良久云上大人丘乙己化三千七十士還會麼會乃佳作仁不會可知禮也山僧二十年前橫擔拄杖獨步四方自謂盡十方世界覓箇伴侶不可得後來無端披毛帶角向荒草裏走有時隨波逐浪看樓打樓有時向三家村裏東卜西卜世間鄙事無不為之如今到這裏摘脫不下也拈起拄杖云適值五兆在手更為諸人擲一卦看乃拋下云還會麼吉無不利青春易過白日難留始見新年又將一月生死事大人皆知之了得生死能有幾箇拈拄杖云拄杖子了得死生古今日月磨礲他不得天堂地獄籠他不得六道四生留連他不得祖師言句羈絆他不得如師子王自在無畏哮吼一聲羣狐屏跡遂橫按拄杖云有時橫按孤峯頂鐵眼銅睛不敢窺一法既通萬法無礙拈起笟籬放下布袋顯親上堂打鼓說禪北鬱單越合掌頂戴乃高聲讚言稽首如空無所依只箇世間觀自在咄是何言歟正說知見時知見俱是心當心即知見知見即如今咄用許多葛藤作麼但管風以時雨以時時和歲稔主上無為亦不用麒麟出現鳳凰來儀自然農夫鼓舞野老熙怡若問承何恩力但道百姓日用而不知閏年節候晚六月始梅蒸一番雲過一番雨半日陰來半日晴草鞋爛却渾間事苦是禪人眼不醒驀拈拄杖云大衆惺惺著後五日去免被拄杖子熱瞞卓拄杖下座聞聲悟道見色明心蝦䗫塞破衲僧耳朵梅雨滴爛諸人眼睛東西不辨南北不明爭似今朝見天日水自流兮山自青金粟智和尚語嗣天童宏智上堂真空不空寥寥無影樹頭月真色非色隱隱不萌枝上花威音路外芬芳鳳無依倚空劫已前照耀鶴不停機更須一色功圓便得同中有異同中異直下承當休擬議夜來明月照蘆花鶴鷺竝頭踏雪睡見色見心簷際庭花噴火非心非色溪邊嫩柳含金只如水凍魚潛雪寒人健又作麼生莫守寒巖異草青坐著白雪宗不妙舉僧問曹山三界擾擾六趣昏昏如何辨色山云不辨色僧云為什麼不辨色山云若辨色即昏昏也師拈云辨不辨昏不昏打破盆子只論盆千里遠山烟樹數家沙鳥漁村夜深月與湖光渾天水茫茫絶點痕深夜虗堂露氣佳氷霜著月沒痕瑕木人打破琉璃碗走過新羅始到家一不成二不是火雲堆裏秋風起堪笑耘田車水翁手腳忙亂同兒戲同兒戲有巴鼻但得豐年賀太平四海五湖皇化裏動時常寂寂靜處活鱍鱍動靜兩俱忘佛祖何處著驀地夢回頭長天飛一鶚春風有時好春風有時惡不得春風花不開花開又被風吹落錯錯錯蒸餅元來是麵作舉古德道幽鳥語如篁柳垂金線長雲收山谷靜風送杏花香難然如是沒量大人到這裏一時被時境轉了可惜葛藤絆倒且道金粟有什麼長處幽鳥語如篁有耳如聾柳垂金線長有眼如盲雲收山谷靜截斷意根風送杏花香拽回鼻孔到這裏薦得可謂一根既返源六門成解脫其或未然禹力不到處河聲流向西贊天童覺和尚烏頂雪眉雲蹤鶴態貌出正偏見非向背芙蓉月照兮太白峯高丹鳳翔空兮瓊林玉碎覿面分明兩彩一賽已菴深和尚語附嗣中竺癡禪妙上堂風蕭蕭葉飄飄雲片片水茫茫江干獨立向誰說天外飛鴻三兩行龍生龍鳳生鳳老鼠養兒緣屋棟達磨大師不會禪歷魏遊梁乾打閧端午云桃符休釘艾人莫縛太虗無雲本自寥廓大家拊掌歸去休擬議思量錯錯錯維摩默然普賢廣說歷代聖賢互呈醜拙君不見落花三月子規啼一聲聲是一點血一九二九相逢不出手三九二十七籬頭吹觱篥翻憶小釋迦雙手抱屈膝知不知實不實摩訶般若波羅蜜東村王老夜燒錢百萬雄兵帶甲眠四塞八蠻皆鎮靜大家拊掌賀堯年
