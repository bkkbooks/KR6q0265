body:
  text: 清凉法眼益禪師語嗣地藏上堂惱亂上座不安者外有物內有心所以凡聖一真猶存見隔便道見在即凡情忘即佛勸上座不用求真唯須息見又云願我速除虗妄見妙觀察智轉分明但漝麼究好珍重夫為沙門出生死路最急且道那路出生死不了物故為物所轉便是迷己為物去古聖教人轉一切物同無上覺便云不物於物不非物於物故經云一切法皆是佛法上座要會麼佛法也不是珍重尋常白諸上座道如今便散去早是勞上座來一轉也僧家實是無事經行林中宴坐樹下但不於三界現身意便是無事人若乃布置模樣起許作用即不古脉豈不見文殊方入得居士室上座還會麼祇為不作如許多怪朕不唯入室亦乃長在室中若不漝麼莫道入室門也摸不著且問上座如今在門裏在門外還會麼若不會久立氣脉更不續珍重雲門匡真禪師語嗣雪峯上堂有官人問佛法如水中月是不師云清波無透路進云和尚從何得師云再問復何來進云正與麼時如何師云重疊關山路問如何是啐之機師云響進云還應也無師云且緩緩問如何是雲門一曲師云臘月二十五進云唱者如何師云且緩緩問如何是祖師西來意師云日裏看山問如何是學人自己師云遊山玩水進云如何是和尚自己師云賴遇維那不在問如何是一代時教師云對一說問如何是正法眼師云普問如何是端坐念實相師云河裏失錢河裏摝問如何是諸佛出身處師云東山水上行師乃云我事不獲已向你諸人道直下無事早是相埋沒也更欲踏步向前尋言逐句求覓解會千差萬別廣設問難贏得一場口滑去道轉遠有什麼歇時祇此箇事若在言語上三乘十二分教豈是無言語因什麼道教外別傳若從學解機智祇如十地聖人說法如雲如雨猶被呵責見性如隔羅縠以此故知一切有心天地懸殊雖然如此若是得底人道火不能燒口終日說事未嘗挂著脣齒未曾道著一字終日著衣喫飯未曾觸著一粒米掛一縷絲雖然如此猶是門庭之說須是實得與麼始得若約衲僧門下句裏呈機徒勞佇思直饒一句下承當得猶是瞌睡漢時有僧問如何是一句師云舉問如何是塵塵三昧師云桶裏水鉢裏飯三乘十二分教橫說豎說天下老和尚縱橫十字說與我拈針鋒許說底道理將來看與麼道早是死馬醫雖然如此且有幾箇到此境界不敢望你言中有響句裏藏鋒瞬目千差風恬浪靜伏惟尚饗問如何是透法身句師云北斗裏藏身問如何是吹毛劍師云骼又云觜問如何轉動即得不落階級師云南斗七北斗八舉一則語教汝直下承當早是撒屎著你頭上也直饒拈一毛頭盡大地一時明得也是剜肉作瘡雖然如此也須是實到者箇田地始得若未且不得掠虗却須退步向自己根腳下推尋看是什麼道理實無絲髮許與汝作解會與汝作疑惑況汝等各各當人有一段事大用現前更不煩汝一毫頭氣力便與佛祖無別自是汝諸人信根淺薄惡業濃厚突然起得如許多頭角擔鉢囊千鄉萬里受屈作麼且汝諸人有什麼不足處大丈夫漢阿誰無分獨自承當尚猶不著便不可受人欺瞞取人處分才見老和尚開口便好把特石驀口塞便似屎上青蠅相似鬬咂將去三箇五箇聚頭商量苦屈兄弟古人一期為汝諸人不奈何所以垂一言半句通你入路知是般事拈放一邊自著些子筋骨豈不是有少許相親處快與快與時不待人出息不保入息更有什麼身心閒別處用切須在意珍重盡乾坤一時將來著你眼睫上你諸人聞與麼道不敢望汝出來性燥把老僧打一摑且緩緩子細看是有是無是箇什麼道理直饒你向這裏明得若遇衲僧門下好槌腳折若是箇人聞說道什麼處有老宿出世便好驀面唾汙我耳目汝若不是箇手腳才聞人舉便承當得早落第二機也汝不看他德山和尚才見僧入門拽拄杖便趁睦州和尚見僧入門來便云現成公案放你三十棒自餘之輩合作麼生若是一般掠虗漢食人膿唾記得一堆一擔搕𣜂到處馳騁驢脣馬觜誇我解問十轉五轉話饒你朝問至夜答到夜論劫還夢見麼什麼處是與人著力處似這般底有人屈衲僧齊也道得飯喫堪什麼共語處他日閻羅王面前不取你口解說諸兄弟若是得底人他家依衆遣日若未得切莫掠虗不得容易過時大須子細古人大有葛藤相為處祇如雪峯和尚道盡大地是你夾山和尚道百草頭上薦取老僧閙市裏識取天子洛浦和尚云一塵才起大地全收一毛頭師子全身總是你把取翻覆思量看日久歲深自然有箇入路此箇事無你替代處莫非各在當人分上老和尚出世祇為你作箇證明你若有箇入路少許來由亦昧汝不得若實未得方便撥你即不可兄弟一等是踏破草鞋行腳拋却師長父母直須著些子眼睛始得若未有箇入頭處遇著本色咬豬狗手腳不惜性命入泥入水相為有可咬嚼眨上眉毛高挂鉢囊十年二十年辨取徹頭莫愁不成辦直是今生未得來生亦不失人身向此門中亦乃省力不虗辜負平生亦不辜負施主師長父母直須在意莫空過時遊州獵縣橫擔拄杖一千里二千里走這邊經冬那邊過夏好山好水堪取性多齊供易得衣鉢苦屈苦屈圖他一斗米失却半年糧如此行腳有什麼利益信心檀越一把菜一粒米作麼生消得直須自看無人替代時不待人一日眼光落地前頭將何抵擬莫一似落湯螃蟹手腳忙亂無你掠虗說大話處莫將等閒空過時光一失人身萬劫不復不是小事莫據目前俗子尚猶道朝聞道夕死可矣況我沙門合履踐何事大須努力珍重問殺父殺母佛前懺悔殺佛殺祖向什麼處懺悔師云露問不起一念還有過也無師云須彌山問如何是和尚家風師云有讀書人來報問聖僧為什麼被大蟲咬師云與天下人作榜㨾問如何是超佛越祖之談師云糊餅進云這箇有什麼交涉師云酌然有什麼交涉大衆集良久驀拈拄杖云看看北鬱丹越人見汝般柴不易在中庭裏相撲供養你更為你念般若經云一切智智清淨無二無二分無別無斷故僧便問如何是一切智智清淨師云西天斬頭截臂這裏自領出去問古人面壁意旨如何師云念七又云定問如何是釋迦身師云乾屎橛問初秋夏末前程忽有人問如何祇對師云大衆退後進云過在什麼處師云還我九十日飯錢來問樹凋葉落時如何師云體露金風問一切智通無障礙時如何師云掃地潑水相公來問隨流認得性時如何師云東堂月朗西堂暗天帝釋與釋迦老子在中庭裏相爭佛法甚閙便下座和尚子直饒你道有什麼事猶是頭上安頭雪上加霜棺木裏眨眼灸盤上更著艾爝這箇是一場狼藉不少也你合作麼生各自覓箇託生處好莫空遊州獵縣祇欲得捏搦閒言語待老和尚口動便問禪問道向上向下如何若何大卷抄將去𡎺向皮袋裏卜度到處火爐邊三箇五箇聚頭舉口喃喃地便道這箇是公才語這箇是就處打出語這箇是事上道底語這箇是體語體汝屋裏老爺老娘噇却飯了祇管說夢便道我會佛法了也將知與麼行腳驢年得休歇麼更有一般底才聞說箇休歇處便向陰界裏閉目合眼老鼠孔裏作活計黑山下坐鬼趣裏體當便道我得箇入路也還夢見麼這一般底打殺萬箇有什麼罪過喚作打底不遇作家至竟祇是箇掠虗漢你若實有箇見處拈將來看共汝商量莫空過不識好惡詷詷地聚頭說葛藤莫教老僧見捉來勘不相當槌折腰莫言不道汝皮下還有血麼到處自欲受屈作麼這滅胡種盡是野狐羣隊總在這裏作麼以拄杖一時趂下從上來且是箇什麼事如今抑不得已且向汝諸人道盡大地有什麼物與汝為對為緣若有針鋒與汝為隔為礙與我拈將來喚什麼作佛作祖喚什麼作山河大地日月星辰將什麼為四大五蘊我與麼道喚作三家村裏老婆說話忽然遇著本色行腳漢聞與麼道把腳拽向階下有什麼罪過雖然如此據箇什麼道理便與麼莫趁口快向這裏亂道須是箇漢始得忽然被老漢腳跟下尋著勿去處打腳折有什麼罪過既與麼如今還有問宗乘中話麼待老漢答一轉了東行西行有僧擬問次師以拄杖劈口打便下座問如何是清淨法身師云花藥攔進云便與麼會時如何師云金毛師子因聞鐘鳴乃云世界與麼廣闊為什麼鐘聲披七條人人自有光明在看時不見暗昏昏便下座師在文德殿赴齊有鞠常侍問靈樹果子熟也未師云什麼年中得信道生偈頌喪時光藤林荒圖人意滯肌尫舉不顧即差互擬思量何劫悟咄悟咄力囗希禪子訝中眉垂抽顧頭鑒咦室中語要師舉古云聞聲悟道見色明心師云作麼生是聞聲悟道見色明心乃云觀世音菩薩將錢來買糊餅放下手云元來祇是饅頭舉僧問趙州某甲乍入叢林乞師指示州云喫粥了也未僧云喫粥了也州云洗鉢盂去師云且道有指示無指示若道有指示向他道什麼若道無指示者僧何得悟去有時云平地上死人無數過得荊棘林是好手僧云與麼則堂中第一座有長處也師云蘇嚕蘇嚕一日云三家村裏賣卜東卜西卜忽然卜著也無定僧便問忽然卜著時如何師云伏惟舉僧問乾峯十方薄伽梵一路涅槃門未審路頭在什麼處峰以拄杖劃云在者裏師拈起扇子云扇子㪍跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾相似會麼有時云若說菩提涅槃真如解脫是燒楓香供養你若說佛說祖是燒黃熱香供養你若說超佛越祖之談是燒瓶香供養你歸依佛法僧下去一日拈起拄杖舉教云凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空乃云衲僧見拄杖但喚作拄杖行但行坐但坐總不得動著舉雪峯云三世諸佛向火𦦨上轉大法輪師云火𦦨為三世諸佛說法三世諸佛立地聽有時拈起拂子云者裏得箇入處去揑怪也日本國裏說禪三十三天有箇人出來喚云吽吽特厙兒擔枷過狀舉雪峯云飯蘿邊坐餓死人臨河渴死漢玄沙云飯籮裏坐餓死漢水裏沒頭浸渴死漢師云通身是飯通身是水有時云直得乾坤大地無纖毫過患猶是轉句不見一色始是半提直得如此更須知有全提時節舉翠巖夏末上堂云我一夏已來與師僧說話看翠巖眉毛在麼保福云作賊人心虗長慶云生也師云關有時云光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細點檢來有什麼氣息亦是病或拈拄杖示衆云拄杖子化為龍吞却乾坤了也山河大地甚處得來舉玄沙示衆云諸方老宿盡道接物利生忽遇三種病人來作麼生接患盲者拈捶豎拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得且作麼生接若接此人不得佛法無靈驗有僧請益師師云你禮拜著僧禮拜起師以拄杖便挃僧退後師云你不是患盲復喚近前僧近前師云你不是患聾乃豎起拄杖云還會麼僧云不會師云你不是患啞其僧於此有省舉馬大師云一切語言是提婆宗以此箇為主師云好語祇是無人問僧便問如何是提婆宗師云西天九十六種你是最下種舉肇法師云諸法不異者不可續𠒎截鶴夷嶽盈壑然後為無異者哉師云長者天然長短者天然短又云是法住法位世間相常住乃拈起拄杖云拄杖不是常住法舉世尊初生下一手指天一手指地周行七步目顧四方云天上天下唯我獨尊師云我當時若見一棒打殺與狗子喫却貴圖天下太平舉雪峯示衆云世界闊一丈古鏡闊一丈世界闊一尺古鏡闊一尺玄沙指面前火爐云火驢闊多少峯云似古鏡闊沙云這老漢腳跟未點地在後東使拈問僧為復古鏡致火爐與麼大火爐致古鏡與麼大西院云與麼問人也未可在師云餿飯泥茶爐舉僧問雲居山河大地從何而有居云從妄想有僧云與某甲想出一鋌金得麼居便休去僧不肯師聞得云已是葛藤不能折合得待伊道想出一鋌金得麼拈拄杖便打垂示代語師上堂云你道古佛與露柱相交是第幾機無對師云汝問我與汝道僧便問師云一條絛三十文代前語云南山起雲北山下雨僧又問作麼生是一條絛三十文師云打與上堂云乾坤側日月星辰一時黑作麼生道代云好事不如無一日云今日十五入夏也寒山子作麼生代云和尚問寒山學人對拾得或云古人道人人盡有光明在看時不見暗昏昏作麼生是光明代云廚庫三門又云好事不如無一日云佛法大殺有祇是舌頭短代云長也又云大斧斫了手摩抄示衆云中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上作麼生代云逐物意移又云雷起雲興或云阿耶耶新羅國裏打鐵火星燒著我指頭自代云非但指頭一日云眼睫橫亘十方眉毛上透乾坤下透黃泉須彌塞却你咽喉還有人會得麼若有人會得拽取占波共新羅國鬬額代云哂示衆云作麼生是不露鋒骨句代云今時人須是明明向道始得師乃有頌不露鋒骨句未語先分付進步口喃喃知君大罔措遊方遺録師初參睦州蹤禪師州才見師來便閉却門師乃扣門州云誰師云某甲州云作什麼師云己事未明乞師指示州開門一見便閉却師如是連三日去扣門至第三日州始開門師乃拶人州便擒住云道道師擬議州托開云秦時𨍏轢鑽師從此悟入師到雪峯莊見一僧師問上座今日上山去那僧云是師云寄一則因緣問堂頭和尚祇是不得道是別人語僧云得師云上座到山中毗和尚上堂衆才集便出握腕立地云這老漢項上鐵枷何不脫却其僧一依師教雪峯見這僧與麼道便下座攔胸把住其僧云速道速道僧無對雪峯托開云不是汝語僧云是某甲語雪峯云侍者將繩棒來僧云不是某語是莊上一浙中上座教某甲來道雪峯云大衆去莊上迎取五百人善知識來師次日上山雪峯才見便云因什麼得到與麼地師乃低頭從茲契合又因疏山示衆云老僧咸通年已前會得法身邊事咸通年已後會得法身向上事師問承聞和尚咸通年已前會得法身邊事咸通年已後會得法身向上事是不山云是師云如何是法身邊事山云枯樁師云如何是法身向上事山云非枯樁師云還許學人說道理也無山云許你說師云枯樁豈不是明法身邊事非枯樁豈不是明法身向上事山云是師云法身還該一切不山云作麼生不該師指淨瓶云法身還該這箇麼山云闍梨莫向淨瓶邊會師便禮拜因見信州鵝湖上堂云莫道未了底人長時浮逼逼地設使了得底人明得知有去處尚乃浮逼逼地師下來舉此語問首座適來和尚示衆云未了底人浮逼逼地了得底人浮逼逼地意作麼生首座云浮逼逼地師云首座在此久住頭白齒黃作這箇語話首座云未審上座又作麼生師云要道即得見即便見若不見莫亂道首座云祇如堂頭道浮逼逼地又作麼生師云頭上著枷腳下著杻座云與麼則無佛法也師云此是文殊普賢大人境界師到江州有陳尚書請師齊相見便問儒書中即不問三乘十二分教自有座主作麼生是衲僧行腳事師云曾問幾人來書云即今問上座師云即今且置作麼生是教意書云黃卷赤軸師云這箇是文字語言作麼生是教意書云口欲談而辭喪心欲緣而慮忘師云口欲談而辭喪為對有言心欲緣而慮忘為對妄想作麼生是教意尚書無語師云見說尚書看法華經是不書云是師云經中道一切治生産業皆與實相不相違背且道非非想天有幾人退位書無語師云尚書且莫草草十經五論師僧拋却特入叢林十年二十年尚不奈何尚書又爭得會尚書禮拜云某甲罪過師因乾峯上堂云法身有三種病二種光須是一一透得更須知有照用臨時向上一竅在峯乃良久師便出問菴內人為什麼不見菴外事峯呵呵大笑師云猶是學人疑處在峯云子是什麼心行師云也要和尚相委峯云直須與麼始解穩坐地師應諾諾乾峯示衆云舉一不得舉二放過一著落在第二師出衆云昨日有人從天台來却往徑山去峯云典座來日不得普請便下座師在靈樹知聖大師會中為首座時僧問知聖如何是祖師西來意聖云老僧無語却問僧忽然上合著得什麼語時有數僧下語皆不契聖云汝去請首座來洎師至聖乃舉前話問師師云也不難聖云著得什麼語師云有人問如何是祖師西來意但云師知聖深肯法昌遇禪師語嗣北禪賢上堂釋迦未滅迦葉未聞從凡入聖功不浪施大藏教文如金如玉洎乎金色頭陀受法傳衣龍宮海藏無處出頭且道祖師有什麼長處一丸消衆病不假藥方多你若退身千尺我便當處生芽你若覿面相呈我便藏身弄影你若春池拾礫我便撒下明珠直得水灑不著風吹不入如箇無孔鐵鎚相似且道法昌還有為人處麼利刀割肉瘡猶合惡語傷人恨不消春山青春水緑一覺南柯春睡足携笻縱步出松門是處桃英香馥郁恩因昔日靈雲老三十年來無處討如今競愛摘楊花紅香滿地無人掃黃龍南禪師至云拏雲攫浪數如麻點著銅睛眼便花除却黃龍頭角外自餘渾是赤斑蛇法昌小剎路遠山遙景物蕭踈遊人罕到敢謂黃龍禪師曲賜光臨不唯泉石增輝亦乃龍天喜悅然雲行雨施自古自今其奈爐鞴之所鈍鐵尤多良醫之門病者愈甚瘥病須求靈藥銷頑必藉金鎚法昌這裏有幾箇墮根阿師病者病在膏肓頑者頑入骨髓若非黃龍老漢到來總是虗生浪死遂拈起拄杖云還會麼打還他州土麥唱歌須是帝鄉人頭戴華巾離少室手携席帽出長安鷲峯峯下重相見鼻孔元來總一般黃龍胡蘆棚上掛冬瓜麥浪堆中釣得蝦誰在畫樓沽酒處相邀來喫趙州茶法昌鐵牛對對黃金角木馬雙雙白玉蹄為愛雪山香草細夜深乘月過前溪黃龍玉麟帶月離霄漢金鳳䘖花下綵樓野老不嫌公子醉相將携手御街遊法昌四月八云我佛世尊降誕迦維直得九龍吐水天雨四花一手指天一手指地便道天上天下唯我獨尊大似傍若無人及乎韶陽老漢出來打一棒諸方將謂瓦解氷銷殊不知天欲明而必暗人欲旺而必衰譬如塗毒鼓打著即乖致令祖域千古之下競起干戈挂人唇齒法昌臨危不悚人好一棒太遲生未離兜率腳跟下便好與一錐豈到今日然雖如是大似賊過張弓莫有向這裏下得一轉不傷物義底語不唯與瞿曇出氣亦乃劃斷諸方葛藤有麼莫怪渠儂多意氣他家曾踏上頭關聞聲悟道何異緣木求魚見色明心大似迷頭認影諸仁者不用續𠒎截鶴夷嶽盈壑南辰北斗纏度分明日晦月明升沉自異但請休征罷戰端拱無為自然得箇入頭差肩佛祖若更言中辨意句裏明機清風月下守株人凉兔漸遙春草緑法昌今日開爐行腳僧無一箇為報十八高人緘口圍爐打坐不是規矩嚴難免見諸人話墮直饒口似稱鎚未免燈籠勘破不知道絶功勳妄自修因證果若逢臨濟德山應是難能放過但知一念回心定免三乘羈鎖青山鳥道登者即迷碧落無波動犯風影不是目前法莫生種種心明暗不相關虗空無背面到這裏直似秋潭月影靜夜鐘聲猶是生死岸頭事莫當等閒不見古者道直須向那邊擔荷了却來這邊行李揩磨心識盡却今時過患直似枯木逢春不潤始有少分相應古人與麼說話意作麼生那邊擔荷箇什麼這邊又作麼生行李除非久參碩德乃可知之莫只與麼業識茫茫無明人我私心作解妄生穿鑿如磨磚作鏡相似多少贅訛快須著力莫待前頭路盡方始著忙一朝心眼頓開方知法昌老以佛法為事年年四月十六諸方盡皆禁足法昌者裏如何但見山青水淥師到北禪禪問近離什麼處師云福嚴禪云思大鼻孔長多少師云與和尚當時見底一般禪云你且道我見時長多少師云和尚大似不曾到福嚴禪云學語之流來時馬大師安樂否師云安樂禪云向你道箇什麼師云教和尚莫亂統禪云念你是新到不能打得你師云某甲亦放過和尚喫茶次禪問鄉里什麼處師云漳州禪云三平在彼作什麼師云說禪說道禪云年多少師云與露柱齊年禪云有露柱且從無露柱年多少師云無露柱一年不少禪云半夜放烏雞師訪芭蕉泉菴主問云菴主在麼泉云誰師云行腳僧泉云來作什麼師云禮拜菴主泉云恰遇菴主不在師云你𠰒泉云向道不在說什麼你我拽棒直趕下山明朝再去依前被趕師後又去問菴主在麼泉云誰師云行腳僧揭簾便入泉攔胸把住云這裏蟲虎縱橫尿牀鬼子三回兩度來討箇什麼師云久嚮道風泉乃解開衣抖擻云你將謂泉大道有多少奇特師便問如何是菴中主泉云入門須辨取師云莫只這便是泉云賺殺幾多人師云前言何在泉云聽事不真喚鐘作甕師云與麼則萬法泯時全體現君臣合處正中邪去也泉云驢漢不會便休亂統作什麼師云未審客來將何祗待泉云雲門胡餅趙州茶師云與麼則謝師供養泉云我火種也未有早道謝供養北禪歲夜小參云年窮歲盡無可與諸人分歲今夜烹箇露地白牛煮野菜羮燒榾柮火喫了大家圍爐唱村田樂何也免使倚他門戶傍他墻致使傍人喚作郎至夜深維那問訊云縣中有人勾和尚禪云作什麼那云和尚夜來殺牛不曾納皮角禪遂捋下帽子云這箇不是那拾得便出禪喚侍者云賊賊那云天寒且還和尚帽子禪顧視師云這箇公案作麼生師云潭州紙貴一狀領過大凡參學兄弟道眼未明心地未安入一叢林出一保社須當親近良朋善友二六時中將佛法為事直須决擇令心眼精明這箇不是小事光陰易得時不待人一失人身卒未有出頭處在莫只恁麼打閧過時今日三明日四這裏經冬那裏過夏記取一肚葛藤路布學解到處摩脣捋觜漢語胡言道我解禪解道輕忽好人作無間業將知此事大不容易沒量大人到這裏討頭鼻不著莫當等間亂開大口法昌老漢無人情莫愛人摩捋你讚歎你盡不是好心一朝風火解散眼光落地善惡業緣受報好醜生死境界一時現前那時便如落湯螃蟹手忙腳亂從前活計神通佛法總使不著業識忙忙無可依怙追悔不及隨緣受報解換頭回都未可定豈不見古者道學般若菩薩且莫自謾切須子細纖毫不盡未免輪回絲念未忘盡從沉墜你要識披毛帶角底麼便是你尋常亂作主宰者是你要識拔舌地獄麼便是你誑惑迷徒者是儞要識寒氷鑊湯麼便是你濫受信施者是三塗八難盡是你心自作只為道眼不明方乃如是若是諦當底人豈有這箇消息法昌與麼說話盡是契合諸聖不獨你三兄五弟但未得忍菩薩皆有此過豈況天龍八部既來這裏徑冬過夏莫生容易老僧钁頭邊討飯供養你說些子出家話莫被人我夯却一生空過一旦四大分張那時作伎倆遲也有一般漢聞舉著他肚裏事瞋心念起便道佛法豈有與麼事大悟不拘小節更問阿誰我且問你悟見箇什麼還脫得髑髏識想也未十二時中且與五戒十善相應靈山會上還曾見有無行業底佛麼還有妄語底祖師麼大似將牛屎比旃檀有甚交涉可謂醍醐上味為世所珍遇斯等人翻成毒藥你要他相應但如今於一念於一切處放教枯淡二六時中對五欲八風如盲人視物不為諸法管帶亦不管帶諸法六根門頭檢點無絲髮過患方有少許趣向分法昌與麼說話如服瞑眩底藥相似一期苦口他時大有得力處所以古者道假使百千劫所作業不忘因緣會遇時果報還自受無人替代你各自努力雪竇禪師語嗣智門師開堂升座普觀大衆一回乃云人天普集合發明箇什麼事焉可互分賓主馳騁問答便當宗乘去廣大門風威德自在輝騰今古把定乾坤千聖祇言自知五乘莫能建立所以聲前悟旨猶迷顧鑒之端言下知宗尚昧情識之表諸人要知真實相為但以上無攀仰下絶己躬自然常光見前箇箇壁立千仞還辨明得也無未辨辨取未明明取既辨明得能截生死流同踞祖佛位妙圓超悟正在此時堪報不報之恩以助無為之化翠峯受疏專使相爭紜紜不已升座不須作鬧事在况僧家也無固無必住則孤鶴冷翹松頂去則片雲忽過人間應非彼此殊源動靜乖趣今與諸人念三二年洞庭晦迹承四遠信心恩顧捿衆方諧舊轍藏教復乃新歸豈可知感頓忘遽致前邁誠為不可四明太守星馳介使輜重俄臨既跋涉數州迢遞千里投誠苦逼一至於斯進退審詳不能自決住翠峯好往雪竇好于時衆僧高聲云往雪竇好師顧謂檀越不用為訝宜各知時且佛法委自王臣兼住持亦以緣斷在彼在此本無間然希披疏文以塞來命便下座上堂因僧送拄杖上師師拈起成頌云清峻孤根別有靈勢含山水自分明提來勝得豐城劍報盡人間兩不平復云大凡以平報不平是義烈常準以不平報不平為格外清規亦猶以智遣惑頗逢下士以智遣智罕遇作家要會兩不平麼諸人也沒量罪過雪竇也沒量罪過雪竇過自能檢責你者漆桶不打更待幾時以拄杖一時趁下形興未質名起未名形名既兆遊氣亂清師拈起拄杖云大衆拄杖子是形名雙舉還有過也無有即水裏月無即形名兆若也究得實謂恩大難酬未出母胎見成公案周行七步過犯彌天更入鹿野苑中枝蔓上復生枝蔓乃拈起拄杖云吽吽便下座諸仁者夫宗師唱道譬若滄溟上客獨泛蘭舟月渚煙波隨情放曠欲拋香餌須待長鯨縱有纖鱗應無希冀直鈎釣鯤鯨曲鈎釣龜鱉曲鈎若在鯤鯨理應未可直鈎若在龜鱉情亦不甘如今拋鈎也負命者上鈎來良久云勞而無功便下座日日日東上日日日西沒循環三百六十幾箇解知窠窟放開精精冥冥把定恍恍惚惚君不見毗耶離城彼上人一室寥寥是何物師召大衆高著眼便下座因雪示衆頭上皚皚腳下皚皚金色尊者獨上高臺開眼造罪合眼受災如何如何天網田地穩密底祖佛不敢近為什麼擡腳不起又云神通遊戲底神鬼不能測為什麼下腳不得直饒十字縱橫朝打三千暮打八百春山疊亂青春水漾虗碧寥寥天地間獨立望何極便下座却顧謂侍者云適來有人看方丈麼云有師云作賊人心虗大無外小無內半合半開成團成塊老胡既隔絶衲子多違背從他千古萬古長漫漫填溝塞壑沒人會以拄杖卓地一下云歸堂一不定二不可上下四維春風包褁桃花杏花鬪開柳條桑條憋破可憐昔日靈雲剛道迷逢達磨師拈起拄杖云靈雲鼻孔穿了也小參云須菩提巖中宴坐諸天雨花讚歎尊者云空中雨花讚歎復是何人云我是梵天尊者云汝云何讚歎天云我重尊者善說般若波羅蜜多尊者云我於般若未曾說一字汝云何讚歎天云尊者無說我乃無聞無說無聞是真說般若波羅蜜多又復動地雨花師云避喧求靜處世未有其方他在巖中宴坐也被者一隊漢塗糊伊更有者老把不住問云空中雨花讚歎復是何人早見敗闕了也我重尊者善說般若波羅蜜多惡水驀頭潑我於般若未曾說一字草裏走尊者無說我乃無聞識甚麼好惡總似者般底何處有今日師復召大衆雪竇幸是無事人爾來者裏覓箇甚麼以拄杖一時趁下上堂不得春風花不開花開又被風吹落爾若明得褒貶句未必善因而招惡果歸堂長觜鳥芳樹不棲喃喃獨語摩斯吒滄溟不入戰戰却回三十年後悟去提起手云吽吽便下座有時豎起拄杖云洪機在掌排巨靈擘太華之峯復橫案云明鏡當臺絶演若逐東西之徑又以拄杖一劃云比擬張麟兔亦不遇便下座巢知風穴知雨刢利衲僧未可相許若問如何苦哉佛陀參雪覆蘆花欲暮天謝家人不在漁船白牛放却無尋處空把山童贈鐵鞭釋迦已滅彌勒未生正當今日佛法委在翠峯放開揑聚總由者裏放開也七縱八橫是處填溝塞壑揑聚也天下老和尚盡在拄杖頭不消一劄劍輪飛處日月沈輝寶杖敲時乾坤失色衆魔從茲膽裂千聖由是眼開其如二聽不圓震迅雷而莫覺孤根將敗霈春雨以非滋致使凡聖岐分悟迷派列奔馳七趣汩沒四流重業相纏無有休日爾諸禪德覬善參詳如人上山各自努力立賓立主剜肉作瘡舉古舉今拋沙撒土直下無事正是無孔鐵槌別有機關合入無間地獄明眼衲子應須自看以字不成八字不是優曇花正開嗅著無香氣翻笑釣魚船上客不愛南山愛鱉鼻還有閙市裏出頭底麼良久云不如䇿杖歸山去長嘯一聲煙霧深便下座天衣懷和尚語嗣雪竇顯上堂舉教中道劫來觀世間猶如夢中事乃拈起拄杖云看看拄杖子作夢夢見吞却山河大地明暗色空又夢見成佛作祖你等諸人還曾夢見麼若也夢見山僧今日一場敗闕若不夢見各自歸堂掛搭下莫教失却枕頭以拄杖擊香臺下座衲僧橫說竪說未知有頂門上眼時有僧問如何是頂門上眼師云衣穿瘦骨露屋破看星眠雲生谷口水滴懸崖猿嘯孤峯鴈橫碧落眼睛定動鼻孔遼天箭發離絃新羅國裏便下座闍王殺父圓悟無生善星出家生陷地獄彼彼丈夫莫自退屈通身是眼見處偏枯截斷衆流正是隨波逐浪諸仁者要會麼冬瓜長儱侗瓠子曲彎彎便下座無邊身菩薩窮盡法界不見如來頂相諸仁者無邊身菩薩不見如來頂相且致祇如釋迦老子還見無邊身菩薩頂相麼如今若有明眼衲僧非但頂相十方世界諸如來心悉現在前良久云還見麼土上更加泥便下座太陽門下日日三秋明月堂前時時九夏古人恁麼道也是剜肉作瘡太陽門下幾箇踏著明月堂前承虗接響山僧即不然火不待日而熱風不待月而凉芭蕉聞雷開葵花隨日轉若也便恁麼去西天移來此土參一鉗一槌抽釘拔楔大唐鼓韛新羅打鐵諸仁者盡乾坤大地是箇槌柄在什麼處若更問你索鉗與山僧一時敗闕少林九年垂一則語直至如今諸方賺舉欲得不賺麼山僧與你諸人舉一遍乃云唵部咘默伽多哩薩訶便下座般若無知無所不知昨夜燈籠吞却佛殿即不問你且道新羅王子坐朝說什麼話良久云久雨不晴一一漚裏一文殊看看漚滅還歸水諸上座是漚乾坤大地是漚文殊在什麼處良久云南天台北五臺雲籠古殿迦葉攢眉露滴階墀空生泣淚森羅舉唱孰是知音水乳難分鵝王善別忽然頂門眼開莫道山僧壓良為賤舉修山主問僧甚處來僧云翠巖來主云翠巖有何言句示徒僧云和尚尋常道出門逢彌勒入門見釋迦主云恁麼道又爭得僧便問和尚又如何主云出門逢阿誰入門見什麼僧於言下有省師云雖得一場榮刖却一雙足且道落在賓家分上主家分上若定當得出憂則共戚樂則同歡山僧即不然出門則吳山楚水入門則佛殿行廊或有箇衲僧出問師意如何許伊具一隻眼良久云作是思惟時十方佛皆現如今思惟了十方佛即不現翻思古佛大似不丈夫何故如斯世界如許廣闊為什麼於一毛端現寶王剎坐微塵裏轉大法輪點檢將來氣急殺人舉教云佛放眉間光現諸希有事崇壽香臺放光三門佛殿前廊後架音聲浩浩豈不是希有事還會麼西天與此土不同參舉法眼頌云九節一笻堪觀大功謂語諸子是笻非笻師云法眼也是抱橋柱澡洗把纜放船山僧即不恁麼乃拈起拄杖卓一下云九節一笻根生上長未入手中全無伎倆既在手中可下可上若也劃斷千聖路頭文殊普賢惶惶失却座下師象十地聖人直得三三兩兩便下座諸佛非我道誰是最道者父母非我親誰是最親者既諸佛非道父母非親那箇是得力處乃拈起拄杖云或龍盤或虎踞或縱或橫萬變施為計在臨時若也變作金剛王寶劒鎮定八方狼烟永息若也變作踞地師子正眼著則喪身失命若也變作探竿影草東家杓柄長西家杓柄短無不了知在天為五星在地同五嶽在文殊手中作如意在普賢手裏為梵夾在老僧手裏祇是多年萬歲藤然雖如是節目上更生節目枝蔓上更生枝蔓三十年後不得錯舉入荒田不揀信手拈來草盡乾坤大地是一株草你諸人且道是什麼草若人識得瘥病不假驢駝藥若人不識且向荒田裏坐參無邊剎境自他不隔於毫端且道妙喜世界不動如來說什麼法十世古今始終不離於當念祇如威音王佛最初一會度多少衆若有通方作者試為道看良久云行路難行路難萬仞峯前著眼看千峯影裏古佛場中主賓相見目擊知音猶是剜肉成瘡更言向上別有玄關盡是欺賢罔聖良久云諸人者欲得不相瞞昧麼天台楖栗杖南嶽萬歲藤微言滯於心首恆為緣慮之場實際居於目前翻成名相之境天下老和尚開口動舌將特石塞却真如佛性菩提涅槃一筆勾下盡大地直得無絲毫過患由是無事甲裏更有事敢問諸人雲門為什麼倒騎佛殿趙州為什麼摘楊花虗明自照不勞心力上士見之鬼神茶飯中士見之狂心頓息更有一人切忌道著身現圓月相以表諸佛體說法無其形用辨非聲色乃舉云大衆還見龍樹菩薩性命在山僧手裏麼若也放行從教道圓道頓說是說非若不放過不消一揑參萬法何殊心何異何勞更用尋經義古人與麼說話大似泥裏洗土塊未是格外之談然依經解義三世佛冤離經一字即同魔說黃底是紙黑底是墨分別底是業識併却咽喉脣吻經在什麼處參大衆集定乃云上來打箇不審能消萬兩黃金下去打箇珍重亦消得四天下供養若作佛法話會滴水難消若作無事商量眼中著屑且作麼生即是良久云諸人還會麼珍重舉教云若見諸相非相即見如來法眼道若見諸相非相即不見佛諸人者得即得要且祇知瞻前不知顧後山僧即不然若見諸相非相眼在什麼處此語有兩負門若人點檢得出許你具擇法眼參曹山寂禪師語嗣洞山師辭洞山囑曰若要辨認向去之人真僞有三種滲漏若是當機相見切在推窮勘問子細不得鹵莽恐誤後人印可訛謬壞滅祖宗切囑切囑三滲漏者一見滲漏機不離位墮在毒海二情滲漏滯在向背亮處偏枯三語滲漏究妙失宗機昧終始濁智流轉於此三種子宜知之未達法源者多於此三種流滯盡落邊岸汝當護持斯為驗矣綱要頌三首一敲唱俱行金針雙鎖備叶路隱全該寶印當風妙重重錦縫開二金鎖玄路交互明中暗功齊轉覺難力窮忘進退金鎖網鞔鞔三不墮凡聖事理俱不涉回照絶幽微背風無巧拙電火爍難追師乃禮謝次日辭洞山山問云向什麼處去師云不變異處去山云不變異處豈有去耶師云去亦不變異問未具胞胎時還有言句也無師云有進云便請師傍瞥云汝將什麼聽進云祇如聾者還得聞否師云若聞即具耳目也進云未審是什麼人得聞師云未具胞胎者鏡清嗣雪峯即道怤也問清虗之理畢竟無身時如何師云理即如是事又作麼生清云如理如事師云謾曹山一人即得爭奈諸聖眼何清云若無諸聖眼爭知不恁麼師云官不容針私通車馬又問祇如少子還帶也無師云不憐少子老亦忘歸清云不帶時如何師云不住清云不住者如何師云非的非的清云此事還從授手也無師云事須事須清云正恁麼時作麼生師云念念相續清云恁麼則貫通血脈去也師云貫通血脈不從人得清云不從人得事作麼生師云這裏更不見人清便禮拜上堂示衆云諸方盡把格則何不與他道却令他不疑去雲門出云密密處為什麼不知有師云祇為密密所以不知有門云此人如何親近師云莫向密密處親近門云不向密密處親近時如何師云始解親近門云諾諾門又問如何是沙門行師云喫常住苗稼者是門云便恁麼去時如何師云汝還畜得麼門云畜得師云你作麼生畜門云著衣喫飯有什麼難師云何不道披毛戴角門便禮拜僧問漫漫荒徑甚處堪置生涯師云荒處莫刺腳進云不荒之地作麼生師云不渺漭進云一旦煙生誰人居止師云鬧處去也進云未審本來生涯作麼生師云蒺藜深僧問清稅孤貧乞師賑濟師召云稅闍黎稅應諾師云清源白家酒三盞猶道未霑脣僧問沙門豈不是具大慈悲底人師云是進云忽遇六賊來時如何師云亦須具大慈悲進云如何是具大慈悲師云一劍揮盡進云盡後如何師云始得和同問朗月當空時如何師云猶是階下漢進云請師接上階師云月落後來相見問未審是什麼人即不被無常吞師云熾然在無常中還吞得麼問如何是曹源孤峻處師云梯橙不到進云還有人得到也無師云不踏梯橙即得進云未審得到後如何師云不見有孤峻問如何是其中人師云傾國無知己進云還有人識得否師云有進云是什麼人師云土木瓦礫問又無阻隔為什麼過那邊不得師云若無阻隔也無那邊進云恁麼則大千沙界總是他屋裏也師云大千沙界即是他屋裏作麼生是大千中人僧無對師代云不坐大千者師問衆云山河大地一時來問是什麼人能答衆無語師代云不具六根者師問強上座云佛真法身猶若虗空應物現形如水中月作麼生說箇應底道理強云如驢井師云道則太殺道祇道得八成強云未審和尚如何師云如井驢僧問教中云大海不宿死尸如何是大海師云包含萬有者進云既是包含萬有為什麼不宿死尸師云絶氣息者不著進云既是包含萬有為什麼絶氣息者不著師云萬有非其功絶氣息者有其德進云向上還更有事也無師云道有道無即得爭奈龍王按劒何問日未出時如何師云曹山也恁麼來進云出後如何師云猶較曹山半月程師問德上座菩薩在定聞香象渡河出什麼經德云涅盤經師云定前聞定後聞德云和尚流也師云道則太殺道祇道得一半德云和尚如何師云灘下接取僧問學人十二時中如何保任師云如經蠱毒之鄉水也不得霑一滴問一牛飲水五馬不嘶時如何師云曹山解忌口又云曹山孝滿僧問香嚴如何是道嚴云枯木裏龍吟僧云如何是道中人嚴云髑髏裏眼睛僧後舉問石霜如何是枯木裏龍吟霜云猶帶喜在進云如何是髏髑裏眼睛霜云猶有識在僧又舉問師如何是枯木裏龍吟師云血脈不斷進云如何是髑髏裏眼睛師云乾不盡進云未審有得聞者否師云盡大地未有一人不聞進云祇如枯木裏龍吟是何章句師云不知是何章句聞者皆喪師因有頌枯木龍吟真見道髑髏無識眼初明喜識盡時消息盡當人那辨濁中清僧問雪覆千山為什麼孤峯不白師云須知有異中異進云如何是異中異師云不墮諸山色問家貧遭劫時如何師云不能盡底去進云為什麼不能盡底去師云賊是家親進云既是家親為什麼翻成家賊師云內既不應外不能為進云忽然捉敗時如何師云內外絶消息進云捉敗時功歸何所師云賞亦不曾聞僧云恁麼則勞而無功師云功則不無成而不處進云既成為什麼不處師云不見道太平本是將軍致不許將軍見太平紙衣道者問訊次師云莫便是紙衣道者麼衣云不敢師云如何是紙衣下事衣云一裘才掛體萬法悉皆如師云如何是紙衣下用衣近前叉手便立脫師云汝祇解恁麼去不解恁麼來衣忽然開眼問云一靈真性不假胞胎時如何師云未是妙衣云如何是妙師云不徣借衣便珍重歸單下坐化師乃有頌覺性圓明無相身莫將知見妄疏親念異便於玄體昧心差不與道相憐情分萬法沈前境識鑒多端喪本真如是句中全曉會了然無事昔時人僧舉澧州茗溪示衆云吾有大病非世所醫未審是什麼病師云攢簇不得底病進云一切衆生還有也無師云人人盡有進云和尚還有否師云正覓起處不得進云一切衆生為什麼不病師云一切衆生若病則非衆生進云諸佛還有此病否師云有進云既有為什麼不病師云為伊惺惺問抱璞投師請師雕琢師云不雕琢進云為什麼不雕琢師云須知曹山好手問世間什麼物最貴師云死猫兒頭進云死猫兒頭為什麼却貴師云為無人著價問古人云吾常於此切意旨作麼生師云要曹山頭即斫將去樹問洞山什麼處來山云親近來樹云若是親近用動這兩片皮作什麼山休去師後聞乃云一子親得四禁頌莫行心處路不挂本來衣不須正恁麼切忌未生時示學者頌二首學者先須識自宗莫將真性雜頑空妙用體盡知傷觸力在逢緣不借功出語直教燒不著潛行須與古人同無身有事超岐路無事無身落始終將名召物顯非名豈料迷形却認聲鏡裏捉頭徒自遠水中撈月枉千生回鄉暫指還家路若至家中又失程莫怪漁人頻舉棹鼓風搖浪待龍行投子青和尚語嗣大陽師入院拈香祝聖罷次拈香云此一瓣香大衆還知來處麼非天地所産非陰陽所成威音已前不落諸位燃燈之後七佛傳來直至曹溪分流大廈山僧向治平初在浮山圓鑒和尚親手傳得寄付其宗頌委證明慈旨云代吾續大陽宗風山僧雖不識大陽和尚憑浮山宗法識人以為嗣續如此更不敢違浮山和尚法命付囑之恩恭為郢州大陽明安大師和尚何故父母諸佛非親以法為親升座師云若論此事豈在高升法座下列明賢問答主賓以為出世況千賢杜口萬聖絶言古今佛祖分雪無門三藏五乘指諭不下然雖如是不可一向弓折箭盡去也所以道千峯鎖色萬木古巖月照風生幽洞雲開四面龍吟枯木鳳轉青霄石牛吼斷長空木馬嘶開金戶靈苗競發瑞草爭春日月同明千江共澍直得如斯猶是出世邊事落在今時諸仁者如何得不落今時去良久云萬年石徑千雲鎖一帶青山半夜封上堂若論此事如魚遁深淵必招釣客玉埋荊谷何逆求人所以刖足楚城烟波渭水蓋不守平常致斯如是此日白雲滿谷淥水浮烟瑞鳥驚晨山光眩目觸事無私有何不可然雖如是更須無手能遮日釣魚不犯竿下座謝化主云碧岫樓空白雲自異靈苗獨秀繁草何生金雞啼處月落三更玉兔眠時日輪當午瓊林上苑枯木迎春寶殿苔生歌謠萬里然雖如是且道應時應節一句作麼生道良久云夜來深雪裏天曉數枝開參默沉陰界語落深坑擬著則天地懸殊棄之則千生萬劫洪波浩渺白浪滔天鎮海明珠在誰收掌良久卓拄杖一下云百雜碎因雲大師到云無影殿上誰是知音古路傍邊幻人木馬千峯鎖翠萬木含煙白雲起處樓閣門開碧霧卷時妙峯頂露且道絶頂相見一句作麼生道良久云不辭山路遠特地入松門莫坐白雲休眠青嶂直須枯木花芳氷河焰發旋風不滯觸目能傷擬議之間徒勞進步到這裏直須懸崖撒手自肯承當絶後再蘇欺君不得禪德作麼生是承當底事良久云㵎深花落遠山高樹影長孤村陋店莫掛瓶盂祖佛玄關橫身直過早是蘇秦觸塞求路難回項主臨江何逃困命禪德到這裏進則落於天魔退則沉於鬼趣若是不進不退正在死水中諸仁者作麼生得平穩去良久云任從三尺雪難壓寸靈松宗乘若舉凡聖絶蹤樓閣門開別戶相見設使捲簾悟道豈免傍觀春遇桃花重增病眼所以古人道向上一路千聖不傳諸仁者既是不傳因甚陝府鐵牛走過新羅國裏乃喝一喝云達者須知暗裏驚舉種種幻化皆生如來圓覺妙心拈起拄杖云只如山僧拄杖子且不從彼中生何故若從彼中生爭得在山僧手裏禪德若知生處祖師向諸人腳跟下乞命若也不知山僧不免與諸人注破擲下拄杖歸方丈舉僧問洛浦學人欲歸鄉時如何浦云家破人亡子歸何處僧云恁麼則不歸去也浦云庭前殘雪日輪消室內紅塵遣誰掃師拈云且道洛浦恁麼對他什麼處是指這僧歸路若於這裏會得可謂撒手歸家若也不會舉步更須子細下座雪覆千山白雲淡濘松寒千古㵎水流氷祖師不坐少林春來者休尋無縫塔歲旦云元正啓祚萬物咸新千山秀翠於烟峯淥水穿雲於碧霧石牛運步瑞草鮮明木馬垂絛靈苗發艷古佛塔廟善財得遇文殊雞足山西飲光再逢彌勒寒山添壽拾得增年同賀太平共扶堯化諸仁者且道嘉州大像今日壽年多少良久云千歲老兒顏似玉萬年童子髮如絲煙雲擁翠鸞鳳迷蹤寒雨衝山樵人歸晚劫初鈴子振者何人路不拾遺君子稱美少林昨夜月當圓𦵇嶺山西𢹂隻履諸仁者祖師更有一隻履諸人還曾收得麼若收得不直半分錢若收不得當何憑準以拂子擊禪牀下座謝首座云古人道積石成山積水成流積土成墻積學成聖積行成德且道衲僧家積箇什麼良久云少林雖不語別是一家春昔日世尊在靈山會上入無量三昧身心不動是時天雨曼陀羅華摩訶曼陀羅華大衆當初世尊大似傍若無人山僧今日雖是養子不及父亦不入無量三昧且免得天雨四花遂拈起拄杖云與諸人轉大法輪卓拄杖下座諸佛出世應病施方祖佛西來守株待兔直饒全提舉唱猶如鑿壁偷光設使盡令施行大似空中擲劍何故不見古人道不用求真唯須息見諸仁者且道息箇什麼見良久云靈雲不悟桃花旨空使玄沙暗皺眉三日一風五日一雨德山臨濟不勞更舉舉僧問曹山佛未出世時如何云曹山不如又問出世後如何云不如曹山師云古人道則一時間道了也須知妙峯頂上有一人大不肯曹山恁麼道諸人還識此人麼若不識山僧為你諸人道破良久云寧可截舌不犯國諱古人道執事元是迷契理亦非悟作麼生免得去良久云久立住投子謝專使云若論此事豈在繁論雖官不容針私通車馬便有分疏分所以道靈山分座自恥何多少室虗掩是誰之過蓋栽梧待鳳種竹引風若無二祖承襲依舊青山帶翠諸仁者且道承襲箇什麼良久云不勞懸古鏡天曉自雞啼小參昨夜鐘鳴時道人盡來此今夜鐘鳴時復來有何事月明幽室寒星分拱辰異若是陶淵明攢眉却回去良久云今夜不教諸人攢眉何故心不負人面無慚色下座舉藥山和尚一夜小參衆集山云我有一句子直須待特牛生兒即向你道時有僧出云特牛生兒也自是和尚不道山云把火來其僧潛身入衆洞山拈云却是這僧知有只是不肯禮拜師云大衆且道甚處是這僧知有底道理若道得可謂與這僧雪屈若道不得却被藥山謾山僧今夜不惜眉毛與諸人頌破一句那教祖佛知特牛生子落今時暗中一曲依稀似燈照殘文不是詩偈頌浮山遠和尚出十六題令師頌出識自宗二佛祖言時路轉乖石人語話頗同諧徒施棒喝門庭迅擬動之間早自埋空劫威音前別有一壺天御樓觀射獵豈是刈茆田死中活絶境沉機無是非江南春早鷓鴣啼皆言即色明心會木馬無絛動地嘶活中死鳥銜花落碧巖前對境皆言到處傳人問西來指庭柏豈關蒼翠嶺頭穿不落死活金雞日裏報春時玉兔懷胎入紫微兩岸蘆花映白鷺漁翁舞棹撥烟歸背捨百非若盡萬惑除對境無心物物渠真淨界中才一念閻浮早是八千初不背捨真金入火兩何殊優鉢羅花𦦨裏敷煩惱路中誰作伴無明海內自沉浮活人劒黃河九曲鎮乾坤濟水穿溟透海清風起浪高船更長月分彎勢又多晴殺人劒劃斷機彀勢莫窮聖凡從此永沉蹤巴江迅闊人難渡一陳嚴風信莫通平常一周才盡又春風野渡江濵動釣翁堤岸緑楊和雨綻近山添翠碧朧利道拔生休觀黃葉失金錢自是無他豈後先千聖共傳無底鉢大都迷悟有中邊言無過失露柱拈來作木杓他人不肯任從他三腳踟跦巧不會致令王老笑呵呵透脫黃鶴樓畔緑條新二水三山間景橫南地瘴多炎氣盛北天夏雨凍成氷透脫不透脫東山西嶺間紅青云言答話有其門跳得南堆北阜坐到頭不解跨崑崙稱揚靈山分座顯仁風少室傳芳續𦦨同功不浪施直到此本來祖意豈西東降句擬發言來路八千回頭顧望滿家憐立荒野無人識空對悲風草色前方入圓錢牛幾度過新羅踏斷千溪萬道河欲會方中入圓句牧童橫管又披蓑四料揀頌奪人不奪境青草初開嫩竹折野禽撩亂㵎分斜岡烟乍斷雲猶淡片照郊原木未遮奪境不奪人藍關風雪徑難通野渡求舟謁釣翁五里望遙復五里一宵愁盡一宵同人境兩俱奪石徑春回草不青荒墟平野月為鄰楚山斷處殘雲散渭水河枯木倒秦人境俱不奪春風吹谷緑苔新流水滔滔貫孟津鶯囀上林喧帝里帶煙垂釣得金鱗憶古肯來一法無生處迷去千言越轉訛釋迦曾受燃燈記還有人能記得麼慶今得承遺蔭歸真覺高謝空王諦此心但教日用平懷穩佛祖情塵見自沈白牯露地前時懶欲牽恐分頭角踏人田如今放育清溪上吼斷千峯萬樹烟閒述寄人情有諸緣動心空萬事休不唯凡聖斷觸類自無求禮四祖大醫禪師塔一塔雙峯下全身萬象前松寒幾度老月滿不離天靜剎師親創醫王聖主宣牛頭人不在東㠐接雲煙題廬山遠法師塔八百餘年鴈塔存幾遭風雨幾逢春虎溪輦在社人散依舊杉梯長翠陰雙溪田道真堂道存今古人何去溪水分頭帶月來巖畔老松墳畔竹時搖清韻祖堂階贊黃檗禪師真百丈山雄斷際崖峻月滿滄溟兮眼暗耳聾吐舌縮項兮臨濟歸順大鼎湯中片雪飛劫火灰心紅玉潤投子楷和尚寂住松寒祖峯月冷審諦慈顏威而不猛星河斗轉五更前帶雪泥牛耕月影浮山圓鑒大師真玉樹無棲鳳金河月未生木人來乞火半夜太陽春自贊忽覽傳儀殊無可相不是為僧升合難望白雲中夜抱巖石月上千峯曉青嶂楊次山贊師真附一隻履兩牛皮金鶯啼處木雞飛半夜賣油翁發笑白頭生得黑頭兒師諱義青本青社人姓李氏七歲出家十五試經得度後得法於浮山圓鑒遠禪師先是圓鑒參見郢州大陽山明安禪師機緣相契遂傳宗旨明安以皮履布裰付之遠辭曰某甲已先有得處安歎曰吾一枝遂無人也遠曰洞下宗風實難紹舉和尚尊年或無人承嗣即某當持衣信為和尚求人轉相付囑安許之曰他時得人留吾書偈證明乃書曰楊廣山頭草憑君待價焞異苗翻茂處深密固靈根其末云得法後潛衆十年方可闡揚後遠與師相遇洞下宗旨示之以大陽真像衣信書偈付囑曰代吾續大陽宗風後果隱十載方出世嗣大陽有嗣法子芙蓉楷禪師芙蓉楷禪師語嗣投子青上堂此日雪落填溝塞壑玉樹瓊林寒光閃爍六牙香象木人騎露地白牛無處著直得混同一色浩蕩難分點檢將來猶是今時之說諸仁者忽然撞著日面佛教君一場懡㦬結夏云諸禪德直饒你踏破腳亦且向這裏休去好古殿風清回廊人靜青青庭柏善說真如隱隱石魚能談法要燈籠側耳露柱點頭若也於斯薦得慶快平生若也未明山僧不免說破還會麼口似鼻孔解夏云今日解夏了也且去南行北行到處東卜西卜出門聊贈一言鎮州出大蘿蔔月白風清水遙山遠樓臺聳翠殿閣生凉大地山河森羅萬象盡與諸人說了也切莫自生退屈更去問佛問祖說道說禪却恐埋沒諸人去還相委悉麼良久云已落第二月也便下座威音那畔水泄不通便是釋迦親來也分踈不下少室九年伸吐無門若據令而行三世諸佛側立六代祖師只可傍觀如今放一線道許諸人通箇消息若通得箇消息許你同身共命一氣連枝若通消息不得良久云只知荊玉異那辨楚王心威音已前不落諸位燃燈之後以心傳心諸祖相繼襲掩室摩竭似是而非更於鹿野苑中三轉十二行法輪自後聲教既傳四十九年指喻不下子孫幾乎斷絶黃面老人末後著忙將青蓮目顧視迦葉迦葉微笑吾有正法眼藏付囑於汝金色頭陀大似不丈夫取人處分自後西天此土指鹿為馬少室黃梅將日作月祖師已是錯傳山僧已是錯說今日不免將錯就錯曲為今時從來向君道直須旨外明宗莫向言中取則石人似汝也解唱巴歌汝若似石人雪曲也應和直饒唱得韻出青霄和得宮商不犯正是出世邊事落在今時且道未出世邊事作麼生道良久云眹兆未生前薦取春風飄擺緑楊垂威音路外千聖不遊問答言陳鄉關萬里設使總不恁麼坐在無事界中更乃凝眸不勞相見今朝五月旦石人手把寒天扇休休無背面觀君直下忘知見若憑學路幾時休瞥爾情生魔得便還會麼良久云行玄體妙落邪途究理窮源千里遠參世尊於二千年前在兜率陀天作一夢夢見降身母胎又夢見金盆洗浴周行七步目顧四方又夢見六年雪山修道又夢見菩提樹下成等正覺又夢見於波羅奈國安坐道場又夢見雙林樹下入大涅槃諸人且道與今日是同是別所以道三世諸佛說夢六代祖師說夢天下老和尚說夢山僧今日說夢諸人還曾夢見麼良久云不因西域殘氷盡爭見東園柳眼青下座法無彼此道無凡聖歷劫坦然離諸修證得之者紅𦦨生蓮失之者碧潭捉影從來不得蓋為今時如今善惡二念與你一時掃却直教盡處不為家空處不為座萬行不為衣行如鳥道坐若虗空良久云還會麼虗空不掛劒玉兔不披鱗入道之徑內虗外靜如水澄凝萬象光映不沉不浮萬法自如所以道火不待日而熱風不待月而凉堅石處水天瞽猶光明暗自爾乾濕同方若能如是巖前枯木半夜開花木女携籃清風月下石人舞袖共賀太平野老謳歌知音者和於斯明得何必重登塔廟再見文殊道在目前一時參取一法遍含一切法拈起拂子云諸人還見過去見在未來一切諸佛於山僧拂子頭上現大神通作大佛事諸人若這裏薦得便乃入維摩丈室大寂光中四聖六凡共同一處其或未然山僧為諸人說破良久云明月鋪霄漢山河勢自分拂子擊禪牀下座謝新舊知事小參有進有退今古常儀進者如龍歸滄海衆類有依各得其所退者如𦏰羊挂角形影不彰長養聖胎漸成大器此二者自利利他各不相弱山僧今夜勸你諸人莫學佛法擬心學者草深一丈從上諸祖被你諸人埋向深草叢裏今夜山僧與祖師雪屈勸汝諸人莫向經卷冊子上尋求設使言語文字中有箇入處譬如螢火之光自救不了你若向空劫時悟明自己譬如百千日月光明無量無邊衆生一時度脫你若未明直須退步就己始得自休休去自歇歇去似古廟香爐去一念萬年去似一息不來底人去你若能長年歲月如此若不得道果山僧妄語誑你諸人自生陷地獄勸汝諸人莫錯用身心辨取前程道路莫待臨時須是自家著力無人替代珍重示衆云夫出家者為猒塵勞求脫生死休心息念斷絶攀緣故名出家豈可以等間利養埋沒平生直須兩頭撒開中間放下遇聲遇色如石上栽花見利見名似眼中著屑況從無始已來甚事不曾經歷又不是不知次第不過翻頭作尾止於如此何須苦苦貪戀如今不歇更待何時所以先聖教人只要盡却今時能盡今時更有何事若得心中無事祖佛猶是冤家一切世間自然冷淡直須這邊冷淡方始那邊相應你不見隱山至死不肯見人趙州至死不肯告人匾擔拾橡栗為食大梅以荷葉為衣紙衣道者只披紙玄泰上座只著布石霜置枯木堂與人坐臥祇要得死了你心投子使人各自辦米同煮共餐祇要得省取你事且道從上諸聖有如此榜樣若無長處如何甘得諸仁者若也於斯體究的不虧人若也不肯承當向後深恐費力山僧行業無取忝主山門豈可坐費常住頓忘先聖付囑今者輒欲效古人住持體例與諸人議定更不下山不赴齊不發化主唯是本院莊課一歲所得均作三百六十分日取一分用之更不隨人添減可以備飯即作飯作飯不足即作粥作粥不足即作米湯新到相見茶湯而已更不煎點唯置一茶堂自去取用務要省緣一向辦道又況活計具足風景不疏花解笑鳥能啼木馬長鳴石牛善走天外之青山寡見耳畔之鳴泉無聲嶺外猿啼露濕中宵之月林間鶴唳風回清曉之松春風起而枯木龍吟秋葉凋而寒林花發玉階鋪苔蘚之紋人面帶烟霞之色音塵寂爾消息沉然一味蕭條無可趣向山僧今日向諸人前說家門已是不著便豈可更去升堂入室拈捶竪拂東喝西棒張眉努眼如癇病發相似不唯屈沉上座況亦辜負先聖你不見達磨來到少室山下面壁九年二祖至於立雪斷臂可謂受盡艱辛然而達磨不曾措了一辭二祖不曾問著一句還喚達磨做不為人得麼還喚二祖做不求師得麼山僧每至說著古聖做處便覺無地容身慚愧後人軟弱又況百味珍羞遞相供養道我待四事具足方可發心祇恐做手腳不迭便是隔生隔世去也時光似箭深為可惜雖然如是更在諸人從長相度山僧也強你不得諸仁者還曾見古人一偈麼山田脫粟飯野菜淡黃虀喫則從君喫不喫任東西伏惟同道各自努力珍重偈頌妙唱不干舌剎剎塵塵處處談不勞禪子善財參空生也解通消息花雨巖前鳥不銜死蛇驚出草日炙風吹草亂埋觸他毒氣又還乖暗地若教開死口長安依舊絶人來解針枯骨吟死中活得是非常密用他家別有長半夜髑髏吟一曲氷河紅𦦨却清凉鐵鋸和三臺不是宮商調誰人和一場伯牙何所措此曲舊來長古今無間一法元無萬法空箇中那許悟圓通將謂少林消息斷桃花依舊笑春風歲旦免人事日出東方夜落西急須著眼莫遲疑新年不用來相賀江月松風是舊時因雪有頌寒雲擁出玉花飛溝壑平盈客路迷露地白牛何處覓牧童空把鐵鞭歸真歇了禪師語嗣丹霞淳上堂苔封古徑不墜虗凝霧鎖寒林肯彰風要鈎針穩密孰云漁父棲巢只麼承當自是平常快活還有具透關眼底麼良久云直饒聞早便歸去爭奈從來不出門巢知風穴知雨忽若風雨愆期又知箇甚麼良久云却是完全底雨過夜塘暗通法脈雲凝曉色密耀靈蹤一根返而百草潛敷六戶明而千巖擁秀渴飲飢餐即且置黧奴白牯為甚麼却快活撼拄杖云看看三千大千世界一時搖動雲門大師即得雪峯即不然卓拄杖云三千大千世界向甚麼處去還會麼不得重梅雨秧苗爭見青久默斯要不務速說釋迦老子也待要款曲賣弄爭奈未出母胎已被人覷破且道覷破箇甚麼良久云瞞雪峯不得及得盡猶隔鄉關轉得回尚涉雲水作麼生得不涉雲水海底金烏出光分一色前松風吟鴉鵲詠各自說各自聽唱一漚未發宗乘提千聖不傳正令如今開口盡無端爛醉舌頭何日醒且道雪峯今日為甚麼也有些毛病曲為今時一杯只得大家酩酊具啐同時眼見得到有啐同時機用得到爭奈疾雷不及掩耳所以道眨上眉毛早是蹉過且道蹉過箇甚麼良久云古佛過去久矣山僧今日要洗一夏已來汲量大底口業遂呵呵大笑云山僧口業已得清淨即容下座禮謝大衆天不言四時行地不言萬物生拄杖子不言衲僧倒戈卸甲高豎旌旗不敢正眼著雪峯擬欲放過將謂欺善怕惡遂卓拄杖云誰奈我何古洞煙收玄關密啓新豐路隔妙信潛通九包之鳳呈祥丹岫之雲布彩直得靈峯擁秀絶頂抽條雪嶺增輝揚眉共慶正恁麼時擲地金聲即且置血脈不斷是甚麼人鄱陽城裏月照破萬家門夜雨蕭蕭渾無縫罅虗堂歷歷逈脫蹤由但知萬壑曉分誰管六門春盡妙在體前即且置作麼生是自由自在底時節夜來一覺睡不聽五更鐘五乳峯前三拜歸位平地喫交更言得髓可憐無限兒孫一時被他帶纍即今善法堂中只得大家觸禮禮即不無且道與神光底相去多少却須抖擻精神不得開眼瞌睡一雨所滋根苗有異人人要麥秀兩岐箇箇望禾登九穗聖朝不必望嘉祥只管豐年為上瑞且道衲僧分上成得甚麼遂拍手呵呵大笑云菩薩子喫飯來粗言及細語皆歸第一義三家村裏老婆惡口廝罵穢語廝爭盡是面門放光助佛揚化若見得徹剔起眉毛大家平出其或未然山僧觸忤大衆即容禮拜懺謝象