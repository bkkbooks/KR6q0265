難所以道去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年貧錐也無會禪易脫禪難大須子細始得東霞山中無事若已得者默默地長養聖胎時節到來自是遏捺不住尸居而龍現淵默而雷聲若未得者却須晝三夜三精研磨煉擺脫得失是非直使上無攀仰下絶己躬如靠一座須彌山靠來靠去忽然葛狚脫落眼睛突出始有少分相應不枉在東霞度夏也解夏云布袋口結也無繩自縛布袋口開也天台南嶽布袋口不開不結天下衲僧無處摸索總不恁麼官不容針私通車馬洞山示衆云初秋夏末兄弟東去西去直須向萬里無寸草處去衲僧拄杖子拈得便行說什麼萬里有寸草無寸草瀏陽菴主云出門便是草是則是要與洞山把手共行未免腳跟下浮逼逼地更有翠巖老路見不平示衆云一夏已來與兄弟說話看取翠巖眉毛在麼眼觀東南意在西北保福云作賊人心虗也在翠巖窠窟裏長慶云生也共出一隻手雲門云關勘破了也諸大老與麼提唱大似管中窺豹可中有箇漢向未屙已前一跳跳出如生師子卓朔查沙有什麼近傍處古人不得已道神光不昧萬古徽猷入此門來莫存知解蝦蟆跳上梵天蚯蚓走過東海到這裏布袋口結布袋口開布袋口不結不開以至總不恁麼還用得著麼既用不著畢竟如何良久云若到諸方切忌錯舉光陰不饒人方始結制倐忽又是十日一夏能有幾箇十日有志參學之士思之得不寒毛卓豎耶教中道觀天地念非常觀世界念非常却移觀天地世界底念來自己靈覺上反照看大迦葉久滅意根圓明了知不因心念是以釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無說而演道釋梵絶聽而雨花從上古佛莫不窮到根極處一時失却鼻孔眼睛了却打一箇背翻筋斗向第二義門出一隻手興慈運悲開方便門豈知法出姦生事久多變不務其實一味承虗接響大丈夫漢肯受人差排滅却臨濟宗瞎却正法眼撞入瞎驢隊裏作箇大闡提人家男女當恁麼時德山棒如雨點臨濟喝似雷奔祕魔擎杈文殊仗劍玄沙猛虎雪峯鱉鼻無處施呈師乃豎起拂子云金山拂子不甘恁麼說話變作大將軍身橫吞巨海背負須彌哮吼一聲却入拂子裏去也或有箇衲僧出來道雷聲甚大雨點全無只向他道逢人且說三分話未可全拋一片心普說便恁麼散去早是辜負平生了也那堪更進前咨詢某甲等為生死事大無常迅速不堪為種草若是互為賓主成法為人却較些子此為已徹證者說或者久在叢林非不用心不能得箇透徹者過在什麼處過在信根不重半信半疑似做不做只是無決定志又不能全身放下縱使放得下做到理路絶處情識盡處靜境不戀閙境不拘只與麼浸在死水裏分明死了活不得往往多只向者裏著到若能猛烈靠將去一撞撞翻始得慶快此為久在叢林打未到頭底說若是乍入叢林兄弟信根純淨諦信此事恰似箇白練絹相似不受他人點污得遇明師發一片誠心不願出人前唯只是要參禪學道發明心地資之勇猛確然以生死大事為念十二時中時時覷捕驀然泯情塵絶知解如晴空萬里不挂片雲何患日頭不出也日頭才出無有不照處日頭出時恰似箇什麼山野老婆心切向壁角頭拈出一片陳橘皮與諸人作箇㨾子豈不見壽禪師因普請次拋下一片柴頭驀然契悟便道撲落非他物縱橫不是塵山河及大地全露法王身這箇時節還計較得麼如人飲水冷暖自知法眼和尚也曾恁麼打發一回便解道物物到心上全心物自閒古今城郭裏得者住如山可謂真語者實語者當恁時不用求殊勝殊勝自至非但壽禪師大法眼如此至於三世諸佛六代祖師天下老和尚皆不出此若有別證別解即是外道法非是佛法金山恁麼忉忉怛怛恰似箇媒人婆相似東邊說一歇西邊說一歇兩邊說得合及至鴛鴦帳裏你自理會不干媒人事你若實到鴛鴦帳裏一回便不忍捨也參禪學道須到不忍捨底田地正好做工夫如人上山各自努力示楊州孤山接待友仲禪人化莊田靈山會上百萬大衆雲集世尊升座一言不措舒金色臂拈一枝花普示人天一一莫知其由惟迦葉尊者破顏微笑世尊更不囊藏八字打開云吾有正法眼藏涅槃妙心分付摩訶迦葉自此人傳一人綿綿不斷西天二十八祖唐土六祖曹溪而下臨濟雲門曹洞溈仰法眼列為五宗星分碁布若揭日月誠心要明佛祖不傳之妙者衆若非資糧莫能加行是故友仲禪人重念祝髮之所孤山乃伏虎禪師道場四方往來尋訪宗師究明此道底玄衲要衝之處毅然發心勸募遠近檀越興置常住田畞資糧既備坐享見成豎起脊梁全身挨入最初一步插腳穩當自然入得人爐韛受得人煅煉禁得人拳躍逗到宗眼睛明知見脫略所謂拈花微笑已是犯手傷鋒人傳一人互相鈍置但恐入作處莽鹵承當處含胡未免打入葛藤窠裏非但辜負從上佛祖亦辜負傾施檀度思之豈不寒毛卓豎耶悟明心地打得徹頭與古人為伍則彼此利益無窮耳頌古世尊未離兜率已降王宮風從虎兮雲從龍兜率王宮不見蹤腳力盡時山更好莫將有限趁無窮天上天下唯吾獨尊女子出定指天指地是何三昧師子咬人狂狗逐塊女人擺尾世尊搖頭文殊罔明看樓打樓莫教一著錯敗子卒難收巴陵明眼人落井馬祖日面佛月面佛潑天大路鐵壁萬重殺人可恕無禮難容尊候何如問最親鑽簇不得病源深等閒提起軒轅鏡扁鵲盧醫無處尋趙州蘇州有常州有心不是佛智不是道蘇州有常州有未到蘇常不知有既到蘇常何處有若人不識古人意空向城中顛倒走遲日江山麗春風花草香泥融飛燕子沙暖睡鴛鴦雲門露飲官酒臥官階當處死當處埋天公知悖逆不許葬尸骸清淨行者不入涅槃破戒比丘不入地獄清淨行者清淨破戒比丘破戒各自安貼家切忌放賊過界長慶坐破七箇蒲團雲門放洞山三頓棒白首儒生困路岐殘杯冷𮌉飽還飢一朝得意春風下便把驢兒作馬騎孫臏減竈捉龐涓相如奪得連城璧蕭蕭黃葉墜金錢凜凜清風生八極贊祖師達磨圜悟來時折蘆渡江去後手𢹂隻履祇緣來去分明惹得清風動地若言直指單傳東土有人笑你不作擎天柱甘為法棟梁箇中無限意多少錯商量朱道人燒煙火虗空霹𮦷撒星花變化多端見作家些子藥頭都料定傍人只得眼迷麻東山空和尚語嗣草堂師在秀峯受雪峯請指法座顧視大衆云到這裏便一時散去救得一半如其未然山僧向上頭七縱八橫瞞你諸人去也遂登座僧問和尚未見草堂時如何師云江南有僧云見後如何師云江北無僧云侍郎若不勤三請爭見黃龍真爪牙師云且緩緩師乃云俊快底點著便行癡鈍底推挽不動便行則人人歡喜不動則箇箇生嫌山僧而今轉此癡鈍為俊快去也乃彈指一聲云從前推挽不出而今出從前有院不住而今住從前嫌佛不做而今做從前嫌法不說而今說出不出住不住即且置敢問諸人做底是甚麼佛空王佛耶然燈佛耶釋迦佛耶彌勒佛耶說底又是甚麼法根本法耶無生法耶世間法耶出世間法耶衆中莫有道得底麼若道得山僧出世事畢如或未然逢人不得錯舉喝一喝下座上堂結夏云少室九年守株待兔神光三拜緣木求魚馬祖即心是佛劈頭便錯盤山非心非佛末後猶乖臨濟入門便喝可煞著忙德山入門便棒未遇作家趙州關子強生節目溈山水牯慙惶殺人雲門顧鑒也是尋常雪峯輥毬至今未了皆是從上不得勦絶致使後來為之帶纍而今雪峯門下莫有迥超今古絶類離倫底麼向結夏十五日道將一句來直饒道得也是河裏失錢河裏摝喝一喝施主散經請云是法不可示言詞相寂滅釋迦老子向這裏轉得一步便向靈山會上四十九年演出一大藏教彌滿龍宮海藏流布天上人間達磨大師向這裏著得一雙眼便解從南天竺國十萬里得得而來少林面壁九年單傳心印不立文字天下老和尚向這裏出得一頭地便解向曲木繩牀上播揚大教流出胸襟蓋天蓋地三段不同今當第一乃豎起拄杖云一時穿却又卓云甚處去也真覺忌云老子參禪太辛苦九上洞山三投子德山棒下桶底脫鰲山店頭用不著自從成道至如今鱉鼻傷人毒無藥毒無藥賴是當時缺一著且道缺那一著今日開山真覺和尚忌辰山門截日計口之後凡事不如昔山僧不免將無作有且要不墜家聲以百億四天下為一壇場以百億須彌山為一盤餕餡以百億四大海為一杯餺飥以百億日月為一筵燈燭雖然供養微薄且是不從外求遽起身作女人拜云曾郎萬福莫怪空疏雪峯五月五日不假神符妙術只有頂門一錐乃卓拄杖一下云鐵佛也須汗出千五百衆雪峯住無麵軟餅褁露柱橫咬豎咬飽便休莫倚他門傍他戶以拂子擊禪牀雪峯一說應時應節赫日炎天紛紛雨雪是何之說稱鎚是鐵送南泉入菴容吞舟之鱗必有滔天之水起摩霄之翼須得持世之風南泉慈覺大禪師佛海吞舟之鱗祖天摩霄之翼今者自忘其大來入雪山雪山既無滔天之水又無持世之風將容之則無所欲起之則無力幸而去此善法堂不遠有臥雲老人舊隱之東菴伏望禪師不忘乃祖暫韜藏然雖如是空上座終是疑著何故只恐藏之藏不得守住本覺無繩自縛解得他玄猶隔西天快人一言快馬一鞭而今有箇入得仲秋漸凉山僧敢保伊應時衲祐喝一喝拈拄杖云寒山舞拾得笑豐干一曲無羌調囉囉哩哩哩囉近日秋林落葉多卓一卓大風雨後云臨濟三回喫六十棒普化兩度躍倒飯床定上座空拳築殺尿床鬼子周金剛白棒佛來也打一似大風雨鼓蕩直無前衲僧所得法用處亦如是雖然如是潢潦無源朝滿夕除即不問你衲僧家金剛眼睛因甚爛如泥喝一喝卓拄杖下座舉君不見絶學無為閒道人顧視左右云在什麼處不除妄想不求真喚來與老僧洗腳無明實性即佛性退後退後洗腳也不中幻化空身即法身便喝永嘉大師項上三百斤鐵枷拈了也如今還有知永嘉落處底麼如無三十年後莫道雪峯龍頭蛇尾舉保寧和尚一日示衆道保寧飯食粗惡別無精妙品饌供養諸人既到遮裏開單展鉢須是喫得這無滋味始得若喫不得且莫怪大衆保寧先代叢林早是供養如法比之雪峯今日大不干事你諸人才入雪峯門便是墮在那洛伽中坐臥底是熱鐵牀喫底是熱鐵丸飲底是熱鐵汁有恁麼滋味到你尚自不知不覺何況保寧無滋味無滋味有滋味上方香積無根蒂莫似將錢買李只揀赤邊咬臘月三十日怪雪峯不得香林等請云大無外小無內無內無外七處九會是聖是凡重重無礙捩轉鼻孔須彌粉碎乃拈拄杖豎起云看看西天摩竭陀國人見你雪峯山中禪和子參禪不易總來山僧拄杖頭舞雲韶之曲供養你諸人更與你舉悉怛多般怛囉無上神呪曰懷州牛喫禾益州馬腹脹天下覓醫人灸猪左膊上乃呵呵大笑云將謂摩竭陀國人元來只是杜順和尚卓拄杖一下僧問記得玄沙問真覺和尚亡僧遷化向什麼處去覺云如氷歸水玄沙不肯真覺却問子又作麼生沙云如水歸水意旨如何師云總未得脫灑在僧云如何是脫灑底句師云鐵索橋頭大目溪僧禮拜師云若作脫灑會入地獄如箭師乃云洞山道天晴蓋却屋乘時刈却禾輸納王租了鼓腹唱謳歌古人住山得與麼了事得與麼快活雪峯有屋蓋未了有禾收未上有租未納破方待鼓腹謳歌而顗都莊又遷化苦苦敢問大衆一等是出家兒一等是住山人為甚苦樂不同會麼曹溪波浪如相似無限平人被陸沈喝一喝舉黃檗一日捧鉢向南泉位坐泉入堂見問長老甚年中行道云威音王已前泉云猶是王老師孫下去師過第二位坐泉休去雲峰拈云後來叢林中商量或道黃檗有陷虎之機南泉有殺虎之威若作與麼說話誠實苦哉殊不知這老賊有年無德喫飯坐處也不依本分若雲峰門下說甚威音王已前王老師更大直須喫棒趁出妙喜曰何待問他甚年行道才入僧堂見他在主位坐便捧鉢盂向第二位坐直饒黃檗有陷虎之機擬向甚處施設師云進以禮退以禮古人事無一向雲峰盡法無民妙喜設心最毒山僧今日放低一頭地與你諸人理論乃高聲召大衆衆舉頭師云各請歸堂莫教失却鉢位山僧入城有三段奇特事今日歸來鳴鼓升堂舉似大衆第一南臺江水穿過方山鼻孔第二萬歲塔與報恩塔鬬額第三山前李胡子騎箇蹇驢兒從鼓門下出來道看馬看馬山僧簥裏坐却記得洞山和尚道一大藏教只是箇之字只此奉聞伏希聰悉佛以一音演說法衆生隨類各得解乃拈起拄杖云山僧柱杖變作釋迦老子了也卓一下云說則不妨說且作麼生解若也解得燈籠合掌若也不解露柱證明擲下拄杖拈起拄杖云大衆雲門大師來也卓一下云臘月二十五舉一拳拳倒黃鶴樓一躍躍翻鸚鵡洲有意氣時添意氣不風流處也風流俊哉俊哉快活快活一似十七八歲少年作狀元相似誰管你天誰管你地心王不妄動六國一時通罷拈三尺劍休弄一張弓自在自在快活快活恰似七八十老人作宰相相似風以時雨以時五穀植萬民安乃豎起拄杖云大衆這兩箇并山僧拄杖子共作得一箇衲僧到雪峯門下但知隨例餐䭔子也得三文買草鞋喝一喝卓拄杖下座啐之機暫時活計清虗之理不可依憑執之失度必入邪路東海鯉魚打一棒陝府鐵牛兩角折即不問你諸人水不洗水一句作麼生道若道不得五九盡處又逢春一刀兩斷未稱衲僧就下平高難為作者古人到這裏口似匾擔善則甚善要且無出身路雪峯到這裏又作麼生良久云後五日看退院云拈起一張弓架起一隻箭等閒一發定天山即不問你拋了弓擲下箭撒手到家人不識鵲噪鴉鳴柏樹間又作麼生且得天下太平便歸東菴小參法語解夏云兄弟時光易失剎那剎那念念念念一時一時一日一日直至九十日為一夏汝等後生家九十日中出入息內過却幾恆河明朝又是解夏也今夜鳴鐘擊鼓聚集少時已證入未證入已諦當未諦當今者幸遇我空王如來垂慈咸放十字街頭廖胡子聞與麼道醉夢中打兩箇筋斗起來連叫數聲快活快活雪嶺泥牛出海方山鼻孔撩天引得猪肉按頭鄧屠魚行內李媼說禪說道眼空四海閻老子鋪席頓然蕭索冷地裏努得頷腮下癭大如斗山僧拄杖子却呵呵大笑道你這一隊窮鬼子且莫空自歡喜妄自煩惱須知道江南兩浙春寒秋熱喝一喝卓拄杖二百年前風穴和尚於選佛場中曾立箇䇿問至今未有人答得我此一衆盡是選佛底俊流一操直取狀元山僧今夜不免向糞掃堆頭斬新拈出與汝諸人答看參學眼目臨機直須大用現前勿自拘於小節設使言前薦得猶是滯殼迷封縱然句下精通未免觸途狂見汝等諸人應是從前學解明昧兩岐如今為汝一時掃却直須箇箇如師子兒吒沙地哮吼一聲壁立千仞誰敢正眼覷著覷著則瞎却渠眼此是風穴和尚與麼道而今莫有吒沙地底師子兒麼試出來哮吼一聲不見道驚羣之句須向驚羣處舉揚奇特之事須向奇特人拈出平生慶快只在如今過後思賢不為鷹俊有麼有麼如無山僧老大衰颯不免作少年調度與你諸人代筆去也驀拈拄杖劃一劃乃橫按喝一喝云風穴老漢合喫三十痛棒𭣟瞎貶向二鐵圍自餘釋迦元和佛陀是什麼碗躂丘擲下拄杖下座東山老漢有少業緣未盡昨出頭來一時償却而今安樂一菴不辜你輩兄弟自是你兄弟家不識好惡將謂東山有多少奇特到伊競來鑽刺又要我以洗腳水驀頭驀面潑還識羞麼說佛說祖舉古舉今向上向下有句無句與麼不與麼是洗腳水潑你不著佛求不著法求不著僧求向父母未生已前會取風塵草動悉究端倪是安排你向屎坑裏著衲僧家用處如擊石火似閃電光聲前喝句後棒略露些子鋒鋩擬不擬當頭一钁剔起便行是把撮馬糞漢待你即心非心就理就事五位三路全提半提雙明單說有玄有要有賓有主有縱有奪有圓相有默論凡有言說無言說皆是喚狗與食向榼𣜂堆頭埋却你我而今忍不住把將從上佛佛祖祖天下老和尚留下許多潑你底惡水埋却你底榼𣜂挈作一桶瀉放大目溪裏流出西峽門去也更無一法蓋得你等得你一箇箇出來如師子子吒沙地哮吼一聲狐羣膽落豈不快哉是你如今出門三步忽有人問東山住菴近日說什麼法又如何祗對對得對不得盡是滅胡種去去開先廣鑒瑛和尚語嗣東林總上堂請化主參頭云若論此事如一員上將軍相似須是先師鬼谷次習孫吳飽諳龍虎豹之六韜洞曉天地人之三略負文經武緯之才識有七擒七縱之機謀然後三級登壇黃金佩印橫行於大千世界統領於百萬雄師運籌於帷幄之中決勝於千里之外謾說西戎北狄到便平治休誇百粵三秦遇皆掃蕩由是題芳史冊畫像凌煙享富貴於一時垂功名於萬世古人道千兵易得一將難求華藏今日築壇了也且道什麼人作將要會麼杖頭有眼明如日欲辨真金火裏看師開堂日祝聖問答罷乃豎起拂子云金色界銀色界有人這裏會得則便文殊前引普賢後隨去也會與不會即且置且道山僧未升此座已前人天未集之際還有佛法也無若言有何由更升此座若言無即今升座後佛法又自何而得大凡參學之人到這裏須是著些眼目始得所以道釋迦已滅彌勒未生世界空虗真燈靄昧九十五種異道趣下為高十二品類含生合塵背覺是以祖師東化別唱玄宗直指人心見性成佛譬如輪王灌頂萬國咸歸亦如杲日麗天幽明洞鑒今時不能曉悟蓋為滯在見聞若能一念回光則便轉凡成聖諸禪德轉凡成聖則不無且作麼生是回光底一念要會麼良久云千峯勢到嶽邊止萬派聲歸海上消復說偈云大千沙界是吾家隱顯何曾有等差為報人天高著眼優曇花異世間花擊禪牀云久滯尊官伏惟珍重百丈得大機黃檗得大用臨濟入門便喝德山入門便棒雲門掣電之機法眼唯心之法古人叢林商量悉把以為奇特若是華藏聞得恰似一場秋夢相似何謂如此不見道曾經大海難為水除却須彌不是山發化主舉梁武帝問達磨云寡人造寺塑像寫經度僧廣設大齊有何功德達磨云無功德帝云如何無功德達磨云此是人天小果如影隨形雖有非實帝云作麼生是真功德達磨云淨智妙圓體非空有如是功德不以世求師云碧眼胡僧從西方十萬八千餘里來入震旦自云佩上乘印傳佛妙心求大乘器不妨使人疑著及乎被梁帝一問直得說盡道理若是華藏則不與麼作麼生是真功德良久云十片五片雲千家萬家雨擊禪牀下座釋迦如來已滅彌勒大士未生當今之時正法顛墜東西南北文字並馳皆云把定要津誰肯言我家醋淡華藏不得已出世來也不挑紙錢引他禍祟亦不握木劍降他妖魔只是無為無事坐致太平使夫封疆之內鼙鼓不鳴分野之中旄頭不現然後天降甘露地涌醴泉慶雲翔而和氣流芝草生而嘉禾秀與麼安貼家與麼丹青造化且道是有道之時是亂罹之世要會麼不同三尺劍自是五絃琴莊中回僧問如何是道師云良田萬頃僧云不會師云春若不耕秋無所望師乃云若論此事譬如田家耕田相似須是先觀時節次辨肥磽使夫畞步分明陂塘有素應是稊根稗種一切屏除三杷三犂直教純熟然後播殖嘉穀無失其時甘雨雱霑秋收百倍倉箱既滿家道亦隆縱過水旱凶年終是資糧不絶這一片田地東西四至立契來賣與諸人固非一朝一夕深耕淺種則不無且道即今水牯牛在什麼處要見麼穿却了也下座烏長飛兔不住暑往寒來朝復暮朱顏未改白髮生三界茫茫何處去本源自性無凋變千聖皆從影中現不離當處常湛然覓則知君不可見忽然見倒騎牛兮入佛殿咄僧問如何是祖師西來意師云君山點破洞庭心僧問意旨如何師云白浪四邊繞紅塵何處來師乃拈起拂子云今日華藏手中拂子示身為諸人作大善知識開甘露門入神通遊戲三昧若將東指則東方妙喜世界百寶莊嚴從空中現東方阿閦如來坐天花臺四衆圍繞來集於此若將南指則南方無垢世界百寶莊嚴從空中現南方寶相如來坐天花臺四衆圍繞來集於此若將西指則西方極樂世界百寶莊嚴從空中現西方阿彌陀如來坐天花臺四衆圍繞來集於此若將北指則北方蓮花莊嚴世界百寶莊嚴從空中現北方微妙聲如來坐天花臺四衆圍繞來集於此若將下指則波波吒吒青赤蓮花阿鼻無間大小地獄火蛇火狗刀山劍樹鑊湯爐炭鐵城萬仞鐵網千層衆苦莊嚴從空中現牛頭阿旁藥叉羅剎牙如利劍口似血盆領諸罪人來集於此若將上指則四禪六欲忉利非想一切諸天從空中現梵王帝釋天子天女天樂普奏天香普熏來集於此然雖如是諸人還見麼若也見得不惟與華藏拂子同參亦乃證得神通遊戲三昧如其不然不獨鈍置華藏拂子華藏今日一場失利知郡朝議洎諸巨公入山瞻禮新造輪藏畢請升座僧問昔日趙州三等接人蓋為燕趙二王今日使車入山未審和尚如何接師云適來緑蘿亭相見了也僧云今古應無墜分明在目前師云目前底事作麼生僧云洎不問過師云只知其一不知其二僧云只如朝貴轉大法輪未審有何福報師云有雨灑不著無風吹亦香僧云謝師答話師云禮拜了退師乃顧謂衆曰昔如來大師於涅槃會上舒兜羅綿手於座前捻少土置指甲上問迦葉菩薩曰吾指甲上土與大地土何者為多對曰大地之土轉厚無疆指甲上土不可與比佛言如是一切世間所有衆生從人身得人身不生邊地長富貴家十相具足智圍天地辨凋萬物知忠於君孝於親友于兄弟不作諸惡奉行衆善敬信三寶慎護三業近善知識求明心達本窮理盡性脫離死生超凡入聖者如指甲上土從人身失人身受地獄身受餓鬼身受畜生身經千百劫復得人身生於邊地在貧賤家十相不具足愚癡暗塞不知忠於君孝於親友于兄弟造作諸惡不行衆善不敬信三寶不慎護三業周流苦趣無有出期如大地上土由是而觀之三界六道人身最為難得既得人身具是數美無彼衆惡者益又為難矣所以唐相裴公有言曰鬼神沈幽愁之苦鳥獸懷獝狘之悲修羅方瞋諸天正樂可以整心慮趣菩提惟人道為能耳人而不為吾末如之何也矣此蓋勉人學於佛道人而不學佛道則為自棄者也然則釋迦如來之道寂寥虗曠不可以形名得微妙無相不可以有心知超羣有以幽升量太虗而永久言其大則該括河沙世界言其細則收攝歸一微塵言其照耀則日月不足以比其明言其蓋載則天地不足以方其德非春夏而能生長非秋冬而能變凋非風雨而能詬濡非陰陽而能造化隨之不得其終迎之罔眺其首先天而生而不居其尊後天而老而不稱其壽迷之則合塵背覺悟之則入聖超凡遠之則苦海浮沈趣之則人天快樂不假廣尋文字祇要一念回光但能除一切顛倒妄想攀緣染著生死不淨之心只於一剎那間便證無生法忍是故古人道靈光獨耀迥脫根塵體露真常不拘文字性相無染本自圓成但離妄緣即如如佛只如諸人四大五蘊行住坐臥有為無為是語是默皆是妄緣且作麼生是如如佛還會麼魚因解帶金鱗活馬為行春玉勒寬濕者顏水乾者歸地熱者歸火轉者歸風則四大不可得四大既不可得則生老病死四相亦不可得此喚作人空過去已滅未來未至現在無住則三世不可得三世既不可得則東西南北四維上下十方亦不可得此喚作法空有人了此二空則便覺齊佛覺雖然如是雲門道底去年逢青春朱顏映桃李今年逢青春白髮壓雙耳人生七十年疾若東流水不了本來心生死何由離擊拂子下座彎石鞏弓架興化箭運那羅延力定爍迦羅眼不射大雄虎不射藥山鹿不射雲巖獅子不射象骨獼猴且道射箇什麼良久云放過一著僧問少林面壁意旨如何師云入定僧云與麼則辜負古人去也師云罕遇知音師乃云有大人先生智圍天地辨凋萬物糟粕百家九流塵垢伊周孔孟了悟自心自性兼得大用大機嗤笑指柏拈花高揖釋迦彌勒今日頓轡毗盧性海縱步華藏道場凜然生匝地之風四海衲僧誰敢正眼覷著然雖如是古人相見目擊道存鳴鼓升堂莫太周遮麼良久云官不容針私通車馬盲枷瞎棒臨濟不如德山胡喝亂喝德山不如臨濟溈仰巧傳父子曹洞橫設君臣雲門無限葛藤法眼一般心法從前五家見解皆是剜肉作瘡若以正眼觀之是什麼弄猢猻伎倆而今莫有為古人作主底衲僧麼出來與華藏相見良久云螳蜋不拒轍螢火敢燒山生老病死此四箇煩惱門一切衆生意甚苦之求出不得常樂我淨此四箇解脫門一切衆生意甚樂之求入不得華藏今日借拂子作大導師指示路頭使諸人從此門出至彼門入拔去生死苦根證得涅槃樂果然雖如是且道路頭在什麼處具眼底試道看駕羊車接諸聲聞駕鹿車接諸緣覺駕牛車接諸菩薩且道接衲僧駕箇什麼三腳驢子弄蹄行二十五圓通二十五具鐵枷百千三昧門百千梁鐵鎖大丈夫漢出家行腳著甚來由將父母所生身擔他鐵枷帶他鐵鎖而今要得三界獨遊直須是佛法兩字不把耳聞始得不見古人道設有一法勝過涅槃我說如夢如幻雖然如是也須真到這箇田地始得若未到這箇田地且莫粗心元宵云上元令節四海燃燈華藏亦以燈為佛事先用毗盧性海以為盞次用河沙勝福以為油中用無上菩提以為心末用廣大智慧以為火是燈也以不點而點是故常點是光也以不照而照是故常照上至阿迦膩吒天下至無間地獄無不洞鑒無不明了四生六類一切有情遇是燈光咸得本心出無明殼諸人還要見如是清淨微妙無盡燈麼良久云燎破面門明眼底人被眼礙悟心底人被心礙證道底人被道礙達法底人被法礙何謂如此不見道金屑雖貴落根成翳要得高步大方直須去此四礙僧問如何是截斷衆流句師云斗門下閘問如何是隨波逐浪句師云船子下楊州問如何是函蓋乾坤句師云無縫不通風問此是古人三句如何是和尚三句師云重言不當吃師乃云煉鐵圍山作釣鈎餌懸八萬四千牛毗盧海內閒拋下蝦蟹魚龍盡縮頭遂舉昔日有僧問雲門如何是透法身句門云北斗裏藏身師云喚什麼作法身更覓箇透法身句這般漢節目上更生節目枝蔓上更添枝蔓賴遇古人慈悲若是華藏三十棒一棒也較不得雖然如是且道雲門與麼道意作麼生要會麼青蛇每用腰為足紅莧時將葉作花皇帝錫廣鑑師號說偈云湛露重重灑紺園衰殘何以報君恩白雲堆裏焚香坐耀古騰今不二門復云道本無名強名曰道十號者應緣而設三身者為物而彰是故造理則唯一虗空造事則森羅萬象然則無名則幾息於道有相則或蔽於真而今要得妙契自心直須是名相語言二邊不涉乃拈起拂子云若道是拂子則滯在有相有名若道不是拂子又落在無名無相作麼生得不涉二邊去要會麼太湖三萬六千頃月在波心說向誰舉江月照松風吹永夜清宵何所為若有人向這裏得箇入處管取解空第一朔風如刀痛刮人骨千山萬山雪映寒日心知春氣來目覩梅花發遊子南方歸不歸曉堂閒却龜毛拂千經萬論窮之者入海算沙正眼妙心悟之者認賊為子無為無事墮在解脫深坑勤苦修行何異無繩自縛所以古人道恁麼也不得不恁麼也不得恁麼不恁麼總不得而今還有與華藏把手底衲僧麼離衆出來通箇消息異獸藏頭角靈禽惜羽毛鏤水求紋謾勞心力陶空作器枉費工夫游溟渤始測淺深登須彌乃知高遠太陽門下爝火何施鏌鎁匣邊鉛刀可棄擊拂子下座踏破化城來至寶所不採輝山之璧不探驪頷之珠壞衲堆肩擁爐閒坐喚作無事道人堪受人天供養華藏與麼道不是好心德山棒如雨點臨濟喝似雷鳴雖然聲振一時風流萬世檢點得來還是強生節目華藏則不與麼三間茆屋十里松門健則縱步閒遊困則倒頭酣寢身如槁木心若死灰有人笑我愚癡正𭺗著儂家癢處豎不窮三際橫不亘十方大不逼塞虗空細不入於芥子三世諸佛如覺如夢諸大祖師若存若亡與麼境界從上諸聖尚迷昧如斯方今學人且作麼生湊泊還要會麼但得雪消去自然春到來上不見天下不見地把定咽喉何處出氣江南江北絶毫絶釐東土西天成團成塊釋迦彌勒尚自瞞盰臨濟德山如何擬議衲僧家沒巴鼻却喚六雙為十二咄奇怪諸禪德文殊普賢化作寒山拾得頭戴炙脂帽子腳踏無底麻鞋身著鶻臭布衫腰繫斷鞓腰帶手持拍板口唱高歌歌曰吾心似秋月碧潭清皎潔無物堪比倫教我如何說華藏當時若見每人痛與一頓何為如此且教伊不敢掣風掣顛免使後人疑著乃拈拄杖云向什麼處去也擊繩牀下座提智慧劍破煩惱網拔生死類置涅槃宅空却魔王窟穴掃蕩惡趣關防開拓般若封疆滋長菩提種性與麼作用與麼建立還有氣不平不相肯底衲僧麼象駕崢嶸謾進途誰見螳蜋能拒轍豎起拳云一大藏教諸大祖師天下老和尚言句總在這裏明明向道尚且不知蓋覆將來如何會得僧問祖意教意是同是別師云防風長焦僥短僧云與麼則不同也師云鵝王擇乳素非鴨類師乃云持長竿搖短艇篛笠只一箇簑衣無兩領洞庭秋水風不吹涵虗恰似新磨鏡末後句留與謝三郎咄水菴一禪師語嗣佛智裕上堂魔作佛壞爛虗空元有骨佛作魔須彌頂上湧清波魔佛二邊俱坐却瘥病不假驢駝藥偶與水雲合不與水雲同雲散水流處寂然天地空古人恁麼道大似徐六擔板水菴即不然喜與水雲會甘與水雲同雲屯水聚處塞破太虗空所以道千波競起盡是文殊家風一亘晴空無非普賢床榻便恁麼會正是沙彌童行邊事須知衲僧別有長處作麼生是衲僧長處喝一喝擊禪牀十二月旦云今晨改旦伏惟首座大衆知事頭首一九二九天寒不出手三九二十七籬邊吹觱栗四九三十六夜眠如露宿屈而復伸展而又縮一夜萬算千思胸中一團麻線睡也睡不熟及至天曉起來腳踏實地頭還帶屋若作佛法商量口啞舌禿若作世諦流布特牛生犢拂子道我悟也我悟也山僧道你悟箇什麼拂子云可憐逐惡天下人六六元來三十六圜悟師翁道參禪參到無參處參到無參始徹頭翠雲道參禪參到無參處參到無參未徹頭若也欲窮千里目直須更上一層樓喝一喝破暑黃梅雨清神白乳茶萬緣俱不到物外野僧家佛窟和尚至相逢握手不論心心性吾儕眼裏金三箇柴頭煨品字與君閒話古叢林柴頭煨盡已更闌樓上鐘聲落月寒一把柳絲收不得和煙搭在玉欄干凍雲欲雪未雪普賢象駕崢嶸嶺梅半合半開少室風光漏泄便恁麼去猶是半提作麼生是全提無智人前莫說打你頭破腦裂天申節上堂以拄杖卓一下云還聞麼復拈起云還見麼以手橫按云萬年藤上一枝春用祝光堯萬乘君身固壽康長不老大平時代自由身燕去梁閒靜鴻來眼界寬繞庭何所有風撼竹珊珊拂子擊禪牀一下下座頌古如何是道墻外底普化明頭打趙老家風不熱瞞問他大道答長安有誰平步歸家去多是區區自作難一拶銀山鐵壁摧大悲院裏趕村齊善財拄杖如無用乞與佯狂老萬回藏身處沒蹤跡三喚侍者藏身無跡更無藏脫體無依便廝當古鏡不勞還自照淡煙和露濕秋光三喚須知意不輕平生肝膽一時傾負吾負汝還知否縱有丹青畫不成須彌山慈明盆子橫劍不起一念須彌山特立當頭著眼看拈一縷絲輕絆倒家家門底路長安家山指出路非遙萬仞嵳峩插碧霄一片白雲橫谷口幾多歸鳥自迷巢婆子拋兒雲門話墮巖頭婆子鐵肝心擊碎乾坤覓賞音眨上眉毛如不薦嶽陽惡浪轉增深十八佳人美態嬌繡衣輕整暗香飄擡身花圃徐徐立引得黃鶯下柳條別峯雲和尚語嗣此菴元上堂我宗無語句亦無一法與人知有者已涉繁詞不知有者更宜子細喝一喝云擘破成狼藉渾崙又不成開爐云丹霞燒木佛院主眉鬚落官裏有明條許人私結約傝杜禪和識情爭卜度休卜度萬里遼天飛一鶚舉雲門大師道若說菩提涅槃真如解脫是燒楓香供養你若說佛說祖是燒黃熟香供養你若說超佛越祖之談是燒瓶香供養你支提即不然若說菩提涅槃真如解脫是將水潑你若說佛說祖是將尿潑你若說超佛越祖之談是將屎潑你且道雲門為人好支提為人好若辨得出許你天下橫行裂開也在我揑聚也在我而今裂開也有解問者出來衆無語乃云比擬張麟兔亦不遇教你不肯你為君通一線若是明眼人覓甚臘月扇喝一喝下座直截根源佛所印摘棄尋枝我不能世尊掩室於摩竭是摘葉尋枝淨名杜口於毗耶是摘葉尋枝須菩提唱無說而顯道是摘葉尋枝釋梵絶聽而雨花是摘葉尋枝作麼生是直截根源喚作直截早是曲了也諸人如何話會元宵云支提山裏作上元若校諸方真箇異大蟲舌上打鞦韆蟭螟眼裏放夜市燈籠倒退舞三臺露柱趍前弄鱉鼻引得水鳥樹林蝦蟆蚯蚓一時𨁝跳出來盡道花鼓是獨有你這一隊尿牀鬼子無一箇伶利拈拄杖下座大衆一時走散崑崙奴著鐵袴打一棒行一步遱邏真箇遱邏峭措非常峭措不惟佛法會盡且是文章滿肚見渠嘗試篇詩便有驚人底句如今對大衆前不免一時剖露且道詩道什麼舉不顧即差互擬思量何劫悟大衆你見好詩麼無事也好題取一篇佛說一乘法無二亦無三山花開似錦㵎水湛如藍支提遮裏無法可說贏得口似匾擔舉寒山子道一念了自心開佛之知見師云春無三日晴夏無十日雨蛇咬蝦蟆聲更有衆生苦豈不是佛知見喝一喝云諸增上慢者聞必不敬信支提不敢向人說達磨西來有妙訣若將妄語誑衆生自招拔舌塵沙劫結夏云南方有處名曰支提中有比丘某甲與千菩薩現前大衆同此安居九十日內遇飯即飯遇茶即茶無寂滅行可修無諸垢染可離輒不得一人問著佛法二字打折你驢腰貶向二鐵圍山莫言不道支提元不會禪只是依時及節孟春即曰猶寒孟夏即曰漸熱雖無格外高談不向眼中添屑汝等莫錯商量打你頭破額裂端午云今朝五月五擊動禾山鼓鬱壘與神茶歡呼齊起舞報道山門內外乃至諸莊田厙兒一一平安惟有禪和子肚裏七上八下被箇狗子無佛性苦諸人者欲不苦透得趙州一字關手握黃金如糞土舉真淨和尚道也無禪也無道也無玄也無妙快活須明這一竅師云既無禪道又無玄妙甚處得這一竅若有一竅可明如何得快活去諸人即今要得快活麼便下座山僧尋常向諸人道三世諸佛是竹木精靈三賢十聖是守古冢鬼西天二十八祖唐土六祖是弄泥團漢自餘當甚碗脫丘乃引聲唱云我昔毀佛及諸祖皆由無始貪瞋癡從身口意之所生一切我今皆懺悔遂呵呵大笑以手作鵓鳩觜云谷谷呱便下座舉杜順和尚有箇法身頌道懷州牛喫禾益州馬腹脹天下覓醫人灸猪左膊上師云叢林盛傳以為奇特有甚奇特驀拈拄杖云支提拄杖子有箇法身頌敢保天下善知識牙如劍樹口似血盆無一人道得到他田地今日不惜舉似大衆蝦蟆翻出闊曲鱔草之長門前飛八百屋後走千張好大哥昨日有人從陝府來却得嶺南信報道潭州城裏好養民米賤柴多足四鄰唯有道吾和尚不解深山藏拙却來閙市裏看人樂神驀被魚行老媼劈面唾云遮野狐精青天白日向遮裏見神見鬼他後魔魅人家男女未有了日只得飲氣吞聲支提拄杖子聞而呵呵大笑曰好事從來不出門燈籠露柱夜來相爭佛法一云即心是佛一云心不是佛山僧當時見伊互爭不已各與三十拄杖三十打即心是佛三十打心不是佛待他向後眼開始信支提車不橫推理無曲斷參禪人多逐妄不用起模仍畫樣春風吹綻桃李花淡煙疏雨籠青嶂喝一喝云若到諸方莫道支提將境示汝叮嚀損君德無言真有功任從滄海變終不為君通古德與麼道大似此處無金二兩俗人沽酒三升支提佛法無多子何必胡僧勸舉揚好對春風二三月鷓鴣啼處百花香喝一喝拈拄杖云拄杖子震大法雷擊大法鼓說大脫空平欺佛祖嚇得深沙神口呿舌長吐竇八布衫穿遍覓舊片補諸人各各有耳共聞有眼共覩若更不會不妨辜負支提拄杖子卓拄杖喝一喝浴佛云扶宗豎教整頓頽綱正令當行有縱有奪縱也一任周行七步目顧四方奪也直得掩室摩竭飲氣吞聲且不縱不奪又作麼生喝一喝云也缺一杓惡水不得五月方改旦今朝又初十日月去如飛快趁不及禪須放下參但莫固拘執是處解脫門汝自不肯入何必問支提丁字著腳立只今普請歸堂問取自己每日業識忙忙著甚死急喝一喝如來禪祖師意絶承當只這是破草鞋汗臭氣熱碗鳴驢豚沸也大奇不思議分明在目前今古應無墜佛滅二千年比丘少慚愧喝一喝因祈雨云雙童峯見諸人連日祈求上來下去諷誦不易即今在門前祥光橋上相撲三交兩合七起八倒供養大衆末後陳箇口號云嗟見世間人永劫墮迷津不省這箇意修行徒苦辛山僧向道謝供養便下座舉僧問雲門如何是正法眼門云普僧問風穴如何是正法眼穴云瞎師云雲門普風穴瞎三門外金剛冷地裏笑殺且道笑箇什麼不見僧問米胡從上諸聖還達真正理也無胡云達參禪人莫造作擬心即差動念即錯大乘小乘錢貫井索前三後三佛手驢腳開眼也著合眼也著擬向這裏承當鼻孔依前失却舉昔有一老宿住菴門上書心字窗上書心字壁上書心字法眼云門上但書門字窗上但書窗字壁上但書壁字玄覺云門上不必書門字窗上不必書窗字壁上不必書壁字何故字義炳然師云諸方商量咸謂三老各善筆法點畫可觀且不是草書相謾支提敢道諸方未具辨書眼在殊不知字經三寫烏焉成馬汝等諸人挑囊負鉢東走西走道我瞻風撥草為法求人驢年會去不見道武帝求仙不得仙王喬端坐却升天喝一喝云天上忽雷驚宇宙井中之物不擡頭三十年後莫道支提性急火焰為三世諸佛說法三世諸佛立地聽燕子為玄沙深談實相玄沙立地聽拈起拄杖云支提拄杖子為諸人念摩訶般若波羅蜜多諸人立地聽且如剎說衆生說三世一時說又教什麼人聽卓拄杖一下云有眼無耳朵六月火邊坐支提門下五日一參我才合掌汝便和南龍象蹴踏非驢所堪直得諸天雨花無路淨名口似匾擔自餘之輩誰敢正眼覷著喝一喝爐鞴之所鈍鐵尤多良醫之門病者愈甚支提今日且作死馬醫拈拄杖卓一卓喝一喝師住石泉僧問達磨大師道教外別傳不立文字佛說一大藏教未審孰是孰非師云東家點燈西家暗坐僧云且道是一是二師云放待冷來看僧云落霞與孤鶩齊飛秋水共長天一色師云一任卜度師乃云佛語心為宗無門為法門心不在內不在外不在中間法離見聞非耳目之所到遮裏如何體會先聖見你無捫摸處遂向第二頭道應無所住而生其心心如虗空無有邊際本來無住然後從無住本立一切法立處皆真當體空寂若定執有心有法正是一翳在眼空花亂墜永嘉不云心法雙忘性即真須知當人分上壁立千仞如蓮花不著水一切處污染不得方能於四生六道虎穴魔宮出入縱橫自他兼利不見洞山對雲門道某甲今後向十字街頭不蓄一粒米不種一莖菜接待往來箇箇與伊拈却炙脂帽子卸却鶻臭布衫教伊灑灑落落去雲門云汝身如椰子大開許大口可謂心不負人面無慚色山僧即不然乍離千聖林間寺來汲城頭石罅泉相見杯茶雖淡薄往來無惜為君煎且道與洞山相去多少東家不見西家事豐儉隨人莫怪休舉趙州和尚道夫為宗師須以本分事接人師云山僧這裏若有一毫頭本分事到你豈不彼此受屈雖然如是山花不費栽培力自有春風管帶伊佛是塵法是塵區區馳覓謾勞神向道莫行山下路果然猿叫斷腸聲喝一喝風高八九月自合知時節何必待山僧升堂特地說天際鴈南飛接翅作行列悉念佛法僧軋軋聲不絶影落寒山水已是重漏泄普請好生觀西來無妙訣喝一喝前三後三日面月面七凸八凹千化萬變捏聚放開胡來漢現不離當處常湛然覔即如君不可見了了了時無可了玄玄玄處亦須呵貪生逐日區區去喚不回頭爭奈何歲旦云大盡三十日小盡二十九昨夜送窮年今朝賀歲首時節有變更佛法無新舊既是箇中人不惜娘生口坐對春風唱鷓鴣嘉聲不落威音後復云少賣弄山僧昨出看謁簥裡覷見南街北巷東買西賣校重論輕爭斤奪兩因記得大慧和尚道十字街頭現成行貨擬欲商量漆桶蹉過不蹉過是什麼將謂廣南檳楖元來却是西川漏籃子喝一喝春色融和羣芳競拆水緑山青桃紅李白不是時節因緣亦非向上奇特恁麼也不得不恁麼也不得此時若不究根源直待當來問彌勒佛生日云是非只為多開口煩惱皆因強出頭致使韶陽要打殺思量著甚底來由石泉從來臨危不悚人少閒與大衆同詣殿上燒一炷香歌一遍喝囉怛那熱樂他則箇何故曾為浪子偏憐客自是貪杯惜醉人結夏云佛子住此地即是佛受用常在於其中經行及坐臥何必九旬禁足三月安居踞菩薩乘修寂滅行離諸垢染清淨根塵大似好肉剜瘡無風起浪然雖如是罕逢穿耳客多是刻舟人喝一喝會麼掣電之機徒勞佇思便下座今朝五月十有五十日作了八日雨不薦簷頭滴滴聲說妙談玄何足數君不見皓布褌嘗有語夜雨打倒蒲萄棚知事普請行者人力撐底撐拄底拄阿呵呵莫錯舉從來大道無規矩入興化華嚴指三門云三門頭合掌佛殿裏燒香雲門大師說得行不得新長老今日親行此令去也便入解夏舉僧問德山九旬禁足今日滿自恣之談合若何山云猢孫趁蛺蝶九步作一歇僧云意旨如何山云兩箇童兒抱花鼓這邊舞了那邊舞須臾變作百千般一一示君君看取師云德山費許多口頰自恣之談且不曾道著忽有人問華嚴九旬禁足今日滿自恣之談合若何即對道鮎魚上竹竿一日一千里復云意旨如何即對道秋江清淺時白鷺和煙島良哉觀世音全身入荒草舉教中道諸佛出興世懸遠值遇難正使出世間說是法復難無量無數劫聞是法亦難能聽是法者斯人亦復難釋迦老子恁麼說語可煞欺你後來無人華嚴路見不平有箇道處諸佛出興世懸遠值遇難夜夜抱佛眠朝朝還共起有什麼難正使出世間說是法復難剎說衆生說三世一時說有什麼難無量無數劫聞是法亦難夜聞祭鬼鼓朝聽上灘歌有什麼難能聽是法者斯人亦復難慣從五鳳樓前過手握金鞭賀太平有什麼難靈利漢點著便知如其未然老僧贏得口過有時恁麼有時不恁麼恁麼也得不恁麼也得大唐國內無禪師觀音院裏有彌勒參禪人休揀擇不見古人有言兮毫𨤲有差天地懸隔春雨乍晴景物舒豁日暖風和鳥啼花發伶利漢點著便知也有照也有用也有縱也有奪更說甚雪峯輥毬德山托鉢俱胝一指臨濟四喝遂以拂子劃云即今一時與諸人劃斷了也且道劃斷後如何君子可八秉拂小參解夏云善言言者言所不能言善迹迹者迹所不能迹迹所不能迹則無迹言所不能言則無言言迹既無心智路絶直得內空外空內外空俱不可得只這不可得亦未是諸人安身立命處更說什麼秋江清淺時白鷺和煙島良哉觀世音全身入荒草更說什麼鴈過長空影沈寒水鴈無遺蹤之意水無沈影之心更說什麼人從陳州來不得許州信鐘樓上念讚牀腳下種菜盞子撲落地楪子成七八片須知這裏間不容髮直下如王寶劒誰敢當頭擬犯鋒鋩橫尸萬里若也一向坐斷盡大地無一人夢見父母未生已前巴鼻是以從上先德尋念過去佛所行方便力遂向第二頭打之繞如今不免將錯就錯恁麼恁麼泥揑夜叉水裏走不恁麼不恁麼嚼碎通紅鐵一團恁麼中不恁麼須彌南畔三千里不恁麼中却恁麼吹毛才舉斗牛寒已是不識好惡向諸人面前四稜踏地打這一上之繞且作麼生相委若也委得便與從上佛祖同一眼見同一耳聞同一鼻嗅同一舌嘗同一身觸同一意思更無差別所謂塵塵爾剎剎爾念念爾苟或未明看潑第二杓惡水蟭螟吞却白額蟲泥牛咬斷老鼠尾瞋底瞋喜底喜天台國清寺裏油澆神現出鳩槃茶面觜無端拈祕魔叉趕上八角磨盤向空中輥得七倒八起忽然撲落下來直得火星迸散燒著海龍王腳指且要魚龍知水為命又誰管你燈籠冷地拍掌呵呵大笑云青天白日向這裏燒錢引鬼喝一喝云且置是事冬夜我宗無語句亦無一法與人更教秉拂上座向這裏如何啓口假饒說得天雨四花地搖六震在諸人分上總沒交涉何以欲得親切當須自觀若此觀者名為正觀若他觀者名為邪觀諸人且作麼生觀為作有相觀作無相觀作不有不無相觀作亦有亦無相觀直饒總不恁麼也是扶籬摸壁所以道欲知佛性義當觀時節因緣莫有知時別宜底麼昔有老宿問米七師月中斷井索時人喚作蛇未審七師見佛喚作什麼七師云若作佛見還同衆生老宿云千年桃核後來遠和尚拈云千年桃核也生芽著葉抽枝便發花結得果來能樣好元來却是大甜瓜大甜瓜橘柚名查栗子菘子棐子桃葩杏葩李葩也有福州橄欖也有宣州木瓜當地牛心柿子西川蜜浸芎芽既是一箇核子為甚有許多果子請首座領衆一一從頭咬破且留取核子與山僧明年作種大小遠和尚拾得一枚桃核種得些兒雜碎果子更不囊藏一時䬦飣出來可謂解使不由家富貴風流豈在著衣多披秀冬夜也有些果子迥與諸方不同不同鄭州梨青州棗溈山柿雪峯橘寒山苦桃板搭橡栗靈雲林檎大梅梅子香底香甜底甜酸底酸澀庭澀擬待來夜與諸人分冬秉拂上座今夜先此奉白大衆切須子細咬嚼看是甚麼滋味不得渾崙吞驀被堂頭索核子臨時吐不出未免遞相鈍置設有一箇半箇吐得出來亦不堪為種草何以直饒栽種得終是不馨香忽有箇漢出來道秉拂上座恁麼告報豈不是普州人却許伊具一隻眼僧問德山小參不答話此理如何師云三更神世界僧云趙州小參却答話又作麼生師云半夜鬼乾坤僧云未審二老相去多少師云一對無孔鐵槌僧禮拜云作家宗師天然有在師云放你三十棒師乃云世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知既是三昧各不相知且如前佛後佛諸大祖師天下老和尚各各出來將何傳授將何利生莫是傳箇不知底麼既是不知又如何傳這裏覷得破釋迦迦葉阿難和修鼻孔總在諸人手裏不消一揑直得命如懸𮈔若覷不破諸人鼻孔却在他手裏十二時中坐臥經行未免受他處分山僧從來曲不藏直分明說與諸人只這不知已是葛藤露布了也自此一人傳虗萬人傳實千古之下殃及兒孫忽有箇破家散宅底牙如劍樹口似血盆出來翻却祖父田園扯却多年契書可以籠古今乾坤坐斷也表叢林中有人不見德山道這裏無佛無祖達磨是老臊胡釋迦老子是乾屎橛文殊普賢是擔糞漢等覺妙覺是破執凡夫菩提涅槃是繫驢橛十二分教是鬼神簿是拭瘡疣紙四果三賢初心十地是守古冢鬼自救不了你看德山向龍潭吹滅紙燭處竊得些子螢火之光自此翻轉面皮便解斡旋天地號令聖凡無波浪處生波浪愁殺孤帆過海人好教德山見今日叢林寒氣出來毛𣯶𣯶地盡是倚他門戶傍他墻壁隨他作解受他處分也好慚惶殺人一朝忽被業風吹向曲木牀上便道我是臨濟下你是雲門下列派分枝是非紛起豈不是鈍置他古人山僧不是輕今重古抑弱扶強只要諸人知有從上來事設使箇箇出來負德山氣槩具德山作略止宿草菴且居門外何也山僧未曾與諸人向蟭螟眼裏拈新羅與占波鬬額去在歲夜僧問黃龍佛手驢腳楊岐金圈栗蓬學人上來乞師指示師云一字兩頭垂僧云如何是金剛圈師云也知上座透不得僧云如何是栗棘蓬師云刺破你咽喉僧云且如未有楊岐已前未審教學者吞透箇什麼師云知恩者少僧云我手何似佛手師云等閒挨落天邊月僧云我腳何似驢腳師云徐行踏斷流水聲僧云如何是和尚生緣師云舉頭殘照在元是住居西僧云且道黃龍為人好楊岐為人好師云牛頭南馬頭北僧云洞中春色四時好門外峯巒一樣高師云闍梨什麼劫中夢見黃龍楊岐僧云三尺一丈六且同携手歸師云猶自說夢僧云謝和尚證明便禮拜師云且莫詐明頭師乃云天地造化有陰有陽有生有殺日月照臨有明有暗有隱有顯江河流注有高有下有壅有決草木開敷有長有短有榮有謝歲時迭遷有去有來有新有舊其舊也門門俱𪹼竹處處送窮年其新也青林才換葉紅蘂便開花乃喝一喝云且道是新是舊若辨不出臘月三十日大有事在是以黃面老子道一切衆生生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有流轉諸人要得生死不相續妄想不生須是直下識此常住真心性淨明體始得即今莫有識得者麼且如春生夏長秋殘冬謝暑往寒來迎新送舊又是箇什麼目前燈燭晃耀坐立儼然問答交馳主賓互立諸人又向甚處去來這裏會即便會不得擬心動念即沒交涉不擬心不動念一一天真一一明妙恁麼說話祖師門下喚作死蛇當大路山僧今夜不避諸方怪笑且要應箇時節若是脫灑道流見人須棄敲門物得路仍忘堠子名自然於一切處不被法縛不求法脫數聲清磬是非外一箇閒人天地間若是執法修行如牛拽磨三十年後且莫錯怪人好參禪須是悟學成終莽鹵明眼人前一點相瞞不得你輩作麼生說箇悟底道理莫是師姑元是女人做麼莫是天地與我同根萬物與我一體麼莫是明明百草頭明明祖師意麼莫是隔山見煙便知是火隔墻見角便知是牛麼當知古人曲為中下之機故有這般說話諸人且莫錯認定盤星明朝後日賺你入鑊湯爐炭去在直饒上不見有塵沙諸佛下不見有六道四生內無能證之心外無所證之法露倮倮赤灑灑撒手到家人不識更無一物獻尊堂又似避溺而投火這裏如何理論得不傷物義南泉道牽牛向溪東放未免犯他國王水草牽牛向溪西放未免犯他國王水草不如隨分納些些總不見得如今只得從空放下與諸人平展去夜來須彌頂上轟一聲霹𮦷娑竭羅龍王夢裏驚覺倒跨東海鯉魚向藕絲孔中霈一巡大雨盡大地無不周遍崑崙奴走入天台山裏拾橡栗澆得渾身七郎八當連打數箇筋斗跳上華表柱頭翹足而坐等太陽東生曬㫰鐵袴唯有門前上馬臺面前乾𪹼𪹼地幾乎惹出一場禍事金剛與深沙神一夜廝爭乾底是濕底是一云總是總不是一云乾底從他乾濕底從他濕山僧遂與一喝云三更半夜這裏爭甚熱碗鳴拈拄杖一時趕散然則通人分上要用便用機變無方縱奪臨時卷舒在我譬如擲劍揮空莫論及之不及且不著思量平仄對偶星河秋一鴈砧杵夜千家之語要得尖新應箇時節佛法不是這箇道理然雖如是無智人前不可說夢拈古頌贊舉調達因謗佛生身陷入地獄佛令阿難去問你在地獄還安否達云我在地獄如處三禪天樂佛又令去問你還求出否達云待世尊入我即出難云世尊是三界大師豈有入地獄分達云世尊既無入地獄分我豈有出地獄分拈云大隱居鄽小隱居山各得其所隨分安閒何必更來論出入人生在處有餘歡舉維摩會上三十二菩薩各說不二法門至文殊云如我意者於一切法無言無說無示無識離諸問答是為入不二法門文殊又問維摩維摩默然文殊嘆言善哉善哉乃至無有文字語言是真入不二法門拈云這老病漢尋常釘觜鐵舌及被文殊一問真得口裏膠生隨後更與一杓惡水至今起不得舉趙州訪茱萸才上法堂萸云看箭州亦云看箭萸云過州云中拈云二老一期爭射總未是好手若到別峯門下管取弓折箭盡舉僧請益翠巖曰有僧問趙州萬法歸一一歸何所巖便喝僧茫然巖却問趙州道什麼僧擬舉巖打一拂子喝出拈云洪機在掌排巨靈擘太華之威明鏡當臺絶演若逐東西之怖當時若不是這僧洎合錯祗對舉僧問投子一切聲是佛聲是否子云是僧云和尚莫屎沸碗鳴聲子便打僧又問粗言及細語皆歸第一義是否子云是僧云喚和尚作一頭驢得麼子便打拈云這僧拾得一柄鉛刀便敢充關突塞若非投子有定亂之劍洎被攪擾一上然雖如是若無舉鼎拔山力千里烏騅不易騎達磨見梁武帝趙州勘二菴主一片銀蟾掛碧天清光冷照鳳樓前九重玉戶深深閉爭見扶疏桂影圓春風有時惡春風有時好人競逐春風却被春風惱雲門三頓棒龍潭吹滅紙燭雲門一曲一葉扁舟信晚風雨昏渾不辨西東不因再到秋江上爭見蘆花對蓼紅白雲綻處見明月黃葉落時聞搗衣勸君休去便休去欲覓了時無了時獨唱清新拍不同寥寥千古意無窮擬開眼向聲前聽早被風吹別調中五祖和尚舉僧問趙州如何是祖師西來意州云庭前柏樹子恁麼會便不是了也如何是祖師西來意庭前柏樹子恁麼會方始是家人卦變作明夷爻象分明不待推無動無謀終吉慶有求有用即迍危世尊出山相言法華縮頭只可藏山谷出得山來却不堪若謂利生開佛見這般惡口不如緘終朝皮街頭走有口何曾誦法華末後脫空尤叵耐逝多容你更交加給孤長者雲門大師遠迓瞿曇至給孤竚聆有法為開敷早知是法應須捨好請乘時出帝都中毒睦州伸冤雪嶠拔本無門剜空作竅有折腳殃乃破家兆萬福曾郎容此不肖送幽巖滋上人出嶺諸方無說汝無聞聞說俱無莫倒跟才起絲毫奇特想依前似不出雷門或菴體禪師語嗣此菴元上堂舉神鼎示衆五蘊出頭一段空同門出入不相逢無量劫來賃屋住到頭不識主人公師云古人大似釘樁搖櫓把纜放船覺報裂轉面皮終不向半生半滅處與諸人相見會麼童頂雲衣野興濃清齊淡話有何窮春歸簷幕千家雨月滿樓臺一笛風塗灰抹土添光彩社舞村歌笑己躬堪笑當年呆得好百無一解訴心空星拱北水朝東月落千江體一同能向海門深處輥行船誰怕打頭風西土尊師故紙羅南方歷祖葛藤窠臨風剔起透青眼跟腳從頭覷破那阿呵呵會也麼尺水休誇一丈波幕天席地生涯闊敵勝吹毛不用磨掉開骨董奮一隻拳擘破面皮軒知大膽住荒凉院舍拾落成新說朴實頭禪摧邪顯正他人肯處我不肯緇素分明他人疑處我不疑夤緣有在方來共住道伴交肩冷月深冬圍爐向火不作方便可煞古風守口如瓶更嫌什麼從上禿鬼沙魘河樓露布葛藤空相絆撚兄弟見機瞥地慶快己躬一切臨時只依本分咄出頭天外看誰是那邊人巡堂喫茶去不守師承不會禪飢來喫飯困來眠平常肯恃拳頭大冷地乾贏空劫前活祖師意直用直行離文字禪非延非促咬薑呷醋眼蓋乾坤衲被蒙頭氣衝牛斗選甚風號劍閣火聚刀山勘破勝熱婆羅門誰誇平等真法界十方聚會杓頭舀來青出於藍有何奇特良久云野步雲頭闊閒歌雪子吟目擊泄天機梅天散花雨稽首毗盧師和南法身主風光遍大千捏在毫端聚多劫修來是浪傳一念不生傾肺腑從此兒孫遍世間活計清虗爭檢古擲下拂子云今日祈晴切忌錯舉舉臨濟垂語有一人在孤峯頂上無出身之路有一人在十字街頭亦無向背且道那箇在前那箇在後師云聞名不如見面又云有一人論劫在途中不離家舍有一人在家舍不離途中那箇堪受人天供養師云見面不如聞名若是異目超宗終不向人背後吸冷氣南禪因行掉臂說一伽陀粗疏帶出蓮花笠濟楚披來糞掃衣拈起少林無孔笛左瞻右盻兩頭吹聲聲慢拍拍隨聽者雖多和者稀曲遍欲休休不得知音知後更誰知少室無師句曹溪絶學禪渾家鬼擘口五逆不成冤何故天之自高地之自厚人之自在道之自然廣額屠兒立便成佛清淨行者不入涅槃三千威儀那裏是那裏八萬細行阿誰是阿誰然而諸佛本源衆生心地翻來覆去一似不曾良馬窺鞭羚羊掛角白鷺和煙島黃鶯下柳條啞子唱嘲詞那吒不識父各住本位舌至梵天本色叢林厖眉老衲不慕諸聖不重己靈只如鼻孔搭上脣一句又且如何慣入驚人浪生拏稱意魚居常日用聞底也是見底也是用底也是有時問底也錯見底也錯用底也錯何故是也錯錯也是行之在人斷之在智鼻孔聽聲耳朵出氣黑漫漫八面玲瓏活潑潑四稜踏地會麼從前多少好兒郎枉向靈山空受記解夏云文殊三處度夏彌勒一味放憨善財走百十城達磨九年面壁闡拈花微笑光揚布髮掩泥羣黨吒梨兒孫霸旺將斷貫索穿人鼻孔把木槵子換人眼睛呼喚不回令法久住牢籠不下高枕無憂飽到處為家活潑潑出門是路不恤時時九夏非誇日日三秋軒知入定修禪曲棒打地轍莫朝參暮請折筯量空如何露柱證明作麼臘人為驗雖然恁麼只如解開布袋不涉夤緣有何標格鶴有九臯難翥翼馬無千里謾追風為不世師不可以絶學較其所得行無間道不可以超方窮其自然法不相饒言非夙辦脫空活業只在目前生鐵心肝豈愁身後拈苕菷柄破疑網於劍樹刀山𩩱大柴頭建法幢於鑊湯爐炭更有難吞草料接待上流𢬵得焦口爛腸管取眉毛廝結如是闡提短販義學沙門又不可同日而語也何故藍田射石虎錯怪李將軍一拳也是打爺來未有輸贏莫放開割捨拍盲窮性命觜喎鼻塌見全材道妙休云所得遲不離聞見分明極檻外一聲婆餅焦黃頭碧眼斷消息斷消息最條直是虎何須更插翼蒼龍平地起波瀾萬仞峯頭轟霹靂舉劉侍郎問仰山了心之旨可得聞乎山云若欲了心無心可了無了之心是名真了師云口朝鼻孔無空過眼蓋胡鬚有古風信彩骨頭花十八等閒擲出滿盆紅開爐舉五祖云難難幾多般易易沒巴鼻好好催人老默默從此得過得此四重關了泗州人見大聖焦山老漢也有此說難難放軟頑易易多瞌睡好好和衣倒默默有筋骨過得這四重關了屋裏販楊州其或猶豫未決更聽一頌夤緣過夏又經冬難易當知好惡同肚裏飢瘡無聒擾堂中生炭滿爐紅挑灰弄火非相許闊論高談定不容疊足跏趺描不就眼空烟景振宗風天際雲翻墨江頭浪輥花胡僧無鑑識特地渡流沙小參赤骨歷窮擔片板顛癡㪍癩豎雙眉驀生做處難名狀佛祖當頭聽指揮會麼窮生論死盡屬天魔說妙談玄總成外道輒莫問如瓶瀉答似盆傾本分事中總用不著放一線地怎麼商量心同虗空示等虗空證得虗空亦無虗空鴨頭緑鶴頂紅風從虎雲從龍男兒不顧傳家譜拈起簸箕別處舂喝一喝下座解制虎穴魔宮闊步挨毀僧謗佛不安排無明三毒令人怕是我冤家一樣乖會麼正令提綱法堂前草深一丈邪師過謬虀甕裏淹殺幾人出處不凡到頭得地氣吞雲夢光射斗牛以法界作伽藍龍蛇易辨以河沙為廣衆衲子難瞞虎口爭餐非為性燥馬前廝撲豈是英靈九夏三秋全提大用諸方未曾到底境界盡底掀翻佛祖不出口底舌頭和根㔃斷誰誇自恣選甚護生鼻直眼橫風高韻遠入得南禪室出得南禪門軒昂不以路為酬拈得死蛇弄解活只如來早布袋頭開日見日新復有何說良久云端的克家真種草不同短販野盤僧退院云耳有重輪非差事胸題卍字亦尋常腰間不朿三條篾萬頃風煙一草堂示衆暗撒驪珠成瓦礫閒傾鴆毒是醍醐冤將恩報滅胡種舉眼無親真丈夫頌古善財南詢臨演無位真人毗目執善財手妙峯孤頂無知識百十城遊喪善財樓閣若還彈指見分明有眼不曾開棒頭落節來翻本閃電光中立信旗殃害叢林無說處幾人錯認口頭肥坦然古路勿迂疏霽月凉風動十虗毗目善財當日事好如潘閬倒騎驢臨濟見大愚靈雲悟桃花門庭推倒亂縱橫火迸星飛無路行赤契分明基業在依前淺種又深耕桃花零落眼方開自謂風流孰可陪叵耐玄沙忒偏黨却來醉後便添杯一切障礙即究竟覺十智同真早朝心悶三杯酒午後頭昏一碗茶入夜脫衣伸腳睡五更走起眼瞇陽春白雪非難和藻鑑氷壺豈足觀一把柳絲收不得和風搭在玉欄干觀身實相觀佛亦然居一切時不起妄念眼空四海恣縱橫鼻孔遼天信腳行拏得電光為火把却來日午打三更和煙釣月是生涯古䇿風高未足誇款乃一聲天地闊祖師何必渡流沙同名同號阿彌陀佛二祖安心竹溪煙絶雨才通無數深紅間淺紅山店落英春寂寂青旗吹動柳花風屈節從長也大𢬵雪堆斷臂仰高寒鐵牛鞭起熊峯下一吸黃河徹底乾若能轉物即同如來為道日損雨色和煙匝四維眼皮未綻若為窺等閒覷破金剛際坦蕩無因役路岐添錢買得漏燈盞洗腳長拖破草鞋翻著襴衫歌雪曲倒携席帽趕村齊中佛事斫頭瀝血摩訶演掛肚懸腸薩怛多惡口小家無盡藏更將何法度娑婆贊達磨臥蓮玩月觀音萬福西來老骨檛不遵行止渡流沙被人打落當門齒啞子依前喫苦瓜上絶把茆江月白下無寸土眼頭寬青蓮影裏安身法普與勞生了正觀船子自贊孤蹤短艇寓江濵眼蓋乾坤徹骨貧接了夾山鑽入水至今恩怨不曾分歲寒節操水月精神隨所住處無過任真咦今古江山今古意一番雨過一番新四聖四總頌稽首釋迦現千百億鹽貴米賤苦趁樂喫瞋喜愛憎是非聲色日炙風吹一文不直稽首觀音全彰妙有鶴唳青霄鶯啼緑柳鼓響鍾鳴椎雞打狗不落諸緣通身眼手稽首文殊本非延促柏短松長山青水緑星移斗轉日行月逐開眼合眼一切具足稽首普賢不可思議出頭露面開言吐氣拍盲擔板忘恩斷義事無寸長熏天炙地釋迦觀音文殊普賢驀鼻牽來作一串穿橫拖倒拽痛報深冤彌天罪過一任流傳敬覽晦室老人所集前輩諸大尊宿語要深為叢林之助宗源募金鋟木分為六䇿併賾藏主元集四䇿合成一部以廣其傳因憶飲光微笑破顏而吾佛為之斂袵神光三拜依位而吾祖為之倒戈是皆表顯心行處滅言語道斷者之所作也苟欲揭示如來正法眼藏撈漉人天不假筌亦難矣此録乃真筌也其或智過二光氣吞佛祖者知我罪我總不離是録嘉熙戊戌臘月佛成道日比丘宗源再拜書于卷末三山傅詔刊
