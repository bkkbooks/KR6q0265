body:
  text: 雪堂行和尚語嗣佛眼上堂舉璣和尚僧侍立次垂問云禪以何為義衆下語不契僧請益師自代云以謗為義大衆三世諸佛是謗西天二十八祖是謗唐土六祖是謗天下老和尚是謗諸人是謗山僧是謗於中還有不謗者也無談玄演妙河沙數爭似雙峯謗得親動則萬丈懸崖不動則當處沈埋千重萬重關鎖一鎚當面擊開伎死禪和無數依前似鴨聞雷喝一喝下座佛說三乘十二分教頓漸偏圓癡人面前不得說夢祖師西來直指人心見性成佛臨濟三玄洞山五位癡人面前不得說夢山僧恁麼道還免得遭人檢責也無所以古人道石人機似我也解唱巴歌汝若似石人雪曲也應和還有和雪曲底麼若有喚來與老僧洗腳師入法海院僧問離壽寧丈室屆法海道場如何是不動尊師云此去雙峯一十里僧云未是某甲問處師云金剛腦後添生鐵師乃舉德山初參龍潭問久嚮龍潭及乎到來潭又不見龍又不現潭云子親到龍潭師拈云二古佛總向家堂裏販楊州不妨綿密山僧今日乍入法海波澄鏡淨魚龍可觀手內絲輪故然無用何故如此東西南北吾皇化玉笛橫吹宇宙寬舉帝釋持花入佛會中佛問從天得耶曰弗也問從人得耶曰弗也問從地得耶曰弗也問從心得耶曰弗也問從無因得耶曰弗也問畢竟從何得釋豎起拳頭師拈云車不橫推理無曲斷若是此花佛與帝釋總不知來處這裏著得一隻眼許你與佛祖為師正宗法眼歷古昭彰大事因緣此時成現迅機掣電處密密綿綿綿綿密密中迅機掣電更問如之若何我面何殊佛面舉僧問雲門樹凋葉落時如何門云體露金風後來死心和尚道大小大雲門境上縛殺後有僧問死心樹凋葉落時如何心云珊瑚枝枝撐著月師云大衆大小死心句裏縛殺山僧恁麼道為復壓良古人為當別有道理解夏拈起拄杖問云拄杖子你將甚麼度夏如是三問了却云拄杖子你因甚不祗對老僧拄杖子恰似眠夢覺起來道長老你老老大大得與麼不識好惡我九十日眉毛一時落盡了也你更覓祗對在山僧聞得呵呵大笑大衆且道山僧笑甚麼笑他眉毛落盡金烏急玉兔速天上星兮地下木衲僧要透祖師關勸君拈却面前大案山自然會得五祖把火入牛欄一不成二不是三不定四不可拗折弓箭踏翻射垛若據山僧檢點盡大地曲彔木牀上老漢一時有過且道過在什麼處舉南院問風穴南方一棒如何商量穴云作奇特商量穴却問南院此間一棒如何商量院云棒下無生忍臨機不見師忽有人問山僧一棒如何商量劈脊便棒何故見之不取千載難忘舉維摩經云觀五受陰洞達空無所起是苦義師拈云既五受陰洞達空無所起諸人十二時中行來往返是誰之所為若向這裏著得一隻眼便請拗折拄杖高掛鉢囊好一員心空及第底禪客若也未然刀山劍樹總在諸人鉢盂匙筯上通身是口說得一半通身是眼用得一橛用不到處說有餘說不到處用無盡所以道當用無說當說無用用說同時用說不同時諸人若也擬議山僧在你腳底舉古德道如人擔百二十斤擔從獨木橋上過不傾不側又不墮在㵎底當與麼時是什麼人扶持得與麼恰好古人垂絲千尺不在深潭離鈎三寸難為作者諸人還委悉麼幽州著腳廣州廝撲三輪清淨是名大施內不見能施者外不見受施人中不見所施物有者道內不見能施者是無我相外不見受施人是無人相中不見所施物是無衆生受者相若恁麼商量解會未夢見衲僧腳板底一莖毛在豈不見東山和尚有頌殷勤喚子不歸家愛向門前弄土沙每到年年三月裏滿城開盡牡丹花僧懺佛請舉持勢菩薩至袈裟幢世界窮釋迦音聲不得極處持地菩薩接竹至梵天量佛丈六之身不得目連以神通至非非想天要見如來頂相不見師云古聖既有與麼風規諸人何不向萬仞崖上放身百尺竿頭進步直得一人人作獅子兒吼一聲壁立千仞去豈不快哉記得僧問薦福古殿無佛時如何福云梵音何來忽有人問天寧只向伊道明日來更與你慶懺一遍問一答十問十答百過在唇吻十語九中不如一默落在鬼窟裏總不恁麼成何道理所以石梁駕嶮靈鵲難棲洞水涓涓不停纖粟正當恁麼時千鈞不立鎚處如是通信解知慚愧者和我石牛歌舉僧問趙州狗子還有佛性也無州云無師云狗子佛性無韶石不相辜為君重決破秋至鴈蘆僧問如何是和尚為人一句師云門前石塔子師乃云門前石塔子八白與九紫方道既分明免被巡官使出隊歸云冒暑入鄽如親八熱之獄却回舊住似登五臺之山於斯具通方眼鑊湯爐炭裏皆有坐具地分其或不然一滴滴水一焰焰火飲水人醉向火人老從上宗門事直是少時輩兔子不喫窠邊草象王走入野狐隊若是少林禪達磨自不會為甚如此苦瓠苦連根甜苽甜徹蒂冬至云運推移露柱生兒日南長至須知慚愧君子道長嘉州大像小人道消天台石橋伏惟知事首座大衆如龍若鳳應時納祐頭尾相就慶無不宜乞棗得梨山僧與麼提唱且道節文在什麼處一箇紅心不插兩箭舉大陽延和尚頌云半夜烏雞抱鵠卵天明起來生老鸛鶴毛鷹觜鷺鷥身却共烏鴉為侶伴高入煙樓低飛柳岸向晚歸來子細看依稀恰似雲中鴈師拈云莫道諸人不會只老僧也會不得透過一切機達磨在少林九年正是拗曲作直透過一切境維摩老人一默未免墮坑落塹應無所住而生其心道我悟去六祖大師全身坐在深草裏德山入門棒臨濟入門喝雷聲浩大雨滴全無東湖與麼道誣人之罪全罪加之以拄杖擊禪牀下座老僧有一句問諸人第一不得作問會有一句答此問第一不得作答會所以道問問不差答答不錯問答去來龜毛兔角這裏著得一隻眼盡十方都盧是箇佛祖頂門無第二機無第二用無第二句有時與麼夾山老子在百草頭上與你和泥合水有時不與麼西河獅子當門踞坐但有來者一時咬殺且道與麼即是不與麼即是良久云薦福眉毛都落盡從他露柱笑呵呵開藏經云依經解義三世佛冤離經一字即同魔說禪和家總道眼裏有筋皮下有血還見得古人節角處麼若也見得魔說佛冤千載龜鑑其或未然諸人今日看藏經多他一字不得少他一字不得若覓法雞足山中問迦葉迦葉老人已入滅二千年諸人向什麼處問若問不得行腳眼在什麼處若問得倒道將一句來拍禪牀下座端午云庚午太歲五月五東湖向舊灸瘡盤上更著艾炷二祖謾自覓安心法連達磨元來不會轉身句帶纍百子千孫箇箇錯行此路為什麼如此熟處難忘解粘去縛拔楔抽釘還他本分宗師舉一明三動絃別曲須是英靈衲子所以道靈鋒寶劍常露現前亦能殺人亦能活人須知是殺中有活活中有殺殺中無活活中無殺殺活同時殺活不同時靈利漢擺手出荊棘林向三跳後寒山古路信息不通且道是什麼人行履處良久云萬仞峯前獨足立驪龍頷下奪明珠普說若是本參中來豈有許多般事只為這一竅子未曾踏著所以省力處却成箇費力去山僧記得昔年到浮山游巖過得石龍峯了回頭却望見山極頂上有箇大竅狀如雞籠喚作雞籠巖可見不可上浮山遠禪師曾垂語云三十五箇巖你諸人無不左穿右穴自在登覽只有雞籠巖向上無門向下無路雲不能遮鳥不能度你諸人還親到得也未若未曾到得三十年後忽然失腳踏著也不定師云你諸人見浮山恁麼道且道箇老漢通你箇入路不通你箇入路若通你箇入路又道向上無門向下無路若不通你箇入路又道三十年後失腳踏著也未定到這裏也須是箇漢始得如今兄弟聞山僧舉箇雞籠巖事便覺須有箇解會處必然須道我也會得山僧將知你只是解境與你己躬大事直是沒交涉黃梅雨麥秋寒與麼會太無端時節因緣佛性義大都須是髑髏乾所以道欲識佛性義當觀時節因緣時節若至其理自彰且道現今是什麼時節佛性義在什麼處這裏具些子英俊便可隨時受用於參學門中是箇向上行履底人記得蒙溪和尚見馬師得安樂後住蒙溪一日問僧上座甚處來僧云定州來溪云定州有什麼奇特事僧云某甲旦過彼中只見說鹽貴米賤並無奇特事蒙云我這裏也只恁麼只是粗粥淡飯與禪和家隨分過時亦無奇特事却云你會麼僧云不會溪云賴是你不會你若會洎輸你一半道理晚間首座上來問和尚今早對這僧道輸你一半道理某甲實不會特來請益溪云你既忘前失後我又忘後失前首座方欲下去溪却喚住云你下去不得道著如今師僧只說鹽貴米賤並不於佛法用心你若頻頻舉著喪却你窮性命也不難諸仁者一等是入泥入水求人就中蒙溪老宛爾不同若未遇本色道伴往往錯會只如首座請益溪答云你既忘前失後我又忘後失前蒙溪為人一著在什麼處須知首座恁時已是命似懸絲當時若入得蒙溪門說甚輸一半道理直是倒退三千近來佛法淡薄衆中兄弟聞舉古人公案往往只麼情解將去此是參學家大不唧𠺕處自己腳跟下病根元不曾破只為當人未有入處縱有螢火之光落在腳前腳後到這裏又不能揮劒一生作箇垛根漢如急流水撑船不離舊處有甚共語處所以道譬如擲劒揮空莫論及之不及斯乃空輪無跡劍刃非傷於此忽然喪却窮性命自然七穿八穴有甚不成辦底事業法語大冶洪爐烹金成汁範模既備引而注之高廣大小唯範所成寸無差互既為完器用之得地利亦廣矣人之所以處世擇安巢之枝求勝己之侶親師慕道曉夕不敢自怠所至彌篤所造彌近時節既至咬猪狗手向腦後毒下一槌則卓然碩大之器自模範中出一生事亦可慶矣昔僧問南嶽讓和尚如鏡鑄像像成後光向什麼處去讓云如大德為童子時相貌何在僧曰為甚不鑑照讓曰雖然不鑑照謾他一點不得此僧疑像既成何以無昔日之光如人開眼見明合眼見暗常情便謂合眼並無所見殊不知明暗雖二均是見境讓祖隨分乘來機著一句子不妨明白平實又不可一向作明白平實解將去方徹見謾他一點不得處非升合語也千里之象一絲繫其足象為之不行萬斛之舟一石礙其底舟為之不動衆生處處著佛祖以無量方便引之不過攻其所偏而已識盡功亡己物披露演若達多得喪祛矣學般若菩薩明道易用道難苟得其用雖佛祖去伊面前亦出頭不得三交嵩和尚在汾陽會中看楚王城畔汝水東流語終未契旨同道告之曰你何不用將去言下頓領前話嘗有偈云得用直須用心意莫定動三歲獅子吼十方絶狐蹤毫𨤲繫念三塗業因瞥爾情生萬劫羈鎖余初讀德山示衆語至此念目今凡夫漏心念念生滅何時與德山說處相應及至自家扶持得起來金不博金水不洗水當人分上如大火聚向上著一物不得直下千人萬人控持伊不住有什麼傍附處到得被學家逼拶臨機應用目機銖兩緇素宛然若果未具此眼目却須勤勤退步如雞抱卵要得暖氣相接時節若至啐同時既出胎殼自然羽毛相似也楊岐栗棘蓬學者競欲吞之而不知吞不得處吞之有暇矣金剛圈學者競欲透之而不知透不得處透之有暇矣若是性燥衲子從末上頭便有憤憤不受人處分底志氣向未屙已前一覷覷透自然臨機大用掀豁如獅子游行不求伴侶壯士展臂豈借他力也豫昔年極力求道力盡神疲大事益遠後方平生佛法身心一時放下一棒打不回頭處忽然識得吾家舊物譬如寶物篋器在手隨意而用良可喜耳從上來事如娑竭龍王降注大雨非大海不能容受如是過量事非過量機亦不能入作其間宿有道機者聊聞人指點著如誤食金剛要令此金剛出心乃休息西山鄙叟曩有編蒲之念弗忘往來松陽三十年未嘗以一言勸人留心禪門將知此事非大根大器將盡未來際為期程放盡一切人我取捨為加行未議進向也偈頌僧問南院寒暑到時如何院云紫羅抹額繡裙腰僧云上上之機今已曉中下之機事若何院云炭庫裏藏身紫羅抹額繡腰裙傾國風流宛勝秦玉笛插藏人不見夜深吹起鳳樓春不二軒不於三界現身意誰謂維摩談不二山空晝永鳥無聲春光不在千花裏訪廣因欣講師不遇白雲山出復山沒寒㵎日西還日東長老不歸豫又去唯留蘿月與松風訓學徒雲居高菴老人在龍門作首座臨衆事必曰須知有識者在他日侍誨次嘗請問其說高菴曰平生衆中立志免沈于下愚者盡出此語耳豈不聞大溈警語曰舉措看他上流慎勿隨於庸鄙廣衆之中鄙者常衆識者常少鄙者易習識者難親果能自奮於其間如一人與萬人戰庸鄙之習力盡真挺特沒量漢也余從是終身踐其言然有識者果何人哉學者得其旨歸行腳大事不遠而復氣勝志則為小人志勝氣則為端人正士唯志與氣齊為得道之賢聖有人於剛很不受諫曉氣使之然也公正之士雖強之使為不善寧死無二志使之然也耆婆將死百草皆泣曰耆婆在世我等有用耆婆死後世間無識我者此喻世間諸法佛在世時佛能用之若佛滅度諸聲聞僧所不能用余未出家將冠之年見獨居士嘗謂余曰中無主則不正外無正則不行此語宜終身踐之聖賢事業備矣余佩其說在家立身出家學道以至中年撫衆以此如衡石之定重輕規矩之成方員耳捨此便事事失準竹菴圭和尚語嗣佛眼上堂真實本有之事不可妄求現成難信之宗終無所得爰自靈山付囑雞足授衣晝渡重溟夜航一葦皆緣上祖不了殃及兒孫汝等諸人各各如初心而出家如初心而行腳切須自重莫受人瞞異時足下煙生也怪天寧不得天寧今日為諸人說老婆禪去也一切衆生是正報山河國土是依報一切衆生有情有血氣山河國土無情無知覺佛言有情無佛性無情有佛性有情不解說法無情常說法你諸人還聞無情說法麼莫道剎說衆生說常說熾然說無間歇是無情說法若恁麼說內為色身所惑外為山河所眩終不聞說法諸人要會無情說法麼靜聽靜聽良久云句下不知言外旨目前迷悟隔千山師良久云莫瞌睡若據令而行豈有今日正使法堂前草深一丈孤峯外水泄不通猶未為分外何故自有佛有祖以來不敢錯誤諸人一毛頭許三令五甲之後也不得錯怪人好若是箇漢須於格外明機肯向途中辨的擡眸掩耳側掌翻身澄源湛水而未可停舟峻浪驚波而豈容擬棹但是凡情聖解理照覺知祖教詮量古今通辨一時剗削徹底消除自然一箇箇不受人瞞豈不見道暫時岐路終費輪蹄得坐披衣向後自看驀拈拄杖卓一下喝一喝云幽州猶自可最苦是新羅請首座云衲帔蒙頭下板頭邊且打瞌睡蒲團疊足長連牀上隨分挨肩忽然露柱眼開聖僧也須出院切忌釘樁搖櫓更須看風使帆各各總在其中人人自宜照顧且道照顧箇什麼喝一喝云堂中賓主句覿面沒親踈師在褒禪受廬山東林院請云不動之機往復無間且前生死要妙無根還有薦得底麼薦得薦不得是誰分上事僧問立地薦得時如何師云癡人面前不得說夢僧云薦不得如何師云啞子喫冬瓜僧云薦得薦不得畢竟是誰分上事師云是你分上事僧云便恁麼去時如何師云出門須見路莫比在家時僧云好師云吽吽師乃云適來上座道薦得薦不得是誰分上事山僧道是你分上事須恁麼看始得設使你立地薦得我且問你許多時向什麼處去來所以道絶滲漏超情離見方得不作兩橛大衆一山南北煙霞裏兩寺東西林麓間開眼如今渾是夢莫言真箇在廬山夢境全真三界依夢心而住幻機本寂萬法隨幻相而生以如夢如幻之心了世出世間之事是故在此在彼江月本自分身出機入機嶺雲初無作意投子和尚下繩床而立十方世界毫髮不差趙州老漢拽拄杖便行天下人摸𢱢不著大衆到這裏且道去則是住則是起雲自笑褒禪老結社人呼遠法師面前一道如絃直當門不用栽荊棘陝府鐵牛昨夜失却尾巴嘉州大像不是白拈賊趙州南石橋北黃河九曲吞崑崙大悲院裏安彌勒正旦云諸法不動故萬象歷然故性相常住故我及涅槃二皆空故遂呵呵大笑云新年頭作恁麼語話以拄杖卓一下云元正啓祚天地玄黃泥揑聖僧又添一歲廬山五老峯一夜不覺頭白面皺南嶽三生藏去年已是眼暗耳聾將謂彼此接物利生誰知如今魔強法弱仁義盡從貧處斷世情偏向富門多伏惟山門監寺首座大衆應時納祐各各道體萬福昨夜鄰家乞新火曉窗分與讀書燈師高聲喝云你諸人看看眼目定動也左神茶右鬱壘鍾馗小妹生歡喜開門不用掛桃符昭昭靈靈元是鬼遂長噓云但願今年蠶麥熟羅睺羅兒豎一指遂豎起一指云還會麼良久云俱胝和尚東林百不會瞎驢隨大隊鞭打不進前步步只倒退一日復一日靈臺轉昏昧死去入地獄永劫終不悔大衆為什麼如此開口見心肝實語當懺悔喝一喝云錯又喝一喝云錯復喝兩喝云錯錯乃大笑云錯錯東林手把斷貫索諸方鼻孔都穿却人問如何不自穿自己鼻頭難摸𢱢而今子細細思量元來不是而今錯擲下拂子下座到廣因訪妙喜和尚衆請云師翁咬破鐵餕餡後來兒孫被他賺如今重為振綱宗只提一口金剛劍可笑諸方老凍膿口裏只今無佃線彭崎逆浪卷波瀾霹𮦷聲中看閃電大衆雲門句裏別有生機甘蔗洲邊漸入佳境俊鶻窠裏不生鴟猛虎窟中更添獅子哮吼處壁立萬仞吒呀地誰敢當頭東林老子到這裏彼此有落節處何故閙市裏上竿還瞞得你諸人麼雖然如是山僧同行在此說一片禪直教四六八六錦上添花一要塞斷諸方老和尚口二要捩轉你禪和子鼻孔你諸人到這裏須是定省精神始得遂卓拄杖云金鏃慣調經百戰鐵鞭多力恨無讎請化主