吹渭水落葉滿長安散聖節舉太宗皇帝因僧相見帝問近離甚處僧云臥雲帝云臥雲深處不朝天因甚到此僧無語雪竇代云難逃至化海印云聖明難遇師拈云咫尺龍顏這僧蹉過若非二尊宿作家爭見君臣道合正法則不然臥雲深處不朝天因甚到此只對云雲從龍風從虎舉僧問雲門如何是沙門行門云會不得進云為什麼會不得門云只守會不得師拈云前箭射人可後箭射人深鍾先生沒後此道少知音豎起拂子云見麼太陽溢目萬里不掛片雲三世諸佛歷代祖師於此只眨得眼至於一棒一喝一機一境總是覆盆之下呈伎倆還有透得底麼咄誣人之罪以罪加之住金山開堂舉仁示皇帝夜夢神人勸發菩提心宣左右街僧録問菩提心作麼生發皆無對雪竇代云實謂古今罕聞海印信云莫過於此師云至尊面前好一場佛事左右街蹉過即且置只如二老還得直截也未或問金山菩提心如何發只答云王言如絲其出如綸張都督生日云淨法界身本無出沒大悲願力示現受生故黃面瞿曇從法界藏流出正體智正體智流出後得智後得智流出大悲心是以從兜率天退入胎住胎出胎出家成道轉法輪度衆生如優曇鉢花時一現耳而少傅樞相都督相公乘過去大悲大願大智大力山川孕秀河嶽儲靈於九月二十日降誕恩隆宸眷慶溢民瞻千聖之所護持萬靈之所景仰況斯文關治道之得失而大老為天下之重輕敢憑佛法之緣仰祝喬彭之壽正當恁麼時敢問諸人黃面瞿曇與大丞相如是奇特如是殊勝從什麼處流出諸人若識得去則二老道不虗行其或未然春行萬國春無跡月滿千江月不分只恁麼過犯不少更擬搖脣鼓舌展事投機則千佛出世不通懺悔所以靈山會上是知而故犯曹溪門下是知而故犯山僧今日不可更把髻投衙是則是若不入水爭見長人密印忌日拈香普示大衆云還見麼昔日哦眉山上親曾把斷要津今朝楊子江心依舊不通水泄不肯伊會佛法只肯伊沒人情不肯伊口巴巴只肯伊乾嚗嚗留下千斤擔褲無口裩無襠聊焚一炷香冤有頭債有主今年月去年月四海九州同皎潔去年人今年人鼻孔依前搭上脣只道年年人與月一回相見一回新或修行或供養馬師鼓起無風浪爭如此夜十分圓人在妙峯孤頂上舉趙州一日侍者報云大王來也州云萬福大王侍者云未到在州云又道來也師云來也宮殿隨身去也笙歌滿路侍者白頭如新趙州傾蓋如故臘八云佛高一丈魔高一丈正覺山前無風起浪金山箇裏佛魔俱喪明星現時且莫欺誑無牛乳糜有德山棒為甚如此真法供養慈航到云每遇五日一參雖是諸方舊例今日宗師面前豈容亂呈懵袋雖則恁麼不可放過遠山作眉紅杏腮嫁與春風不用媒老婆三五少年日也解東塗西抹來且道今日又作麼生逢人切忌錯舉舉僧問睦州一言道盡時如何州云裂破僧無語又問雲門一言道盡時如何門云老僧在你鉢袋裏師拈云雲門睦州二大老美則美矣要且未勦絶在或有人問徑山一言道盡時如何只向他道省得山僧一半力裴十觀察供羅漢云具般若種於般若上自見自明有福德人於福德上愈修愈進如會百川而歸海似增九仞以成山榮華轉榮華殊勝又殊勝此是大檀越觀察分上事於一切法成一切智具大人相號正遍知此是三世諸佛分上事雙斷二障雙證二空欲證圓覺而未極圓覺此是諸菩薩分上事知苦斷集證滅修道以佛道聲令一切聞此是靈山五百十八大阿羅漢分上事向上一路千聖不傳學者勞形如猿捉影此是歷代祖師分上事雖然如是差別不同而龍樹祖師道生為四種生衆為四衍衆此一法界藏遍於彼行處是知大檀越與諸佛菩薩五百羅漢歷代祖師同一舌頭同一解脫同一關棙譬如瓶盤叉釧同是一金江河淮濟同是一水酥酪醍醐同是一味若向這裏會得則聖凡平等理事一如衆中莫有箇瞞不得底出來道徑山這裏是什麼所在說同說不同說異說不異正當與麼時如何排遣卓拄杖云青山不鎖長飛勢滄海合知來處高復頌云雨足斂煙雲山晴開錦繡良哉信心人知有向上竅携家上崔嵬法席為宏開五百阿羅漢擲錫與浮杯赴供如雲集壽山增岌岌次男慧性開念念皆迪吉徑山不覆藏言外要承當風雲重際會歸去侍清光說法不勞三寸舌參禪惜取兩莖眉玉攔干畔青青柳最好人間二月時諸人莫作時節會莫作佛法會莫作玄妙會莫作平常會總不恁麼畢竟作麼生會憶昔首山曾漏泄新婦騎驢阿家牽古德道何似生遼天鶻萬重雲只一突大慧師叔道何似生莫妄想直饒透出古今也是胡孫伎倆別峯晚輩輒敢續貂何似生合取口三世諸佛不知有日午打三更面南看北斗舉演首座挂牌云黃面老子云自未得度先度他者菩薩發心自覺已圓能覺他者如來應世諸兄弟佛祖既有榜㨾子孫只得遵承弘持蓋是大緣靖退實為小節前堂首座禪師道價精金美玉充滿江湖機鋒掣電奔雷高超佛祖雙徑久煩分座諸方無不欽風此來川藞苴相聚有緣正賴善知識共垂隻手重開法施接納方來使碧眼胡兒子孫轉見昌盛有白衣老人眷屬密賜扶持前程未易度量當場豈可退避且已展不縮一句作麼生道袖中凜凜吹毛劍千聖齊教立下風復頌云律身行業凜氷霜接物機關走雷電七千餘指渴思漿願為重提正法眼海書記出世開元引座云諸佛橫說豎說祖佛全提半提權掛垢衣初無實法七擒七縱用不祥之器豈得已哉雙放雙收呵學語之流蹉過久矣當山海書記棄儒學佛捨律參禪為三吳爛漫之遊探千聖不傳之妙可取者如灘底石不隨流俗之波難掩者如器中鍠屢却藩侯之請今則姑蘇緣熟史君命嚴拈拄杖往據要津把葛藤束之高閣佛祖爐韛中煆煉得底人天眼睛裏正好施呈迦葉維衛想已點頭龐老維摩亦皆稽首益無所益為無所為橫彼岸之慈航皎昏衢之慧矩乃云海首座火落襪只自承當箭離弓弦不容擬議且直下承當作麼生道莫道洞深雲出晚須知果熟自然香復頌云初三十一中九下七衆眼難瞞當機莫惜奉旨靈隱開堂遣中使付御香謝恩畢捧起示衆云香水海中流出玉皇案上頒來九州四海散作光明雲萬歲千年用嚴皇帝壽判府尚書度疏師接起示衆云毛錐子上舌相廣長吐作仙機之錦曹溪路畔春風蕩漾遂開枯木之花其中一點誵訛不妨對衆吐露拈香祝聖云此一瓣香七佛已前靈根秀發九天之上瑞氣盤旋恭為今上皇帝祝延聖壽恭願子帝王於大明之上閲世無疆友天地於太極之初卜年有永天眷恭願金枝玉葉如珠網以交輝福海壽山空芥城而不動文武官僚恭願佩玉鳴珂天作明良之會攀龍附鳳日新經濟之能此一瓣香眼看不入鼻嗅不聞半生歷盡艱辛一旦得來容易骨董袋裏幾回曾已施呈龍牀角邊今日重新說破若有所為祖圜悟父密印未肯點頭若無所為新彌勒舊釋迦也須熏倒問答罷乃云建法幢立宗旨不須三令五申超毗盧越釋迦只要一刀兩段從上來有句無句是心非心金剛栗棘覿面拈來兔角龜毛當場擲出未免傷鋒犯手帶水拖泥我王庫內無如是刀明眼人前作無限笑雖然恁麼當爐不避猛火當言不避截舌而今傾西湖水錢塘水以為墨束飛來峰凌霄峯以為筆以此筆以此墨欲寫達磨所傳之法欲書今上皇帝所得之妙書也書不盡寫也寫不及只這寫不及書不盡處或有一箇半箇覷透誵訛見得諦當如捎空俊不受羅籠似出礦精金決無改變一了一切了一明一切明能殺人而活人不逐物而却物所以道我此法印為欲利益世間故說而今說即說了也喚什麼作法印卓拄杖一下云擘開華嶽連天色放出黃河到海聲臣僧某此日開堂舉揚般若所有一毫之善恭為今上皇帝祝延聖壽恭願父堯子舜兩宮睿算無疆君聖臣賢四海生靈有慶伏念某山林螻蟻之臣誤蒙睿旨差住徑山此山乃兩宮祈禱去處千古道場庸陋之人祇領而來不勝戰汗此日開堂攽降御香光輝溢目實為希世之遇誓與衲子安禪林下力行此道以答鴻休臣無任瞻天望聖激切屏營之至復舉張商英在江陵府請皓布裩升堂祝聖皓公問答罷遂示衆云公不見良久又云公不見時無盡云見了也皓公遂下座一衆惘然師拈云提過量人境界須過量人證明諸方盡道皓布裩忘了話頭張無盡救得一半且得沒交涉新徑山輒有頌云胡張三黑李四不會禪不識字驀然相見閙籃頭話盡平生各歸去十日雨五日風謳歌鼓舞樂無窮普說別峯箇裏無可與兄弟商量無可與兄弟探究是非緇素得失迷悟盡是兄弟擔帶得來自起自倒別峯一毫不曾動著有志之士切宜細意古德道宗門深奧酌度胸襟粗餐易飽細嚼難飢根本差殊良由自錯敢問自出叢林見善知識以來只為參究且將什麼作根本還得不錯也未你聽人口頭以為實解錯了也說心說性以為道理錯了也無言寂默以為玄奧錯了也行棒行喝以為緊峻錯了也問東問西以為淨潔錯了也拈匙把筯以為見成錯了也電光石火以為直截錯了也飢餐困臥以為平實錯了也一絲不掛以為到家錯了也呵佛罵祖以為本分錯了也若能一時放下剗得斷去得盡作箇水灑不著風吹不入底本色衲僧不為分外其或硬把死蛇頭則千聖出來亦無救汝處釋迦老子三無數劫勤苦修行也只為此事及乎以殊勝願力示現王宮出家成道且作箇榜樣而今盡道教外別傳不立文字是達磨宗旨釋迦四十九年所說皆是教乘不知這老漢常示此意遇作家亦常拈出一日王舍城中見栴陀羅二人舁猪而過佛指以問云這箇是什麼旃陀羅云佛具一切智猪子也不識曰也要問過且道世尊意在什麼處須要問作麼又一日上堂大衆集定世尊一辭不措且道意在什麼處箇裏如山之固似海之深不容擬議文殊多事出來白鎚一下云諦觀法王法法王法如是好一釜羮傷鹽傷醋了也而今人便道此公案易會無言處見說了也若如此埋沒世尊與文殊不少你尋常一切處不作聲時何不會須待於公案上強生卜度作什麼故雪竇頌云列聖叢中作者知法王法令不如斯未免是據欵結案又怕你癡子輩於此作窠窟却云會中若有仙陀客何必文殊下一槌既不待下一槌諸人作麼生會還有仙陀客麼到這裏釋迦老子命如懸絲又一日外道問不問有言不問無言世尊踞坐外道云世尊大慈大悲開我迷雲令我得入且道外道見箇什麼阿難問佛佛言如世良馬見鞭影而行而今人便謂默時說說時點乃是跛鱉盲龜見解百丈恆和尚舉此話問法眼語未終法眼遽掩其口云住住你擬向良久處會那恆忽然大悟法眼如金翅入海直取龍吞不容佇思若不作良久會且悟箇什麼後來住百丈後依樣畫猫兒一箇上堂衆集定云喫茶便下座有時云歇便下座有時云珍重便下座平生多用此時節因緣衆人不曉其意這老漢殺人不用刀只緣他有實證處放將出來自然離泥離水後來自頌此三轉因緣云百丈有三訣喫茶珍重歇直下便承當知君猶未徹他既垂示要人承當既直下承當為什麼未徹知麼百丈賴有此語救得一半後來古塔主云只如恆和尚作此一頌且道見處如何還知得失否是他三度上堂却似箇好人後來作此一頌恰似面上雕兩行字若是通人達士舉起便知後學初機難為揀辨且道什麼處是雕兩行字處古塔主又曰老僧與汝從頭注出百丈有三訣賊身已露喫茶珍重歇贓物出來直下便承當知君猶未徹大似抱贓判事師乃拊掌大笑云直是好笑且道笑箇什麼古塔主恁麼批判不妨自要列為好人若比百丈面上雕兩行字則古塔主除却眉毛眼睛雕得黑墨律焌了也諸人檢點得出麼若檢點得出則與百丈雪屈古塔主雪屈世尊雪屈外道雪屈法眼雪屈印上座雪屈其或未然屈屈小參親喜二上人請云浮玉山頭留不住相携夜過長蘆渡識得諸方第一機踏翻船子先歸去敢問諸人且道歸什麼處去看取向下注腳瞻風撥草結伴尋師蓋是衲僧尋常行履處親喜二上人妙高臺下興闌挾復便行長蘆渡頭緣盡隨流而去須知同鄉同院同死同生問佛蓋有因緣於理莫非幻化當以平生參學眼目掃蕩歷劫虗妄根源滔天雪浪處把斷要津沃日雲濤中不漏涓滴吸乾滄海擊碎驪珠携龍女同出娑竭宮中笑夾山滯在華亭橈下歷歷落落似金博金密密綿綿如水歸水記得夾山參華亭船子和尚子云大德住在何寺山云似則不住住則不似子云汝道不似不似箇什麼山云不是目前法子云汝甚處學得來山云非耳目之所到子云一句合頭語萬劫繫驢橛船子又問垂絲千尺意在深潭離鈎三寸子何不道夾山擬開口船子以橈打落水中才上船船子又問道道山擬開口船子又打夾山於此有省不覺點頭子云竿頭絲線從君弄不犯清波意自殊夾山遂問拋綸擲釣師意如何子云絲懸緑水浮定有無人意速道速道山云語帶玄而無路舌頭談而不談船子不免用冬瓜印子說道釣盡江波錦鱗始遇山乃掩耳不妨作家子云如是如是遂囑云汝向去直須藏身處沒蹤跡沒蹤跡處莫藏身吾二十年在藥山只明斯事汝今既得他後不得住城隍聚落但向深山裏钁頭邊討一箇半箇接續無令斷絶夾山辭行頻頻回顧船子遂喚闍梨夾山回首船子豎起橈云汝將謂別有乃覆却船而去船子雖則頭正尾正未免養子之緣親喜二上人坐機一路又且不然不待諸方帶水拖泥翻却船子雙雙便去敢問諸人且道向什麼處與二上人相見良久云誰知遠煙浪別有好商量法語示宗願僧無十年學不獲聖法才且道學箇什麼莫是學經論學文章學世間種種伎藝麼且得沒交涉豈不見趙州道十二時許你一時外學時有僧問未審外學箇什麼趙州云學佛學法且佛法尚是外學這老漢十二時中在什麼處著意宗願從小師慧海落髮今歸侍親求一語以資參學儻不落從上窠臼直下覷透趙州十二時中著意處則知趙州赤心片片若果親得親證資之以學佛學法所謂聖法才如大蟲插翅若只恁麼渾崙吞箇棗莫道不疑好宗願勉之頌古趙州巡乞凌行婆云太無厭生州覆鉢而去千尺絲綸直下垂錦鱗撥剌上鈎時斜風細雨歌歸去醉倒蓬窗百不知牛頭未見四祖水因有月方知靜天為無雲始覺高獨坐孤峯休更問此時難著一絲毫僧問夾山撥塵見佛時如何山云若論此事直須揮劍若不揮劍漁父棲巢學佛人人被佛瞞撥塵見得幾何般狂風卷地雲吹散獨立欄干宇宙寬立地佛事華亭錢參政起棺菊花明日是重陽惆悵人亡德不亡幻化浮生非久戀乃呼相公歸去來佛會天堂曇塔主下火雙塔修成未合尖曇公一旦驀抽單山頭陳迹昭然在有意重來也不難曇塔主自閩縣棄俗來高沙為僧豎起生鐵脊梁不作鬼家活計瞻風撥草嘗盡諸方五味禪抹土塗灰偏是化人三昧熟此山缺如龍之角上人奮縛虎之拳未滿十年已新雙塔山林增勝道俗交欣乘時正要合尖久病忽翻筋斗嗚呼大緣難辦人命無常實際難忘起滅心別峯痛失左右手今則春山寂寂春水漫漫相送茶毗不勝依戀移身換步報恩喚起主人公結果收因浮玉唯憑火把子乃呼云曇塔主未忘夙願莫惜再來蒲團禪板尚依然栗棘金圈牢記取若記得去夫復何言其或未然從前汗馬無人識百煉精金火裏看孫承奉掩壙掃開荊棘林鑿出金剛窟端誠老先生安居得解脫端誠元酒大羮淡而有味精金美玉混而不淄當年筆掃千人治易名高兩學時命未偶豈孟裏陽果不才耶道德自娛笑陶彭澤歸來晚矣有難兄如都運有至交如後湖一觴一詠樂餘生四女四男奉甘旨享七十七歲可謂五福兼全與三十三人所證一絲不隔今則霜風凜凜林木蕭蕭玉骨將掩於郊墟血屬不勝於雨淚事到這裏夫復何言快與承當不勞擬議敢問大衆且道作麼生承當端誠丈要知麼大地撮來粟米粒拖金曳紫付兒孫覺禪客撒灰師以手拍灰盆云覺禪客還記得話頭麼本分事絶羅籠胡峰不戀舊時窠靈利漢沒彼此猛將不向家中死山僧說法錦城三年汝侍巾瓶山僧放浪吳越萬里汝隨舟楫相從浮玉山中問答機鋒電掣夫何一病縈牽半夏驀地抽單已得鵬禪斷送闍維玉骨珊珊覺禪客惺惺著領取別峯老婆心萬里天邊飛一鶚金山退菴奇禪師語嗣別峯印上堂臘月二十五大地無寸土蒼松雪後凋寒梅香欲吐奉報參玄人動著即莽鹵滿聖節舉肅宗皇帝問忠國師如何是十身調御國師云檀越踏毗盧頂上行師云肅宗密行深深藏頭露角忠國師赤心片片醉後添杯國恩即不然如何是十身調御良久云萬歲萬歲臘八云半夜逾城一著錯六年苦行又千差縱睹明星翻得轉可憐特地隔天涯受東霞拈疏云不立文字直指人心見性成佛又何須這箇然雖如是也要錦上鋪花江月照松風吹永夜清宵何所為佛性戒珠心地印霧露雲霞體上衣永嘉恁麼說話大似向屎窖裏輥一身不淨更教人嗅克由叵耐東霞即不然江月照松風吹便下座舉僧問智藏有問有答賓主歷然無問無答時如何藏云怕爛却那僧又問長慶慶云相逢盡道休官去林下何曾見一人師云二大老恁麼答話一人似孟嘗門下慣接高賓一人如李白不攀丹桂直入翰林然雖如是點檢將來未免話墮今日忽有人問東霞有問有答賓主歷然無問無答時如何只對他道此處無金二兩俗人酤酒三升他若道和尚恁麼答話亦未免話墮也怪伊不得何故明眼人前衲僧家當具決烈之志截斷門頭戶底一念不生前後際斷處窮根徹源到頂到底更須知有窮不極處然從捩轉關棙脫