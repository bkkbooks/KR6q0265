body:
  text: 佛心才和尚語嗣靈源上堂日出扶桑老胡眼睛獨露月澄寒沼祖師心印全彰便與麼去正是鄭州出曹門上封一句海墨難詮墻壁瓦礫晝夜流傳若住聽瑩子沖天當陽不顯迹文彩未生前只箇平常處壺中別是天別是天唯自到緩行急行俱蹉過紅塵數盡去來人李白元是癡措大參宗乘提唱妙絶名言一句該通乾坤函蓋直似首羅正眼竪亞面門又如圓伊三點橫該法界乃卓拄杖云向這一點下明得出身猶可易脫體道應難又卓拄杖云向第二點下明得縱橫三界外隱映十方身又卓拄杖云向第三點下明得魚龍鎖戶佛祖潛蹤不然放過一著隨分有春色一枝三四花色本殊質像聲元異樂苦眼耳絶見聞半夜日輪午日輪午與誰説休向虗空重釘橛炯炯森羅相對看如淨琉璃含寶月乃拈拄杖云三世諸佛鑽入拄杖裏去了也見麼見麼無智人前莫説打汝頭破腦裂二由一有一亦莫守拂子朝到西天暮歸唐土向汝諸人道也無佛也無祖夜半日輪正當午露柱燈籠𡎺著時誰道黃金如糞土清機歷掌同道方知格外稱提徒勞啖句中有句埋沒己靈句中無句藏身北斗拈燈籠向佛殿裏即且置將三門來燈籠上又作麼生自是覷不見剛道有遮護太上皇帝升遐就大內升座云智身迥出先天地大用縱橫不易知鼓舞靈源宣衆妙人間天上仰無為無為之道任其來也倥侗無象抱一冥真神應無私群靈自化與其往也塵銷鏡淨海湛空澄月寫寒潭光吞萬象契斯理者死生通貫真一如如乃聖乃神無在不在可以與三世諸佛同時成道坐菩提場共六代祖師同時説法據師子座適來適去宛爾全真在古在今曾無別體然雖如是且道今日舉揚資嚴仙駕趣何地位還會麼翻身不坐琉璃殿要踏毗盧頂上行新安元滿和尚到云法王法令超群生常以法財施一切久持斯語今見其人不免向百尺竿頭聊分主伴萬仞崖上覿體唱酬直得風行雷動電激星飛不唯光壯叢林要且家聲不墜此中有三百鈍根衲子生盲者盡道目前無法見佛祖如生冤家生聾者蓋道耳界無聲聞禪道如風過樹十二時中只是騰騰任運似此等輩難為醫療幸遇法叔到來乾元不至寂寞略借敏手痛與一針使聞見脫然恩歸有自憶得三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人師云若是乾元則不然逢人即出出即便為人未審法叔逢人又作麼生下座攀請為衆説破懷州牛喫禾益州馬腹脹天下覓醫人灸豬左膊上乃卓拄杖一下云大衆還知杜順鼻孔在這裏麼穿過東弗于逮透徹西瞿耶尼縱橫十字無人識贏得山僧眼似眉入靈石上堂云䔧杖破雲穿石徑芒鞋高躡釣龍臺到家不必輕彈指樓閣重重陟頓開樓閣門開虗空廓徹太陽溢目顯露主賓山花溪水發揚格外之樞機虎踞龍蟠奮迅驚群之作略山僧到這裏只得口挂壁上且道五湖衲子又作麼生相委喝一喝云只今休去便休去欲覓了時無了時牛頭橫説竪説不知向上關棙衲僧全提半提失却劫初鈴子若也鈎懸六犗直是釣鯨釣鰲遂卓拄杖一下云莫有負命者麼我若孤峯獨宿從他佛祖正眼難窺我若淺草平田狸奴白牯許他知有知音相見休更揚眉傾蓋同途已成多事休休欲言言不及冷暖自家知達磨未傳心地印釋迦未解髻中珠人人負絶世之機箇箇懷超方之作及乎花開五葉句列三玄例皆帶水拖泥不免坐沉丘壑莫有旁不肯底麼若有出來向南山起雲北山下雨三十年後莫道山僧埋沒人好入荒田不揀信手拈來草觸目未嘗無臨機何不道遂拈起拄杖云夾山變作山僧拄杖子拶著釋迦眼睛穿過彌勒鼻孔却向波斯國裏説禪去也以拄杖敲禪牀云禪禪偏中無正正中無偏又敲數下云道道築著額頭休蹉過又卓拄杖云不蹉過陌上迷人逢達磨結夏云十五日已前百尺竿頭進取一步十五日已後明月堂前倒退三千正當十五日橫眸看梵字彈舌念真言恁麼舉唱正是和泥脫墼畢竟如何大盡三十日小盡二十九為席參政追悼云昔年相見深深處今日無忘密密觀莫把迅機饒佛祖便乘靈覺入塵寰席大資席大資但願空諸所有慎勿實諸所無善保遐程無忘此祝大衆偉哉若人非佛非儒亦非百氏全佛即魔而折衝萬里全儒即佛而融會九流全機受敵而應變無窮全死即生而去來可辨憶得李都尉臨死時有尼問曰衆生見劫盡大火所燒時切要照管主人公都尉云為我煎一服藥來尼無對尉云這師姑藥也不解煎投枕而卒師云都尉可謂頭正尾正絶後光前且如席大資當與麼時又作麼生倒騎鐵馬上須彌踐破虗空七八片我宗無語句亦無一法與人大似揚聲止響掩耳偷鈴若是俊流直須洗耳靈石則不然遂卓拄杖一下云晴空霹𮦷頭角崢嶸止濼困魚徒勞激浪夜來忽聽虗空語烏雞飛去無尋處天明捉得死貓兒文殊跨取便歸去欲歸去却把住將謂是文殊大士元來只是東村王大叔施主請云十方無壁落四面亦無門正當此時生死魔向什麼處入剎竿頭上煎䭔子三箇猢猻夜簸錢祖佛到這裏向甚處出頭若也具通方底眼有格外之機便能向毒蛇頭上揩癢猛虎口裏爭餐從教舉世樂欣欣須信渠儂猶未肯總不與麼天自高地自厚飢來喫飯困來打眠任運還同癡兀人他家自有通人愛憶得志公和尚十二時歌云雞鳴丑一顆圓光明已久師遂以拂子擊繩床云生死於此而頓息苦海於此而枯涸菩提於此而圓成涅槃於此而直入與麼説話大似認魚目作明珠去家轉遠靈石則不然雞鳴丑一顆圓光明已久忽然抖擻起來時問著依前還漏逗還漏逗擬欲藏身北斗前應須合掌南辰後三界無法何處求心四大本空佛依何住直得清寥寥白滴滴猶是真常流注諸人十二時中還有相應處也無若也相應去上無攀仰下絶己躬喚起懷州牛喫禾捺下益州馬腹脹從教天下覔醫人灸豬左膊上奇奇是是非非總不知夢回瞥起臨明鏡洎被張公錯畫眉諸佛放光明助發真實相卓拄杖云希有諸比丘是中無比況遂竪起拄杖云還見麼良久擲下拄杖云山僧今日失利李侍郎到山云袖裏暫間醫國手岸巾來訪臥雲人相逢一笑千峯頂高下森羅百億身相逢一笑萬壑風清大冶精金應無變色黃檗昔遇裴相國當頭一劄冷暖自知睦州久契陳尚書剖露肝腸清虗廓落正當今日賓主互換覿體唱酬似空藏空如鏡照鏡且道於中作麼生分芥子拈來敲石窟須知渠是箇中人謝典座云畫餅不足以充飢大羮必資於敏手淨瓶躍倒目前贏得大溈山鐵鉢擎來八萬毛孔皆香發口吞三世即且置鐵牛不食連鞭草又作麼生良久云機梭不犯風雲勢石笋從教劫外抽秋風浩浩來芙蓉花半開秋風蕭蕭去黃葉填山路大塊本無私恩威各有遇為什麼如此藏頭白海頭黑明眼衲僧辨不得參小參兄弟一切用心總是間不如徑截向父母未生前看取若向父母未生前明得四大六根一時脫落根塵器界直下頓空明如皎日寬若太虗便與三世諸佛同體非唯與三世諸佛同體便與橫行竪走醯雞蚊虻悉皆同體便與森羅萬象明暗色空方圓長短悉皆同體可以拈一塵盡大地一時明便乃頭頭上明物物上顯所以道塵塵爾念念爾入荒田不揀信手拈來草觸目未嘗無臨機何不道無根兮却活離地兮不倒日用尚不知更於何處討一時撒向諸人面前了也要用便用不妨快活平生到這田地若是箇漢如關將軍相似持一口露刃劒當八萬大陳一時掃將去劒下有殺人之意有分身之路只如此人作麼生近傍得他作麼生比擬得他選佛若無如是眼假饒千載又奚為頌古達磨見梁武帝寶壽開堂三聖推出一僧遠泛鯨波入大梁廓然無聖對君王可憐徑寸無人鑑却與相如依舊藏豐城收寶劒宇宙識人稀不入張華手焉能別是非山堂洵禪師語嗣佛心入靈石舉翠巖云過去諸佛已滅未來諸佛未生正當今日佛法委在翠巖放行也隨機利物把住也瓦解氷消且道放行好把住好良久喝一喝云者野狐精師云翠巖和尚恁麼説話自救不了如何為人靈石也無佛法到諸人參也無禪道與諸人學拈却丈二釘去却八尺楔若也會得迥絶無人處聚頭相共舉若也不會三尺一丈六且同携手歸正旦云蟄戶未開龍無龍句喝一喝云沒量大人盡向者裏坐著山堂不然元正啓祚打開門戶頭角崢嶸興雲致雨卓拄杖云頭角露也若也見得張三烏帽斜李四醉絶倒若也未見應時納祐慶無不宜窮谷無人作上元一燈歷劫鎮長存諸人盡在光明裏看時不見暗昏昏燈籠與露柱相交佛殿與三門鬬額留雪嶂橫趍下海九疊峰𨁝跳上天者裏明得一燈明而萬億燈明儻或未然東家點燈西家暗坐朔風掃地卷黃葉門外千峯凜寒色夜半烏龜帶雪飛石女溪頭皺兩眉卓拄杖云大家在這裏且道天寒人寒喝一喝云歸堂去撾鼓升座拈香祝聖明明錐破卦文直下更無少剩只如靈龜未兆文彩未生還有這箇消息也無良久云歸堂去萬人叢裏求知己百草頭邊識老僧從此更無回避處三頭兩面得人憎有佛處不得住藕絲孔裏行官路無佛處急走過十字街頭相對坐喝一喝云功德天黑暗女有智主人二俱不受畢竟如何大盡三十日小盡二十九祈雨云拽回天關踏翻地軸拄杖化為龍一雨沛然足在坑滿坑在谷盈谷大衆既然如是為什麼者裏乾索索地良久云知恩者少一葉翻空便見秋不風流處也風流當頭薦得便歸去看取木人騎土牛喝一喝赤肉團上壁立千仞渾家送上渡頭船糞掃堆頭丈六金身和盲勃塑瞎今時兄弟聞人與麼舉點頭咽唾道我會了也殊不知山堂老漢不入這保社何也時人只看絲綸上不見蘆花對蓼紅是非海裏橫身入豺虎群中放步行自是渠儂無影迹從教天下競頭爭常在動用中動用收不得常在萬象中出萬象一頭你若簸土揚塵我則空澄海湛你若單提獨弄我則竪四橫三且道據箇什麼道理不是渠儂多意氣他家曾踏上頭關卓拄杖下座天申聖節云天下無二道聖賢無兩心世尊不説説迦葉不聞聞達磨直指人心見性成佛者裏若星馳電激如何近傍文王之不識不知孔子之無思無為子思之不思而得不勉而中者裏如銀山鐵壁作麼商量當陽薦得綿歷萬世而卓爾常存信手拈來日應萬機而巍然不動彌綸天地混茫太虗而不見其蹤鼓槖陰陽陶鑄萬物而不宰其功吾君以此道傾天下生靈之心無一物而失其所臣僧以此道祝吾君齊天之壽得萬國之歡心是日也日月為之光華陰陽為之協序臣僧今日又且如何笑把胡家十八拍為君吹作萬年歡舉教中道法身流轉於五道故曰衆生衆生現時法身不現咄是何言歟盡大地是釋迦老子何處更有衆生便恁麼去也只得一橛更有一橛饒你參三十年也未分付在久雨云娑竭龍王數時惡發將四大海水一踏踏翻直得三千大千世界雨淋淋地在谷盈谷居坑滿坑濕透釋迦鼻孔浸爛達磨眼睛衆中莫有補綴虗空底鉗鎚喝散白雲底意氣麼但願曦光照林谷時聞野老自謳歌針劄不到處放下死蛇頭唱拍相應時根塵俱脫盡明眼漢沒窠臼百尺竿頭放步行大洋海裏和身倒住白鹿據方丈云掩室摩竭正令已行杜口毗耶全機脫略更來開口猶欠三拳擬欲吞聲不消一钁冬至云一陽才起處梅萼破南枝且從你諸人點頭萬物未生時渾崙無縫罅是你諸人作麼生摸𢱢若是箇漢向冷湫湫處覷得破閙嘈嘈處用得行十二時中無向背何妨日午打三更盡大地是真實人體賊來須打客來須看總剎海是解脫門東頭賣貴西頭賣賤卓拄杖云見之不取思之千里歲月去人如箭急一年祇有十五日雪砌禪人總不知但見鉢盂兩度濕正與麼時不是玄妙奇特亦非聖解凡情茂林芳