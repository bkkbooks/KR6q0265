素笑破衲僧口所以善財到這裏妙峯頂上七日不見德雲比丘普眼菩薩到這裏遍觀微塵剎土不見普賢德山到這裏便道潭又不見龍又不現夾山到這裏便道目前無闍梨此間無老僧山僧到這裏不免向佛祖説不到處道一句頂門上千日並照佛祖行不到處進一步腳跟下萬鏡臨臺除非直下承當方解通途寥廓拈起一微塵撒向三千大千世界剎説塵説熾然説無間歇將取三千大千世界納在一塵之中直得人空法亦空亦無能説之者亦無所聽之人聽説兩忘乾坤獨露正與麼時且道是到是不到是説是不説於斯明得靈山一會儼然猶在憶得臨濟一日與官人遊僧堂次官人云這一堂僧還看經麼僧云不看經官云還習禪麼濟云不習禪官云畢竟作麼濟云總教伊成佛作祖去官云金屑雖貴落眼成翳濟云我將謂是箇俗漢師云臨濟只見錐頭利不見鑿頭方山僧今日與官人遊僧堂官人云這一堂僧還看經麼云也看經官云既是禪僧因甚却看經只向他道有求皆應無願不從作麼生説箇應底道理菩提妙花遍莊嚴隨所住處常安樂告香普説師云伏承諸人以己事相求若論當人己事如大火聚近之則眉髮不存如塗毒鼓聞之則種族皆喪到這裏三世諸佛近傍不得六代祖師退身無路直至于今未曾有一人當頭道著道著則啞却你口禿却你舌所以道若欲正提綱直教大地荒擬來衝雪刃不免露鋒鋩便恁麼見得徹往往覓箇人掃地也無洵上座今日要出一隻手大家向荒草裏輥是你諸人也須急著眼始得竪起拂子云看看還見當人自己麼直下領略得去大似認驢鞍橋喚作阿爺下頷若也不見去諱又爭諱得而今見與不見一時拈却當人自己無處安著無處著休摸𢱢眼似鼓槌頭如木杓天下橫行任君斟酌有時終日覓不見有時滿口道得著著與不著爭幾何祥麟只有一隻角明明明得得得從教萬別千差分明只是這賊堪嗟今古人幾箇知恩德直饒從上佛祖語句羅紋結角玉轉珠回殺人刀活人劒騎虎頭收虎尾向上向下這邊那邊菩提涅槃真如解脫盡是撩鈎搭索總不干諸人己事你看德山到龍潭便道久響龍潭及乎到來潭又不見龍又不現龍潭老漢有年無德便道子親到龍潭也是奴見婢殷勤佛一日在楞伽峯頂説法無神通者不能到有一夜叉到聽法獻種種樂具種種飲食須臾之間不見世尊亦不見種種樂具飲食回頭打一覷亦不見有自身惜乎放過一著當時待他道不見自身便好與他一喝非唯教他頭正尾正免見死在中途古人又道觀色即空成大智而不住生死觀空即色成大悲而不證涅槃既不住生死又不證涅槃且道此人畢竟向甚處安著喝一喝云千言萬語無人會又逐流鶯過短墻別峯珍禪師語嗣佛心在首座寮受鼓山請拈帖云青氈本屬吾家日用何曾欠闕要識裏許清規除是君子可八佛心授法衣師接示衆云非衣不傳於法非法不授於衣衣既已授法若為傳玲瓏八面自回合峭峻一方誰敢窺指法座云高而無上不可極淵而無下不可測欲知步步透雙關看取清風生兩腋升座云自慙疏拙百無能下板長行粥飯僧豈謂因緣有僥幸千斤擔子若為勝教中道我本無心有所希求今此寶藏自然而至作這般説話大似貧兒見小利然雖如是敢問大衆拈却當門大案山寶藏在什麼處卓拄杖云茫茫宇宙人無數獨有胡僧笑點頭指方丈云絶待老師丈室諸方瞻望不及今朝分付小僧携被從茲而入諸人還甘麼超然坐斷毗盧頂千聖齊教立下風喝一喝便入當晚小參舉興聖國師示衆云鼓山門下不得咳嗽時有僧咳嗽一聲國師云作什麼僧云某甲傷寒國師云傷寒即得師云大小國師見義不為何勇之有新長老當時若見這僧咳嗽問他作什麼待他云某甲傷寒劈脊便打何故若藥不瞑眩厥疾不瘳開堂僧問和尚未見佛心時如何師云祥麟只有一隻角進云見後如何師云丹鳳却有九苞文進云未審是一是二師云不是任公子徒勞話釣竿師乃云諸佛出世為一大事因緣點即不到祖師西來直指人心見性成佛到即不點歷代宗師棒如雨點喝似雷奔一人傳虗萬人傳實天下老宿建法幢立宗旨祖禰不了殃及兒孫新長老今日已展不縮從上來許多間門破戶盡底與你掃除諸人自己所有無量解脫法門神通光明寶藏以拄杖卓一下云今日一時打開了也未聞者聞未見者見忽有見聞剔脫管取乾坤獨露堪報不報之恩用助無為之化佛心茶毗後謝大衆云舉僧問長沙南泉遷化向什麼處去沙云石頭作沙彌時參見六祖來大衆若見古人去處便知今人落處只如古今不昧一句又作麼生人面不知何處去桃花依舊笑春風上堂二月春將半桃花開爛熳紛紛尋劒客誰是不疑漢莫有不疑底麼喚來與山僧洗腳施主請云百歲光陰如劈箭無常生滅日遷變唯有摩訶般若多耀古騰今無背面見不見碗子撲落地楪子成八片便恁麼見得高超三界獨步大方截生死流到涅槃岸竪起拂子云還見某人麼全體向拂子頭上現十八變直得身上出水身下出火見諸人不覺不知往南方無垢世界作佛去也且道以何為驗良久云國土動搖迎勢至寶花彌滿送觀音祈雨舉僧問興化萬里無片雲時如何化云青天也須喫棒鼓山即不然萬里無片雲時如何拈起拄杖云黑龍王來也且道來後如何卓拄杖云照顧濕却你鼻孔十五日已前藏身處沒蹤迹十五日已後沒蹤迹處莫藏身正當十五日布袋頭開全身顯露又作麼生不憐鵝護雪且喜蠟人氷退鼓山云長年追逐走埃塵贏得間名纍此身爭似別峯峯頂上一菴高臥與雲鄰瑞巖受嶽林辭衆云巖谷相從始晏然又携瓶錫應時緣奉川此去無多遠興發何妨訪戴船古者道人之所謂住我則言其去人之所謂去我則言其住去住雖殊其致一也恁麼説話大似釘樁搖櫓把放船且不落去住一句作麼生道青山藏不得明月却相容入院云衰老百無堪擔頭入閙籃生涯何所有彌勒是同龕當山祖師道彌勒真彌勒分身千百億時時示時人時人俱不識師云長汀子放憨作什麼只今新長老來也你須退後還他出一頭地始得大道只在目前要且目前難睹欲識大道真體不離聲色言語卓拄杖云者箇是聲又竪起云者箇是色喚什麼作大道直饒向這裏見得也是鄭州出曹門尋牛須訪迹學道訪無心迹在牛還在無心道易尋竪起拂子云者箇是迹牛在什麼處直饒見得頭角分明爭奈鼻孔在嶽林手裏離四句絶百非頭長三尺知是誰江北江南問王老一狐疑了一狐疑佛不遠人即心而證法無所著觸境皆如竪拄杖云若喚作拄杖亦著於法總不恁麼瞎驢趁大隊畢竟如何遂靠拄杖云弄巧成拙住法石上堂云向上一路千聖不傳卓拄杖云恁麼明得十萬八千畢竟如何桃紅李白薔薇紫問著春風總不知春已去夏初臨相逢休話本來心隨緣齋粥海山寺從聽堂前草自深諸法寂滅相不可以言宣所以僧問風穴語默涉離微如何通不犯穴云長憶江南三月裏鷓鴣啼處百花香這箇是言宣那箇是寂滅相卓拄杖云不用低頭思量難得施主看藏云演出演入穿過髑髏全藏半藏換却眼睛黃底非紙黑底非墨碧眼胡僧辨不得以字不成八字不是百衲禪家不靈利若靈利撩起便行高揖釋迦不拜彌勒奴呼菩薩婢喚聲聞其餘是甚碗躂丘夫如是者是真精進是名真法供養如來可以報生成之德可以酬莫大之恩然雖如是且道某人生何國土良久云不須他處覓只此是西方吾心似秋月碧潭清皎潔無物堪比倫教我如何説師云大小寒山子大似抱贓呌屈若是山僧又且不然以拄杖打一圓相云騰騰離海嶠漸漸出雲衢諸人被十二時使老僧使得十二時牧童嶺上一聲笛驚起群鴉繞樹飛慶三門云昔有一天使問睦州三門俱開從何門而入州召尚書尚書應喏州云從信門入師云大小睦州只有殺人刀且無活人劒今日忽有人問法石三門俱開從何門而入却向他道登科任你登科拔萃任你拔萃飄空一葉兩新收暑退涼生萬壑秋貼肉汗衫才脫下橫吹木笛倒騎牛卓拄杖云一大藏教只説者箇又卓云一大藏教不説這箇又卓云這箇是什麼良久云眼生三角頭峭五嶽住崇福云物物到心上全心物自間古今城郭裏得者住如山山僧辭山林居城市且道圖箇什麼良久云大家相聚喫莖虀一事了無真道情結制云九夏斯臨結集時滿堂雲水復明誰若言相見交肩過未免依前落見知且不落見知一句作麼生道荷葉團團團似鏡菱角尖尖尖似錐解夏云十五日已前過去心不可得十五日已後未來心不可得正當十五日現在心不可得三心既不有萬象復明誰者裏著得隻眼許你九十日內得箇安樂法門脫或未然莫謂無心云是道無心猶隔一重關住承天云文殊三處度夏別峯兩院禁足誰知把住放行盡道違真逆俗正當恁麼時且道把住耶是放行耶遂以拄杖橫肩上云刀尺長懸拄杖頭志公不是間和尚知幻即離不作方便離幻即覺亦無漸次大小釋迦老子平地上喫交盡大地人扶不起山僧今日為他扶起去也拈拄杖云風不來樹不動青春已去朱夏斯臨放下橫肩楖𣗖宴坐古佛叢林荊山之璞不須覓赤水之珠何用尋縱饒尋覓得失却本來心且如何是本來心卓拄杖云今年桃李貴一顆直千金舉僧問古德夏終今日畢竟如何德云天晴道路乾僧云便恁麼去時如何德云直透海岸頭師云古德只解隨波逐浪不解截斷衆流或問承天夏終今日畢竟如何向他道切忌亂走便恁麼去時如何入地獄如箭古德云奇哉十方佛元是眼中花只如佛身充滿於法界且道眼在什麼處若也見得朝觀東南暮觀西北若也不知麻上生繩猶自可那堪繩上更生蛇此方真教體清淨在音聞卓拄杖云者箇是音聞那箇是教體良久云天明日頭東畔出街南人呌吉州針卓拄杖云有智若聞則能信受無智疑悔則為永失又卓一下云是什麼瞥不瞥三人證龜喚作鱉若論此事如人喫飯飽則便休若也不飽必有思食之心若也過飽又有傷心之患到者裏作麼生得恰好去良久云且歸巖下宿同看月明時乾峯示衆云舉一不得舉二放過一著落在第二雲門出衆云昨日有人從天台來却向徑山去師云乾峯動絃雲門別曲且道誰是知音者會麼曲終人不見江上數峯青我所得智慧微妙最第一衆生諸根鈍著樂癡所盲釋迦老子雖然開口見膽也是雲居羅漢何故人平不語水平不流承言須會宗勿自立規矩所以僧問趙州萬法歸一一歸何處州云我在青州作一領布衫重七斤師云趙州布衫雖然斤兩分明爭奈無人知落處敢問大衆既是斤兩分明為甚却不知落處拈起拄杖云時人只看絲綸上不見蘆花對蓼紅眼若不睡諸夢自除心若不異萬法一如恁麼告報且從諸人點頭忽若心眼雙忘又作麼生春風初解凍枯木也生花有句無句如藤倚樹眼睛定動失却巴鼻忽然拈得時如何水向竹邊流出冷風從花裏過來香向上一路千聖不傳學者勞形如猿捉影承天今日貴買賤賣去也拈起拄杖云月色靜中見泉聲幽處聞沙彌披剃云斷除鬚髮著僧衣精進當遵古佛儀一念不生親領略方知我法妙難思便恁麼是真出家可以報生成之德可以酬莫大之恩其或未然無人知此意令我憶南泉上不在天中不在人下不在地還知落處麼卓拄杖云一片月生海幾家人上樓昔有僧辭趙州州云有佛處不得住師云魚行水濁無佛處急走過師云草偃風行三千里外逢人不得錯舉師云泗州人見大聖恁麼則不去也師喝一喝摘楊花摘楊花師云若不得流水還應過別山大衆承天今日已是為蛇畫足汝等諸人切忌近前啖心月孤圓虗明洞透耀古輝今絲毫不漏恁麼明得卓拄杖云誰謂春歸無覓處不知轉向此中來欲識佛性義當觀時節因緣三年一閏是人知有九月重陽以何為佛性義竹葉於人既無分菊花從此不須開寓菴遺書至云憶昔保福遷化僧問鼓山國師保福拋却殼漏子向甚處去國師云你且道保福在那箇殼漏裏師召大衆云保福遷化國師助哀要識去處南嶽天台然雖如是今日忽有人問寓菴拋却殼漏子向什麼處去只向他道鳥啼無下淚花笑不聞聲施主開藏云靈文一閲五千卷感果當知越四禪應笑毗耶方丈裏却容天女問因緣蔡居士昔也恁麼來今也恁麼去今昔兩無殊去來擬何處住住明明百草頭明明無生路敘謝畢復云陋巷閉門唯讀書了無塵果自如初時來坐脫西窗下驚起須彌繞太虗退承天云是處青山可垛跟白雲流水繞孤村笑携拄杖出門去三世誰知一口吞立地佛事為光孝遵老下火三世諸佛向火𦦨上轉大法輪盡大地無一人覷得見火𦦨為三世諸佛説法遍十方無一人聽得獨有光孝禪師到這裏一覷便破一咬便斷直下與三世諸佛同見同聞與火𦦨同起同滅轉大法輪説微妙法還有人證明麼若也證明得去者老子不虗來泉南打一遭脫或未然山僧為伊重下注腳六十四年老古錐手携隻履去難追要知葉落歸根處識取金風體露時為木菴下火時國清方來請石橋未跨忽宵征空使叢林嘆老成寄語豐干與寒拾松門休更算來程木菴老登山須到頂入海須到底既是大頂不居雙澗不住因甚向南方村草步頭單丁垛跟為或是這回不是夢真箇到天台為或是一度被蛇傷怕見斷井索到這裏須有出身一路始得以火炬畫一圓相云火後一莖茆鐵蛇鑽不入為趙判院起棺富貴功名如昨夢涅槃生死等空花高歌一曲笑歸去翻著襴衫烏帽斜到這裏生也不道死也不道一念回光歸家穩坐恁麼明得非儒非佛非凡非聖何三界可出何菩提可求何風樹可悲何逝水可嘆七十年齡世希有身前身後轉光輝雖然如是且道出門向什麼處去令人翻憶老居士天上人間不可陪遊龍湫拜諾矩羅尊者十里松溪到上流斷崖千尺瀉龍湫誰言尊者心無著冷眼長年看不休雲蓋本和尚嗣白雲師開堂日僧問諸佛出世池湧金蓮五峯出世有何祥瑞師云總無祥瑞僧云為什麼却無師云座前縱有天花落正眼看來亦是邪僧以手劃一劃師云切須子細僧欲進語師乃云問話且止此一大事乃是先佛之根本群生之性命亘古亘今未嘗改移在聖在凡曾無增損包含天地混茫太虗而不知其大鼓泄陰陽陶鑄萬物而不宰其功浩浩然不可以語言造昭昭然不可以寂默詣語言求之返成諍論寂默求之墮於斷滅到此唯聖與賢乃能共證在昔裴相國治潭之日石霜山中有一老僧號曰普會雖有道行不為世人之所欽奉孤守深山孑然自善裴公知之一日枉駕公秉以見之坐次普會乃問相公手中秉者是何物公曰此有多名略言其二在天子手中曰圭在百官手中曰笏普會曰敢借一觀公遂度與善會會接得乃拈起示相公云在天子手中曰圭在百官手中曰笏且道在老僧手中喚作甚麼公無説普會曰若也道得却還相公若道不得留在山中永為法物裴公然之自爾之後普會之道大行天下學者歸之如市堂盈千衆得其旨者不知其數普會之道既行良由裴公不以廟堂尊高為貴而能屈折於山中一老僧之前遂使如來正法眼歲萬世光顯此非聖賢用心則無由能得雖然如是三百年來未曾有人提掇雲蓋今日幸逢勝會不免再三乃竪起拂子云只這箇不是笏不是圭諸佛授手千聖護持巍巍蕩蕩應物隨機收來則天寬地厚放去乃斗轉星移且道即今是收是放若也道得裴公普會不遠目前若也未知更俟他日拂一拂上堂平高就下辭郭入村斬新日月特地乾坤釋迦老子橫眠竪臥樓至如來把却三門喝一喝拍禪牀下座秋雨蕭蕭秋風飋飋好箇公案無人斷得有麼有麼良久拍禪牀喝一喝夫有情之本依智海以為源含識之流總法身而為體祇為情生智隔想變體殊達本情忘知心體合道家又道杳杳冥冥其中有精恍恍惚惚其中有物遂拈起拄杖云文殊菩薩共太上老君在五峯拄杖上相趕還有人見麼若也見阿誰在前阿誰在後乃擊香卓云打與三百是即埋沒千聖非即辜負自己且道是非不到處一句作麼生道良久云鶴鷺並頭踏雪睡月明驚起兩遲疑一年去一年來年去年來知幾回勸若識取去來者免被光陰取次催且道去來者作麼生識既識得作麼生道若道不得五峯與你一切道出乃云孟春猶寒下座拈拄杖云五峯不會佛法問著也無對答却將拄杖亂敲笑殺叢林老衲卓拄杖一下頭戴須彌山腳踏四大海呵吸成風雷動用生五彩若人識得渠一任歲月改且道誰人識得渠喝一喝云田厙奴下座一年春盡一年春野草山花幾度新天曉不因鍾鼓動月明非為夜行人拈拄杖橫按云倚天照雪豈並太阿捉日追風寧同八駿且道與他安名立字好不與他安名立字好良久云德山有口未曾開臨濟兩行淚先落卓拄杖請化主云一人發真歸源十方虗空悉皆消殞海會即不然一人發真歸源十方世界乾坤大地盡是黃金白玉瑪瑙珊瑚為什麼如此良久云我觀法王法法王法如是春雨綿綿連朝接夜普天普地無處不周非人力之能為豈虗空而自有且問諸人因什麼得到恁麼地良久云山房睡起寂無人野禽啼在深花裏舉僧問睦州和尚如何是學人一卷經州云題目甚分明師云如今一問一答一主一賓一縱一擒一舒一卷揚眉瞬目竪拂敲牀以至種種施為總是題目敢問諸人經在什麼處良久云朝轉三千暮轉八百無漏果圓共成佛道請典座藏主莊主知客舉釋迦老子有四弘誓願第一煩惱無邊誓願斷第二法門無邊誓願學第三無上菩提誓願證第四衆生無邊誓願度海會亦有四弘誓願第一願粥足飯足三德六味不離口邊第二願黃卷赤軸不能遮眼十字縱橫第三願拖犁拽杷步步到家第四願唱喏唱諾不動舌頭大衆且道與釋迦老子是同是別試斷看良久云明月滿江無處覓沙鷗時呌兩三聲古者道視之不見謂之夷聽之不聞謂之希搏之不得謂之微若是雲蓋則不然視之則遍周沙界聽之則響應十方搏之則納須彌於芥中擲大千於方外然雖如是猶是因風吹火順水行船且道開合一句作麼生商量良久云總被秋風收拾去不知和雨落誰家不須添不須減妙智靈光常湛湛一日兩度鉢盂開莫認饅頭作餕餡七月山中雨便覺無暑氣中夜竹簟冷背手牽布被父母非我親祖佛非我位此外更無他不如且瞌睡赤日曬來乾落索秋風吹動又新鮮欲向江邊問消息鷺鷥踏却釣魚船滿頭白髮面皮乾祖道難扶強自寬多謝流鶯能助我曉來枝上語千般舉祖師道父母非我親誰是最親者諸佛非我道誰是最道者雲蓋即不然父母非我親無有不親者諸佛非我道無有不道者且道與祖師相違為復不相違如鳥二翼如車二輪如天地之二儀如日月之雙照祖師得第一句五峯得第二句若有人添得一句許伊鼎分三足木人眼卓朔石女頭把𩬟兩箇火爐頭愛説多年話張三失了刀李四拾得一場乾落索幾人知縫罅喝一喝拍一拍下座古者道淨地上死人無數過得荊棘林者是好手若説大盡三十日小盡二十九地肥茄子大腳瘦草鞋寬寒則向火熱則取涼正是淨地上死人若也探竿影草袖裏藏鋒換步移身主賓雙照攪長河為酥酪變大地作黃金猶未過得荊棘林在且道作麼生得與五峯相見良久云良玉不為沙礫混要識真金火裏看一中三三中一無量劫來到今日且作麼生是今日事良久云楊柳煙深百舌啼度水胡僧雙腳濕三轉法輪於大千其輪本來常清淨敢問諸人且作麼生是三轉法輪良久云晨朝有粥齋時飲夜後長伸兩腳眠雲霾萬壑雪覆千峯口欲談而牙齒寒目欲視而睛光亂到這裏且道憑箇什麼建立良久云地爐禪客莫嫌冷更有英雄臥鐵衣兩不成雙一不成隻貌若嬰孩聲如霹𮦷入水不揚波穿山不動石滔滔常在五峯前明眼衲僧識不識拍禪牀喝一喝下座見可見無所見聞可聞無所聞無聞則音聲至大無見則色像至廣音聲色像既廣既大則見聞覺知無邊無際雖然如是為什麼三世諸佛向一微塵裏轉大法輪家家門外路一一透長安打破虗空喝散風雨地獄天堂無著處浮漚影裏任經年石火光中論劫住雪嶺吼泥牛雲門嘶木馬祇應除此外萬般俱是假靜為躁之君蹂為靜之臣君臣如合道躁靜一時真春風吹園林歷歷傳好音見聞如不脫辜負老婆心偈頌寄酬邵陽陳朝請謝靈泉茶邵陽太守老禪翁盡日忘緣與我同千里生靈為海衆一城絃管是家風簿書行遣通消息枷棒分明示苦空回顧一盂并一錫却慚高臥白雲中﨟茶一餅占春先碾罷仍將雪水煎盡日清香繞牙齒爐邊不動見靈泉送僧遊皇都送小師衲卷春風逸性情孤鴻悠揚拂青冥崖泉別後聲長在時倚笻枝猶自聽萬國歸心共一家等間移步到京華明年杜宇聲聲好應憶山中玉杵花履石思磊落臨流念清瑩玩月學高明觀松斆堅徑四者皆可師行坐若身影吾言不汝忘朝暮時一詠寄唐祕校送明長老歸灌溪竹椅蒲團倚石屏隔溪新月帶煙明自從陶令出山去間却孤猿數夜聲松檜交陰路屈盤穿雲歸去錫聲寒人間夜夜見山月不似溪頭石上看默軒山中瘦竹三四莖怪石一兩塊有箇白頭僧時來坐相對一池秋水浸莓苔夜靜從他月入來水亦無心吞月色冷光寒碧共徘徊牧童歌茸茸芳草隨牛食牛上橫眠吹短笛笛中一曲落梅花都來不用春風力煙雨濛濛入深塢重重不礙來時路石上攣拳紫蕨肥葉裏綿蠻幽鳥語驀地歌驀地舞縱遇知音未相許騎牛歸去月明天竹枝敲落聲前句虎丘隆和尚語嗣圓悟上堂豁開戶牖萬里不挂片雲杲日騰空四顧清風滿座湖光浩渺野色澄明萬象森羅全彰海印直得頭頭妙用物物真機心境一如纖塵不立正當恁麼時萬機休罷千聖不携坐斷毗盧頂不稟釋迦文婢視聲聞奴呼菩薩德山臨濟目瞪口呿有棒有喝一點也用不著且道忽遇其中人來時如何話會傾蓋相逢元故舊何妨來喫趙州茶悠悠世事空浮沈自愛白雲歲月深舉眼盡非凡草木剛然斷臂覓安心雖然如是事無一向拈拄杖云達磨來也在山僧拄杖頭上為諸人説安心法門還信得及麼若信得及當下便心安其或未然海枯終見底人死不知心寰中天子敕塞外將軍令一句定乾坤一劍安天下便見時康道泰四海晏清向我衲僧門下又且不然拄杖子吞却乾坤了也綿綿不漏絲毫何處更有一物與諸人為緣為對還會麼良久云各請歸堂喫茶去牛頭沒馬頭回渠無國土無位真人突出難辨甚處逢渠擊石火閃電光得不得未免喪身失命且風恬浪靜一句作麼生道善財別後誰相識樓閣門開竟日間不犯之令明古今風月靈機常獨耀萬象悉澄徹更説什麼正法眼藏瞎驢邊滅無計較中翻成計較無途轍中翻成途轍一時與你截斷稱槌硬似鐵別別八月秋何處熱一滴水一滴凍喝下風雷彰大用棒頭點出眼睛來照了諸相悉空洞出門撞著須菩提拶破虗空全體露一片雲凝絶謂情萬里清光飛玉兔光非照境境亦非存光境俱忘復是何物百草頭上罷干戈則且置忽若嘉州大像倒騎陝府鐵牛把須彌一摑百雜碎新羅國裏走馬南贍部洲説禪又作麼生五臺山上雲蒸飯佛殿階前狗尿天凡有展托盡落今時不展不托墮坑落塹直饒風吹不入水灑不著檢點將來自救不了豈不見道直似寒潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散此猶是生死岸頭事拈拄杖劃一劃云劃斷生法師多年葛藤點頭石不覺撫掌大笑且道笑什麼腦後見腮莫與往來贊達磨闔國人難挽西攜隻履歸只應熊耳月千古冷光輝應菴華和尚語嗣虎丘上堂九年面壁壞却東土兒孫隻履西歸鈍置黃面老子拈拄杖劃一劃云石牛攔古路一馬生三寅黃檗老婆大愚饒舌佛法無多子正眼瞎驢滅驀拈拄杖云妙嚴突出拄杖三人證龜成鱉遂卓一下云拄杖子善甄別硬作脊梁莫教漏泄觀音菩薩將錢買胡餅放下却是一塊生鐵擲拄杖下座雪堂行和尚到云臨濟三遭痛棒高安灘上知歸興化於大覺棒頭深明黃檗宗旨山中兄弟雖然不多各各病在膏肓不是師叔和尚到來明果不敢妄通消息少間下座與諸知事頭首大衆拜請伏望慈悲痛垂發藥十五日已前水長船高十五日已後泥多佛大正當十五日東海鯉魚打一棒雨似盆傾直得三千世界一切衆生歡喜贊歎謂言打這一棒不妨應時應節報恩不覺通身踴躍遂成一頌舉似大衆青蜓許是好青蜓飛來飛去不曾停捉來摘却兩邊翼便是一枚大鐵釘舉大愚芝和尚云大家相聚喫莖虀若喚作一莖虀入地獄如箭射師云大愚好語要且無來處若人辨得出與你一兩金舉德山一日有僧才相看便近前作相撲勢山云你恁麼無禮合喫山僧手中棒僧拂袖便出山云饒你與麼也只得一半僧便喝山便打云須是我打你始得僧云諸方有明眼人在山云汝天然有眼僧以手擘開眼云貓山云黃河三千年一度清師云這僧是透關底漢若非德山本分鉗鎚幾乎死在句下只如德山道黃河三千年一度清又作麼生嶺梅殘雪後雲鬢未梳時披毛戴角拽擺拖犂耕荊棘林下地獄種開三毒花結無明果是故見者聞者悉起惡念惡念起時充塞虗空即虗空體證魔王身正當恁麼時誰是施者誰是受者箇裡緇素得出許你諸人有出身路苟或未然且道佛之與魔是一是二一二之義汝等諸人且莫瞌睡為甚如此三十三天輥氣毬參學人切忌錯用心悟明見性是錯用心成佛作祖是錯用心看經講教是錯用心行住坐臥語言三昧是錯用心喫粥喫飯屙屎送尿是錯用心一動一靜一來一往是錯用心更有一處是錯用心歸宗不敢與諸人説破何故一字入公門九牛拽不出達磨西來直指人心見性成佛者老臊胡當時若知有轉身句是你諸人未免橫尸露骨且道寶林恁麼告報還有地頭也無莫守寒巖異草青坐著白雲宗不妙入羅漢五臟云黃面老人乾屎橛參隨一火爛泥團心肝腸胃皆條直蔬飯茶花照膽寒佛法雖然未夢見神通却許入雲端應須痛念歸宗寺時復持盂下翠巒舉僧問徑山掩息如灰時如何山云猶是時人功幹僧云幹後如何山云耕人田不種僧云畢竟如何山云禾熟不臨場師云鳳閣香沈雪巢夜冷半窗明月和氣藹然正當恁麼時且道歸宗與徑山還有相見分也無見與不見即且置只如這僧問徑山還具眼麼苟或未然雲藏無縫襖鳥宿不萌枝萬杉到云大底大小底小長底長短底短曲底曲直底直方底方圓底圓正底正邪底邪為復是佛耶是菩薩耶是羅漢耶是聖僧耶是鬼神耶是天仙耶我昔聞是法未嘗妄宣説是義非義是隨義墮非是非義非非義是隨句墮若作佛法商量達磨一宗掃土而盡不作佛法商量老僧活陷地獄是你諸人還緇素得出麼苟或未然少間下座同知事頭首攀請新萬杉為衆説破舉百丈示衆云汝開田了我與汝説大義僧云開田了請和尚説大義大展兩手白雲端和尚拈云百丈説大義只如此當時再參馬祖底向什麼處去也若言更有在未免與蛇畫足且道作麼生得知百丈老人立地處乃云客來無茶點蒿湯備禮儀師云白雲要見百丈再參馬祖底道理直是好笑笑須三十年又道作麼生得知百丈立地處也與笑三十年客來無茶點蒿湯當禮儀也與笑三十年三笑而九十年為復笑白雲批判未盡為復別有道理汝諸人若檢點得出歸宗拄杖子兩手分付苟或未然幾度醉歸明月夜笙歌引入畫堂前舉睦州示衆云裂開也在我揑聚也在我有僧問云如何是裂開州云三九二十七菩提涅槃真如解脫即心即佛我且與麼道你又作麼生僧云某甲不與麼道州云盞子落地碟子成七片雲峯悅云相罵饒你插觜相唾饒你潑水師云我且問你諸人雲峯恁麼拈提為復是見睦州意耶明睦州語耶歸宗因行不妨掉臂不是禪不是道不是玄不是妙久立伏惟珍重舉丹霞因過一寺值凝寒於殿中見木佛乃取燒火向院主偶見呵責曰何得燒我木佛霞以杖撥灰云吾燒取舍利主云木佛何有舍利霞云既無舍利更請兩尊再取燒之院主自後眉鬚墮落師云諸方商量道院主忽起疑心而致斯禍又云院主天寒不與丹霞火向致令燒却木佛遂乃眉鬚墮落殊不知院主買鐵得金一場富貴舉僧問多福如何是多福一叢竹福云一莖兩莖斜僧云學人不會福云三莖四莖曲師因成一頌一莖兩莖斜其意毒如蛇三莖四莖曲無疑入地獄言下若知非心空及第歸堪笑蔣山老無端入荒草出隊歸上堂透過鐵壁銀山紅塵閙市全彰古佛家風經過酒肆茶坊突出衲僧巴鼻冷笑諸方寒灰枯木坐在無魂必死之地妙嚴有些子神通為汝諸人出氣卓拄杖云三十年弄馬騎却被瞎驢受記又卓一卓下座大丈夫須猛烈打破從前伎倆直下斬釘截鐵拈却佛祖機拔却繫驢橛豈不見睦州為人太親切拶得雲門腳折後來兒孫不辨端倪却向推門處辨別若也恁麼參禪驢年未得休歇妙嚴不惜眉毛與你當頭拈出拈拄杖擲下云南贍部洲人常在北鬱單越荊棘林中紅爛破驢脊上蒼蠅韓信臨朝底洞山佛無光這一隊漢朝三千暮八百有什麼罪過只如銅砂羅裏滿盛油汝諸人又作麼生良久云大盡三十日小盡二十九百草頭上罷却干戈萬仞峯前縱橫遊戲暗嗟魯祖面壁一味祇貪瞌睡翻笑睦州見僧與我提一桶水當恁麼時臨濟喝似雷奔也拈放一邊德山棒如撒星亦置之一處妙嚴有條活路與汝諸人共行遂畫一圓相云東山下左邊底九九釋迦老子不知有翻轉面皮伸出毛手握金剛鎚碎窠臼突出無位真人一一面南看北斗山河大地草木叢林盡是恆河沙劫千佛數直饒信得及去大似掉棒打月東頭買貴西頭賣賤三十年後破草鞋向什麼處著漆桶參堂去結夏拈拄杖橫按云住山僧某甲據菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智老僧二千年前與十二大士同在光明藏中親聞如來金口叮嚀付囑向二千年後為末世衆生廣演斯要今正是時報恩不敢囊藏被蓋更為諸人八字打開去也以拄杖卓一卓云先請文殊大士向山僧拄杖頭上為諸人説安居偈護生須是殺殺盡始安居會得箇中意鐵船水上浮次當山僧重説偈言去也文殊據虎頭山僧收虎尾中間諸菩薩隨例生歡喜復以拄杖卓一卓下座謝首座書記藏主舉趙州會下有二僧相推不肯作第一座主事白州州云總教伊作第二座事云教誰作第一座州云裝香著事云裝香了也州云戒香定香慧香解脫香師拈云趙州下一鎚不妨驚群動衆子細檢點將來也是泥裏洗土塊若是薦福門下不用相推第一座也有人第二座也有人第三座也有人雖然不免從頭注過第一座鐵眼銅睛覷不破第二座陽春白雪無人和第三座真實身心同達磨且道與趙州是同是別若也會得許你具一隻眼若也不會也許你具一隻眼有箇衲僧出來道總不恁麼時如何對他道切忌向鬼窟裏作活計祈雪夜來得一番雪子細思量有五件奇特事應時應節災殃殄滅能除熱惱衆人定疊又見老鴉頭白且道衲僧門下畢竟如何文殊疾走無邊方普賢眼裏重添屑平地上若衣喫飯十箇有五雙不知落處輕如鴻毛重如泰山不必較之達磨西來直指人心見性成佛知他是真是偽衲僧家口似血盆舌如利刀到這裏因甚口似匾擔東湖借路經過驀拈拄杖云且道尋常在什麼處著到乃擲下云橫身當宇宙一句定綱宗即心即佛非心非佛不是心不是佛不是物冷水浸冬瓜大家廝淈𣸩雖然淈𣸩却有箇分曉處驀拈拄杖云山僧夜來吟得山偈舉似大衆雪子落紛紛烏盆變白盆忽然日頭出依舊是烏盆忽有箇衲僧出來道長老長老此是雪詩乃對他道冬行春令便下座明不見暗暗不見明明暗雙忘無異流俗阿師野干鳴獅子吼獅子吼野干鳴三家村裏臭胡孫價增十倍驪龍頷下明珠分文不直若作衲僧巴鼻甚處得來三十年後換手槌胸未是苦在見聞覺知無障礙色香味觸常三昧眼見如盲口説如啞蘇州人呆常州人打爺大宋國裏只有兩箇僧川僧浙僧其他盡是子淮南子江西子廣南子福建子豈不見道父慈子孝道在其中矣新鑄鐘云有大智人具大知見啓大爐鞴奮大鉗鎚然後示大機顯大用於二百日中成此大法器住大解脫門亘千萬億劫震大圓音空明暗相以此津濟四生以此梯航九有以此祈祥懺罪以此息苦停酸以此揭示頂門正眼以此流通佛祖慧命直得星飛電卷山色凝光鳳舞鸞翔龍馳虎驟豈不見玄沙和尚道直似秋潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事苟能於此洞明便見玄沙老子即今向紫霄峯下拭眼堂前騎聲蓋色坐斷十方脫或未然塞却耳根分明聽取君子道長小人道消衲僧活計不在兩頭有般癡漢便問未審在什麼處似這般底不打更待何時且道寶林恁麼道還有過也無試定當看住報恩上堂僧問祇這是埋沒自己祇這不是孤負先聖去此二途和泥合水處請師道師云玉筯撑虎口師乃云古佛家風遇古佛然後拈出大人境界見大人乃可顯揚今日朝旆臨筵人天普集古佛家風既展大人境界全彰揭示摩醯正眼洞明少室真機頓契佛祖不傳妙心開悟父母未生面目直下斬釘截鐵猶是把放船苟若説心説性未免和泥合水這條通天活路千聖共行萬靈同轍淨裸裸沒虗空赤灑灑無空缺雖居有為界示無為法而不滅壞有為之相雖居無為界示有為法而不分別無為之相如是則如鐘在虡扣之則鳴似鏡臨臺物來斯照於其中間應變萬差出沒卷舒得大自在祇如應真不借一句又作麼生雙溪源脈深無底濟物曾無有倦時結夏云金錫罷遊留靠壁草鞋乾曬待秋風且那長夏深思省看是平生有底功真實行藏宜保惜虗頭伎倆疾消鎔老僧豈是多饒舌要與諸方氣味同鷲嶺拈花少林直指指空畫空泥裏洗土如來禪烈焰光中綻白蓮祖師意海裏紅塵成陳起透得過權實照用一鎚打破透不過葛藤窠裏長年打坐總不與麼喚取瞎驢來拽磨受寶林請云孤峯頂上聳壑昂霄好不資一毫十字街頭和泥合水醜不資一毫如是則在彼在此同得同用所以道我此法印為欲利益世間故説在所遊方勿妄宣傳到箇裏推倒須彌飲乾大海於其中間出沒卷舒了無妨礙且應緣利物一句作麼生道雪後始知松柏操事難方見丈夫心三十二相八十種好從朝至暮啾啾唧唧説黃道黑不知那裏是二時上堂喫飯不覺嚼碎舌頭血濺梵天四天之下沛然有餘玉皇大帝惡發追東海龍王向金輪峯頂鞠勘頃刻之間追汝諸人作證見也且各依實供通切忌回避儻若不實喪汝性命舉正法別峯和尚立僧云西天四七唐土二三天下老和尚無不以此頂𩕳上一著流通正法眼藏顯示涅槃妙心是故雲夢之竹天下之徑也然而不矯揉不羽筈則不能以入堅堂溪之金天下之利也然而不鎔範不砥礪則不能以擊強矯揉羽筈鎔範砥礪既妙至人之用其赤手提持解粘去縛抽釘拔楔烹佛煅祖轉凡成聖亦不出此箇端由所謂善知識者是大因緣其斯之謂歟正當恁麼時如何佇看汗血八駿駒何啻日馳三萬里道遠乎哉觸事而真善因招惡果聖遠乎哉體之則神刻糞作旃檀蔣山恁麼著語是你諸人還知落處麼良久云不因風撼庭前樹爭見山花入袖香道不得底句不在天台定在南嶽拈拄杖云是汝諸人還見蔣山拄杖麼卓一卓云人貧智短馬瘦毛長開爐三世諸佛吞却火焰火焰燒殺三世諸佛一盲引衆盲相牽入火坑棒打不碎底填溝塞壑刀斫不入底臥雪眠霜作世諦商量也得作佛法流布也得渾崙吞却三十年後有人索飯錢在直饒爛嚼白湯咽下未免粘牙帶齒且道蔣山為人在什麼處爛研巴豆三千顆瀉却諸方五味禪大慧至我本無心有所希求今此法王大寶自然而至法王大寶既至汝等諸人急著精彩所謂見之不取思之千里豈不見大隨道我參七十餘員善知識具大眼目底祇有一二其他盡具正見在今天下具大眼目真善知識唯法叔老師一人而已黑漆竹篦掀翻海嶽從頭打過雖是死馬醫就中要妙黃檗打臨濟拄杖蔣山豈是無耶蓋為土曠人稀雲門一曲臘月二十五那在今朝十六日吹唱驀拈拄杖卓一下云虗空可量風可繫無能宣説佛功德復舉頃在虎丘聞先師舉佛眼叔祖初作無為軍化士因道中著攧有箇省處歸來舉似師祖後令充知客因夜坐撥火忽然猛省雖然如是每至入室未能深入閫奧從容請益太師祖云我為你説箇喻子正如一人牽一頭牛從窗櫺中過兩角四蹄悉皆過了唯尾巴過不得師云這箇説話多年在肚皮裏信知在今天下無人理會得所以密之三寸苟非法叔老師到來小姪此生無因拈出敢問諸人既是大底過了如何尾巴却過不得且道誵訛在什麼處小姪今日對衆拈出供養我法叔老師大和尚唯願壽與趙州同年為佛法作大主張使天下衲僧洞徹此一段奇特大事下座同知事頭首大衆殷勤拜請伏望慈悲俯垂開示上堂良工未出玉石不分巧冶無人金沙混雜縱使無師自悟向天童門下何啻朝打三千暮打八百驀拈拄杖云喚作拄杖玉石不分不喚作拄杖金沙混雜其間一箇半箇善別端由管取平步青雲苟或未然卓拄杖云急著眼看傳法寺請開鐘聲云頑銅鈍鐵美玉精金大冶洪爐一模鑄就不假毗沙門天王神力豈從須彌頂𩕳上持來器重千鈞樓高百尺啓圓通三昧發清淨妙音直須眼處聞聲莫向耳邊領略鑊湯爐炭不用吹而自滅刀山劍樹何待喝而後摧昏夢頓除沈迷了悟萬象森羅俱作舞大千沙界一時聞大衆且道末上一鎚落在什麼處劫石有消日洪音無盡時小參是真精進是名真法供養如來爾時靈山一會儼然未散豈不是今日恁麼時節雖然不言我家醋淡蓋為人人各有一坐具地侵他一絲毫也不得光孝恁麼提唱須是箇人始得還有獨脫底麼出來與光孝相見其或未然是法住法位世間相常住老僧自到光孝首荷七員外令閣喜道人令似祖道舉家學般若眷屬無不戮力外護自非夙昔有大因緣安能若是然而與人相聚莫非身心真實心若真實至於動靜施為行住坐臥一語一默無不真實豈不見古人道只箇心箇心是佛十方世界最靈物縱橫妙用可憐生一切不如心真實所以山河大地日月星辰人畜草芥皆依真實而現相好然真實之義即是從上佛祖清淨大解脫門只看當人各各所行如何其間一生為善者至於多生為善者無量劫來為善者即殊勝果報歷歷現前苟為不善者其不善境界亦常歷歷現前信之善惡報應毫髮無差且如衲僧家親近善知識悠久辨一片真實身心窮己躬大事無有不辨底道理是故從上佛祖天下老和尚無不以真實顯示豈不見疏山矮師叔在溈山會下聞示衆云行腳高士直須向聲色裏睡眠聲色裏坐臥始得是時疏山出問云如何是不落聲色句溈山豎起拂子疏云此是落聲色句溈山便歸方丈疏山不契遂辭香嚴嚴云何不且住疏云某甲與和尚無緣嚴云有何因緣不契試舉看疏山遂舉前話嚴云某甲有箇語疏山云道什麼香嚴云言發非聲色前不物疏云元來此中有人乃囑香嚴云師兄向後有住處某甲却來相見諸人要識言發非聲色前不物麼便是釋迦老子道一人發真歸源十方虗空悉皆消殞底螢火之光也然疏山癢處既被香嚴抓著豈止溈山撿點千古之下具大眼目尊宿皆不放過溈山至晚乃問香嚴問聲色底矮闍梨在麼嚴云已去也溈山云向子道什麼嚴云某甲亦曾對他來溈山云試舉看嚴云言發非聲色前不物溈云他道什麼嚴云他深肯之溈山失笑云我將謂矮子有長處元來只在這裏看溈山下這一著不妨驚天動地惜乎土曠人稀溈山又云此子向去設有住處近山無柴燒近水無水喫爛泥裏有刺然古人之言必不妄矣在今天下討一箇言發非聲色前不物底正如掘地覓天何況要會溈山説話不言可知矣雖然切忌鑽龜打瓦大底宗師據曲彔床不是細事山野自出世來隨所住處非不為兄弟激揚此事然未嘗動著箇一著子頃住薦福偶然二三百衲子相聚因而略露鋒芒遂惹起無限風波自後一向隨宜施設終不將真珠作碗豆糶却古人有見賢思齊之説在今日去聖時遙邪師過謬非衆生咎是他本色道流做工夫底只向腳跟下推究推來推去驀然推徹豈不是大力量人苟推未徹語意活脫終不為間言市語邪師印證語有箇見處語知是般事語硬配在生滅斷常坑子裏所謂善知識者是大因緣老僧行腳走遍江西湖南及乎到圓悟處更開口不得正如就地彈相似是他為人不妄下手至下手時峭峻無道理與人湊泊後到先師處稍知觸淨方知圓悟説話分曉蓋尊宿為人古今難得其人是他本分手段迥別比其和泥合水阿師豈可同日而語耶昔高安白水仁禪師示衆云尋常不欲向聲前句後鼓弄人家男女何故且聲不是聲色不是色時有僧問如何是聲不是聲仁云喚作色得麼僧云如何是色不是色仁云喚作聲得麼僧禮拜仁云且道為你説答你話若向這裏見得溈山道這矮子將謂別有長處元來只在這裏箇些子明白便見得白水道且道為你説答你話無不透頂透底刢利漢聞恁麼舉豈止醍醐灌頂苟或未然參須實參悟須實悟閻羅大王不怕多語久立舉茗溪示衆云吾有大病非世所醫看他古人吐露箇消息不妨炟爀其實無他只是踏著向上關棙子拈出來便該天括地近傍不得是他往日有知音後來僧持問曹山未審是什麼病山知他落著便道攢簇不得底病這箇便是知音也豈似而今無地頭恣意亂道才見人問未審是什麼病便打入葛藤窠裏恰似拽鋸相似你拖去我又拽來幾時得歇於本參中有什麼交涉這般病諸人皆有之只是不會病酌然攢簇不得既不會病變成毛病去既成毛病只是業識忙忙無本可據到年窮歲盡總無得力處豈不哀哉若踏著攢簇不得底病便有超生離死之由這僧又問一切衆生還有此病也無山云有僧云既有因什麼不病山云衆生若病即非衆生這僧也會推究又問曹山和尚還有此病也無山云老僧正覓起處不得不妨險峻這一句子難道非曹山如何啓口雖然正覓起處不得諸方具正知正見者其護惜珍育為出世妙訣不肯容易發露與人若向薦福門下正是大病謂之貼肉汗衫謂之解脫深坑又謂之死水又謂之墨汁又謂之明白你諸人若病到覓起處不得但來問薦福當為顯示諸方奈何你不得何故蓋正坐此病這僧又問一切諸佛還有此病也無山云有僧云因什麼不病山云為伊惺惺此老人是曹洞正傳有回互傍參不犯底手段臨機八面得大自在豈守窠臼瞎學者眼諸道流既來此間相聚二六時中急著精彩時不待人儒者尚云朝聞道夕死可矣況衲子乎法語答詮老法嗣書老僧自幼出家正因也方袍圓頂正因也念生死未明撥草瞻風親近善知識正因也至於出世領衆今三十餘年未嘗毫髮厚己也方丈之務未嘗少怠也晝夜精勤未嘗敢懈也念衆之心未嘗斯須忘也護惜常住之念未嘗敢私也行解雖未及古人隨自力量行之亦不負愧也痛念佛祖慧命懸危甚於割身肉也念報佛祖深恩寢食不遑安處也念方來為道衲子心地未明不啻倒懸也雖未能盡古人之萬一然此心不欺也長老隨侍吾三四載凜然卓卓可喜去年夏末命悅衆是吾知長老也吾謝鍾山寓宣城昭亭未幾赴姑蘇光孝方兩月長老受鳳山之請道由姑蘇首來相見道義不忘如此也別後杳不聞耗正思念間懷淨上人來承書并信物方知入院之初開堂為吾燒香乃知不負之心昭廓也今既為人天眼目前來事體不同也果能如吾自幼出家為僧行腳親近善知識以至出世住持其正因行藏如此行之則吾不妄付授也又何患宗門寂寥哉至祝無以表信拂子一枝法衣一頂幸收之紹興壬午七月初七日住光孝應菴老僧書復示徽禪人達磨西來直指人心見性成佛不妨直截省要正眼看來已是七錯八錯了也事不獲已且作死馬醫祇這直指底心便是黃面老子四十九年橫説豎説不著底至精至妙罕有達此正脈者此心傳授不得唯自證自悟到無迷悟處祇是平常著衣喫飯更無許多玄解義路貫塞胸次蕩蕩地間間地祖師道一種平懷泯然自盡方得大受用至於臨生死之際湛然凝寂更無毫髮走作祇恁麼地如一座須彌山相似豈不要哉近年來參學兄弟雖號行腳恰如冷水澆石一般到所在挂搭祗是妄想記憶諍勝負以當平生真可憐憫若是正因行腳人終不恁麼地看他從上古聖出叢林入保社親近真正知識十年二十年退步就己寒灰枯木密密地究竟根蒂下一些子要著實處方可隨緣任運名為了事衲僧行腳高人若心地不洞明如何歇得十二時中起心動念匝匝地如千波萬浪相似如何消鎔得去到這裏若無透脫處祇是一箇無所知盜常住飯劫賊臨濟和尚謂之禿兵是也劫來劫去劫得渾身赤骨聿地忽然緣謝所有平生機智聰慧向眼光落地時一點也用不著設使纍生作得恆沙功業愈無超生死之期祇得人天福報報盡依舊無出頭處若要窮虗空劫盡未來際受用不盡須是直下心空既未能徹證此道當須稟大宿誓擇本分宗師放下復子盡此一報身窮究此公案無有不契證者第恐如存若亡口頭雖説參禪肚裏全不肯做若此不如歸一頭存誠看教作白淨業將來不失人身古德云説得一丈不如行得一尺是也且如今列剎相望呼為善知識傳直指心宗畢竟此心如何傳是何形狀近來出一等魔教中謂之惡友各説異解以為利人或者教人休去歇去都莫思量才起心動念速為除去或者教人一向無事香不燒拜不禮或者教人一向理會古今恰如箇杜撰座主或者將從上老宿赤心提持處謂之建立門庭或者見學家來室中下得轉語相似打半日又問一句學者又進語合得他著便謂此兄弟有箇入處且道此等利人還契得直指心麼酌然是無星子交涉所以佛鑒和尚道今之善知識多是曲指人心説性成佛此之是也臨濟正脈自百丈於馬師喝下遞代至今非但契證諸大祖師命根亦乃契證不可説不可説百千萬億阿僧祇佛祖命脈絲髮不差百丈得黃檗黃檗得臨濟臨濟付三聖乃云誰知吾正法眼藏向這瞎驢邊滅却只這箇説話若見得徹去何更有臨濟宗耶德徽上人以道義相從頗進古風不倦窮究衲衣下事誠謂之不虗行腳也若要易會祇向十二時中起心動念處但即此動念直下頓豁了不可得如太虗空亦無虗空形段表裏一如智境雙泯玄解俱亡三際平等到此田地謂之絶學無為間道人也更須知有五祖道底始得上人既炷香誠悃因書以付其行示茂先二化士法語頭云一大藏教且不是黃面老子説底直指人心且不是達磨大師傳底祇這兩著殃害天下衲僧求不得生求不得死正擬議間驀地被人推轉一刀兩段血濺梵天向歸宗門下猶是掇洗腳水底漢未曾夢見我先祖意旨在道人之心其直如絃在在處處若倚天長劍世間富貴驕奢五欲八風入作無門名利是非四生九有籠不住得到這田地便是取黃面老子命根時節也豈只一生兩生堅徑行願所致乃是積劫熏煉種智純熟至於歷諸勤苦然後乃可引跂大方超然獨步者也德山未遇人時𡎺一肚皮葛藤流入八萬四千毛竅化為精魅魍魎冬冬於無量神通及見龍潭一點也用不著然後知非乃云從今日去更不疑天下老和尚舌頭也讓祖首起馬駒膏肓之病示以磨磚打車殺佛之要所謂瘥病不假驢駝藥應平生堅執奉重渙然氷釋從容父子懲酬曾無毫髮滲漏皎然如千日並照臨機八面超情離見到出生入死不疑之地了無生死始終之患爾後以是傳之百丈百丈以是傳之黃檗黃檗以是傳之臨濟臨濟以是傳之三聖三聖死且喜太平豈謂興化忍俊不禁向大覺棒下見徹臨濟在黃檗處喫棒底意旨此老故是聽事不真喚鐘作甕就中奇怪逮今天下老和尚無不以是褒揚殺人刀活人劍乃上古之風規亦今人之樞要摧魔破執不得不無其間一箇半箇灑灑落落終不肯坐死水裏與蝦蟆蚯蚓長歌細吟大底抽釘拔楔解粘去縛手段以壽後世從今日去斷定要箇撲跌不破底點出來與臨濟作種子俾綿綿亘萬世為祥為瑞為風為雷為雲為雨為殃為害又豈徒然哉從上佛祖無一念心要做大漢生死大事方得了辨然後大漢自然而至始謂之釋迦種草也若有一念馳求成佛作祖之心此謂之敗種焦芽無復發生也年來學道人凡見尊宿不問如之若何祇要人道他有箇見處便歡喜殊不知歡喜底便是討閻羅王鐵棒打你鬼骨臀款子也若是箇漢祇要人道你未在却堪持論菩提離言説從來無得人德山道我宗無語句亦無一法與人趙州道佛之一字吾不喜聞看他恁麼吹砂走石早是瞎人眼了也更向棒頭上討活路一喝下覓出身句無異捕鼠求象牙也所以從上護惜箇一著子二六時中直是無絲頭子虗棄做到無捫摸處無湊泊時却須放下令教虗靜澄湛應于從前知解道理惡知惡見悉皆入作不得便是要徑也一旦洞明腳跟下事徹底透脫去亦不孤釋迦老子叮嚀所謂獅子兒衆隨後三歲便能大哮吼若是野干逐法王百年妖怪虗開口頌古女子出定疏山造塔出得出不得滿面是埃塵愁人莫向愁人説説向愁人愁殺人鑿開荒徑造浮屠往復商量價不孤無限落花隨水去夕陽春色滿江湖香嚴上樹風幡故園春色在枝頭惱亂春風卒未休無事晚來江上望三三兩兩釣魚舟大海波濤湧千江水逆流龍王宮殿裏不見一人遊密菴傑和尚語嗣應菴上堂一進一退一動一靜須信那伽常在定一擒一縱一殺一活四方八面活鱍鱍嘉州大像喫鹽多陝府鐵牛添得渴若作佛法商量喫鐵棒有日在因雪云滿目紛紛呈瑞雪填溝塞壑誰辨別文殊無處頓渾身普賢失却真如訣烏鴉變作白頭鴉鐵樹翻成銀線結報諸人瞥不瞥庭際無人立片時便是太平底時節喝一喝即心即佛鐵牛無骨非心非佛空山突兀不是心不是佛不是物人從鄭州來却得許州信報道今年蠶麥熟風雨時五穀豐萬民樂東村王老聞時嘻嘻而歌曰從來不唱脫空歌把火燒山拾田螺白洛樹梢魚扇子急水灘頭鳥作窠大衆不是文章四六亦非直指單傳哆哆和和如薦得祖師鼻孔一時穿以拂子擊禪牀下座有句無句如藤倚樹石裂崖崩毒蛇當路樹倒藤枯悉哩蘇盧溈山呵呵大笑和贓捉敗了也且水不洗水一句作麼生道皇天無親唯德是輔直菴到舉芙蓉訪實性大師大師上堂以右手拈拄杖倚左邊云此事若不是芙蓉師兄大難委悉師召大衆云實性大師弄巧成拙鈍置他芙蓉師兄直菴師兄今日來烏巨也不拈拄杖亦不與麼道且道與古人是同是別良久云相逢自有知音知何必清風動天地世尊拈花勾賊破家迦葉微笑聲前失照雪峯輥毬雙放雙收玄沙未徹眼中拔屑雲門顧鑑相脫賺俱胝豎指全無巴鼻這一隊漢敵國家財盡被烏巨籍沒了也直得上無片瓦下絶卓錐却來眉毛罅裏埋冤負屈聲聲叫道無惻隱之心非人也無羞惡之心非人也無是非之心非人也烏巨癢處被他抓著不覺手之舞之足之蹈之驀拈拄杖擲下云遇赦咸放少室單傳衲僧巴鼻磑觜生春驢鳴犬吠廁坑籌子念摩訶驚起法身無處避無處避若為論驀拈拄杖卓一卓云我行荒草裏汝又入深村在眼曰見在耳曰聞在手執捉在足運奔豁開則東西南北把住則毫髮不存且道豁開好把住好驀拈拄杖卓一卓云一氣不言含有象萬靈何處荷無私靜悄悄處跳得出閙浩浩處可橫身閙浩浩處挨得行靜悄悄處堪駐足所以德山據一條白棒佛來也打祖來也打且不坐在閙浩浩處靜悄悄處又道我二十年不曾打著一箇獨脫底祥符門下若有獨脫底正好喚來洗腳月生一無角鐵牛眠少室月生二赤腳波斯入閙市月生三氷生於水青出於藍驀拈拄杖橫按顧視云文殊堂裏萬菩薩夜來盡向此中參譬如擲劍揮空莫論及與不及斯乃空輪絶迹劍刃無虧正與麼時如何遂顧視左右云填溝塞壑無人會雨過夜塘秋水深聖節云諸佛不説説祖師不聞聞留下一轉語千古鎮乾坤且道是那一轉語拈起拄杖躬身叉手云皇帝萬歲萬萬歲高高處無物堪比倫低低處猶難擬議一毫端上立寶剎寬廓非外百草頭邊突妙喜世界寂寥非內權實照用並行敲碎髑髏裏眼睛揑出虗空骨髓且聽諸人東卜西卜忽若把斷要津如何通信八月秋何處熱今朝上元節是處挂燈毬一燈燃千百億燈燈燈相續重重無盡如寶絲網三世諸佛向光影裏出現六代祖師向光影裏説法度人四聖六凡向光影裏頭出頭沒山河大地向光影裏成立諸人若信得及去覓其光影來處了不可得便乃坐斷報化佛頭若信不及十二時中被光影使得七顛八倒二由一有一亦莫守一心不生楊生左肘達磨九年面壁覷不破黃面老子三百餘會道不著德山臨濟咬定牙關一場懡㦬華藏到這裏如何道得接手句風暖鳥聲碎日高花影重靈隱佛海遺書至呼猿洞口虗空迸裂鴉飛不度如行如説三十三天撲帝鐘打刀須是賓州鐵喝一喝下座舉演首座立僧舉一不得舉二放過一著落在第二徑山即不然舉一了舉二截斷露布葛藤突出衲僧巴鼻如獅子王哮吼一聲壁立萬仞誰敢正眼覷著一向恁麼去三十年後何止法堂前草深一丈所以釋迦老子道譬如琴瑟箜篌雖有妙音若無妙指終不能發諸人要知妙音妙指齊發麼下座詣首座寮告香諸佛説不到處人人開口道著佛祖行不到處人人舉足踏著既道著又踏著因甚麼從朝至暮不自覺知良久云只為分明極翻令所得遲解夏云一箇葫蘆才倒地滿地葫蘆盡傾倒欲識單傳直指禪今日鬬湊得恰好朝説暮説展演河沙句義不是衲僧分上事行棒行喝敲牀豎拂揚眉瞬目不是衲僧分上事透出兩重關逗到不疑之地正好朝打三千暮打八百且道過在什麼處欲得不招無間業莫謗如來正法輪頌古女子出定狗子佛性出得何如未出時瞎驢成隊喪全機而今四海平如砥蘆管迎風撩亂吹狗子無佛性殺人便償命楚痛百千般因邪却打正趙州洗鉢盂百丈野狐粥了令教洗鉢盂鐵船無底要人扶片帆高挂乘風便截海須還大丈夫五百生前失却五百生後太錯錯錯誰道祥麟只一角即心是佛趙州勘婆大海波濤闊千峯氣象雄古今無間斷南北路頭通天高地厚人難見海闊山遙只自知勘破却回休錯問得便宜是落便宜贊諸祖布袋開明禪師大慧禪師禪不參道不會終日忙忙弄箇布袋十字街頭道等人阿誰知得渠綣繢稽首彌勒世尊國有憲章三千條罪江郎入定烏巨開山林深路逈火冷雲寒道大不知誰辨的帝王親手付金襴𭣟瞎頂門三隻眼是非佛法一齊剗竹篦頭上放無端也是徐六擔片板松源嶽禪師語嗣密菴入院上堂化育之本物我同途祖佛之源古今不易靈然獨露透色透聲坐斷千差孤危不立如天普蓋似地普擎若聖若凡皆承恩力所以我此法印為欲利益世間故説在所遊方勿妄宣傳今日人天普集對衆明明剖露乃豎起拂子云還見麼西天此土的的相承不立階梯獨標象外正與麼時如何千峯勢到嶽邊止萬派聲歸海上銷上士聞道勤而行之弄泥團漢中士聞道若存若亡一刀兩段下士聞道而大笑之彩奔齪家澄照恁麼告報且節文在什麼處利刀割肉瘡猶合惡語傷人恨不消舉古德道君若隨緣得似風飛沙走石不乖空但於事上通無事見色聞聲不用聾古德與麼告報正謂按牛頭喫草若是澄照又誰管得你有問西來便答東從教人笑我佯聾白雲乍可離青嶂明月難教下碧空諸佛説不到處人人開口道著諸佛行不到處人人舉步踏著道著踏著醍醐毒藥苦哉佛陀耶陳年斷貫索退院云生平活計一絲頭嘯月迎風得自由管甚澄江興逆浪等間平步過滄洲冶父門風別無道理種田博飯早眠晏起洗面摸著鼻啜茶濕却觜忽有箇漢出來道低聲低聲墻壁有耳也怪他不得何故洞山佛無光韓信臨朝底喝一喝拈起拄杖云諸佛降生好與三十拄杖諸佛成道好與三十拄杖諸佛轉法輪好與三十拄杖為甚如此鶴有九皋難翥翼馬無千里謾追風應菴密菴同日忌拈香云冤有頭債有主撞破砂盆眼卓豎不是佛不是祖太白峯前只如許這兩箇老凍膿咬牙囓齒同死不同生簸土揚塵有彌天罪過我自江湖四十年漸愧不入他保社既不入他保社因甚今日以此供養遂以手搖曳云嗚咿嗚咿此意分明説向誰拈拄杖云入荒田不揀信手拈來草懷州牛喫禾益州馬腹脹懷寧獨山張主管鑄鍋三口賓頭盧尊者不知失却琉璃碗且道落在什麼處擲拄杖云衆眼難謾拈拄杖云天不言四時行地不言萬物生墻壁瓦礫橫説豎説衲僧家閉却咽喉脣吻道將一句來若道不得拄杖子忍俊不禁自道去也擲下拄杖盡令提綱乾坤黯黑放開一線道泰時清且道本身盧舍那還知慚愧麼三生六十劫達磨九年面壁和贓捉敗盧行者不識字露出尾巴衲僧家氣宇如王只這些子因甚麼透不過樊噲踏鴻門舉風穴示衆云若立一塵野老顰蹙不立一塵野老安貼於此明得闍梨無分全是老僧於此不明老僧即是闍梨闍梨與老僧亦能迷却天下人亦能悟却天下人欲識闍梨麼右邊拍一拍云這裏是欲識老僧麼左邊拍一拍云這裏是應菴師祖拈云大小風穴不會轉身句師云大小風穴醋氣猶在何故始作翕如也縱之純如也皎如也繹如也以成喝一喝拈拄杖召云拄杖子自應諾即心即佛作麼生會云不會非心非佛如何云不會不是心不是佛不是物聻云不會既是不會如何擔荷我祖師擔子復云阿呵呵無物堪比倫教我如何説僧問虗空消殞時如何答云驢不成馬不是師乃云天不能蓋地不能載冷湫湫地是什麼標格野老不知堯舜力鼕鼕打鼓祭江神張弓架箭魚遊網物外安身鳥入籠生殺盡時蠶作繭如何透得這三重應菴老人盡力與麼道也是與賊過梯一大藏教不是黃面老子説底直指人心不是達磨大師傳底盡情為汝諸人道了也還覺頂門重麼舉古德云去年貧未是貧今年貧始是貧去年貧無卓錐地今年貧錐也無師云年去年來貧復貧祖師擡腳重千斤愁人莫向愁人説説向愁人愁殺人解夏云虎丘一夏無可供養諸人諸人合有沒量罪過諸人若識慚愧虎丘也有沒量罪過且道因甚如此石牛沿古路一馬生三寅夫為善知識須是驅耕夫之牛奪飢人之食驅耕夫之牛令他苗稼滋盛奪飢人之食令他永絶飢虗雖然有時逼到萬仞崖頭又須是你當人自肯放身捨命始得舉靈觀和尚常閉門坐一日雪峯敲門觀便開門峯搊住云是凡是聖觀乃唾云這野狐精拓開又閉却門雪峯云也要識老兄師云一不做二不休賓主互換有來由焦磚打著連底凍赤眼撞著火柴頭依經解義三世佛冤離經一字還同魔説達磨九年面壁老盧踏碓舂粳檢點將來也是寸釘入木德山入門便棒望風豎降旗臨濟入門便喝諸人還猛省麼攻乎異端斯害也已言無展事語不投機承言者喪滯句者迷和底掀翻了趙州東院西橫按拄杖云汝等諸人各各命若懸絲復卓拄杖云且救得一半舉僧問白兆和尚如何是萬行兆云今年桃核也無説甚麼爛杏又問如何是妙覺兆云若是妙藥見示一服僧云不問這箇兆云你問甚麼僧云妙覺兆云若是皂角分付浴頭師云這僧不妨懵懂白兆終是惺惺不惺惺藥因救病出金瓶舉灌溪參臨濟濟下禪牀攔胸搊住云道道溪云領濟拓開云且放你一頓溪住院後云我見臨濟無言説直至于今飽不飢師云爐鞴之所鈍鐵猶多雖然如是不因夜來鴈爭見海門秋秉拂豎起拂子云三世諸佛也與麼六代祖師也與麼天下老和尚也與麼見前大衆也與麼山河大地萬象森羅有情無情悉皆與麼只有秉拂上座不與麼為甚麼如此劍去久矣直饒瞥轉玄關大機獨脫呵佛罵祖斬釘截鐵猶是鈍漢何況立問立答舉古舉今激濁揚清談玄説妙大似掉棒打月若也據實而論虗空未足為廣日月未足為明乾坤未足為大萬象未足為衆秉拂上座有口也無説處諸人有耳也無聽處千聖只言自知誰敢正眼覷著所以道向上一路千聖不傳未曾親近早隔大千若向這裏著得一隻眼便見皇風蕩蕩海晏河清君子道長小人道消無一法不是真乘無一物不是妙用塵塵爾剎剎爾如盤走珠何處留礙如斯剖露懵底固是不知落處久參先德腳踏實地又且如何拍禪牀云機關不是韓光作莫把胸襟當等間小參義出豐年是處井中有水禮薄致怨誰家竈裏無煙得路塞路過橋斷橋衲僧家鼻孔遼天不知腳下泥深三尺不著珍御權挂垢衣土曠人稀相逢者少不見道吾本來此土傳法救迷情一花開五葉結果自然成達磨雖是善因却招惡果當時便好貶向鐵圍那畔免見後來承虗接響不思善不思惡那箇是汝本來面目六祖老漢得星兒便乃錮鏴人家男女自從胡亂後三十年不少鹽醬即心即佛非心非佛馬大師一手擡一手搦閙市裏識自己百草頭上薦取老僧看他夾山撞頭磕額回互無門任從天下樂欣欣我猶不肯何故如靈龜負圖自取喪身之兆鳳縈金網趣霄漢以何期末後一句始到牢關洛浦徹底老婆心也是按牛頭喫草觀音大士將錢買胡餅放下手元是箇饅頭雲門大師懸羊頭賣狗肉怎奈他何且道臨濟德山又有甚麼伎倆乃卓拄杖喝一喝云棒頭取證鈍置殺人喝下承當辜負自己先師三頓棒輕似蒿枝貧兒思舊債元來黃檗佛法無多子賊過後張弓潭又不見龍又不現子親到龍潭平地喫交且喜會得末後句只得三年將錯就錯一夏與兄弟説話看翠巖眉毛在麼苦瓠連根苦一箇道生也一箇道作賊人心虗一箇道關一家有事百家忙這一隊漢自不知非胡麻廝繳也好笑亦堪悲不是心不是性家貧難辨素食事忙不及草書信手拈來拍拍是令豈不見馬大師一日上堂畫一圓相云入也打不入也打僧便入馬祖便打僧云和尚打某甲不得馬師靠却拄杖看他作家相見一機一智略露鋒鋩彼此無傷優劣自定既是彼此無傷更説什麼優劣良久云不是山僧逞人我鐵鞭多力恨無酬普説心外無法用王庫刀法外無心發千鈞弩通身無影像遍界絶遮攔一句截流萬像俱透三世諸佛出興只為此一大事六代祖師傳持惟示此一心法如金剛幢如無盡藏如烈火焰如大日輪通徹十虗彌綸萬有直得威音已前以至窮未來際未嘗移易一絲毫盡十方世界無邊香水海只向一絲毫頭上識得根源所以道目前無法意在目前不是目前法非耳目之所到恁麼揭示直下如青天轟一箇霹𮦷相似眨得眼來已過那裏去了而今兄弟多以古人公案心思意解築取一肚皮逢人撒出來以當平生參學子細觀來你也好癡臘月三十日賺你去在山僧頃年在蔣山隨侍應菴師祖常聞道今時兄弟不濟事做工夫二十年也不抵我在衆時一日如何見得他恁麼説話師祖初行腳時在一尊宿會下住多教學者過公案恁麼過也過不得又恁麼過也過不得二人商確不覺雞鳴遂拊掌散去後來一一過得了只是依前肚裏黑漫漫地遂冷地思量若恁麼參禪如何敵得生死聞隨州水南遂和尚道行乃洞下尊宿法嗣恩官人徑往參禮便得歸堂有一連單弟兄長時坐禪不與人交師祖一日問他還少睡麼其僧厲聲道而今是什麼時節更有工夫打睡師祖直得面熱汗下遂發心不捨晝夜以悟為則不過一月連單先有發明師祖亦有發明自此每每入室得路便撑將去遂和尚並不奈何一日入室次喚華兄你也好只是公案未明師祖抗聲道盡大地是一箇公案和尚作麼生明遂和尚便低頭師祖道這老漢了我不得束包望方丈禮三拜便行聞圜悟住雲居直造會下凡遇入室機機相副得數時圜悟提起向上巴鼻竟不能開口圜悟每向人説這箇蘄州子得即得只是腦後少一鎚在圜悟歸蜀師祖也要隨他去圜悟道你不須去有杲首座元侍者彰教隆藏主見處共老僧一般但見他必為汝了却大事遂依教去宣州彰教參隆和尚門庭孤峻直是不容湊泊未經數時遷虎丘亦參隨去續請充維那一日室中舉五祖牽牛過窗話擬祗對次被他劈胸一拳自此打斷命根是時隆和尚欲命首衆會中有圜悟耆舊云華維那嫩在師祖聞得遂書偈於壁間云江上青山殊未老屋頭春色放教遲人言洞裏桃花嫩未必人間有此枝不辭便行此菴元和尚時住處州連雲師祖道我舊在雲居時每喫這漢無滋味如今看來未必他到我田地去驗他看如何才到侍者通報此菴聞得郎忙出來一見便云華兄此番且喜大事了畢師祖道我未曾開口他已知了信知得底人相見不在形言便知落處這箇便是參禪底榜樣豈似今時一般長老與學者相見一句來一句去末後多一句便為贏得禪究竟不知深淺蓋他不曾踏著正脈只在首句裏作活計且如山僧尋常見做工夫兄弟不奈何通一線路引你行一兩步便歡喜才下毒手與你本分草料便發無明自謂長老不識我語或道生滅我移換我你才恁麼見解便是肚裏不安樂如何了得生死所以道參禪須透祖師關妙悟要窮心路絶祖關不透心路不絶盡是依草附木精靈兄弟你若未透且莫粗心直須晝三夜三把做事古人大有方便控你入處豈不見藥山問石頭三乘十二分教某甲粗知承聞南方直指人心見性成佛實未明了乞師垂示石頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得已是八字打開撒放諸人肚裏了也久參兄弟不能得透徹病在於何為你耳裏聽多眼裏見多頑了返不如初機放孟八郎一拶便透如白衣拜相相似緣他無許多搕𣜂知解兄弟這般病痛諸方決定不奈你何嶽上座却有箇方便只要你盡情放下從前學得底參得底諸方傳得底一時揚放他方世界作箇百不知百不會底舌不寄私意不停玄心無所恃行無所倚驀然失腳踏翻可以作箇沒量大漢滅却臨濟正宗與一切人解粘去縛所以道你若高高峯頂立我便深深海底行不是與人難共住大都緇素要分明山僧今夜盡情道了也須知開口不在舌頭上喝一喝頌古不是心不是佛不是物雲門話墮夫子不識字達磨不會禪大唐天子國依舊化三千分明寫出與君看意在鈎頭不在盤縱使石人開得口不知猶被舌頭謾偈頌金山郭璞墓先登閣要識先生真實地龍門浪裏碧崔嵬時人著眼這邊立親切何如到一回大道難將萬物齊先登猶是涉階梯等間平步青霄外回首方知宇宙低示如理居士亮典座歸中峯菴如如不動已周遮理事馳求路轉賒直下踏翻樵子徑知君未到葛洪家太白峯高宇宙低先師靈骨不曾移兒孫箇箇且如許路上行人口似茶湯會求頌春風吹落碧桃花一片流經幾萬家何似飛來峰下寺相邀來喫趙州茶佛事蜀中一上人下火殊上人入塔春雨乍歇春水潺潺春風蕩蕩春鳥關關回首瞿塘煙棹踏翻吳越江山一上座有來端慶快平生是今日紅爐𦦨裏鼓波瀾盡情燒作一堆灰揑不成團擘不開既有這些靈骨在何妨隨處起風雷曹源生禪師語嗣密菴在雲居受妙果請云安樂樹邊藏醜拙浮生穿鑿不相干拄杖朝來剛𨁝跳無端撞破趙州關提起拄杖云看看喚作拄杖子天地懸隔不喚作拄杖子天地懸隔三世諸佛六代祖師天下老和尚到這裏有屈無吽處便恁麼去盡法無民既然裂破面皮不避諸方撿責遂橫按拄杖左右顧視良久云三尺龍泉光照膽太平寰宇斬癡頑喝一喝卓一卓復舉寶公和尚一日傳語思大禪師云何不下山教化衆生一向目視雲漢思大云三世諸佛被我一口吞盡何處更有衆生可度師云殷勤傳語寶公著甚來由費口分疏思大尾巴自露生上座因行掉臂等是下山不問佛及衆生才出頭來便與一刀兩段何故一不做二不休佛法二字人人知有狼毒砒霜那容下口直饒透出威音前也是癡狂外邊走山僧已是拖泥帶水諸人合作麼生會喝一喝飛金烏走玉兔閏月十日又過去無住真人不可尋一夜霜風打門戶釋迦老子道止止不須説我法妙難思喝一喝云面皮厚多少殊不知乾坤大地萬象森羅明暗色空情與無情盡情説了也無你左遮右掩處德山棒臨濟喝俱𦙆豎指雪峯輥毬盡是隔靴抓癢放下著莫妄想是什麼會也無也是喚狗與食更道蘇州菱召伯藕天台華頂南嶽石橋喚作向上提持衲僧門下挈草鞋未得在莫有傍不甘底出來道取一句看直饒道得也是郭郎鼻孔十五日已前不勞再勘十五日已後不用將來正當十五日不昧時機如何通信但見皇風成一片不知何處是封疆冬至豎起拂子云還見麼君子道長擊一下云還聞麼小人道消氷河齊發𦦨石笋暗抽條喝一喝云塵劫來事只在今朝受龜峯請辭衆云披毛戴角入鄽來跳出驢胎墮馬胎佛手明明遮不得從教平地起風雷古帆高挂入曹源雷動風行海嶽昏三十二峯親坐斷卓拄杖一下云一毛頭上現乾坤提起拄杖云看看十方普現剎海齊彰走使文殊普賢驅馳釋迦彌勒把定則銀山鐵壁線路不通放行則匝地普天三頭六臂不放行不把住如王寶劍凜凜神威擬犯鋒鋩橫尸萬里這裏見得徹去堪報不報之恩共助無為之化其或未然龜峯不免為蛇畫足去也以拄杖卓一下云雕弓已挂狼煙息萬國謳歌賀太平春風東扇西扇春雨似晴不晴淺白深紅爛鋪錦繡鶯聲燕語互奏笙篁一一揭示圓通妙門頭頭流通正法眼藏擬心湊泊依前萬水千山直下知歸許你七穿八穴拍禪牀下座結制云衲僧門下三月一結把斷要津聖凡路絶一夜簷頭雨滴聲剛把真機俱漏泄喝云切忌守繫驢橛祈雨兼謝監收云記得睦州看華嚴經僧問和尚看什麼經州云大光明雲青色光明雲紫色光明雲那邊是什麼雲僧云南邊是黑雲州云今日應有雨師云南邊是黑雲今日應有雨宜麻宜豆宜禾宜黍雖然歲稔年豐粒粒幾多辛苦為報參玄人要須知落處若也知得受用無窮若也未知有煩監收諸勤舊舉長沙岑和尚與仰山玩月次仰山指月云人人盡有者箇只是用不得長沙云恰是倩你用去仰山云作麼生用長沙近前一踏踏倒仰山山起來云直下似箇大蟲山僧有箇頌子舉似大衆浮雲散盡月當空兔子懷胎産大蟲跳出風前弄牙爪至今撼動廣寒宮八月過去又九月時節相催不暫停拈拄杖云雲門大師來也劄久雨不晴唯有衲僧鼻孔依前搭在上脣好大哥卓拄杖一下云撲落非他物劃一劃云縱橫不是塵叵耐臨濟賊漢喚作無位真人喝一喝散衆會云古德道一大藏教是箇切腳未審切箇甚字五祖道鉢囉娘圓悟道迅雷不及掩耳二大老與麼切字是即是太煞鄉談忽有人問龜峯一大藏教是箇切腳未審切箇什麼字對他道此去弋陽不遠雨曜劈箭急一年彈指間始見大暑小暑又是小寒大寒通身寒暑無回互笑倒當年老洞山從朝至暮鐘魚鼓板為汝諸人發上上機了也若信得及塵沙諸佛在諸人腳跟下𨁝跳若信不及龜峯拾得口喫飯拍禪牀下座過去諸如來斯門已成就三生六十劫見在諸菩薩今各入圓明墮坑落塹未來修學人當依如是住矢上加尖小參記得死心和尚云叢林小參謂之家訓莫是談玄説妙舉古明今五日上堂三朝入室麼錯莫是行須緩步語要低聲嚴淨威儀精持戒律麼錯莫是行棒行喝吞栗棘蓬透金剛圈輥雪峯毬擔睦州板麼錯衲僧家出一叢林入一保社箇箇頂門具眼人人肘後有符見自己如生冤家聞禪道如風過樹有時孤危壁立線路不通有時合水和泥縱橫十字逢佛殺佛逢祖殺祖造地獄業結無間因馬頷驢腮神頭鬼面終日坐而未嘗坐終日行而未嘗行終日著衣未嘗挂一縷絲終日喫飯未嘗咬著一粒米卷舒出沒蕩蕩無拘如水上葫蘆觸著便動拶著便轉如何近傍如何湊泊直饒三世諸佛六代祖師古往今來大善知識各各現三頭六臂出來只得拱手歸降檢點將來猶是守馬驛撮馬糞底見解向衲僧門下更買草鞋行腳在那堪略無所證一味虗頭誣謗先賢欺瞞自己等間拶著兩腳捎空乃以手拍膝云噁大丈夫兒阿誰無分隨身契券本自分明若解參詳管取丹霄獨步且轉身一句畢竟如何舉頭天外看誰是我般人復舉僧問古德生死以何為舟航古德云年盡不燒錢有箇頌子舉似大衆年盡不燒錢鼠穴被蛇穿直饒玄會得對面隔西天偈頌題烈山題長干塔廟舟船來往此登臨酬酒燒錢慮轉深大抵人心自巇嶮心空山嶽自平沈舍利無端應念來浮圖平地擁崔嵬當年不假金鎚力爭得光明耀九垓鐵鞭韶和尚語嗣密菴上堂結夏云今朝四月十五天下叢林結制衲僧本無多般今且大家隨例不知結者何理制者何義若云結束其身於身無可束若云制禦其心於心無可制若言以此無制無作無止之中任彼一切而為圓覺伽藍是為夾截虗空若言滅彼一切見聞覺知內守幽間是將自家身心而自囚繫去此數路葛藤畢竟如何即是報諸人休擬議不須辛苦歷長期只今便入三摩地咄徽宗皇帝國忌日竪起拂子示衆云還見麼眨得眼來古佛過去久矣珍重春歸夏至薰風匝地須彌山走入蚊子鼻孔裏去大海水藏在禍牛角上直得洪波浩渺白浪滔天不是道不是禪貓兒隔壁呌老鼠走如煙閏月云一五二五機輪無阻南山起雲北山下雨有人却道錦上添花有人又道泥中洗土有人又道離此二途便見丹霄獨步若總如斯論量山僧未敢相許畢竟如何良久云逢人不得錯舉師住泉州光孝判府請開堂祝聖拈香白槌罷師乃云喚什麼作第一義莫有傍不甘者麼出來道看時有僧出問頂𩕳摩醯眼卓竪師拈拄杖卓云住住今日開堂不比尋常佛事設問答到彌勒下生勾鎖連環盛水不漏也祇是空鼓粥飯氣於自己了沒交涉所以道問不在答處答不在問處問答交馳如青天轟霹𮦷看者不容眨眼那堪更向言中定旨句下明宗大似緣木求魚守株待兔殊不知我宗無語句亦無一法與人這裏徹去皇恩佛恩一時報畢其或未然更為錦上添花復卓拄杖一下佛涅槃日云老漢當年臘月八三更夜半顛狂發剛把長釘釘眼睛直至而今未能山僧今日下毒手為他一拔看便下座舉心經云揭諦揭諦波羅揭諦波羅僧揭諦菩提薩摩訶師云釋迦老子大似作賊心虗靈龜曳尾雖然如是更看注腳毀佛謗法不入衆數而終不得滅度自摑口三下為孟侍郎升座一句截流萬機寢削空所空滅寂滅現前坐斷報化佛頭迥脫死生窠臼窠臼迥脫覿體無私塵塵剎剎不昧本光物物頭頭全彰妙用其用也致君澤民經論道其致也空洞無象寂湛常然居富貴而不驕處聲色而不惑於有為界示無為法而不壞滅有為之相於無為界示有為法而不分別無為之性雖先天地生而不為精後天地死而不為老終日變化而不為動畢竟寂滅而不為休雖繁興大用而不擾其神乾坤倒覆而不干其慮蓋為達三祇劫空了一心無住住無所住如是而住覓其住相了不可得去無所去如是而去覓其去相了不可得所以道去來不以象動靜不以心既無心於彼此豈有象於去來生死去來遊園觀耳到箇裏喚作一味平等清淨大解脫門十方如來妙明心地證此地者與佛無殊且道今辰龍圖侍郎證此心地之後生何國土受何勝報要知麼真淨界中留不住塵塵剎剎現全身月月初一十五處處槌鍾打鼓若不毀謗禪道便是呵罵佛祖盡道慈悲接人畢竟無過於此承天鼻孔笑伊直是未敢相許何故坐人舌頭即不無爭教無舌人解語秋光清淺時白鷺和煙嶋良哉觀世音全身入荒草師劄云觀世音菩薩鼻孔盡大地人性命一劄劄將來了也汝等諸人還覺腦門重麼請業海和尚立僧云寶劒未出匣神光射斗牛千兵雖易得一將實難求難求之將既已得之便見兵隨印轉將逐符行坐籌帷幄之中決勝千里之外然雖如是只如不戰屈人兵一著子又作麼生話會委悉麼下座拜請業海禪師特為諸人説破八月秋何處熱風入松聲瑟瑟落霞孤鶩齊飛秋水長天一色不是對景對機不是應時應節畢竟如何下座巡堂去喫茶珍重歇舉教中道一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出未審此經從什麼處出敢請諸人著實道看遂高聲喝云住住不得動著動著三十棒一棒也不較下座師召大衆云會麼欲言言不盡林下好商量且道商量箇什麼良久顧視云一曲兩曲無人會雨過夜塘秋水深解夏舉雪竇在靈隱小參時有箇頌子初看極是冷淡無味難解難入往往從前少有拈掇若子細看來大故驚人蓋他古人得處深奧用處諦當更無禪道佛法道理不比今時説禪説道説妙説玄弄鎗弄刀行棒行喝露風骨説道理奔流度刃疾焰過風有如是惡知惡覺聾瞽後昆此老不作這般去就直拔地和座盤掇出脫體與你相見正所謂老虎無齒臥龍不吟千山月黑六合雲陰山僧快便難逢更為蛇畫足也要後人撿點雪竇頌云六合茫茫竟不知靈山度夏是便宜虗堂夜靜無餘事留得禪僧立片時大衆已畫足了也久立珍重籬畔黃花含曉露庭前丹桂噴秋香明明此物非他物脫體承當不廝當既是承當因甚又却不廝當要知麼三十年後悟去在小參冬夜云運推移日南長至時節到來叢林鼎沸説禪説道舉古明今説東來西來説佛意祖意説寒梅露出祖師眼睛説飛灰漏泄衲僧巴鼻處處潑白露現處處放光動地處處獅子嚬呻處處象王遊戲著著迥脫根塵步步腳踏實地諸方雖然與麼商量南臺這裏總不如是畢竟如何今年柑子熟一顆一文錢破菴先禪師語嗣密菴上堂隔山見煙便知是火隔墻見角便知是牛拈拄杖云這箇不隔一絲毫畢竟喚作什麼有時倚向古屏畔任使丹青入畫圖密菴訃音至云客從南方來報我天童老撞破太虗空全身入荒草而今子細思量令人哭不成哭笑不成笑寥寥目斷千峰曉德山棒起摸畫樣臨濟喝翻成忉怛堪笑無位真人出入面門失却多年破襪暑威尚熾喜見新秋潘閬倒騎驢子梵志翻著襪頭堪笑堪悲自唱自酬有時乘好月特地過滄洲大家共住喫莖虀熟煮爛炊粗餐易飽細嚼難飢冷淡汲滋味從來少人知拍膝一下云此意分明説向誰舉楊岐云楊岐乍住屋壁疏滿堂盡撒雪真珠縮却項暗嗟吁翻憶古人樹下居師云楊岐鬬勝不鬬劣秀峯鬬劣不鬬勝秀峯乍住沒親疏箇箇盡懷滄海珠滿眼湖山看不足釋迦彌勒是他奴馬祖升堂百丈卷席正令不行拗曲作直還知雪竇老人落處麼少林幾坐花木落庾嶺獨行天地寬向上向下全提半提風行草偃斗轉星移總是諸方普請邊事秀峰箇裏只是多年上大人丘乙己拈起則乾坤失色放下則瓦礫生光不拈不放又作麼生卓拄杖一下首夏初臨薰風乍扇急景如梭萬化千變惟有拄杖子黑皴沒思算解道厨庫揖僧堂三門朝佛殿聖節云祖道綿綿王道平平同歌舜日共樂堯年道貫無邊剎境德合一統乾坤且林下道人以何報稱遂起身云萬歲萬歲萬萬歲今朝五月端午不用書符呪語只將這箇拄杖遂卓一下云用作降魔鐵杵楚大夫活捉獰龍張天師倒騎猛虎觸翻東海鯉魚直得傾盆下雨靈山話月曹溪指月玄沙已是嚼飯餧嬰兒寒山子無端更道無物堪比倫教我如何説秀峰路見不平卓拄杖云打破窠窟受廣壽請云釋迦掩室已是誵訛淨名杜詞翻成狼藉若非頂門眼正何以辨明緇素所以道鏡無心而取像妍醜自分劒無意以求人殺活自在顯諸人藏諸用其惟至理乎便恁麼去亦菴居士新建寶坊永延慧命饒益一切可謂功不浪施其或未然但有路可上更高人也行眼見色耳聞聲棒喝交馳拖泥帶水便恁麼大乖張人貧智短馬瘦毛長十方國土中惟有一乘法閙市門頭張三李四東頭買賤西頭賣貴定盤星上稱來未免七顛八錯廣壽長老贏得張口挂壁角從他露柱燈籠打瓦鑽龜搏量卜度誰知笑倒黃幡綽天氣或晴或雨白雲乍卷乍舒行腳漢奔南走北似信不信老臊胡遊梁歷魏似有似無拍膝云劒閣路雖險夜行人更多才涉唇吻便落言詮不落言詮即沉寂滅寂滅則成誑言詮則成謗不誑不謗拄杖子從頭説破卓拄杖一下諸法寂滅相不可以言宣拍膝云老來不著便罪過已彌天住穹窿入三門云常獨行常獨步喝一喝云莫來攔我當門路直指單傳已成迃曲明宗定旨轉見周遮便與麼去執之失度便入邪路放之自然體無去住當爐不避火點出瑕疵與他開山相見去也卓拄杖一下云萬疊湖山磨不盡一天風月鎮長存百不知百不會似兀如癡隨群作隊誰云趙璧無瑕纇為和王升座大人具大見大智得大用胸中懷六合掌內握乾坤致君為堯舜之君佐民為堯舜之民地久天長河清海晏功勳已著德業已成紫綬金章垂蔭後世肅嚴梵宇開大施門運出家珍永延佛子成就無窮諸事莊嚴萬古規模是名特達大丈夫能為出世希有事便乃從無住本示有去來於無去來示同生滅且道具如是威猛作略底人即今在什麼處靈山有路平如砥月戶無人冷似秋復説偈云世出世間希有事顯發須還過量人出沒卷舒驚世夢蓬萊山色又重新舉圓悟祖師道參禪參到無參處參到無參始徹頭後來水菴和尚道參禪參到無參處參到無參未徹頭師云還見二大老節角處麼星河秋一鴈砧杵夜千家節屆書雲陰極陽升冰河發焰枯木抽英惟有拄杖子依舊黑皴不遷不變無辱無榮卓拄杖云笑殺當年面壁人舉教中道凡所有相皆是虗妄遂拈拄杖云若道是有心外有法若道是無心法不周作麼生道得恰好卓一下云劒去久矣病起上堂云臥病恰旬餘氣力無一銖皮穿筋骨露勉強且支捂無鹽無米誰為分疏拈拄杖云拄杖子起來呵呵大笑卓一下云瀉出百斛明珠各請點檢倉庫畢竟是有是無盡道內空外空內外空空空大空勝義空有為空無為空畢竟空山僧不免隨後念一箇蘇嚕蘇嚕中秋云天上月圓人間月半子細看來從頭錯算嫦娥昨夜失金針撼動玉樓尋不見不是心不是佛不是物忍俊不禁為諸人做箇瞥脫卓拄杖一下云流水暗消溪畔石勸人除却是非難華藏首座寮秉拂以大圓覺為我伽藍身心安居平等性智四月十五日結也十方世界若草若木情與無情盡向拂子頭上熏修煉行宴坐經行婢視聲聞奴呼菩薩如今七月十五日解也十方世界若草若木情與無情盡向拂子頭上各各以所得所證法門所修所行行願遍布於微塵之中而彼微塵之量亦不迫隘饒益一切各得其宜直得小根小莖小枝小葉中根中莖中枝中葉大根大莖大枝大葉隨上中下各有所受一雲所雨稱其種性而得生長幸自可憐生被憍陳如尊者起來兜一喝便見三三兩兩把不定不往河南便往河北不妨自由自在驀向中路被人攔住道只如萬里無寸草處作麼生去十箇有五雙撈天摸地直饒總道出門便是草蝦跳不出斗何故人無遠慮必有近憂解夏小參未離兜率已降王宮未出母胎度人已畢已是起摸畫樣了也那堪乘日輪香象示生王宮半夜逾城六年苦行至於布縵天網垂萬里鈎打鳳撈龍隨方任器如印傳印如空藏空全提本地風光揭示正法眼藏大似旁若無人致令守株待兔之流以為實然殊不知我王庫內無如是刀利根上智之士終不向裏許咂啖滋味求覓解會進前退後揀擇摶量向上向下盡底踏翻赤手拏空羅籠不住呼喚不回簸土揚塵飛星撒火覓冤覓讐猶未得其髣佛豈不見道玄門無法不立紀綱若欲討尋聲前薦取見今三期告滿九十日中坐臥經行尅念修證修證已畢梵行已立且作麼生説箇聲前薦取底道理堪羡一堂無事客臥雲深處不朝天歲夜小參智慧弓堅固箭射破虗空成兩片海門斜去兩三行驚起暮天沙塞鴈牛頭沒馬頭回鐵壁銀山一拶開上苑玉池方解凍湖光瀲灔映崔嵬却笑普通年遠事不從蔥嶺帶將來有般漢便道以指喻指逐物却物幽谷寒巖春風遍野是則是斬新日月特地乾坤順朱填墨且從汝諸人七顛八倒或若新故交參倒轉律管何以明辨須知衲僧家拄杖頭上有回天轉地底生涯不挂本來衣不據空王殿謗於佛毀於法不入衆數遇橋斷橋得路塞路誰問你七十三八十四者也周由也未是他棲泊處只如金不博金水不洗水又且如何任大也須從地起更高爭奈有天何偈頌達磨六祖自讚梁皇殿前不能把定少林山下風波愈盛若解慎初護末不到圖形畫影揚下採樵斧直入碓坊舂一腳踏到底黃梅信息通錯錯錯徒名邈畫得十成欠蹄少角一任天下人貶剝為真上人下火初上人撒骨真不立妄本空有無俱遣不空空直饒空盡無一物正好投身烈焰中揚下娘生褲投身大火聚火聚裏翻身失却最初步正恁麼時如何鴈影落寒潭孤舟橫野渡穎菴主撒骨掉却錢塘佳致湖山占得清幽泥牛鬪入海便乃賦歸休皮膚脫落短棹孤舟不著此岸不著彼岸不住中流有時乘好月特地過滄洲笑菴悟和尚語嗣密菴上堂舉院主請藥山為衆上堂衆才集山便歸方丈院主白云和尚既許為衆説禪因甚一言不措山云經有經師論有論師爭怪得老僧師云克由叵耐一人為衆竭力禍出私門一人命若懸絲死而不弔祥符門下令不虗行當時若見掘箇深坑一時埋却遂回顧侍者云侍者還甘麼侍者擬議師喝云將頭不猛纍及三軍山僧夜來得箇夢夢見三教聖人各説一段禪孔夫子道生而知之者上也學而知之者次也山僧向他道之乎者也字經三寫李老君道恍恍惚惚其中有物杳杳冥冥其中有精山僧向他道求生不得生求死不得死末後黃面老子道未離兜率已降王宮未出母胎度人已畢山僧去他耳垛邊輕輕向他道少賣弄忽然雲門趙州德山臨濟法眼曹洞溈仰聞得簇簇上來棒喝交馳君臣父子透聲透色截斷衆流卓然而立三教聖人才見懡羅而退山僧豁開眼來元來是大宋國內崑山縣中資福剎竿頭上展家風善法堂前龍蛇混雜遂召大衆云且道夜來夢底是今朝説底是喝一喝云是汝諸人眼在什麼處今朝七月半叢林解制忙當頭老水牯筋骨不堪當大家團欒禮三拜栴檀薝蔔一般香開爐云今朝開爐向火諸方説禪浩浩靈山一字也無普請大家證據既是一字也無又證據箇什麼蘇嚧蘇嚧三月一日云一即三三即一碧眼胡僧數不出少林面壁九年大似抱贓呌屈屈屈黃檗樹頭討甚木蜜舉德山入門便棒頌云倒嶽傾湫與麼來小根魔子謾疑猜神駒一躍三千界空説門前下馬臺舉僧問睦州以一重去一重即不問不以一重去一重時如何州云昨日栽茄子今日種冬瓜師頌云昨日栽茄子今日種冬瓜一聲河滿子和月落誰家讚政黃牛清曠情懷世莫羈放心異類樂斯時千山萬水無窮意只許灘頭白鷺知晦翁明和尚上堂語附嗣木菴若論此事如人學書點劃可效者功否者拙要之當筆忘手當手忘心當心忘字若如是學名為善學衲僧門下猶喚作順朱小兒假使觀鵝得妙入石三分猶自昧却毫錐未舉文彩未彰時消息且作麼生是文彩未彰時消息良久云孔門弟子憑誰委碧眼胡僧只自知出隊云山僧明日為國出戰去也列五位君臣布三玄軍伍披忍辱鎧操智慧刀彎石鞏弓擂禾山鼓破慳貪賊摧我慢幢且要六國歸降十方肅靜風祥雨順物阜時康且功成事遂一句又作麼生猛將謀臣韜略在好看齊唱凱歌旋無示諶和尚語嗣長靈上堂心月孤圓光吞萬象光非照境境亦非存光境俱忘一場罪過這裏見得則知一大藏教是水底捉月歷代祖師是月中逃影聲聞緣覺未忘所標之指凡夫外道住在覆盆之下衲僧家慷慨作略不受安排切忌以手斫額一花開天下春乃拈起拄杖云這拄杖子抽枝引蔓汝等諸人藉其覆蔭為日久矣一葉落天下秋這拄杖子皮膚脫落盡惟有真實在汝等諸人鼻孔眼睛失却了也還委悉麼只知今日明日誰管前秋後秋投子下繩牀趙州喫茶去得路便行因行掉臂不無古人爭奈腳跟已深三尺若是個漢但向雲騰致雨處道將一句來這個若是頭上安頭這個不是斬頭覓活慎初護末不無古人爭奈小心太過廬山向你道這個若是瓦礫生光這個不是真金失色汝等諸人何不因行掉臂復云一不做二不休更為汝一等拈出這個若是驢脣先生這個不是日宮天子汝等諸人放下死蛇頭得也未文殊智普賢行多年曆日德山棒臨濟喝亂世英雄汝等諸人穿僧堂入佛殿還知險過鐵圍麼忽若踏著釋迦頂𩕳磕著聖僧額頭不免又是禍事謝知事云尺頭有寸鑑者猶希稱尾無星且莫錯認若欲定古今輕重較佛祖短長但請於中著一隻眼果能一尺還他十寸八兩元是半斤自然內外和平家國無事山僧今日已是兩手分付汝等諸人還肯信受奉行也無尺量刀剪遍世間志公不是間和尚法鼓未鳴已前大衆未集之際團圝元縫罅佛祖不知名及乎法鼓既鳴被行者一槌打作三截一截落在諸人眉毛眼睫上為尊為貴一截塞在諸人咽喉裏為災為害一截今在山僧手中恣意𨁝跳直饒你更參三十年終不分付滴水冰生不須駐足大地火發須自轉身解轉身方得到家不駐足始能進步進步則踏翻大海到家則劃斷程途雖然裂半作三要且自南自北還委悉麼青山不鎖長飛勢滄海合知來處高舉仰山問僧好雨僧云好雨仰云好在什麼處僧無語仰云你問我僧云好在什麼處仰指雨示之師拈云仰山向一滴之水興盡波瀾要且只瞞得這僧顯寧即不然好在什麼處君子愛財取之有道舉積翠云春雨淋漓連宵徹曙點點無私不落別處且道落在什麼處自云滴破汝眼睛浸爛你鼻孔師拈云恁麼説話大似石人腰帶黃門栽鬚顯寧則不然兩手扶犁水過膝舉跋陀婆羅與十六開士同時入浴忽悟水因雪竇頌云了事衲僧消一個長連牀上展腳臥夢中曾説悟圓通香水洗來驀面唾師云以強凌弱臨危悚人雪竇不能無過要且矢在弦上而今莫有眨上眉毛者麼恁麼見得非唯跋陀婆羅一人盡大地總被雪竇唾了若未委悉各請歸堂向巾單下摸𢱢面看舉雲門云三日不相見莫作舊時看衆無語自代云千師云廬山道一汝等諸人邊有會處麼一言不中千言無用舉僧問雲門如何是塵塵三昧門云鉢裏飯桶裏水師云飢食渴飲把筯拈匙如恆河沙計工多少量彼來處萬中無一舉水潦問馬祖如何是佛法大意祖攔胸踏倒潦起來拍掌大笑云也大奇百千法門無量妙義只向一毫頭上識得根源去師云踏則踏倒了也爭奈這一毫頭猶在心聞賁和尚語嗣無示上堂請雨舉僧問長靈和尚如何是衲衣下事靈云天旱為民愁諸禪德還知落處麼吞盡山川風雲吐出江河日月能為暗能為明能為陰能為陽能該括衆妙無有遺餘能包含萬類不露形品無出是這天旱為民愁一句驀然變作龍自在王菩薩往十方世界興雲吐霧抉電掀雷扇清涼風灑甘露雨使焦者潤渴者涼枯者榮死者活而這一句子本不曾動本不曾移本不曾知本不曾覺還委悉麼無限蒼生待霖雨不知龍向此中蟠舉百丈上堂有一老人在座下聽法不去丈遂問立者何人老人答云某甲於過去迦葉佛時曾住此山時有學者問大修行底人還落因果也無某答云不落因果遂墮野狐中今經五百劫請禪師代一轉語老人遂理前問百丈云不昧因果老人於言下脫野狐身師云這一則話叢林商量甚衆要且只添得羣隊多不能於言下脫得本體瑞巖今日不惜口業為你諸人分明説破要會麼五百生中受屈祇緣不識個落字百千衆中較量祇緣不識個昧字都來兩字誵訛陷却多少平直而今要識這兩字落處麼喝一喝云三十三天撲落地再蘇不免復搖頭分明似是被人問著又疑特地不疑等間拶著又走只這些兒透不過有多少處放不下皆緣目前有見不除意上起知不已致使情緣間隔語路參差腳一撩虗心頭打撞龍翔是恁麼説破了也還有惺惺靈利底麼便請摘斷一條絲向丹霄獨步病起云維摩病説盡道理龍翔病咳嗽不已咳嗽不已説盡道理説盡道理咳嗽不已汝等諸人還識得其中意旨也未本是長江湊風冷却教露柱患頭風聖節云天是恁麼高一人之壽恁麼高地是恁麼厚一人之福恁麼厚山河恁麼廣一人之體量是恁麼廣日月恁麼明一人之智鑑是恁麼明無相似底故曰獨步乾坤無超越底故曰坐斷今古汝等諸人十二時中行住坐臥莫不承他恩力還識得知恩報德也未一句了然超百億萬年藤亦解山呼達磨見梁皇問聖諦只道得個不識六祖見黃梅付衣鉢只道得個不會天下老和尚只將這個不識不會勘驗衲僧天下衲僧被這不識不會換却眼睛穿却鼻孔長蘆恁麼道是識了也是會了也是換却眼睛穿却鼻孔了也如何道得出身一句名高不用鐫頑石路上行人口似到顯寧升座一放一收半開半合把不定底主人公已隨他去喚不回底擔板漢漸覺頭低借路經過覽溪山之各異閭門相接荷主禮之甚勤罄一夕之劇談空數載之鄙吝人事周足佛法現成更登猊座説葛藤大似雷門呈布鼓然雖如是覿面若無青白眼宗風那得到如今團圝擘不破瀟灑覷不見喚作正法眼入地獄如箭長蘆今日不顧鑊湯爐炭向你諸人道今朝五月初一了也且莫昧却妙觀察智入夏來一月日了也且莫昧却大圓鏡智二六時中動著則汗流如雨且莫昧却成所作智三智雖然不離一心敢問大衆心在什麼處喝一喝云老老大大著甚死急舉僧問雲峯悅和尚如何是第一要悅云蛇穿鼠穴問如何是第二要悅云猢孫上樹問如何是第三要悅云村裏草鞋師云雲峯只知認許多路頭走不知背後被人點背然後如是健行闊步能有幾個而今或有人問長蘆如何是第一要李白歌詩如何是第二要公孫舞劒如何是第三要張顛草書長蘆走得腳步更闊汝等諸人還有趕上來底麼若不得流水還應過別山火爐天曉説法熚熚𪹼𪹼鼻孔夜半談禪䶎䶎䶎䶎三玄三要相合雜熚熚𪹼𪹼千言萬語無差錯無差錯相夾雜地藏栽田博飯噇仰山解把鍬兒插舉雪竇云要得真實相為但以上無攀仰下絶己躬自然常光現前箇箇壁立萬仞師云雪竇恁麼道教小兒順朱即得忽遇張顛出來把髻蘸墨打箇丿乀定是討精魂不見萬年又且如何濃將紅粉傅了面滿把真珠蓋却頭不識佳人真面目空教人唱小涼州謝監收云不作青見不作黃見不作不青不黃見這樣禾在汝諸人自性田中成熟久矣萬年今日與你舉似全收一句竪起拂子云看刈禾鎌上見南泉無限黃雲俱割盡舉趙州問大慈般若以何為體慈云般若以何為體州呵呵大笑次日趙州掃地次慈云般若以何為體州放下子呵呵大笑師云要會麼張公拾得箇鋤頭却被李公認將去張公索手無可用不免又問李公借借則任你借切不得道是我底頌讚國師一念相應竿頭崖頭撒手去閬州澧州尋路歸廉纖脫盡全機露八角磨盤空裏飛趙州勘婆婆子因行掉臂趙州因事長智無端一句誵訛惹得四海鼎沸勘破了有誰知春風過後無消息留得殘花一兩枝僧問國師盧舍那過淨瓶來帶雪含霜半倚籬橫斜影裏露仙姿前村昨夜春來了竹屋老僧猶未知麻谷參章敬南泉繞禪牀明宣一道聰明呪暗寫兩行靈寶符謾道騎鯨遊六合何曾有夢到華胥悼落牙汝從何所來遁迹在我口美惡必同嘗冷暖共知有我口時動搖汝體常堅守失何一病纏遽落鉗匠手汝今先我徂我在嗟無後堅者既不留軟者豈能久平生敲磕句一一如雷吼嚼破百彌盧咬斷衆窠臼我力既若是汝形安得朽無生復無離庶洗言説咎慈航朴和尚語嗣無示上堂清白傳家赤窮到骨心似寒灰口如木棎縱有些兒葛藤盡機也拈不出憑何接待方來聊與一摑一咄遂喝一喝拍禪牀下座花開似錦普現法身鳥語如篁深談實相見聞不昧聲色全真大龍玄沙出諸人眼入諸人耳入諸人耳出諸人眼且道於衲僧門下是第幾機良久云會麼人從陳州來不得許州信參南山起雲北山下雨是古佛與露柱相交底機諸人無不委知只如兔子懷胎蚌含明月又作麼生分般若體用要知麼枝高攀不得和樹抱將來是法平等無有高下是名阿耨多羅三藐三菩提師拈云天左旋地右轉是平等法雲開日出雨下雷興是平等法松直棘曲鵠白烏玄是平等法僧投寺裏宿賊打不良家是平等法山僧坐諸人立是平等法且作麼生是阿耨多羅三藐三菩提良久云雨滋三草秀春風不褁頭洞山麻三斤趙州庭前柏滯貨賣不行未免著潤色五彩畫牛頭便道是極則七寶絡象身此個更奇特桃花紅李花白東君怯寒辨未得且令胡蝴舞三臺木和成十八拍阿呵呵可憐陌上遊人開眼堂堂著賊咦結夏云行者擊動法鼓一椎將圓覺伽藍打得百雜碎撒在十方世界東西十萬南北八千衲僧拄杖頭鞋袋裏以至百草頭上罔不周匝恁麼委悉得去則知山僧與諸人依法而住剋期修證其來久矣然雖如是且道以何為驗卓拄杖一下眉毛相結過蔥嶺八字論功卒未休再卓一下擊塗毒鼓駕鐵牛機萬里不留行十方俱坐斷佛祖不敢正眼覷著魔外直得拱手歸降是則是不辱宗風更須倩人看僧堂始得而今事不獲已平高就下將鳥缸打破作硯瓦子賣去也卓拄杖一下云百雜碎又卓一下云買來買來一文兩個兩文三個又連卓兩下要過鐵蛇山須是不惜性命底要咽石砂豏須是併却咽喉底併却咽喉咽得石砂豏永劫飽不惜性命過得鐵蛇山從此活鱍鱍既活鱍鱍飽更不他求頓除諸念自然上無攀仰下絶己躬常光現前壁立萬仞直饒如是未可眼空四海更須知有老僧手中木葛怛子始得觀音巖玲玲瓏瓏太白石丁丁東東西園菜蟥似不堪食東谷花發却無賴紅且道是祖意教意途中受用世諦流布若辨不出雪峯覆却飯桶若辨得出甘贄禮拜蒸籠參呈無示和尚赤腳波斯入大唐一家有事百家忙而今四海清如鏡率土普天歸我王
