body:
  text: 達磨西來道個不立文字早是立了也致令千載之下所至堆山積嶽堆積既多覽者厭飫今此録者乃是前衆人厭飫之中撮出一二譬若上林春色在一兩花豈待爛窺紅紫然後知韶光之浩蕩也既知春矣喚此録作立文字也得不立文字也得總不干事戊戌佛成道日鼓山晦室師明序續刊古尊宿語要目録第一集天臨濟汾陽昭琅瑘覺慈明圓翠巖真黃龍南死心新晦堂心泐潭英兜率悅草堂清靈源清湛堂準長靈卓第二集地法眼益雲門偃法昌遇雪竇顯天衣懷曹山寂投子青芙蓉楷真歇了宏智覺古巖璧天章楚真淨文隱山璨妙湛慧金粟智第三集日楊岐會白雲端保寧勇五祖演南堂興佛眼遠圜悟勤開福寧佛性泰月菴果復菴封第四集月佛心才山堂洵別峯珍雲蓋本虎丘隆應菴華密菴傑松源嶽曹源生鐵鞭韶破菴先笑菴悟晦翁明附無示諶心聞賁慈航朴第五集星大慧杲晦菴光此菴淨懶菴需佛照光誰菴演遁菴演竹原元蒙菴嶽石菴玿退菴先混源密空叟印木菴永柏堂雅第六集辰雪堂行竹菴圭晦菴光別峯印退菴奇東山空廣鑒瑛水菴一別峯雲或菴體目録終
